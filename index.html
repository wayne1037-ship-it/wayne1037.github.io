<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090d14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="B1-C1 單字庫" />
    <title>B1-C1 iPhone 單字庫</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #090d14;
  --panel: #101722;
  --panel-2: #141d2a;
  --panel-3: #1a2433;
  --text: #eef5ff;
  --muted: #9aa8bc;
  --soft: #c6d3e5;
  --line: #263348;
  --accent: #5eead4;
  --accent-2: #7dd3fc;
  --danger: #fb7185;
  --warn: #fbbf24;
  --good: #86efac;
  --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
  --radius: 8px;
  --tap: 44px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  background:
    linear-gradient(180deg, rgba(94, 234, 212, 0.08), transparent 260px),
    var(--bg);
  color: var(--text);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(1480px, 100%);
  margin: 0 auto;
  padding: 24px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent);
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(1.9rem, 5vw, 3.2rem);
  line-height: 1.05;
}

h2 {
  margin-bottom: 4px;
  font-size: 1.15rem;
}

h3 {
  margin-bottom: 8px;
}

.top-actions {
  display: flex;
  gap: 10px;
}

.icon-button,
.secondary-button,
.primary-button,
.ghost-button,
.filter-pill,
.status-pill,
.mode-tab,
.answer-button {
  min-height: var(--tap);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  color: var(--text);
}

.icon-button {
  width: var(--tap);
  font-size: 1.1rem;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.stat-card {
  min-height: 86px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 23, 34, 0.88);
  box-shadow: var(--shadow);
}

.stat-label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.86rem;
}

.stat-card strong {
  font-size: 1.9rem;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(420px, 0.9fr) minmax(460px, 1.1fr);
  gap: 18px;
  align-items: start;
}

.library-panel,
.study-panel,
.detail-card,
.quiz-card,
.wrong-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 23, 34, 0.92);
  box-shadow: var(--shadow);
}

.library-panel {
  position: sticky;
  top: 16px;
  padding: 16px;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
}

.panel-header p,
#resultSummary {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 0.9rem;
}

.search-wrap {
  margin: 14px 0 12px;
}

#searchInput {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  outline: none;
  background: #0c121c;
  color: var(--text);
  padding: 0 14px;
}

#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.14);
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.filters.compact {
  margin-bottom: 14px;
}

.filter-pill,
.status-pill,
.mode-tab {
  padding: 0 14px;
  color: var(--soft);
}

.filter-pill.active,
.status-pill.active,
.mode-tab.active {
  border-color: rgba(94, 234, 212, 0.78);
  background: rgba(94, 234, 212, 0.14);
  color: var(--accent);
}

.word-list {
  display: grid;
  gap: 8px;
  max-height: calc(100vh - 342px);
  min-height: 320px;
  overflow: auto;
  padding-right: 4px;
}

.word-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  width: 100%;
  min-height: 76px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: var(--panel-2);
  color: var(--text);
  padding: 12px;
  text-align: left;
}

.word-row:hover,
.word-row.active {
  border-color: rgba(125, 211, 252, 0.72);
  background: var(--panel-3);
}

.word-main {
  min-width: 0;
}

.word-title {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 5px;
}

.word-title strong {
  font-size: 1.12rem;
}

.pos {
  color: var(--accent-2);
  font-size: 0.84rem;
}

.meaning {
  color: var(--soft);
  font-size: 0.94rem;
  line-height: 1.35;
}

.row-badges {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 25px;
  border-radius: 999px;
  padding: 0 8px;
  background: #0b111a;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 700;
  white-space: nowrap;
}

.badge.level-B1 {
  color: #bfdbfe;
  background: rgba(59, 130, 246, 0.18);
}

.badge.level-B2 {
  color: #fcd34d;
  background: rgba(245, 158, 11, 0.18);
}

.badge.level-C1 {
  color: #f0abfc;
  background: rgba(217, 70, 239, 0.18);
}

.badge.wrong {
  color: #fecdd3;
  background: rgba(251, 113, 133, 0.18);
}

.badge.mastered {
  color: #bbf7d0;
  background: rgba(34, 197, 94, 0.18);
}

.study-panel {
  overflow: hidden;
}

.mode-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px;
  border-bottom: 1px solid var(--line);
  background: rgba(11, 17, 26, 0.76);
}

.view {
  display: none;
  min-height: 620px;
  padding: 18px;
  border: 0;
  box-shadow: none;
}

.view.active {
  display: block;
}

.detail-head {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.detail-word {
  margin-bottom: 8px;
  font-size: clamp(2rem, 5vw, 3.4rem);
  line-height: 1;
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
  align-content: start;
}

.primary-button,
.secondary-button,
.ghost-button {
  padding: 0 14px;
}

.primary-button {
  border-color: rgba(94, 234, 212, 0.78);
  background: rgba(94, 234, 212, 0.16);
  color: var(--accent);
}

.ghost-button {
  background: transparent;
  color: var(--soft);
}

.info-grid {
  display: grid;
  gap: 12px;
}

.info-block {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(20, 29, 42, 0.7);
  padding: 14px;
}

.info-block label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
}

.info-block p {
  margin-bottom: 0;
  color: var(--soft);
  line-height: 1.55;
}

.example {
  color: var(--text) !important;
  font-size: 1.06rem;
}

.quiz-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  color: var(--muted);
}

.quiz-body {
  display: grid;
  gap: 16px;
}

.quiz-question {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  padding: 16px;
}

.quiz-question p {
  margin-bottom: 0;
  font-size: clamp(1.2rem, 4vw, 1.7rem);
  line-height: 1.5;
}

.blank {
  display: inline-flex;
  min-width: 88px;
  justify-content: center;
  border-bottom: 2px solid var(--accent);
  color: var(--accent);
  font-weight: 800;
}

.answers {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.answer-button {
  min-height: 60px;
  padding: 10px 12px;
  text-align: left;
  font-weight: 800;
}

.answer-button.correct {
  border-color: var(--good);
  background: rgba(34, 197, 94, 0.16);
  color: var(--good);
}

.answer-button.incorrect {
  border-color: var(--danger);
  background: rgba(251, 113, 133, 0.16);
  color: var(--danger);
}

.answer-button:disabled {
  cursor: default;
}

.feedback {
  border-radius: var(--radius);
  padding: 12px;
  background: rgba(125, 211, 252, 0.12);
  color: var(--soft);
  line-height: 1.5;
}

.feedback.good {
  background: rgba(34, 197, 94, 0.14);
}

.feedback.bad {
  background: rgba(251, 113, 133, 0.14);
}

.wrong-list {
  display: grid;
  gap: 10px;
}

.wrong-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  padding: 12px;
}

.wrong-item strong {
  display: block;
  margin-bottom: 4px;
}

.wrong-item p {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 0.9rem;
}

.empty-state {
  display: grid;
  min-height: 260px;
  place-items: center;
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  color: var(--muted);
  text-align: center;
  padding: 24px;
}

@media (max-width: 980px) {
  .app-shell {
    padding: 18px 14px calc(18px + env(safe-area-inset-bottom));
  }

  .stats-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .workspace {
    grid-template-columns: 1fr;
  }

  .library-panel {
    position: static;
  }

  .word-list {
    max-height: 54vh;
  }

  .view {
    min-height: auto;
  }
}

@media (max-width: 620px) {
  .topbar,
  .detail-head {
    align-items: stretch;
    flex-direction: column;
  }

  .detail-actions {
    justify-content: stretch;
  }

  .detail-actions button {
    flex: 1 1 auto;
  }

  .answers {
    grid-template-columns: 1fr;
  }

  .word-row,
  .wrong-item {
    grid-template-columns: 1fr;
  }

  .row-badges {
    flex-wrap: wrap;
  }

  .mode-tabs {
    position: sticky;
    top: 0;
    z-index: 5;
  }
}



/* iPhone single-file edition */
:root {
  --tap: 48px;
}

html {
  background: #05070b;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(180deg, rgba(94, 234, 212, 0.1), rgba(9, 13, 20, 0) 220px),
    var(--bg);
  -webkit-font-smoothing: antialiased;
}

.app-shell {
  width: min(430px, 100%);
  min-height: 100dvh;
  padding: max(14px, env(safe-area-inset-top)) 12px calc(22px + env(safe-area-inset-bottom));
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  align-items: center;
  margin: calc(-1 * max(14px, env(safe-area-inset-top))) -12px 12px;
  padding: calc(12px + env(safe-area-inset-top)) 12px 10px;
  background: rgba(9, 13, 20, 0.9);
  border-bottom: 1px solid rgba(38, 51, 72, 0.76);
  backdrop-filter: blur(18px);
}

.eyebrow {
  font-size: 0.72rem;
}

h1 {
  font-size: 1.55rem;
  line-height: 1.1;
}

.stats-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card {
  min-height: 70px;
  padding: 10px 7px;
  box-shadow: none;
}

.stat-label {
  margin-bottom: 6px;
  font-size: 0.68rem;
  white-space: nowrap;
}

.stat-card strong {
  font-size: 1.18rem;
}

.workspace {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.library-panel,
.study-panel,
.detail-card,
.quiz-card,
.wrong-card {
  box-shadow: none;
}

.library-panel {
  position: static;
  padding: 12px;
}

.panel-header {
  align-items: end;
}

#searchInput {
  min-height: 50px;
  font-size: 16px;
}

.filters {
  gap: 7px;
}

.filter-pill,
.status-pill,
.mode-tab {
  flex: 1 1 auto;
  padding: 0 10px;
  font-size: 0.9rem;
}

.word-list {
  max-height: 52dvh;
  min-height: 300px;
  overflow: auto;
  padding-right: 2px;
  -webkit-overflow-scrolling: touch;
}

.word-row {
  grid-template-columns: 1fr;
  min-height: 74px;
  padding: 12px;
}

.word-title {
  flex-wrap: wrap;
}

.row-badges {
  flex-wrap: wrap;
}

.study-panel {
  overflow: visible;
}

.mode-tabs {
  position: sticky;
  bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 18;
  gap: 8px;
  margin: 0 0 12px;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(11, 17, 26, 0.92);
  backdrop-filter: blur(18px);
}

.view {
  min-height: auto;
  padding: 14px;
}

.detail-head {
  align-items: stretch;
  flex-direction: column;
}

.detail-word {
  font-size: 2.3rem;
}

.detail-actions {
  display: grid;
  grid-template-columns: 1fr;
  justify-content: stretch;
}

.info-block {
  padding: 13px;
}

.quiz-topline {
  align-items: stretch;
}

.answers,
.wrong-item {
  grid-template-columns: 1fr;
}

.answer-button {
  min-height: 58px;
  text-align: center;
}

.empty-state {
  min-height: 180px;
}

    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">B1-C1 Vocabulary</p>
          <h1>單字庫</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="resetProgressButton" type="button" title="清除本機進度" aria-label="清除本機進度">
            <span aria-hidden="true">↺</span>
          </button>
        </div>
      </header>

      <section class="stats-grid" aria-label="學習總覽">
        <article class="stat-card">
          <span class="stat-label">總字數</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">熟記</span>
          <strong id="masteredCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">錯題</span>
          <strong id="wrongCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">今日</span>
          <strong id="todayCount">0</strong>
        </article>
      </section>

      <main class="workspace">
        <section class="library-panel" aria-labelledby="libraryTitle">
          <div class="panel-header">
            <div>
              <h2 id="libraryTitle">所有單字</h2>
              <p id="resultSummary">載入中...</p>
            </div>
          </div>

          <div class="search-wrap">
            <input id="searchInput" type="search" autocomplete="off" placeholder="搜尋單字、中文、搭配或例句" />
          </div>

          <div class="filters" aria-label="等級篩選">
            <button class="filter-pill active" type="button" data-level="ALL">All</button>
            <button class="filter-pill" type="button" data-level="B1">B1</button>
            <button class="filter-pill" type="button" data-level="B2">B2</button>
            <button class="filter-pill" type="button" data-level="C1">C1</button>
          </div>

          <div class="filters compact" aria-label="狀態篩選">
            <button class="status-pill active" type="button" data-status="all">全部</button>
            <button class="status-pill" type="button" data-status="wrong">錯題</button>
            <button class="status-pill" type="button" data-status="learning">複習</button>
            <button class="status-pill" type="button" data-status="mastered">熟記</button>
          </div>

          <div class="word-list" id="wordList" role="list" aria-label="單字列表"></div>
        </section>

        <section class="study-panel">
          <nav class="mode-tabs" aria-label="功能分頁">
            <button class="mode-tab active" type="button" data-view="detail">詳情</button>
            <button class="mode-tab" type="button" data-view="quiz">測驗</button>
            <button class="mode-tab" type="button" data-view="wrong">錯題</button>
          </nav>

          <section class="detail-card view active" id="detailView" aria-live="polite">
            <div class="empty-state">選一個單字查看詳情。</div>
          </section>

          <section class="quiz-card view" id="quizView" aria-live="polite">
            <div class="quiz-topline">
              <span id="quizSource">錯題優先</span>
              <button class="secondary-button" id="nextQuizButton" type="button">下一題</button>
            </div>
            <div id="quizBody" class="quiz-body">
              <div class="empty-state">按「下一題」開始用例句練習。</div>
            </div>
          </section>

          <section class="wrong-card view" id="wrongView" aria-live="polite">
            <div class="panel-header">
              <div>
                <h2>錯題區</h2>
                <p>連續答對 2 次會自動移出錯題。</p>
              </div>
            </div>
            <div id="wrongList" class="wrong-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script id="vocab-data" type="application/json">[{"id":"C1-2-compliance","level":"C1","word":"compliance","pos":"n.","meaning":"遵守；服從","collocations":"in compliance with, compliance with rules","example":"All employees must act in compliance with company policy.","translation":"所有員工必須依照公司政策行事。"},{"id":"C1-3-shareholder","level":"C1","word":"shareholder","pos":"n.","meaning":"股東","collocations":"major shareholder, shareholder meeting","example":"The shareholders voted to approve the merger.","translation":"股東們投票通過了合併案。"},{"id":"C1-4-initiate","level":"C1","word":"initiate","pos":"v.","meaning":"發起；開始","collocations":"initiate a process, initiate talks","example":"The government initiated a new education reform.","translation":"政府啟動了一項新的教育改革。"},{"id":"C1-5-heighten","level":"C1","word":"heighten","pos":"v.","meaning":"加劇；增強","collocations":"heighten awareness, heighten tension","example":"The incident heightened public concern about safety.","translation":"這起事件加劇了公眾對安全的擔憂。"},{"id":"C1-6-proclaim","level":"C1","word":"proclaim","pos":"v.","meaning":"宣告；宣布","collocations":"proclaim independence, proclaim victory","example":"The president proclaimed a state of emergency.","translation":"總統宣布進入緊急狀態。"},{"id":"C1-7-decision-making","level":"C1","word":"decision-making","pos":"n.","meaning":"決策","collocations":"decision-making process, decision-making power","example":"Good decision-making is essential for effective leadership.","translation":"良好的決策能力對有效領導至關重要。"},{"id":"C1-8-supervision","level":"C1","word":"supervision","pos":"n.","meaning":"監督；監管","collocations":"under supervision, close supervision","example":"Children should be under adult supervision at all times.","translation":"兒童在任何時候都應在成人監督下活動。"},{"id":"C1-9-educator","level":"C1","word":"educator","pos":"n.","meaning":"教育者","collocations":"experienced educator, educator training","example":"She is a dedicated educator with 20 years of experience.","translation":"她是一位有二十年教學經驗的資深教育工作者。"},{"id":"C1-10-blessing","l e reconstruction of the bombed city took decades.","translation":"遭轟炸城市的重建工作花了數十年時間。"},{"id":"C1-176-lesser","level":"C1","word":"lesser","pos":"adj.","meaning":"較小的；次要的","collocations":"lesser evil, lesser known","example":"He chose the lesser of two evils.","translation":"他選擇了兩害相權取其輕。"},{"id":"C1-177-swing","level":"C1","word":"swing","pos":"v./n.","meaning":"搖擺；轉變；擺動","collocations":"swing in opinion, golf swing","example":"Public opinion swung sharply after the scandal.","translation":"醜聞爆發後，民意急遽反轉。"},{"id":"C1-178-gear","level":"C1","word":"gear","pos":"n./v.","meaning":"齒輪；裝備；針對","collocations":"top gear, gear up for","example":"The team geared up for the final competition.","translation":"球隊為最後的比賽做好了準備。"},{"id":"C1-179-insult","level":"C1","word":"insult","pos":"v./n.","meaning":"侮辱；冒犯","collocations":"add insult to injury, verbal insult","example":"His comment was taken as a personal insult.","translation":"他的評論被視為對個人的侮辱。"},{"id":"C1-180-attribute","level":"C1","word":"attribute","pos":"v./n.","meaning":"歸因於；屬性","collocations":"attribute to, key attribute","example":"She attributed her success to hard work.","translation":"她將自己的成功歸因於努力工作。"},{"id":"C1-181-readily","level":"C1","word":"readily","pos":"adv.","meaning":"容易地；樂意地","collocations":"readily available, readily admit","example":"Information is readily available online.","translation":"資訊在網路上隨手可得。"},{"id":"C1-182-epidemic","level":"C1","word":"epidemic","pos":"n.","meaning":"流行病；泛濫","collocations":"flu epidemic, epidemic of violence","example":"The obesity epidemic is a major public health challenge.","translation":"肥胖症的流行是重大的公共衛生挑戰。"},{"id":"C1-183-noon","level":"C1","word":"noon","pos":"n.","meaning":"正午；中午","collocations":"at noon, high noon","example":"The meeting is scheduled for noon tomorrow.","translation":"會議安排在明天中午舉行。"},{"id":"C1-184-delicate","level":"C1","word":"delicate","pos":"adj.","meaning":"微妙的；精緻的；脆弱的","collocations":"delicate balance, delicate situation","example":"It was a delicate situation requiring careful handling.","translation":"這是一個需要謹慎處理的敏感情況。"},{"id":"C1-185-systematic","level":"C1","word":"systematic","pos":"adj.","meaning":"系統性的；有條理的","collocations":"systematic approach, systematic review","example":"A systematic review of the evidence was conducted.","translation":"對相關證據進行了系統性的審查。"},{"id":"C1-186-cognitive","level":"C1","word":"cognitive","pos":"adj.","meaning":"認知的","collocations":"cognitive ability, cognitive development","example":"Early education supports cognitive development in children.","translation":"早期教育有助於兒童的認知發展。"},{"id":"C1-187-reflection","level":"C1","word":"reflection","pos":"n.","meaning":"反射；倒影；反思","collocations":"deep reflection, on reflection","example":"On reflection, he decided to change his strategy.","translation":"經過反思，他決定改變策略。"},{"id":"C1-188-rally","level":"C1","word":"rally","pos":"v./n.","meaning":"集會；重新振作；拉力賽","collocations":"stock market rally, political rally","example":"The stock market rallied after the announcement.","translation":"公告發布後，股市出現反彈。"},{"id":"C1-189-sceptical","level":"C1","word":"sceptical","pos":"adj.","meaning":"持懷疑態度的","collocations":"be sceptical of, remain sceptical","example":"Many experts are sceptical about the new treatment.","translation":"許多專家對這種新療法持懷疑態度。"},{"id":"C1-190-resignation","level":"C1","word":"resignation","pos":"n.","meaning":"辭職；認命","collocations":"letter of resignation, forced resignation","example":"She handed in her resignation after the scandal.","translation":"醜聞發生後，她遞交了辭呈。"},{"id":"C1-191-compile","level":"C1","word":"compile","pos":"v.","meaning":"編輯；彙編","collocations":"compile data, compile a report","example":"She compiled a list of recommended books.","translation":"她整理了一份推薦書單。"},{"id":"C1-192-strategic","level":"C1","word":"strategic","pos":"adj.","meaning":"戰略性的；策略的","collocations":"strategic planning, strategic partnership","example":"The company made a strategic decision to enter the Asian market.","translation":"公司做出了進軍亞洲市場的戰略決定。"},{"id":"C1-193-d ":"on the bench, park bench","example":"The judge took her place at the bench.","translation":"法官就坐在審判台上。"},{"id":"C1-228-legislation","level":"C1","word":"legislation","pos":"n.","meaning":"立法；法律","collocations":"pass legislation, draft legislation","example":"New legislation was introduced to protect workers' rights.","translation":"新法規相繼出台，以保護工人的權利。"},{"id":"C1-229-anchor","level":"C1","word":"anchor","pos":"n./v.","meaning":"錨；主播；固定","collocations":"news anchor, anchor a discussion","example":"She was the anchor of the evening news programme.","translation":"她是晚間新聞節目的主播。"},{"id":"C1-230-flourish","level":"C1","word":"flourish","pos":"v.","meaning":"繁榮；茁壯成長","collocations":"flourish under, businesses flourish","example":"Arts and culture flourish in a free society.","translation":"在一個自由的社會中，藝術和文化蓬勃發展。"},{"id":"C1-231-intake","level":"C1","word":"intake","pos":"n.","meaning":"攝取量；進氣口；新生","collocations":"food intake, daily intake","example":"You should reduce your intake of sugar and salt.","translation":"你應該減少糖和鹽的攝取量。"},{"id":"C1-232-administrator","level":"C1","word":"administrator","pos":"n.","meaning":"行政人員；管理者","collocations":"school administrator, hospital administrator","example":"The administrator managed the hospital's daily operations.","translation":"這位行政人員負責管理醫院的日常運作。"},{"id":"C1-233-merge","level":"C1","word":"merge","pos":"v.","meaning":"合併；融合","collocations":"merge companies, merge with","example":"The two banks merged to form a larger institution.","translation":"兩家銀行合併，組建了一家規模更大的機構。"},{"id":"C1-234-diagnosis","level":"C1","word":"diagnosis","pos":"n.","meaning":"診斷","collocations":"receive a diagnosis, early diagnosis","example":"Early diagnosis of cancer greatly improves survival rates.","translation":"早期發現癌症可大幅提高生存率。"},{"id":"C1-235-infamous","level":"C1","word":"infamous","pos":"adj.","meaning":"臭名昭著的","collocations":"infamous for, infamous criminal","example":"The city became infamous for its high crime rate.","translation":"這座城市因高犯罪率而聲名狼藉。"},{ "characterize as, characterize by","example":"The decade was characterized by rapid technological change.","translation":"這十年以科技的快速變革為主要特徵。"},{"id":"C1-245-grip","level":"C1","word":"grip","pos":"v./n.","meaning":"抓牢；控制；掌控","collocations":"in the grip of, tight grip","example":"The country was in the grip of a financial crisis.","translation":"這個國家正深陷金融危機之中。"},{"id":"C1-246-specimen","level":"C1","word":"specimen","pos":"n.","meaning":"樣本；標本","collocations":"blood specimen, museum specimen","example":"The doctor ordered a specimen to be sent to the lab.","translation":"醫生下令將樣本送往實驗室化驗。"},{"id":"C1-247-comply","level":"C1","word":"comply","pos":"v.","meaning":"遵守；服從","collocations":"comply with rules, comply with a request","example":"All companies must comply with environmental regulations.","translation":"所有公司必須遵守環保法規。"},{"id":"C1-248-absence","level":"C1","word":"absence","pos":"n.","meaning":"缺席；不存在","collocations":"in the absence of, absence from","example":"In the absence of evidence, no charges were filed.","translation":"在缺乏證據的情況下，沒有提出任何指控。"},{"id":"C1-249-referendum","level":"C1","word":"referendum","pos":"n.","meaning":"公投；全民投票","collocations":"hold a referendum, referendum on","example":"The country held a referendum on independence.","translation":"這個國家就獨立問題舉行了公民投票。"},{"id":"C1-250-militia","level":"C1","word":"militia","pos":"n.","meaning":"民兵；民兵組織","collocations":"armed militia, paramilitary militia","example":"The militia took control of the capital overnight.","translation":"民兵一夜之間控制了首都。"},{"id":"C1-251-crown","level":"C1","word":"crown","pos":"n./v.","meaning":"王冠；加冕；頂點","collocations":"crown jewels, crown champion","example":"She was crowned champion after winning the tournament.","translation":"她贏得錦標賽後加冕為冠軍。"},{"id":"C1-252-profound","level":"C1","word":"profound","pos":"adj.","meaning":"深刻的；深遠的","collocations":"profound impact, profound knowledge","example":"Her words had a profound effect on his life.","translation":"她的話對他的人生產生了深遠的影響。"},{"id":"C1-253-embark","level":"C1","word":"embark","pos":"v.","meaning":"開始；踏上","collocations":"embark on a journey, embark on a project","example":"The company embarked on a major expansion programme.","translation":"公司啟動了一項重大的擴張計畫。"},{"id":"C1-254-corrupt","level":"C1","word":"corrupt","pos":"adj./v.","meaning":"腐敗的；腐化","collocations":"corrupt official, corrupt data","example":"Several corrupt officials were arrested in the crackdown.","translation":"數名腐敗官員在這次整治行動中遭到逮捕。"},{"id":"C1-255-formulate","level":"C1","word":"formulate","pos":"v.","meaning":"制定；提出","collocations":"formulate a plan, formulate a policy","example":"The team worked together to formulate a strategy.","translation":"團隊攜手合作，制定了一套策略。"},{"id":"C1-256-provision","level":"C1","word":"provision","pos":"n.","meaning":"規定；條款；供應","collocations":"make provision for, legal provision","example":"The contract includes a provision for early termination.","translation":"合約包含一項提前終止的條款。"},{"id":"C1-257-dominance","level":"C1","word":"dominance","pos":"n.","meaning":"主導；支配地位","collocations":"market dominance, global dominance","example":"The company maintained its dominance in the tech sector.","translation":"公司在科技領域保持了其主導地位。"},{"id":"C1-258-explosive","level":"C1","word":"explosive","pos":"adj./n.","meaning":"爆炸性的；炸藥","collocations":"explosive growth, explosive device","example":"The discovery was explosive news for the industry.","translation":"這項發現對整個業界來說是爆炸性的消息。"},{"id":"C1-259-reasoning","level":"C1","word":"reasoning","pos":"n.","meaning":"推理；邏輯","collocations":"logical reasoning, flawed reasoning","example":"His reasoning was sound and his conclusions convincing.","translation":"他的推理嚴謹，結論令人信服。"},{"id":"C1-260-supervisor","level":"C1","word":"supervisor","pos":"n.","meaning":"主管；上司","collocations":"direct supervisor, line supervisor","example":"Her supervisor praised her outstanding work.","translation":"她的上司稱讚了她出色的工作。"},{"id":"C1-261-incur","level":"C1","word":"incur","pos":"v.","meaning":"招致；承擔","collocations":"incur costs, incur losses","example":"The company incurred significant losses last quarter.","translation":"公司上季度蒙受了重大損失。"},{"id":"C1-262-discrimination","level":"C1","word":"discrimination","pos":"n.","meaning":"歧視；辨別","collocations":"racial discrimination, discrimination against","example":"Discrimination in the workplace is illegal.","translation":"職場歧視是違法的。"},{"id":"C1-263-lengthy","level":"C1","word":"lengthy","pos":"adj.","meaning":"冗長的；漫長的","collocations":"lengthy process, lengthy debate","example":"The case involved a lengthy legal battle.","translation":"這起案件涉及一場漫長的法律訴訟。"},{"id":"C1-264-consensus","level":"C1","word":"consensus","pos":"n.","meaning":"共識；一致意見","collocations":"reach a consensus, broad consensus","example":"There was a general consensus that changes were needed.","translation":"普遍達成共識，認為有必要進行變革。"},{"id":"C1-265-aesthetic","level":"C1","word":"aesthetic","pos":"adj./n.","meaning":"美學的；美感","collocations":"aesthetic value, minimalist aesthetic","example":"The building has a modern aesthetic design.","translation":"這棟建築擁有現代美學設計。"},{"id":"C1-266-contrary","level":"C1","word":"contrary","pos":"adj./n.","meaning":"相反的；相反","collocations":"on the contrary, contrary to expectations","example":"Contrary to expectations, the team won easily.","translation":"出乎意料地，球隊輕鬆取得了勝利。"},{"id":"C1-267-sue","level":"C1","word":"sue","pos":"v.","meaning":"起訴；控告","collocations":"sue for damages, sue a company","example":"She decided to sue the company for wrongful dismissal.","translation":"她決定以不當解僱為由起訴公司。"},{"id":"C1-268-hazard","level":"C1","word":"hazard","pos":"n.","meaning":"危害；冒險","collocations":"health hazard, hazard warning","example":"Icy roads are a major hazard in winter.","translation":"結冰的道路是冬季的一大危險隱患。"},{"id":"C1-269-copyright","level":"C1","word":"copyright","pos":"n.","meaning":"版權；著作權","collocations":"copyright infringement, copyright holder","example":"The photographer owns the copyright to her images.","translation":"這位攝影師擁有她所拍攝照片的版權。"},{"id":"C1-270-correction","level":"C1","word":"correction","pos":"n.","meaning":"更正；糾正","collocations":"make a correction, correction facility","example":"The newspaper published a correction to the original story.","translation":"報紙就原始報導刊登了更正啟事。"},{"id":"C1-271-elevate","level":"C1","word":"elevate","pos":"v.","meaning":"提升；升高","collocations":"elevate to, elevate status","example":"His work elevated the status of the entire department.","translation":"他的工作提升了整個部門的地位。"},{"id":"C1-272-medieval","level":"C1","word":"medieval","pos":"adj.","meaning":"中世紀的","collocations":"medieval castle, medieval history","example":"The city is famous for its medieval architecture.","translation":"這座城市以其中世紀建築而聞名。"},{"id":"C1-273-inability","level":"C1","word":"inability","pos":"n.","meaning":"無能；無法","collocations":"inability to, inability to cope","example":"Her inability to meet deadlines caused problems.","translation":"她無法在截止日期前完成工作，造成了一些問題。"},{"id":"C1-274-noble","level":"C1","word":"noble","pos":"adj./n.","meaning":"高貴的；貴族","collocations":"noble cause, noble gesture","example":"Helping others is a noble thing to do.","translation":"幫助他人是一件高尚的事。"},{"id":"C1-275-backdrop","level":"C1","word":"backdrop","pos":"n.","meaning":"背景；布景","collocations":"against a backdrop, scenic backdrop","example":"The protest took place against a backdrop of economic crisis.","translation":"這場抗議是在經濟危機的背景下發生的。"},{"id":"C1-276-deprive","level":"C1","word":"deprive","pos":"v.","meaning":"剝奪；使缺乏","collocations":"deprive of rights, deprive of sleep","example":"Children should not be deprived of their right to education.","translation":"兒童不應被剝奪受教育的權利。"},{"id":"C1-277-citizenship","level":"C1","word":"citizenship","pos":"n.","meaning":"公民身分；公民資格","collocations":"dual citizenship, apply for citizenship","example":"She was granted citizenship after ten years of residency.","translation":"在十年居留後，她獲得了公民身份。"},{"id":"C1-278-patrol","level":"C1","word":"patrol","pos":"v./n.","meaning":"巡邏","collocations":"on patrol, patrol the streets","example":"Police officers were patrolling the neighbourhood.","translation":"警察在社區巡邏。"},{"id":"C1-279-conserve","level":"C1","word":"conserve","pos":"v.","meaning":"保護；節省","collocations":"conserve energy, conserve resources","example":"We must act now to conserve endangered species.","translation":"我們必須立即採取行動，保護瀕危物種。"},{"id":"C1-280-crawl","level":"C1","word":"crawl","pos":"v.","meaning":"爬行；緩慢移動","collocations":"crawl along, traffic crawl","example":"The baby began to crawl at seven months.","translation":"嬰兒在七個月大時開始爬行。"},{"id":"C1-281-integrity","level":"C1","word":"integrity","pos":"n.","meaning":"誠信；完整性","collocations":"moral integrity, data integrity","example":"A leader must demonstrate personal integrity at all times.","translation":"一位領導者必須時刻展現出個人的誠信。"},{"id":"C1-282-warrior","level":"C1","word":"warrior","pos":"n.","meaning":"戰士；勇士","collocations":"fierce warrior, warrior spirit","example":"She was known as a warrior for social justice.","translation":"她被譽為社會正義的鬥士。"},{"id":"C1-283-correlate","level":"C1","word":"correlate","pos":"v.","meaning":"相關；使相互關聯","collocations":"correlate with, positively correlate","example":"Exercise levels correlate with overall health outcomes.","translation":"運動量與整體健康狀況呈正相關。"},{"id":"C1-284-entitle","level":"C1","word":"entitle","pos":"v.","meaning":"賦予權利；給…命名","collocations":"be entitled to, entitle a book","example":"Citizens are entitled to free healthcare.","translation":"公民享有免費醫療的權利。"},{"id":"C1-285-bay","level":"C1","word":"bay","pos":"n.","meaning":"海灣；月桂樹；(at) bay","collocations":"keep at bay, parking bay","example":"The hotel had a stunning view of the bay.","translation":"這家酒店擁有令人嘆為觀止的海灣景色。"},{"id":"C1-286-log","level":"C1","word":"log","pos":"n./v.","meaning":"原木；記錄；登入","collocations":"log in, activity log","example":"Please log in with your username and password.","translation":"請使用您的用戶名和密碼登入。"},{"id":"C1-287-influential","level":"C1","word":"influential","pos":"adj.","meaning":"有影響力的","collocations":"highly influential, influential figure","example":"She became one of the most influential politicians of her generation.","translation":"她成為了她那一代最有影響力的政治人物之一。"},{"id":"C1-288-long-time","level":"C1","word":"long-time","pos":"adj.","meaning":"長期的","collocations":"long-time ally, long-time friend","example":"He is a long-time supporter of the party.","translation":"他是這個政黨長期以來的支持者。"},{"id":"C1-289-array","level":"C1","word":"array","pos":"n.","meaning":"一系列；陣列","collocations":"wide array, array of options","example":"The store offered a wide array of products.","translation":"這家商店提供種類繁多的產品。"},{"id":"C1-290-minimize","level":"C1","word":"minimize","pos":"v.","meaning":"最小化；降到最低","collocations":"minimize risk, minimize costs","example":"The company took steps to minimize environmental damage.","translation":"公司採取措施，將對環境的損害降至最低。"},{"id":"C1-291-frustrating","level":"C1","word":"frustrating","pos":"adj.","meaning":"令人沮喪的","collocations":"frustrating experience, frustrating delays","example":"Dealing with bureaucracy can be incredibly frustrating.","translation":"與官僚體制打交道可能令人極為沮喪。"},{"id":"C1-292-commissioner","level":"C1","word":"commissioner","pos":"n.","meaning":"委員；局長；專員","collocations":"police commissioner, election commissioner","example":"The police commissioner addressed the press conference.","translation":"警察局長召開了記者招待會。"},{"id":"C1-293-trail","level":"C1","word":"trail","pos":"n./v.","meaning":"小徑；追蹤；落後","collocations":"trail behind, hiking trail","example":"She left a trail of clues for the investigators.","translation":"她為調查人員留下了一連串的線索。"},{"id":"C1-294-condemn","level":"C1","word":"condemn","pos":"v.","meaning":"譴責；判罪","collocations":"strongly condemn, condemn to death","example":"World leaders condemned the attack in the strongest terms.","translation":"世界各國領導人以最強烈的措辭譴責了這次攻擊。"},{"id":"C1-295-stake","level":"C1","word":"stake","pos":"n.","meaning":"利害關係；賭注；股份","collocations":"at stake, high stakes","example":"There is a lot at stake in this negotiation.","translation":"這場談判事關重大。"},{"id":"C1-296-collaborate","level":"C1","word":"collaborate","pos":"v.","meaning":"合作；協作","collocations":"collaborate with, collaborate on","example":"Scientists collaborated across borders to find a solution.","translation":"科學家跨越國界合作，尋求解決方案。"},{"id":"C1-297-texture","level":"C1","word":"texture","pos":"n.","meaning":"質地；紋理","collocations":"rough texture, food texture","example":"The artist used different textures to create depth.","translation":"這位藝術家利用不同的紋理製造出深度感。"},{"id":"C1-298-domain","level":"C1","word":"domain","pos":"n.","meaning":"領域；域名","collocations":"public domain, area of domain","example":"Artificial intelligence is a rapidly evolving domain.","translation":"人工智慧是一個快速發展的領域。"},{"id":"C1-299-cocktail","level":"C1","word":"cocktail","pos":"n.","meaning":"雞尾酒；混合物","collocations":"cocktail party, toxic cocktail","example":"A cocktail of stress and poor diet damaged his health.","translation":"壓力與不良飲食習慣的雙重夾擊損害了他的健康。"},{"id":"C1-300-slavery","level":"C1","word":"slavery","pos":"n.","meaning":"奴隸制；奴役","collocations":"abolish slavery, modern slavery","example":"The abolition of slavery was a turning point in history.","translation":"廢除奴隸制度是歷史上的一個轉折點。"},{"id":"C1-301-magical","level":"C1","word":"magical","pos":"adj.","meaning":"神奇的；魔法的","collocations":"magical experience, magical thinking","example":"The sunset over the ocean was a truly magical moment.","translation":"夕陽西下，海上的景色真可謂美輪美奐。"},{"id":"C1-302-mentor","level":"C1","word":"mentor","pos":"n./v.","meaning":"導師；指導","collocations":"find a mentor, mentor a student","example":"She was mentored by a senior executive early in her career.","translation":"她在職業生涯早期得到了一位高階主管的指導。"},{"id":"C1-303-outlook","level":"C1","word":"outlook","pos":"n.","meaning":"前景；觀點；態度","collocations":"economic outlook, positive outlook","example":"The economic outlook for the region looks promising.","translation":"該地區的經濟前景看好。"},{"id":"C1-304-frankly","level":"C1","word":"frankly","pos":"adv.","meaning":"坦白地；直白地","collocations":"frankly speaking, quite frankly","example":"Frankly, I think the decision was a mistake.","translation":"坦白說，我認為這個決定是個錯誤。"},{"id":"C1-305-regime","level":"C1","word":"regime","pos":"n.","meaning":"政權；體制","collocations":"authoritarian regime, tax regime","example":"The regime was overthrown in a military coup.","translation":"這個政權在一場軍事政變中被推翻。"},{"id":"C1-306-worship","level":"C1","word":"worship","pos":"v./n.","meaning":"崇拜；禮拜；信仰","collocations":"religious worship, hero worship","example":"The temple is a place of worship for millions.","translation":"這座神廟是數百萬人的朝聖之地。"},{"id":"C1-307-closure","level":"C1","word":"closure","pos":"n.","meaning":"關閉；終結；了斷","collocations":"emotional closure, factory closure","example":"The closure of the mine put thousands out of work.","translation":"礦場關閉使數千人失業。"},{"id":"C1-308-instinct","level":"C1","word":"instinct","pos":"n.","meaning":"本能；直覺","collocations":"survival instinct, trust your instincts","example":"Her instinct told her not to trust him.","translation":"她的直覺告訴她不要相信他。"},{"id":"C1-309-accordingly","level":"C1","word":"accordingly","pos":"adv.","meaning":"因此；相應地","collocations":"act accordingly, plan accordingly","example":"The situation changed, and we adjusted our plans accordingly.","translation":"情況發生了變化，我們相應地調整了計畫。"},{"id":"C1-310-ash","level":"C1","word":"ash","pos":"n.","meaning":"灰燼；梣木","collocations":"volcanic ash, cigarette ash","example":"The fire left nothing but ash.","translation":"大火過後，只剩下一片灰燼。"},{"id":"C1-311-presidential","level":"C1","word":"presidential","pos":"adj.","meaning":"總統的","collocations":"presidential election, presidential candidate","example":"The presidential election takes place every four years.","translation":"總統大選每四年舉行一次。"},{"id":"C1-312-legendary","level":"C1","word":"legendary","pos":"adj.","meaning":"傳奇的；極著名的","collocations":"legendary performance, legendary status","example":"His legendary performance at the World Cup is still remembered.","translation":"他在世界盃上的傳奇表現至今仍令人津津樂道。"},{"id":"C1-313-riot","level":"C1","word":"riot","pos":"n./v.","meaning":"暴動；騷亂","collocations":"race riot, riot police","example":"Riot police were deployed to restore order.","translation":"防暴警察被部署到現場以恢復秩序。"},{"id":"C1-314-enrich","level":"C1","word":"enrich","pos":"v.","meaning":"使豐富；充實","collocations":"enrich your life, enrich the soil","example":"Travel can enrich your understanding of other cultures.","translation":"旅行可以豐富你對其他文化的理解。"},{"id":"C1-315-toll","level":"C1","word":"toll","pos":"n.","meaning":"通行費；代價；死亡人數","collocations":"death toll, take a toll","example":"The death toll from the earthquake rose to over 1,000.","translation":"地震死亡人數攀升至逾一千人。"},{"id":"C1-316-occasional","level":"C1","word":"occasional","pos":"adj.","meaning":"偶爾的；不時的","collocations":"occasional visit, occasional mistake","example":"She made occasional visits to her childhood home.","translation":"她偶爾會回到童年時的家探望。"},{"id":"C1-317-moderate","level":"C1","word":"moderate","pos":"adj./v.","meaning":"適度的；溫和的；主持","collocations":"moderate views, moderate a debate","example":"The host moderated the panel discussion.","translation":"主持人主持了小組討論。"},{"id":"C1-318-substitution","level":"C1","word":"substitution","pos":"n.","meaning":"替換；代替","collocations":"substitution effect, player substitution","example":"The coach made a substitution in the second half.","translation":"教練在下半場進行了換人。"},{"id":"C1-319-notify","level":"C1","word":"notify","pos":"v.","meaning":"通知；告知","collocations":"notify of, officially notify","example":"Please notify us of any changes to your plans.","translation":"請將您計畫的任何變動通知我們。"},{"id":"C1-320-solidarity","level":"C1","word":"solidarity","pos":"n.","meaning":"團結；連帶","collocations":"show solidarity, in solidarity with","example":"Workers marched in solidarity with striking colleagues.","translation":"工人們聲援罷工的同事，一同遊行示威。"},{"id":"C1-321-terminate","level":"C1","word":"terminate","pos":"v.","meaning":"終止；結束","collocations":"terminate a contract, terminate employment","example":"The contract can be terminated with 30 days' notice.","translation":"合約可在提前三十天通知後終止。"},{"id":"C1-322-consistency","level":"C1","word":"consistency","pos":"n.","meaning":"一致性；始終如一","collocations":"lack of consistency, consistency in","example":"Consistency in quality is key to customer satisfaction.","translation":"品質的一致性是客戶滿意度的關鍵。"},{"id":"C1-323-meantime","level":"C1","word":"meantime","pos":"n./adv.","meaning":"同時；期間","collocations":"in the meantime, for the meantime","example":"In the meantime, we'll keep working on the proposal.","translation":"在此期間，我們將繼續推進這份提案。"},{"id":"C1-324-wit","level":"C1","word":"wit","pos":"n.","meaning":"機智；才智","collocations":"sharp wit, have the wit","example":"She responded with quick wit that delighted the audience.","translation":"她機智幽默的回應讓觀眾開心不已。"},{"id":"C1-325-oral","level":"C1","word":"oral","pos":"adj.","meaning":"口頭的；口腔的","collocations":"oral exam, oral hygiene","example":"He passed his oral examination with flying colours.","translation":"他以優異的成績通過了口試。"},{"id":"C1-326-carve","level":"C1","word":"carve","pos":"v.","meaning":"雕刻；開闢","collocations":"carve out a niche, carve wood","example":"She carved a successful career in law.","translation":"她在法律界開創了一番成功的事業。"},{"id":"C1-327-bare","level":"C1","word":"bare","pos":"adj./v.","meaning":"裸露的；最基本的；揭露","collocations":"bare minimum, bare the truth","example":"He survived on the bare minimum of food and water.","translation":"他僅靠最少量的食物和水勉強維生。"},{"id":"C1-328-transparency","level":"C1","word":"transparency","pos":"n.","meaning":"透明度；公開性","collocations":"financial transparency, lack of transparency","example":"Greater transparency in government is essential.","translation":"政府更透明是至關重要的。"},{"id":"C1-329-fleet","level":"C1","word":"fleet","pos":"n.","meaning":"艦隊；一批（車輛）","collocations":"fishing fleet, fleet of cars","example":"The company operates a fleet of delivery vehicles.","translation":"公司運營著一支配送車輛車隊。"},{"id":"C1-330-obsess","level":"C1","word":"obsess","pos":"v.","meaning":"使著迷；縈繞","collocations":"obsess over, be obsessed with","example":"He was obsessed with achieving perfection.","translation":"他對完美有一種近乎偏執的追求。"},{"id":"C1-331-endeavour","level":"C1","word":"endeavour","pos":"v./n.","meaning":"努力；嘗試","collocations":"in an endeavour to, human endeavour","example":"She endeavoured to complete the project on time.","translation":"她竭盡全力按時完成了這個項目。"},{"id":"C1-332-pipeline","level":"C1","word":"pipeline","pos":"n.","meaning":"管道；輸油管；流程","collocations":"in the pipeline, talent pipeline","example":"Several new products are in the pipeline for next year.","translation":"明年有幾款新產品即將推出。"},{"id":"C1-333-midst","level":"C1","word":"midst","pos":"n.","meaning":"中間；當中","collocations":"in the midst of, in our midst","example":"The decision came in the midst of a crisis.","translation":"這個決定是在危機之中做出的。"},{"id":"C1-334-strain","level":"C1","word":"strain","pos":"n./v.","meaning":"壓力；拉傷；張力；費力","collocations":"financial strain, muscle strain","example":"The long hours put a strain on family life.","translation":"長時間工作給家庭生活帶來了壓力。"},{"id":"C1-335-migration","level":"C1","word":"migration","pos":"n.","meaning":"遷移；移民","collocations":"mass migration, bird migration","example":"Climate change is driving large-scale migration.","translation":"氣候變遷正在推動大規模的人口遷移。"},{"id":"C1-336-simulate","level":"C1","word":"simulate","pos":"v.","meaning":"模擬；假裝","collocations":"simulate conditions, simulate an attack","example":"The training exercise simulated a real disaster scenario.","translation":"這場訓練演習模擬了真實的災難情景。"},{"id":"C1-337-complexity","level":"C1","word":"complexity","pos":"n.","meaning":"複雜性；複雜程度","collocations":"growing complexity, complexity of","example":"The complexity of the problem surprised the researchers.","translation":"這個問題的複雜性令研究人員感到驚訝。"},{"id":"C1-338-asylum","level":"C1","word":"asylum","pos":"n.","meaning":"庇護；精神病院","collocations":"seek asylum, political asylum","example":"Thousands of refugees applied for asylum at the border.","translation":"數千名難民在邊境申請庇護。"},{"id":"C1-339-inadequate","level":"C1","word":"inadequate","pos":"adj.","meaning":"不足的；不夠的","collocations":"inadequate funding, prove inadequate","example":"The current resources are wholly inadequate for the task.","translation":"現有資源完全不足以應對這項任務。"},{"id":"C1-340-offspring","level":"C1","word":"offspring","pos":"n.","meaning":"後代；子孫","collocations":"raise offspring, protect offspring","example":"Both parents took part in raising their offspring.","translation":"父母雙方共同參與撫養子女。"},{"id":"C1-341-resemble","level":"C1","word":"resemble","pos":"v.","meaning":"像；類似","collocations":"closely resemble, resemble in appearance","example":"She closely resembles her mother.","translation":"她長得很像她的母親。"},{"id":"C1-342-parliamentary","level":"C1","word":"parliamentary","pos":"adj.","meaning":"議會的；國會的","collocations":"parliamentary debate, parliamentary system","example":"A parliamentary inquiry was launched into the scandal.","translation":"議會就這起醜聞展開調查。"},{"id":"C1-343-stark","level":"C1","word":"stark","pos":"adj.","meaning":"鮮明的；嚴酷的；赤裸裸的","collocations":"stark contrast, stark reminder","example":"The photographs served as a stark reminder of the tragedy.","translation":"那些照片是對悲劇慘烈程度的有力提醒。"},{"id":"C1-344-discharge","level":"C1","word":"discharge","pos":"v./n.","meaning":"排放；出院；解雇；射擊","collocations":"discharge from hospital, discharge duties","example":"He was discharged from hospital after three days.","translation":"他在住院三天後出院。"},{"id":"C1-345-vague","level":"C1","word":"vague","pos":"adj.","meaning":"模糊的；含糊的","collocations":"vague idea, remain vague","example":"Her answer was too vague to be helpful.","translation":"她的回答太模糊，幫不上什麼忙。"},{"id":"C1-346-calculation","level":"C1","word":"calculation","pos":"n.","meaning":"計算；估算","collocations":"make a calculation, political calculation","example":"His decision was a carefully considered political calculation.","translation":"他的決定是一個經過深思熟慮的政治算計。"},{"id":"C1-347-donor","level":"C1","word":"donor","pos":"n.","meaning":"捐贈者；供體","collocations":"organ donor, major donor","example":"The hospital thanked the anonymous donor for the gift.","translation":"醫院感謝這位匿名捐款者的善舉。"},{"id":"C1-348-elaborate","level":"C1","word":"elaborate","pos":"v./adj.","meaning":"詳述；精心製作的","collocations":"elaborate on, elaborate plan","example":"Can you elaborate on that point?","translation":"你能就這一點詳細說明嗎？"},{"id":"C1-349-irrelevant","level":"C1","word":"irrelevant","pos":"adj.","meaning":"不相關的；無關緊要的","collocations":"completely irrelevant, irrelevant to","example":"His remarks were completely irrelevant to the discussion.","translation":"他的評論與討論內容完全毫無關聯。"},{"id":"C1-350-equality","level":"C1","word":"equality","pos":"n.","meaning":"平等；均等","collocations":"gender equality, equality before the law","example":"The movement fought for racial equality.","translation":"這場運動為爭取種族平等而奮鬥。"},{"id":"C1-351-mutual","level":"C1","word":"mutual","pos":"adj.","meaning":"相互的；共同的","collocations":"mutual agreement, mutual benefit","example":"The deal was reached by mutual consent.","translation":"這筆交易是在雙方合意下達成的。"},{"id":"C1-352-ally","level":"C1","word":"ally","pos":"n./v.","meaning":"盟友；結盟","collocations":"close ally, ally with","example":"The two countries have been allies for decades.","translation":"兩國之間已經結盟數十年。"},{"id":"C1-353-forth","level":"C1","word":"forth","pos":"adv.","meaning":"向前；往外","collocations":"bring forth, put forth, and so forth","example":"He set forth his plan in great detail.","translation":"他詳細闡述了他的計畫。"},{"id":"C1-354-consent","level":"C1","word":"consent","pos":"n./v.","meaning":"同意；允許","collocations":"give consent, informed consent","example":"All participants gave their informed consent.","translation":"所有參與者都簽署了知情同意書。"},{"id":"C1-355-oblige","level":"C1","word":"oblige","pos":"v.","meaning":"義務；迫使；幫忙","collocations":"be obliged to, feel obliged","example":"I am obliged to follow the rules of the committee.","translation":"我有義務遵守委員會的規定。"},{"id":"C1-356-delegation","level":"C1","word":"delegation","pos":"n.","meaning":"代表團；授權","collocations":"head a delegation, delegation of authority","example":"A delegation of ministers arrived for the summit.","translation":"一個由部長組成的代表團抵達參加峰會。"},{"id":"C1-357-embassy","level":"C1","word":"embassy","pos":"n.","meaning":"大使館","collocations":"British embassy, embassy official","example":"She reported the incident to the embassy.","translation":"她向大使館報告了這起事件。"},{"id":"C1-358-weave","level":"C1","word":"weave","pos":"v.","meaning":"編織；穿梭","collocations":"weave through, weave a story","example":"He weaved through the crowd to reach the exit.","translation":"他穿過人群，走向出口。"},{"id":"C1-359-nominate","level":"C1","word":"nominate","pos":"v.","meaning":"提名；任命","collocations":"nominate for, officially nominate","example":"She was nominated for the award by her colleagues.","translation":"她被同事提名角逐這個獎項。"},{"id":"C1-360-philosophical","level":"C1","word":"philosophical","pos":"adj.","meaning":"哲學的；達觀的","collocations":"philosophical debate, take a philosophical view","example":"He took a philosophical approach to his misfortune.","translation":"他以哲學的態度面對自己的不幸。"},{"id":"C1-361-consolidate","level":"C1","word":"consolidate","pos":"v.","meaning":"鞏固；合併","collocations":"consolidate power, consolidate gains","example":"The merger helped consolidate the company's market position.","translation":"合併幫助鞏固了公司的市場地位。"},{"id":"C1-362-aspiration","level":"C1","word":"aspiration","pos":"n.","meaning":"抱負；志向","collocations":"high aspirations, career aspirations","example":"She had high aspirations of becoming a doctor.","translation":"她立志成為一名醫生。"},{"id":"C1-363-inspection","level":"C1","word":"inspection","pos":"n.","meaning":"檢查；視察","collocations":"routine inspection, health inspection","example":"The factory passed its annual safety inspection.","translation":"工廠通過了一年一度的安全檢查。"},{"id":"C1-364-dip","level":"C1","word":"dip","pos":"v./n.","meaning":"下降；浸；蘸","collocations":"brief dip, temperature dip","example":"There was a slight dip in sales during the summer.","translation":"夏季期間銷售額略有下滑。"},{"id":"C1-365-communist","level":"C1","word":"communist","pos":"n./adj.","meaning":"共產主義者；共產的","collocations":"communist party, communist regime","example":"The country was governed by a communist party for decades.","translation":"這個國家在共產黨統治下長達數十年。"},{"id":"C1-366-reproduce","level":"C1","word":"reproduce","pos":"v.","meaning":"繁殖；複製；再現","collocations":"reproduce images, organisms reproduce","example":"Some animals reproduce rapidly in ideal conditions.","translation":"某些動物在理想條件下繁殖速度極快。"},{"id":"C1-367-deteriorate","level":"C1","word":"deteriorate","pos":"v.","meaning":"惡化；變壞","collocations":"condition deteriorates, relations deteriorate","example":"His health deteriorated rapidly after the operation.","translation":"手術後，他的健康狀況迅速惡化。"},{"id":"C1-368-hostage","level":"C1","word":"hostage","pos":"n.","meaning":"人質","collocations":"take hostage, hostage situation","example":"Three employees were taken hostage during the robbery.","translation":"三名員工在搶劫中被劫為人質。"},{"id":"C1-369-spectrum","level":"C1","word":"spectrum","pos":"n.","meaning":"光譜；範圍；領域","collocations":"wide spectrum, autism spectrum","example":"The policy was opposed across the political spectrum.","translation":"這項政策遭到了政治光譜各方的反對。"},{"id":"C1-370-execute","level":"C1","word":"execute","pos":"v.","meaning":"執行；處決；完成","collocations":"execute a plan, execute a criminal","example":"The mission was executed with military precision.","translation":"這項任務以軍事精準度執行完畢。"},{"id":"C1-371-funeral","level":"C1","word":"funeral","pos":"n.","meaning":"葬禮；喪禮","collocations":"attend a funeral, hold a funeral","example":"Thousands attended the state funeral.","translation":"數千人出席了國葬儀式。"},{"id":"C1-372-designate","level":"C1","word":"designate","pos":"v.","meaning":"指定；命名","collocations":"designate as, officially designate","example":"The area was designated as a nature reserve.","translation":"該地區被劃定為自然保護區。"},{"id":"C1-373-dispute","level":"C1","word":"dispute","pos":"n./v.","meaning":"爭議；爭端；爭論","collocations":"territorial dispute, settle a dispute","example":"The two countries are in dispute over the island.","translation":"兩國就這座島嶼存在領土爭端。"},{"id":"C1-374-deed","level":"C1","word":"deed","pos":"n.","meaning":"行為；功績；契約","collocations":"good deed, property deed","example":"He was rewarded for his brave deeds during the war.","translation":"他因在戰爭中的英勇行為而獲得獎勵。"},{"id":"C1-375-lawsuit","level":"C1","word":"lawsuit","pos":"n.","meaning":"訴訟；官司","collocations":"file a lawsuit, settle a lawsuit","example":"She filed a lawsuit against her former employer.","translation":"她對前僱主提出了訴訟。"},{"id":"C1-376-electoral","level":"C1","word":"electoral","pos":"adj.","meaning":"選舉的","collocations":"electoral system, electoral fraud","example":"The country reformed its electoral system.","translation":"這個國家對其選舉制度進行了改革。"},{"id":"C1-377-proposition","level":"C1","word":"proposition","pos":"n.","meaning":"主張；提議；命題","collocations":"business proposition, reject a proposition","example":"It sounds like a reasonable business proposition.","translation":"這聽起來是個合理的商業提案。"},{"id":"C1-378-monk","level":"C1","word":"monk","pos":"n.","meaning":"僧侶；修道士","collocations":"Buddhist monk, Tibetan monk","example":"The monk spent years in silent meditation.","translation":"這位僧侶在沉默的冥想中度過了數年時光。"},{"id":"C1-379-blade","level":"C1","word":"blade","pos":"n.","meaning":"刀刃；葉片","collocations":"razor blade, blade of grass","example":"The knife had a very sharp blade.","translation":"這把刀的刀刃非常鋒利。"},{"id":"C1-380-documentation","level":"C1","word":"documentation","pos":"n.","meaning":"文件；文獻證明","collocations":"official documentation, supporting documentation","example":"You will need documentation to prove your identity.","translation":"你需要提供相關文件來證明你的身分。"},{"id":"C1-381-bass","level":"C1","word":"bass","pos":"n.","meaning":"低音；鱸魚","collocations":"bass guitar, bass drum","example":"He played the bass guitar in the band.","translation":"他在樂隊裡演奏低音吉他。"},{"id":"C1-382-massacre","level":"C1","word":"massacre","pos":"n./v.","meaning":"大屠殺；屠殺","collocations":"carry out a massacre, civilian massacre","example":"The massacre shocked the international community.","translation":"這場大屠殺震驚了國際社會。"},{"id":"C1-383-namely","level":"C1","word":"namely","pos":"adv.","meaning":"即；也就是","collocations":"namely this, namely that","example":"There is one key issue, namely funding.","translation":"有一個關鍵問題，那就是資金問題。"},{"id":"C1-384-extremist","level":"C1","word":"extremist","pos":"n./adj.","meaning":"極端分子；極端的","collocations":"religious extremist, extremist views","example":"The group was classified as an extremist organisation.","translation":"這個組織被列為極端主義組織。"},{"id":"C1-385-adjustment","level":"C1","word":"adjustment","pos":"n.","meaning":"調整；調節","collocations":"make adjustments, minor adjustment","example":"She made a few adjustments to the original plan.","translation":"她對原計畫做了幾處調整。"},{"id":"C1-386-chunk","level":"C1","word":"chunk","pos":"n.","meaning":"大塊；大量","collocations":"a chunk of, large chunk","example":"A large chunk of the budget was spent on marketing.","translation":"預算的很大一部分花在了行銷上。"},{"id":"C1-387-allege","level":"C1","word":"allege","pos":"v.","meaning":"聲稱；指控","collocations":"allege corruption, as alleged","example":"He is alleged to have stolen the money.","translation":"他被指控盜竊款項。"},{"id":"C1-388-loyalty","level":"C1","word":"loyalty","pos":"n.","meaning":"忠誠；忠心","collocations":"show loyalty, party loyalty","example":"Loyalty to the team was valued above all else.","translation":"對團隊的忠誠被視為最重要的事。"},{"id":"C1-389-prosecution","level":"C1","word":"prosecution","pos":"n.","meaning":"起訴；檢察官","collocations":"face prosecution, state prosecution","example":"The prosecution presented compelling evidence.","translation":"檢察方提出了有力的證據。"},{"id":"C1-390-allocate","level":"C1","word":"allocate","pos":"v.","meaning":"分配；撥給","collocations":"allocate resources, allocate funds","example":"The government allocated additional funding to healthcare.","translation":"政府向醫療保健系統撥付了額外資金。"},{"id":"C1-391-troubled","level":"C1","word":"troubled","pos":"adj.","meaning":"困擾的；動盪的","collocations":"troubled region, troubled relationship","example":"The charity supports troubled young people.","translation":"這個慈善機構支援有困難的年輕人。"},{"id":"C1-392-exclusion","level":"C1","word":"exclusion","pos":"n.","meaning":"排除；排斥；除外","collocations":"social exclusion, exclusion from","example":"The exclusion of women from leadership roles is unjust.","translation":"將女性排除在領導職位之外是不公正的。"},{"id":"C1-393-unveil","level":"C1","word":"unveil","pos":"v.","meaning":"揭露；發布；揭幕","collocations":"unveil a plan, unveil a statue","example":"The company unveiled its new product at the conference.","translation":"公司在會議上發布了新產品。"},{"id":"C1-394-liberty","level":"C1","word":"liberty","pos":"n.","meaning":"自由；解放","collocations":"civil liberty, take liberties","example":"Freedom of speech is a fundamental liberty.","translation":"言論自由是一項基本的自由權利。"},{"id":"C1-395-cease","level":"C1","word":"cease","pos":"v.","meaning":"停止；終止","collocations":"cease fire, cease operations","example":"The company ceased trading after the bankruptcy.","translation":"公司在破產後停止了營運。"},{"id":"C1-396-handling","level":"C1","word":"handling","pos":"n.","meaning":"處理；操作","collocations":"handling of a situation, baggage handling","example":"Her handling of the crisis was widely praised.","translation":"她對危機的處理方式獲得廣泛讚譽。"},{"id":"C1-397-integration","level":"C1","word":"integration","pos":"n.","meaning":"整合；融合；一體化","collocations":"social integration, European integration","example":"The successful integration of new technology improved output.","translation":"成功整合新技術後，生產效率得到提升。"},{"id":"C1-398-commence","level":"C1","word":"commence","pos":"v.","meaning":"開始；著手","collocations":"commence proceedings, commence work","example":"Construction will commence in the spring.","translation":"建設工作將於春季開始動工。"},{"id":"C1-399-activation","level":"C1","word":"activation","pos":"n.","meaning":"啟動；激活","collocations":"activation of a plan, activation code","example":"Enter the activation code to unlock the software.","translation":"輸入啟用碼以解鎖該軟體。"},{"id":"C1-400-flawed","level":"C1","word":"flawed","pos":"adj.","meaning":"有缺陷的；有瑕疵的","collocations":"flawed logic, deeply flawed","example":"The research methodology was fundamentally flawed.","translation":"這項研究的方法論存在根本性的缺陷。"},{"id":"C1-401-pregnancy","level":"C1","word":"pregnancy","pos":"n.","meaning":"懷孕；孕期","collocations":"unwanted pregnancy, during pregnancy","example":"She maintained a healthy diet throughout her pregnancy.","translation":"整個懷孕期間，她都保持著健康的飲食習慣。"},{"id":"C1-402-denial","level":"C1","word":"denial","pos":"n.","meaning":"否認；拒絕；否定","collocations":"in denial, flat denial","example":"The company issued a denial of all allegations.","translation":"公司否認了所有指控。"},{"id":"C1-403-ideological","level":"C1","word":"ideological","pos":"adj.","meaning":"意識形態的","collocations":"ideological conflict, ideological divide","example":"There was a deep ideological divide between the two parties.","translation":"兩個政黨之間存在著深刻的意識形態分歧。"},{"id":"C1-404-youngster","level":"C1","word":"youngster","pos":"n.","meaning":"年輕人；青少年","collocations":"talented youngster, local youngster","example":"The youngster showed great potential during training.","translation":"這位年輕人在訓練中展現出了巨大的潛力。"},{"id":"C1-405-convict","level":"C1","word":"convict","pos":"v./n.","meaning":"判定有罪；罪犯","collocations":"convict of murder, convicted criminal","example":"He was convicted of fraud and sentenced to prison.","translation":"他被判詐欺罪成立，被判入獄服刑。"},{"id":"C1-406-credible","level":"C1","word":"credible","pos":"adj.","meaning":"可信的；有信譽的","collocations":"credible source, credible threat","example":"The witness provided a credible account of events.","translation":"這位目擊者提供了對事件的可信陳述。"},{"id":"C1-407-memoir","level":"C1","word":"memoir","pos":"n.","meaning":"回憶錄","collocations":"write a memoir, publish memoir","example":"She published her memoir after retiring from politics.","translation":"她從政壇退休後出版了自己的回憶錄。"},{"id":"C1-408-earnings","level":"C1","word":"earnings","pos":"n.","meaning":"收入；盈利","collocations":"annual earnings, corporate earnings","example":"Company earnings fell short of expectations.","translation":"公司盈利未達預期。"},{"id":"C1-409-creep","level":"C1","word":"creep","pos":"v.","meaning":"爬行；悄悄移動","collocations":"creep up, creep in","example":"Inflation begins to creep up when demand is high.","translation":"當需求旺盛時，通膨便開始悄然攀升。"},{"id":"C1-410-postpone","level":"C1","word":"postpone","pos":"v.","meaning":"推遲；延期","collocations":"postpone a meeting, postpone indefinitely","example":"The conference was postponed due to the storm.","translation":"會議因暴風雨而延期舉行。"},{"id":"C1-411-merchant","level":"C1","word":"merchant","pos":"n.","meaning":"商人；貿易商","collocations":"merchant bank, travelling merchant","example":"A wealthy merchant built his fortune in the spice trade.","translation":"一位富有的商人在香料貿易中積累了他的財富。"},{"id":"C1-412-aftermath","level":"C1","word":"aftermath","pos":"n.","meaning":"後果；餘波","collocations":"in the aftermath of, aftermath of the war","example":"The aftermath of the earthquake was devastating.","translation":"地震過後，滿目瘡痍，令人慘不忍睹。"},{"id":"C1-413-encouragement","level":"C1","word":"encouragement","pos":"n.","meaning":"鼓勵；支持","collocations":"words of encouragement, offer encouragement","example":"Her teacher's encouragement helped her succeed.","translation":"老師的鼓勵幫助她取得了成功。"},{"id":"C1-414-ruling","level":"C1","word":"ruling","pos":"n./adj.","meaning":"裁定；裁決；執政的","collocations":"court ruling, the ruling party","example":"The court's ruling was seen as a major victory.","translation":"法院的裁決被視為一次重大的勝利。"},{"id":"C1-415-monopoly","level":"C1","word":"monopoly","pos":"n.","meaning":"壟斷；獨占","collocations":"state monopoly, break up a monopoly","example":"The government moved to break up the media monopoly.","translation":"政府著手打破媒體壟斷。"},{"id":"C1-416-ironic","level":"C1","word":"ironic","pos":"adj.","meaning":"諷刺的；具有諷刺意味的","collocations":"ironic twist, how ironic","example":"It was ironic that he criticised others for being late.","translation":"諷刺的是，他批評別人遲到。"},{"id":"C1-417-stab","level":"C1","word":"stab","pos":"v./n.","meaning":"刺；刺傷","collocations":"stab in the back, stab wound","example":"He was stabbed during the attack and needed surgery.","translation":"他在襲擊中遭到刺傷，需要接受手術。"},{"id":"C1-418-fixture","level":"C1","word":"fixture","pos":"n.","meaning":"固定裝置；賽事；常客","collocations":"cup fixture, lighting fixture","example":"She has become a fixture in the local political scene.","translation":"她已成為當地政治圈的常見面孔。"},{"id":"C1-419-timely","level":"C1","word":"timely","pos":"adj.","meaning":"及時的；適時的","collocations":"timely response, timely intervention","example":"A timely warning allowed people to evacuate safely.","translation":"及時的預警讓人們得以安全撤離。"},{"id":"C1-420-successor","level":"C1","word":"successor","pos":"n.","meaning":"繼任者；後繼者","collocations":"immediate successor, choose a successor","example":"No clear successor had been named before she resigned.","translation":"在她辭職前，沒有任何明確的接班人人選。"},{"id":"C1-421-flaw","level":"C1","word":"flaw","pos":"n.","meaning":"缺陷；瑕疵","collocations":"major flaw, fatal flaw","example":"The plan had a fatal flaw that nobody noticed.","translation":"這個計畫有一個被所有人忽視的致命缺陷。"},{"id":"C1-422-preside","level":"C1","word":"preside","pos":"v.","meaning":"主持；擔任主席","collocations":"preside over, preside at","example":"He presided over the company during a period of great change.","translation":"他在公司一段重大的變革時期主持大局。"},{"id":"C1-423-coordinator","level":"C1","word":"coordinator","pos":"n.","meaning":"協調員；統籌者","collocations":"project coordinator, event coordinator","example":"She works as a relief coordinator for the charity.","translation":"她在一個慈善機構擔任救援協調員。"},{"id":"C1-424-adolescent","level":"C1","word":"adolescent","pos":"n./adj.","meaning":"青少年；青春期的","collocations":"adolescent behaviour, adolescent development","example":"Adolescents need guidance and support from their families.","translation":"青少年需要家人的引導與支持。"},{"id":"C1-425-contention","level":"C1","word":"contention","pos":"n.","meaning":"爭論
