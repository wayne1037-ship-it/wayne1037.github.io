<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="C1 Vocab Drill" />
  <title>C1 Vocab Drill</title>
  <style>
    :root {
      --bg: #0c0b09;
      --panel: #161311;
      --panel-2: #1d1916;
      --line: #3a3228;
      --text: #f2ece2;
      --muted: #ae9d82;
      --accent: #f0c94a;
      --accent-2: #8de0d0;
      --danger: #ff8d7d;
      --success: #9ce18b;
      --shadow: 0 18px 60px rgba(0,0,0,.38);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Times New Roman", Times, serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      padding-top: max(16px, env(safe-area-inset-top));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 0;
      min-height: calc(100svh - 32px);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
      box-shadow: var(--shadow);
      overflow: clip;
    }
    .main { border-right: 1px solid var(--line); padding: 0 0 26px; }
    .side { background: rgba(0,0,0,.22); padding: 28px 24px; }
    .topbar {
      grid-column: 1 / -1;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: rgba(255,255,255,.02);
    }
    .title {
      letter-spacing: .16em;
      font-size: 1.55rem;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }
    .subtitle { color: var(--muted); font-size: 1rem; }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 18px 28px 0;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 10px 15px;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      font-size: .84rem;
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #19150e;
      border-color: var(--accent);
      font-weight: 700;
    }
    .toolbar {
      padding: 20px 28px 0;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }
    .progress-wrap {
      flex: 1 1 520px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .progress-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }
    .progress-bar {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: var(--accent);
    }
    .counter {
      min-width: 72px;
      text-align: right;
      font-size: 1rem;
      color: var(--muted);
    }
    .score-pill {
      border: 1px solid var(--accent-2);
      color: var(--accent-2);
      padding: 6px 12px;
      min-width: 56px;
      text-align: center;
    }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      font-size: .95rem;
      font-family: "Times New Roman", Times, serif;
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .card {
      margin: 26px 28px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.06);
      padding: 42px 42px 32px;
      min-height: 205px;
    }
    .sentence {
      font-size: clamp(2rem, 2.5vw, 2.8rem);
      line-height: 1.7;
      margin: 0;
      word-break: break-word;
    }
    .blank {
      display: inline-block;
      min-width: 150px;
      padding: 0 8px 2px;
      text-align: center;
      border-bottom: 3px solid var(--accent);
      color: var(--accent);
      letter-spacing: .08em;
    }
    .meta {
      margin: 0 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      border: 1px solid var(--line);
      color: var(--text);
      padding: 7px 11px;
      font-size: .92rem;
      background: rgba(255,255,255,.02);
    }
    .tag.muted { color: var(--accent); }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      margin: 22px 28px 0;
    }
    .option {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 18px 22px;
      min-height: 56px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-size: 1.15rem;
      font-family: "Times New Roman", Times, serif;
    }
    .option:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .option.correct { border-color: var(--success); color: var(--success); }
    .option.wrong { border-color: var(--danger); color: var(--danger); }
    .option.active-inspect { box-shadow: inset 0 0 0 1px var(--accent-2); }
    .feedback { margin: 18px 28px 0; min-height: 104px; }
    .feedback-box {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      padding: 16px 18px;
      line-height: 1.8;
      font-size: 1rem;
    }
    .feedback-box strong { color: var(--accent); font-weight: 700; }
    .feedback-box .ok { color: var(--success); }
    .feedback-box .bad { color: var(--danger); }

    .option-detail { margin: 14px 28px 0; }
    .option-detail .feedback-box { min-height: 120px; }
    .section-title {
      color: var(--muted);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: .84rem;
      margin-bottom: 18px;
    }
    .word-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - 260px);
      overflow: auto;
      padding-right: 4px;
    }
    .word-item {
      border: 1px solid transparent;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      font-size: 1.04rem;
      font-family: "Times New Roman", Times, serif;
    }
    .word-item.active {
      border-color: var(--accent);
      background: rgba(240, 201, 74, .08);
      color: var(--accent);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.8);
      flex: 0 0 auto;
    }
    .dot.done { background: var(--success); }
    .dot.miss { background: var(--danger); }
    .stats {
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      padding: 14px 12px;
      background: rgba(255,255,255,.02);
    }
    .stat b {
      display: block;
      font-size: 1.28rem;
      color: var(--accent);
      margin-top: 6px;
    }

    .side-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .mini-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--accent);
      padding: 7px 10px;
      min-height: 44px;
      cursor: pointer;
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-family: "Times New Roman", Times, serif;
    }
    .mini-btn:hover,
    .mini-btn.active {
      background: rgba(240, 201, 74, .12);
      border-color: var(--accent);
    }
    .all-words-panel {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .all-words-panel.show { display: block; }
    .all-words-title {
      color: var(--accent);
      font-size: .88rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .all-words-subtitle {
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 12px;
    }
    .all-words-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-height: 380px;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding-right: 4px;
    }
    .all-word-chip {
      border: 1px solid rgba(240, 201, 74, .18);
      background: rgba(255,255,255,.02);
      color: var(--text);
      padding: 7px 9px;
      font-size: .88rem;
      line-height: 1.3;
      cursor: pointer;
      text-align: left;
      font-family: "Times New Roman", Times, serif;
    }
    .all-word-chip:hover,
    .all-word-chip.active {
      border-color: var(--accent);
      background: rgba(240, 201, 74, .08);
      color: var(--accent);
    }
    .all-word-detail {
      margin-top: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding: 14px 14px 12px;
      min-height: 180px;
      max-height: 320px;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .all-word-detail.empty {
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .detail-word {
      font-size: 1.24rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .detail-meta {
      display: grid;
      gap: 8px;
      font-size: .94rem;
      line-height: 1.6;
    }
    .detail-label {
      color: var(--muted);
      margin-right: 8px;
      min-width: 84px;
      display: inline-block;
    }
    .detail-example {
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px dashed rgba(240, 201, 74, .22);
    }
    .detail-example-en {
      color: var(--text);
      line-height: 1.7;
    }
    .detail-example-zh {
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.7;
    }
    .side-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.75;
    }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .main { border-right: 0; border-bottom: 1px solid var(--line); }
      .word-list { max-height: none; }
    }
    @media (max-width: 720px) {
      body {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-right: max(10px, env(safe-area-inset-right));
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        padding-left: max(10px, env(safe-area-inset-left));
      }
      .app {
        min-height: calc(100svh - 20px);
        border-radius: 0;
      }
      .topbar {
        padding: 16px 16px 14px;
        gap: 8px;
      }
      .title {
        font-size: 1.1rem;
        letter-spacing: .12em;
      }
      .subtitle {
        font-size: .9rem;
        line-height: 1.5;
      }
      .tabs {
        padding: 12px 16px 0;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab {
        flex: 0 0 auto;
        white-space: nowrap;
        padding: 10px 14px;
        font-size: .78rem;
      }
      .toolbar {
        padding: 14px 16px 0;
        align-items: stretch;
        gap: 14px;
      }
      .progress-wrap {
        min-width: 0;
        flex: 1 1 auto;
        flex-wrap: wrap;
        gap: 10px;
      }
      .progress-track { flex-basis: 100%; }
      .counter {
        min-width: 0;
        text-align: left;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .controls .btn:last-child {
        grid-column: 1 / -1;
      }
      .card {
        margin: 16px 16px 14px;
        padding: 22px 18px 18px;
        min-height: 0;
      }
      .sentence {
        font-size: clamp(1.45rem, 7vw, 2rem);
        line-height: 1.55;
      }
      .blank {
        min-width: 110px;
        padding: 0 5px 2px;
      }
      .meta,
      .options,
      .feedback,
      .option-detail {
        margin-left: 16px;
        margin-right: 16px;
      }
      .meta {
        gap: 8px;
      }
      .tag {
        font-size: .86rem;
        padding: 7px 10px;
      }
      .options {
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 16px;
      }
      .option {
        padding: 16px 16px;
        font-size: 1.04rem;
      }
      .feedback { min-height: 0; }
      .feedback-box,
      .all-word-detail {
        font-size: .96rem;
        line-height: 1.65;
      }
      .side {
        padding: 18px 16px 20px;
      }
      .side-header {
        align-items: stretch;
        gap: 10px;
      }
      .stats {
        gap: 8px;
        margin-bottom: 16px;
      }
      .stat {
        padding: 12px 10px;
      }
      .word-list {
        max-height: 240px;
        padding-right: 0;
      }
      .word-item {
        padding: 13px 10px;
        font-size: .98rem;
      }
      .all-words-grid {
        grid-template-columns: 1fr;
        max-height: 280px;
        gap: 7px;
        padding-right: 0;
      }
      .all-word-chip {
        padding: 10px 10px;
        font-size: .92rem;
        min-height: 44px;
      }
      .all-word-detail {
        max-height: 260px;
        min-height: 140px;
        padding: 12px;
      }
      .detail-word {
        font-size: 1.1rem;
      }
      .detail-label {
        display: block;
        min-width: 0;
        margin-bottom: 2px;
      }
      .side-note {
        margin-top: 14px;
        font-size: .88rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">C1 VOCAB DRILL</div>
      <div class="subtitle">Fill in the blank · All 1277 words · Times New Roman version</div>
    </div>

    <main class="main">
      <div class="tabs" id="tabs"></div>

      <div class="toolbar">
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
          <div class="counter" id="counter">1 / 20</div>
          <div class="score-pill" id="scorePill">0</div>
        </div>
        <div class="controls">
          <button class="btn" id="shuffleBtn" type="button">Shuffle Set</button>
          <button class="btn" id="reviewBtn" type="button">Review Missed</button>
          <button class="btn" id="nextBtn" type="button">Next</button>
        </div>
      </div>

      <section class="card">
        <p class="sentence" id="sentence"></p>
      </section>

      <div class="meta">
        <span class="tag" id="posTag">n.</span>
        <span class="tag muted" id="setHint">Set</span>
      </div>

      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="option-detail" id="optionDetail"></div>
    </main>

    <aside class="side">
      <div class="side-header">
        <div class="section-title">Words in this set</div>
        <button class="mini-btn" id="allWordsBtn" type="button">All 1277 Words</button>
      </div>
      <div class="stats" id="sideStats"></div>
      <div class="word-list" id="wordList"></div>
      <div class="all-words-panel" id="allWordsPanel">
        <div class="all-words-title">Full vocabulary list</div>
        <div class="all-words-subtitle">點單字可查看完整資訊</div>
        <div class="all-words-grid" id="allWordsGrid"></div>
        <div class="all-word-detail" id="allWordDetail"></div>
      </div>
      <div class="side-note">
        快捷鍵：1 到 4 作答，Enter 或 N 下一題。<br />
        這版已把 1277 個單字全部放進題庫。
      </div>
    </aside>
  </div>

  <script>

tion": "sign a petition, file a petition", "example": "Over 50,000 people signed the online petition.", "translation": "超過五萬人在網路上簽署了這份請願書。", "category": "noun", "surface": "petition", "aliases": ["petition"]}, {"word": "standing", "pos": "n./adj.", "meaning": "地位；聲譽；持續的", "collocation": "long-standing, standing ovation", "example": "The judge questioned her legal standing in the case.", "translation": "法官對她在案件中的法律地位提出了質疑。", "category": "noun", "surface": "standing", "aliases": ["standing"]}, {"word": "realm", "pos": "n.", "meaning": "領域；王國；範疇", "collocation": "in the realm of, political realm", "example": "The discovery pushed the boundaries of the realm of science.", "translation": "這項發現突破了科學領域的疆界。", "category": "noun", "surface": "realm", "aliases": ["realm"]}, {"word": "rifle", "pos": "n./v.", "meaning": "步槍；仔細搜索；加工線膛", "collocation": "assault rifle, rifle through papers", "example": "The soldier carried an assault rifle at all times.", "translation": "士兵在任何時候都攜帶著一把突擊步槍。", "category": "noun", "surface": "rifle", "aliases": ["rifle"]}, {"word": "transcript", "pos": "n.", "meaning": "文字記錄；成績單；抄本", "collocation": "court transcript, academic transcript", "example": "The journalist obtained a transcript of the closed meeting.", "translation": "記者取得了這場閉門會議的逐字記錄。", "category": "noun", "surface": "transcript", "aliases": ["transcript"]}];
    const STORAGE_KEY = "c1_vocab_drill_state_v4";
    const SET_SIZE = 20;

    const tabs = [
      { id: "all", label: "All Words" },
      { id: "noun", label: "Nouns" },
      { id: "verb", label: "Verbs" },
      { id: "adj", label: "Adjectives" },
      { id: "other", label: "Adverbs & Others" },
      { id: "review", label: "Review" }
    ];

    const els = {
      tabs: document.getElementById("tabs"),
      progressBar: document.getElementById("progressBar"),
      counter: document.getElementById("counter"),
      scorePill: document.getElementById("scorePill"),
      sentence: document.getElementById("sentence"),
      posTag: document.getElementById("posTag"),
      setHint: document.getElementById("setHint"),
      options: document.getElementById("options"),
      feedback: document.getElementById("feedback"),
      optionDetail: document.getElementById("optionDetail"),
      nextBtn: document.getElementById("nextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      reviewBtn: document.getElementById("reviewBtn"),
      allWordsBtn: document.getElementById("allWordsBtn"),
      allWordsPanel: document.getElementById("allWordsPanel"),
      allWordsGrid: document.getElementById("allWordsGrid"),
      allWordDetail: document.getElementById("allWordDetail"),
      wordList: document.getElementById("wordList"),
      sideStats: document.getElementById("sideStats"),
    };

    const defaultState = {
      currentTab: "all",
      currentIndex: 0,
      score: 0,
      answered: {},
      orderSeed: Date.now(),
      showAllWords: false,
      selectedAllWord: null,
      selectedOptionWord: null,
      sets: {}
    };

    const state = loadState();
    let currentOptions = [];
    let allWordsGridRendered = false;
    const optionCache = Object.create(null);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        return saved ? { ...defaultState, ...saved, answered: saved.answered || {}, sets: saved.sets || {} } : structuredClone(defaultState);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function shuffle(array, seed = Math.random()) {
      const a = [...array];
      let s = Math.floor((seed % 1 || Math.random()) * 2147483647) || 1234567;
      const rand = () => (s = s * 48271 % 2147483647) / 2147483647;
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function tabPool(tabId) {
      if (tabId === "review") {
        return RAW_DATA.filter(item => state.answered[item.word]?.missed);
      }
      if (tabId === "all") return RAW_DATA;
      return RAW_DATA.filter(item => item.category === tabId);
    }

    function ensureSet(tabId) {
      const pool = tabPool(tabId);
      if (!pool.length) {
        state.sets[tabId] = [];
        state.currentIndex = 0;
        return;
      }
      const existing = state.sets[tabId];
      if (existing && existing.length) return;
      const chosen = shuffle(pool, state.orderSeed + tabId.length).slice(0, Math.min(SET_SIZE, pool.length)).map(x => x.word);
      state.sets[tabId] = chosen;
      state.currentIndex = 0;
    }

    function rebuildSet(tabId) {
      const pool = tabPool(tabId);
      state.orderSeed = Date.now() + Math.random();
      state.sets[tabId] = shuffle(pool, state.orderSeed + tabId.length).slice(0, Math.min(SET_SIZE, pool.length)).map(x => x.word);
      state.currentIndex = 0;
      state.selectedOptionWord = null;
      saveState();
      render();
    }

    function currentSet() {
      ensureSet(state.currentTab);
      const words = state.sets[state.currentTab] || [];
      return words.map(word => RAW_DATA.find(item => item.word === word)).filter(Boolean);
    }

    function currentItem() {
      const set = currentSet();
      return set[state.currentIndex] || null;
    }

    function esc(str) {
      return String(str ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function escapeRegExp(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function blankSentence(item) {
      const surface = item.surface || item.word;
      const regex = new RegExp(escapeRegExp(surface), "i");
      const blank = `<span class="blank">${"_".repeat(Math.max(surface.length, 4))}</span>`;
      if (regex.test(item.example)) {
        return esc(item.example).replace(regex, blank);
      }
      return `${blank} ${esc(item.example)}`;
    }

    function makeOptions(item) {
      const categoryPool = RAW_DATA.filter(x => x.category === item.category && x.word !== item.word);
      const pool = (categoryPool.length >= 3 ? categoryPool : RAW_DATA.filter(x => x.word !== item.word));
      const distractors = shuffle(pool, Math.random()).slice(0, 3).map(x => x.word);
      return shuffle([item.word, ...distractors], Math.random());
    }

    function renderTabs() {
      els.tabs.innerHTML = tabs.map(tab => `<button class="tab ${tab.id === state.currentTab ? "active" : ""}" data-tab="${tab.id}" type="button">${tab.label}</button>`).join("");
      els.tabs.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          state.currentTab = btn.dataset.tab;
          state.currentIndex = 0;
          ensureSet(state.currentTab);
          state.selectedOptionWord = null;
          saveState();
          render();
        });
      });
    }

    function renderStats(set) {
      const totalDone = Object.values(state.answered).filter(x => x.correct).length;
      const totalMiss = Object.values(state.answered).filter(x => x.missed).length;
      els.sideStats.innerHTML = `
        <div class="stat">This set<b>${set.length}</b></div>
        <div class="stat">Correct<b>${state.score}</b></div>
        <div class="stat">Done<b>${totalDone}</b></div>
        <div class="stat">Missed<b>${totalMiss}</b></div>
      `;
    }

    function renderWordList(set, activeWord) {
      els.wordList.innerHTML = set.map(item => {
        const status = state.answered[item.word] || {};
        const dotClass = status.correct ? "dot done" : status.missed ? "dot miss" : "dot";
        return `<button class="word-item ${item.word === activeWord ? "active" : ""}" data-word="${esc(item.word)}" type="button"><span>${esc(item.word)}</span><span class="${dotClass}"></span></button>`;
      }).join("");
      els.wordList.querySelectorAll(".word-item").forEach((btn, idx) => {
        btn.addEventListener("click", () => {
          state.currentIndex = idx;
          state.selectedOptionWord = null;
          saveState();
          render();
        });
      });
    }


    function renderAllWordDetail(item) {
      if (!item) {
        els.allWordDetail.className = "all-word-detail empty";
        els.allWordDetail.innerHTML = "點上方任一單字，即可查看例句、中文、詞性與 collocation。";
        return;
      }
      els.allWordDetail.className = "all-word-detail";
      els.allWordDetail.innerHTML = `
        <div class="detail-word">${esc(item.word)}</div>
        <div class="detail-meta">
          <div><span class="detail-label">詞性</span>${esc(item.pos || "—")}</div>
          <div><span class="detail-label">中文</span>${esc(item.meaning || "—")}</div>
          <div><span class="detail-label">Collocation</span>${esc(item.collocation || "—")}</div>
          <div class="detail-example">
            <div class="detail-example-en"><span class="detail-label">Example</span>${esc(item.example || "—")}</div>
            <div class="detail-example-zh"><span class="detail-label">中文句子</span>${esc(item.translation || "—")}</div>
          </div>
        </div>
      `;
    }

    function preserveViewport(callback) {
      const y = window.scrollY;
      const x = window.scrollX;
      const active = document.activeElement;
      if (active && typeof active.blur === "function") active.blur();
      callback();
      requestAnimationFrame(() => window.scrollTo({ left: x, top: y, behavior: "instant" }));
    }

    function preserveElementScroll(element, callback) {
      if (!element) {
        callback();
        return;
      }
      const top = element.scrollTop;
      const left = element.scrollLeft;
      callback();
      requestAnimationFrame(() => {
        element.scrollTo({ top, left, behavior: "instant" });
      });
    }

    function safeClick(handler, scrollElement = null) {
      return (event) => {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        preserveViewport(() => preserveElementScroll(scrollElement, handler));
      };
    }


    function renderAllWordsGridOnce(selectedWord) {
      if (allWordsGridRendered) return;
      els.allWordsGrid.innerHTML = RAW_DATA.map(item => `
        <button class="all-word-chip ${item.word === selectedWord ? "active" : ""}" data-word="${esc(item.word)}" type="button">${esc(item.word)}</button>
      `).join("");

      els.allWordsGrid.addEventListener("pointerdown", (event) => {
        const chip = event.target.closest(".all-word-chip");
        if (chip) event.preventDefault();
      });

      els.allWordsGrid.addEventListener("click", (event) => {
        const chip = event.target.closest(".all-word-chip");
        if (!chip) return;
        event.preventDefault();
        event.stopPropagation();
        preserveViewport(() => preserveElementScroll(els.allWordsGrid, () => {
          state.selectedAllWord = chip.dataset.word;
          saveState();
          updateAllWordsSelection();
          renderAllWordDetail(RAW_DATA.find(item => item.word === state.selectedAllWord) || null);
        }));
      });

      allWordsGridRendered = true;
    }

    function updateAllWordsSelection() {
      const selectedWord = state.selectedAllWord;
      els.allWordsGrid.querySelectorAll(".all-word-chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.word === selectedWord);
      });
    }

    function renderAllWords() {
      els.allWordsBtn.classList.toggle("active", Boolean(state.showAllWords));
      els.allWordsPanel.classList.toggle("show", Boolean(state.showAllWords));
      if (!state.showAllWords) return;

      const selected = RAW_DATA.find(item => item.word === state.selectedAllWord) || RAW_DATA[0] || null;
      if (selected && !state.selectedAllWord) {
        state.selectedAllWord = selected.word;
        saveState();
      }

      renderAllWordsGridOnce(selected ? selected.word : null);
      updateAllWordsSelection();
      renderAllWordDetail(selected);
    }

    function lockAnswered() {
      return Boolean(currentItem() && state.answered[currentItem().word]?.seenInTab === state.currentTab && state.answered[currentItem().word]?.index === state.currentIndex);
    }

    function optionCacheKey(item) {
      return `${state.currentTab}::${state.currentIndex}::${item.word}::${(state.sets[state.currentTab] || []).join("|")}`;
    }

    function getStableOptions(item) {
      const key = optionCacheKey(item);
      if (!optionCache[key]) optionCache[key] = makeOptions(item);
      return optionCache[key];
    }

    function clearOptionDetail() {
      state.selectedOptionWord = null;
      els.optionDetail.innerHTML = "";
    }

    function wordDetailHtml(word) {
      const item = RAW_DATA.find(x => x.word === word);
      if (!item) return "";
      return `
        <div class="feedback-box">
          <div><strong>查看單字：</strong><strong>${esc(item.word)}</strong></div>
          <div><strong>詞性：</strong>${esc(item.pos || "—")}</div>
          <div><strong>中文：</strong>${esc(item.meaning || "—")}</div>
          <div><strong>搭配：</strong>${esc(item.collocation || "—")}</div>
          <div><strong>完整例句：</strong>${esc(item.example || "—")}</div>
          <div><strong>例句翻譯：</strong>${esc(item.translation || "—")}</div>
        </div>
      `;
    }

    function showOptionDetail(word) {
      state.selectedOptionWord = word;
      els.optionDetail.innerHTML = wordDetailHtml(word);
    }

    function handleOptionClick(choice) {
      const alreadyAnswered = lockAnswered();
      if (!alreadyAnswered) {
        answerQuestion(choice);
      }
      showOptionDetail(choice);
      saveState();
      renderQuestion();
    }

    function answerQuestion(choice) {
      const item = currentItem();
      if (!item || lockAnswered()) return;
      const correct = choice === item.word;
      state.answered[item.word] = {
        ...state.answered[item.word],
        correct: correct || state.answered[item.word]?.correct || false,
        missed: !correct || state.answered[item.word]?.missed || false,
        chosen: choice,
        seenInTab: state.currentTab,
        index: state.currentIndex
      };
      if (correct) state.score += 1;
      saveState();
      render();
    }

    function feedbackHtml(item) {
      const answer = state.answered[item.word];
      if (!answer || answer.seenInTab !== state.currentTab || answer.index !== state.currentIndex) return "";
      const correct = answer.chosen === item.word;
      const status = correct ? `<span class="ok">Correct</span>` : `<span class="bad">Not quite</span>`;
      return `
        <div class="feedback-box">
          <div><strong>${status}</strong> · answer: <strong>${esc(item.word)}</strong></div>
          <div><strong>中文：</strong>${esc(item.meaning)}</div>
          <div><strong>搭配：</strong>${esc(item.collocation || "—")}</div>
          <div><strong>例句翻譯：</strong>${esc(item.translation || "—")}</div>
        </div>
      `;
    }

    function renderQuestion() {
      const set = currentSet();
      const item = currentItem();
      renderWordList(set, item?.word || "");
      renderStats(set);

      if (!item) {
        els.sentence.innerHTML = "No question available in this filter.";
        els.posTag.textContent = "EMPTY";
        els.setHint.textContent = "Try another tab.";
        els.options.innerHTML = "";
        els.feedback.innerHTML = "";
        els.optionDetail.innerHTML = "";
        els.counter.textContent = "0 / 0";
        els.scorePill.textContent = "0";
        els.progressBar.style.width = "0%";
        return;
      }

      currentOptions = getStableOptions(item);
      const answered = lockAnswered();
      if (state.selectedOptionWord && !currentOptions.includes(state.selectedOptionWord)) state.selectedOptionWord = null;
      els.sentence.innerHTML = blankSentence(item);
      els.posTag.textContent = item.pos || "N/A";
      const tabLabel = tabs.find(t => t.id === state.currentTab)?.label || "Set";
      els.setHint.textContent = `Word ${state.currentIndex + 1} of ${set.length} · ${tabLabel}`;
      els.counter.textContent = `${state.currentIndex + 1} / ${set.length}`;
      els.scorePill.textContent = String(state.score);
      els.progressBar.style.width = `${((state.currentIndex + 1) / Math.max(set.length, 1)) * 100}%`;

      els.options.innerHTML = currentOptions.map((option, idx) => {
        let cls = "option";
        if (answered) {
          if (option === item.word) cls += " correct";
          else if (option === state.answered[item.word]?.chosen) cls += " wrong";
        }
        if (state.selectedOptionWord === option) cls += " active-inspect";
        return `<button class="${cls}" data-option="${esc(option)}" type="button"><span style="opacity:.6;margin-right:10px">${idx + 1}.</span>${esc(option)}</button>`;
      }).join("");

      els.options.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", safeClick(() => handleOptionClick(btn.dataset.option)));
      });

      els.feedback.innerHTML = feedbackHtml(item);
      els.optionDetail.innerHTML = state.selectedOptionWord ? wordDetailHtml(state.selectedOptionWord) : "";
    }

    function nextQuestion() {
      const set = currentSet();
      if (!set.length) return;
      if (state.currentIndex < set.length - 1) {
        state.currentIndex += 1;
      } else {
        rebuildSet(state.currentTab);
        return;
      }
      state.selectedOptionWord = null;
      saveState();
      render();
    }

    function render() {
      renderTabs();
      renderQuestion();
      renderAllWords();
    }

    els.nextBtn.addEventListener("click", safeClick(nextQuestion));
    els.shuffleBtn.addEventListener("click", safeClick(() => rebuildSet(state.currentTab)));
    els.reviewBtn.addEventListener("click", safeClick(() => {
      state.currentTab = "review";
      state.currentIndex = 0;
      rebuildSet("review");
    }));
    els.allWordsBtn.addEventListener("click", safeClick(() => {
      state.showAllWords = !state.showAllWords;
      if (state.showAllWords && !state.selectedAllWord && RAW_DATA.length) {
        state.selectedAllWord = RAW_DATA[0].word;
      }
      saveState();
      renderAllWords();
    }));

    window.addEventListener("keydown", (e) => {
      if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
      if (/^[1-4]$/.test(e.key)) {
        const idx = Number(e.key) - 1;
        if (currentOptions[idx]) preserveViewport(() => answerQuestion(currentOptions[idx]));
      }
      if (e.key === "Enter" || e.key.toLowerCase() === "n") {
        preserveViewport(nextQuestion);
      }
    });

    ensureSet(state.currentTab);
    saveState();
    render();
  </script>
</body>
