主題前徵求學生意見。"},{"id":"B2-1421-military","level":"B2","word":"military","pos":"adj.","meaning":"軍隊；軍事的；軍人的；適於戰爭的","collocations":"a military choice, military at times, sound military","example":"The day felt military, so we changed our plans.","translation":"那天感覺很「軍隊」，所以我們改變了計畫。"},{"id":"B2-1422-consult","level":"B2","word":"consult","pos":"v.","meaning":"商討；商量；協商；會診","collocations":"consult a specialist, need to consult, consult carefully","example":"They had to consult a specialist before the end of the week.","translation":"他們必須在週末前「商討」專家。"},{"id":"B2-1423-acknowledge","level":"B2","word":"acknowledge","pos":"v.","meaning":"承認；告知收悉；答謝；報償","collocations":"acknowledge the mistake, need to acknowledge, acknowledge carefully","example":"He helped the group acknowledge the mistake without making the problem worse.","translation":"他幫助小組「承認」錯誤，而沒有讓問題變得更糟。"},{"id":"B2-1424-universal","level":"B2","word":"universal","pos":"adj.","meaning":"全世界的；普遍的；宇宙的；通用的","collocations":"universal advice, universal reason, universal choice","example":"That was a universal choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「全世界的」的選擇。"},{"id":"B2-1425-magnificent","level":"B2","word":"magnificent","pos":"adj.","meaning":"華麗的；高尚的；宏偉的","collocations":"a magnificent choice, magnificent at times, sound magnificent","example":"The new idea sounded magnificent, but we decided to try it.","translation":"這個新點子聽起來很「華麗的」，但我們決定試試看。"},{"id":"B2-1426-household","level":"B2","word":"household","pos":"n.","meaning":"一家人；家庭；家族；王室","collocations":"changes in household, a lack of household, focus on household","example":"We heard about household during a conversation at lunch.","translation":"我們午餐聊天時聽到了「一家人」。"},{"id":"B2-1427-illustrate","level":"B2","word":"illustrate","pos":"v.","meaning":"舉例說明；作圖解；闡明","collocations":"illustrate the main point, need to illustrate, illustrate carefully","example":"She learned how to illustrate the main point during her first month at work.","translation":"她在工作的第一個月學會如何「舉例說明」重點。"},{"id":"B2-1428-extension","level":"B2","word":"extension","pos":"n.","meaning":"延長；擴充；範圍；擴展名","collocations":"changes in extension, a lack of extension, focus on extension","example":"A simple classroom activity showed us extension.","translation":"一個簡單的課堂活動讓我們看見「延長」。"},{"id":"B2-1429-struggle","level":"B2","word":"struggle","pos":"n.","meaning":"鬥爭；努力；奮鬥；掙扎","collocations":"the importance of struggle, understand struggle, problems with struggle","example":"The book included a chapter about struggle.","translation":"這本書有一章談到「鬥爭」。"},{"id":"B2-1430-wheat","level":"B2","word":"wheat","pos":"n.","meaning":"小麥","collocations":"a wheat, use the wheat, place the wheat","example":"The child pointed at the wheat and asked what it was used for.","translation":"孩子指著「小麥」，問它是用來做什麼的。"},{"id":"B2-1431-chase","level":"B2","word":"chase","pos":"n.","meaning":"追求；狩獵；追逐；追捕","collocations":"a sense of chase, learn about chase, talk about chase","example":"Friends may disagree about chase, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「追求」有不同看法。"},{"id":"B2-1432-genius","level":"B2","word":"genius","pos":"n.","meaning":"天才；天賦；精神；神魔","collocations":"a sense of genius, learn about genius, talk about genius","example":"A short story helped the class discuss genius.","translation":"一個短篇故事幫助全班討論「天才」。"},{"id":"B2-1433-bond","level":"B2","word":"bond","pos":"n.","meaning":"捆綁物；結合；債券；契約","collocations":"changes in bond, a lack of bond, focus on bond","example":"A friend helped me understand bond with a simple example.","translation":"一位朋友用簡單例子幫我理解「捆綁物」。"},{"id":"B2-1434-draft","level":"B2","word":"draft","pos":"n.","meaning":"氣流；草稿；匯票；草案","collocations":"first draft, rough draft, draft a letter","example":"I finished the first draft of my essay before dinner.","translation":"晚餐前，我完成了作文的初稿。"},{"id":"B2-1435-crisis","level":"B2","word":"crisis","pos":"n.","meaning":"危機；危險期；緊要關頭；危象","collocations":"changes in crisis, a lack of crisis, focus on crisis","example":"The conversation at home turned to crisis after dinner.","translation":"晚餐後，家裡的談話轉到了「危機」。"},{"id":"B2-1436-deadline","level":"B2","word":"deadline","pos":"n.","meaning":"最後期限；截止期限；截止日期","collocations":"a sense of deadline, learn about deadline, talk about deadline","example":"One clear example made deadline easier to understand.","translation":"一個清楚的例子讓「最後期限」更容易理解。"},{"id":"B2-1437-perceive","level":"B2","word":"perceive","pos":"v.","meaning":"感覺；認知；理解；意識到","collocations":"perceive as, perceive a difference, widely perceived","example":"Many residents perceive the new policy as a chance to improve public safety.","translation":"許多居民將這項新政策視為改善公共安全的機會。"},{"id":"B2-1438-skull","level":"B2","word":"skull","pos":"n.","meaning":"頭蓋骨；頭腦；好學生；頭顱","collocations":"a skull, use the skull, place the skull","example":"She put the skull on the table before everyone arrived.","translation":"她在大家抵達前，把「頭蓋骨」放在桌上。"},{"id":"B2-1439-exit","level":"B2","word":"exit","pos":"n.","meaning":"出口；退場；離去；去世","collocations":"the importance of exit, understand exit, problems with exit","example":"The lesson connected exit to things we see every day.","translation":"這堂課把「出口」和我們每天看見的事物連結起來。"},{"id":"B2-1440-justify","level":"B2","word":"justify","pos":"v.","meaning":"替...辯護；證明；證明合法；段落重排","collocations":"justify the expense, need to justify, justify carefully","example":"Our teacher asked us to justify the expense using clear examples.","translation":"老師要求我們用清楚的例子來「替...辯護」支出。"},{"id":"B2-1441-organ","level":"B2","word":"organ","pos":"n.","meaning":"風琴；器官；元件；機構","collocations":"an organ, use the organ, place the organ","example":"She put the organ on the table before everyone arrived.","translation":"她在大家抵達前，把「風琴」放在桌上。"},{"id":"B2-1442-stable","level":"B2","word":"stable","pos":"adj.","meaning":"穩定的；安定的","collocations":"stable job, stable relationship, remain stable","example":"After months of practice, her test scores became more stable.","translation":"經過幾個月練習後，她的考試成績變得更穩定。"},{"id":"B2-1443-transmit","level":"B2","word":"transmit","pos":"v.","meaning":"傳輸；傳染；傳達；遺傳","collocations":"transmit the signal, need to transmit, transmit carefully","example":"The school plans to transmit the signal after talking with parents.","translation":"學校和家長討論後，計畫「傳輸」訊號。"},{"id":"B2-1444-silence","level":"B2","word":"silence","pos":"n.","meaning":"沉默；無聲；靜寂；湮沒","collocations":"the importance of silence, understand silence, problems with silence","example":"A short story helped the class discuss silence.","translation":"一個短篇故事幫助全班討論「沉默」。"},{"id":"B2-1445-completion","level":"B2","word":"completion","pos":"n.","meaning":"完成；完井；結束；完工","collocations":"changes in completion, a lack of completion, focus on completion","example":"The video showed why completion matters in real life.","translation":"這支影片說明瞭為什麼「完成」在現實生活中很重要。"},{"id":"B2-1446-technological","level":"B2","word":"technological","pos":"adj.","meaning":"技術的；工藝的","collocations":"technological change, technological progress, technological innovation","example":"Technological progress has created new opportunities in remote healthcare.","translation":"科技進步在遠距醫療領域創造了新機會。"},{"id":"B2-1447-dismiss","level":"B2","word":"dismiss","pos":"v.","meaning":"解散；開除；解職","collocations":"dismiss the complaint, need to dismiss, dismiss carefully","example":"He helped the group dismiss the complaint without making the problem worse.","translation":"他幫助小組「解散」投訴，而沒有讓問題變得更糟。"},{"id":"B2-1448-resist","level":"B2","word":"resist","pos":"v.","meaning":"抵抗；耐得住；抵制；反抗","collocations":"resist political pressure, need to resist, resist carefully","example":"The school plans to resist political pressure after talking with parents.","translation":"學校和家長討論後，計畫「抵抗」政治壓力。"},{"id":"B2-1449-broad","level":"B2","word":"broad","pos":"adj.","meaning":"寬廣的；遼闊的；廣大的；顯著的","collocations":"broad enough, become broad, look broad","example":"The day felt broad, so we changed our plans.","translation":"那天感覺很「寬廣的」，所以我們改變了計畫。"},{"id":"B2-1450-apparent","level":"B2","word":"apparent","pos":"adj.","meaning":"清晰可見的；顯然的；表面上的；外在的","collocations":"apparent advice, apparent reason, apparent choice","example":"The change was apparent enough for everyone to notice.","translation":"這項改變夠「清晰可見的」，大家都注意到了。"},{"id":"B2-1451-advance","level":"B2","word":"advance","pos":"v.","meaning":"前進；進展；行過的路程；提高","collocations":"need to advance, try to advance, help to advance","example":"We need to advance the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「前進」它。"},{"id":"B2-1452-ladder","level":"B2","word":"ladder","pos":"n.","meaning":"梯；梯狀物；發跡的途徑；襪子抽絲","collocations":"a ladder, use the ladder, place the ladder","example":"She put the ladder on the table before everyone arrived.","translation":"她在大家抵達前，把「梯」放在桌上。"},{"id":"B2-1453-annual","level":"B2","word":"annual","pos":"adj.","meaning":"每年的；一年一次的","collocations":"annual event, annual fee, annual report","example":"The school picnic is an annual event that many families enjoy.","translation":"學校野餐是許多家庭都喜歡的年度活動。"},{"id":"B2-1454-sincere","level":"B2","word":"sincere","pos":"adj.","meaning":"誠實的；正直的；真摯的；純淨的","collocations":"sincere advice, sincere reason, sincere choice","example":"That was a sincere choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「誠實的」的選擇。"},{"id":"B2-1455-obstacle","level":"B2","word":"obstacle","pos":"n.","meaning":"障礙；妨害物；阻礙","collocations":"changes in obstacle, a lack of obstacle, focus on obstacle","example":"The class used everyday examples to understand obstacle.","translation":"全班用日常例子來理解「障礙」。"},{"id":"B2-1456-classic","level":"B2","word":"classic","pos":"n.","meaning":"古典作品；傑作；大藝術家；第一流的","collocations":"a sense of classic, learn about classic, talk about classic","example":"I first learned about classic from a teacher at school.","translation":"我第一次從學校老師那裡學到「古典作品」。"},{"id":"B2-1457-inquiry","level":"B2","word":"inquiry","pos":"n.","meaning":"質詢；探索；調查；詢盤","collocations":"changes in inquiry, a lack of inquiry, focus on inquiry","example":"The conversation at home turned to inquiry after dinner.","translation":"晚餐後，家裡的談話轉到了「質詢」。"},{"id":"B2-1458-nutrition","level":"B2","word":"nutrition","pos":"n.","meaning":"營養；營養學；營養品","collocations":"changes in nutrition, a lack of nutrition, focus on nutrition","example":"She searched online for more information about nutrition.","translation":"她上網搜尋更多關於「營養」的資訊。"},{"id":"B2-1459-sexy","level":"B2","word":"sexy","pos":"adj.","meaning":"性感的；有吸引力的","collocations":"sexy enough, become sexy, look sexy","example":"The new idea sounded sexy, but we decided to try it.","translation":"這個新點子聽起來很「性感的」，但我們決定試試看。"},{"id":"B2-1460-vary","level":"B2","word":"vary","pos":"v.","meaning":"改變；使多樣化；變化；有不同","collocations":"vary suddenly, vary over time, begin to vary","example":"Problems can vary when people ignore early warning signs.","translation":"當人們忽視早期警訊時，問題可能會「改變」。"},{"id":"B2-1461-ink","level":"B2","word":"ink","pos":"n.","meaning":"墨水；墨汁；塗墨水於；簽署","collocations":"an ink, use the ink, place the ink","example":"The child pointed at the ink and asked what it was used for.","translation":"孩子指著「墨水」，問它是用來做什麼的。"},{"id":"B2-1462-wealth","level":"B2","word":"wealth","pos":"n.","meaning":"財富；資源；財產；豐富","collocations":"a sense of wealth, learn about wealth, talk about wealth","example":"Parents often talk about wealth when planning for the future.","translation":"父母規劃未來時，常會談到「財富」。"},{"id":"B2-1463-stretch","level":"B2","word":"stretch","pos":"n.","meaning":"伸展；張開；連綿；一段路","collocations":"stretch your legs, stretch of road, long stretch","example":"We stopped to stretch our legs after two hours in the car.","translation":"坐車兩小時後，我們停下來伸展雙腿。"},{"id":"B2-1464-tissue","level":"B2","word":"tissue","pos":"n.","meaning":"薄的織物；薄紗；棉紙；組織","collocations":"a tissue, use the tissue, place the tissue","example":"The old tissue reminded her of her grandfather's house.","translation":"那個舊「薄的織物」讓她想起祖父的家。"},{"id":"B2-1465-evolve","level":"B2","word":"evolve","pos":"v.","meaning":"進展；進化；展開；使發展","collocations":"evolve suddenly, evolve over time, begin to evolve","example":"The need for help may evolve when the weather suddenly changes.","translation":"天氣突然改變時，可能會「進展」需要幫助的情況。"},{"id":"B2-1466-historian","level":"B2","word":"historian","pos":"n.","meaning":"歷史學家；記事者","collocations":"a historian, work as a historian, ask a historian","example":"We asked a historian for advice before making the decision.","translation":"做決定前，我們向一位「歷史學家」請教。"},{"id":"B2-1467-convinced","level":"B2","word":"convinced","pos":"adj.","meaning":"確信的；深信的","collocations":"feel convinced, seem convinced, become convinced","example":"He looked convinced when he heard the good news.","translation":"聽到好消息時，他看起來很「確信的」。"},{"id":"B2-1468-colourful","level":"B2","word":"colourful","pos":"adj.","meaning":"顏色豐富的；鮮豔的；豔麗的；多色的","collocations":"feel colourful, seem colourful, a colourful day","example":"The new idea sounded colourful, but we decided to try it.","translation":"這個新點子聽起來很「顏色豐富的」，但我們決定試試看。"},{"id":"B2-1469-reputation","level":"B2","word":"reputation","pos":"n.","meaning":"名譽；名聲；聲望；公認證據","collocations":"the importance of reputation, understand reputation, problems with reputation","example":"A simple classroom activity showed us reputation.","translation":"一個簡單的課堂活動讓我們看見「名譽」。"},{"id":"B2-1470-philosophy","level":"B2","word":"philosophy","pos":"n.","meaning":"哲學；人生觀；哲學思想；哲理","collocations":"changes in philosophy, a lack of philosophy, focus on philosophy","example":"We heard about philosophy during a conversation at lunch.","translation":"我們午餐聊天時聽到了「哲學」。"},{"id":"B2-1471-tension","level":"B2","word":"tension","pos":"n.","meaning":"緊張；不安；拉緊；張力","collocations":"a sense of tension, learn about tension, talk about tension","example":"It took me a while to understand tension.","translation":"我花了一段時間才理解「緊張」。"},{"id":"B2-1472-editorial","level":"B2","word":"editorial","pos":"n.","meaning":"社論；評論；編輯的；主筆的","collocations":"newspaper editorial, editorial decision, editorial team","example":"The editorial argued that schools need more support.","translation":"這篇社論主張學校需要更多支持。"},{"id":"B2-1473-desire","level":"B2","word":"desire","pos":"n.","meaning":"慾望；要求；想要；請求","collocations":"a sense of desire, learn about desire, talk about desire","example":"It took me a while to understand desire.","translation":"我花了一段時間才理解「慾望」。"},{"id":"B2-1474-motion","level":"B2","word":"motion","pos":"n.","meaning":"移動；手勢；動作；意向","collocations":"changes in motion, a lack of motion, focus on motion","example":"The lesson connected motion to things we see every day.","translation":"這堂課把「移動」和我們每天看見的事物連結起來。"},{"id":"B2-1475-weird","level":"B2","word":"weird","pos":"adj.","meaning":"怪異的；超自然的；不可思議的；命運","collocations":"a weird choice, weird at times, sound weird","example":"The answer was weird enough for us to keep talking about it.","translation":"這個回答夠「怪異的」，讓我們繼續討論下去。"},{"id":"B2-1476-preparation","level":"B2","word":"preparation","pos":"n.","meaning":"準備；預備；預習；製劑","collocations":"the importance of preparation, understand preparation, problems with preparation","example":"A friend helped me understand preparation with a simple example.","translation":"一位朋友用簡單例子幫我理解「準備」。"},{"id":"B2-1477-healthcare","level":"B2","word":"healthcare","pos":"n.","meaning":"醫療保健；衛生保健；健康護理；健康服務","collocations":"a sense of healthcare, learn about healthcare, talk about healthcare","example":"Parents often talk about healthcare when planning for the future.","translation":"父母規劃未來時，常會談到「醫療保健」。"},{"id":"B2-1478-depression","level":"B2","word":"depression","pos":"n.","meaning":"不景氣；消沉；沮喪；窪地","collocations":"the importance of depression, understand depression, problems with depression","example":"She learned about depression after making a mistake.","translation":"她犯錯之後，學到了關於「不景氣」的事。"},{"id":"B2-1479-govern","level":"B2","word":"govern","pos":"v.","meaning":"統治；支配；管理","collocations":"govern the region, need to govern, govern carefully","example":"She learned how to govern the region during her first month at work.","translation":"她在工作的第一個月學會如何「統治」該地區。"},{"id":"B2-1480-proportion","level":"B2","word":"proportion","pos":"n.","meaning":"比例；比率；均衡；部分","collocations":"a sense of proportion, learn about proportion, talk about proportion","example":"He used a drawing to show the meaning of proportion.","translation":"他用一張圖來說明「比例」的意思。"},{"id":"B2-1481-firework","level":"B2","word":"firework","pos":"n.","meaning":"煙火具；煙火；煙火信號彈；焰火","collocations":"a firework, use the firework, place the firework","example":"Please move the firework away from the edge of the desk.","translation":"請把「煙火具」從桌子邊緣移開。"},{"id":"B2-1482-forgive","level":"B2","word":"forgive","pos":"v.","meaning":"原諒；寬恕；免除","collocations":"forgive the mistake, need to forgive, forgive carefully","example":"The school plans to forgive the mistake after talking with parents.","translation":"學校和家長討論後，計畫「原諒」錯誤。"},{"id":"B2-1483-vital","level":"B2","word":"vital","pos":"adj.","meaning":"生命的；重要的；充滿活力的；生死攸關的","collocations":"vital advice, vital reason, vital choice","example":"The change was vital enough for everyone to notice.","translation":"這項改變夠「生命的」，大家都注意到了。"},{"id":"B2-1484-ridiculous","level":"B2","word":"ridiculous","pos":"adj.","meaning":"荒謬的；可笑的","collocations":"ridiculous idea, sound ridiculous, absolutely ridiculous","example":"The excuse sounded ridiculous, so nobody believed it.","translation":"這個藉口聽起來很荒謬，所以沒有人相信。"},{"id":"B2-1485-scholarship","level":"B2","word":"scholarship","pos":"n.","meaning":"學問；學術成就；獎學金","collocations":"changes in scholarship, a lack of scholarship, focus on scholarship","example":"My friend gave a clear example of scholarship.","translation":"我的朋友舉了一個清楚的「學問」例子。"},{"id":"B2-1486-interval","level":"B2","word":"interval","pos":"n.","meaning":"間隔；距離；間歇；間隙","collocations":"changes in interval, a lack of interval, focus on interval","example":"She wrote a note to remind herself why interval mattered.","translation":"她寫了一張便條提醒自己為什麼「間隔」很重要。"},{"id":"B2-1487-concentration","level":"B2","word":"concentration","pos":"n.","meaning":"集中；專心；濃度；濃縮","collocations":"the importance of concentration, understand concentration, problems with concentration","example":"A short story helped the class discuss concentration.","translation":"一個短篇故事幫助全班討論「集中」。"},{"id":"B2-1488-folding","level":"B2","word":"folding","pos":"adj.","meaning":"可摺疊的；摺疊；摺疊效應","collocations":"look folding, feel folding, become folding","example":"The road became folding near the old bridge.","translation":"靠近老橋時，道路變得「可摺疊的」。"},{"id":"B2-1489-indication","level":"B2","word":"indication","pos":"n.","meaning":"指示；象徵；暗示；指徵","collocations":"changes in indication, a lack of indication, focus on indication","example":"The lesson connected indication to things we see every day.","translation":"這堂課把「指示」和我們每天看見的事物連結起來。"},{"id":"B2-1490-upwards","level":"B2","word":"upwards","pos":"adv.","meaning":"以上；向上","collocations":"move upwards, live upwards, work upwards","example":"We parked upwards and walked to the market.","translation":"我們把車停在「以上」，再走去市場。"},{"id":"B2-1491-regard","level":"B2","word":"regard","pos":"n.","meaning":"關心；注意；尊敬；關係","collocations":"changes in regard, a lack of regard, focus on regard","example":"A short story helped the class discuss regard.","translation":"一個短篇故事幫助全班討論「關心」。"},{"id":"B2-1492-representative","level":"B2","word":"representative","pos":"n.","meaning":"代表；眾議員；典型；描寫的","collocations":"a representative, work as a representative, ask a representative","example":"We asked a representative for advice before making the decision.","translation":"做決定前，我們向一位「代表」請教。"},{"id":"B2-1493-species","level":"B2","word":"species","pos":"n.","meaning":"種；類；外形；茶劑","collocations":"endangered species, native species, species of bird","example":"This island is home to several rare species of birds.","translation":"這座島是幾種稀有鳥類的棲息地。"},{"id":"B2-1494-surround","level":"B2","word":"surround","pos":"v.","meaning":"包圍；環繞；圍繞；圍繞物","collocations":"surround the building, need to surround, surround carefully","example":"The school plans to surround the building after talking with parents.","translation":"學校和家長討論後，計畫「包圍」建築物。"},{"id":"B2-1495-rocket","level":"B2","word":"rocket","pos":"n.","meaning":"火箭；煙火；急升；猛漲","collocations":"a rocket, use the rocket, place the rocket","example":"Please move the rocket away from the edge of the desk.","translation":"請把「火箭」從桌子邊緣移開。"},{"id":"B2-1496-whom","level":"B2","word":"whom","pos":"pron.","meaning":"誰","collocations":"to whom, with whom, people whom","example":"She thanked the teacher whom she had known since primary school.","translation":"她感謝那位從小學就認識的老師。"},{"id":"B2-1497-consequently","level":"B2","word":"consequently","pos":"adv.","meaning":"所以","collocations":"consequently, the result; consequently reduced; consequently became","example":"Several key documents were missing; consequently, the meeting had to be postponed.","translation":"幾份重要文件不見了；因此，會議不得不延期。"},{"id":"B2-1498-opponent","level":"B2","word":"opponent","pos":"n.","meaning":"對手；敵手；反對者；敵對的","collocations":"the importance of opponent, understand opponent, problems with opponent","example":"We heard about opponent during a conversation at lunch.","translation":"我們午餐聊天時聽到了「對手」。"},{"id":"B2-1499-absolute","level":"B2","word":"absolute","pos":"adj.","meaning":"絕對的；專制的；完全的；獨立的","collocations":"a absolute choice, absolute at times, sound absolute","example":"His room looked absolute after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「絕對的」。"},{"id":"B2-1500-purchase","level":"B2","word":"purchase","pos":"n.","meaning":"購買；購買品；緊握；絞轆","collocations":"the importance of purchase, understand purchase, problems with purchase","example":"A friend helped me understand purchase with a simple example.","translation":"一位朋友用簡單例子幫我理解「購買」。"},{"id":"B2-1501-infer","level":"B2","word":"infer","pos":"v.","meaning":"推論出；推斷；作推論","collocations":"infer the meaning, need to infer, infer carefully","example":"He helped the group infer the meaning without making the problem worse.","translation":"他幫助小組「推論出」含義，而沒有讓問題變得更糟。"},{"id":"B2-1502-blind","level":"B2","word":"blind","pos":"n.","meaning":"矇蔽物；窗簾；盲目的；瞎的","collocations":"changes in blind, a lack of blind, focus on blind","example":"The conversation at home turned to blind after dinner.","translation":"晚餐後，家裡的談話轉到了「矇蔽物」。"},{"id":"B2-1503-overnight","level":"B2","word":"overnight","pos":"adv.","meaning":"前一天晚上；一夜的逗留；通宵的；晚上的","collocations":"change overnight, stay overnight, overnight success","example":"The company's reputation did not improve overnight; it took years of careful work.","translation":"公司的聲譽並非一夜之間改善，而是花了多年謹慎經營。"},{"id":"B2-1504-freely","level":"B2","word":"freely","pos":"adv.","meaning":"自由地；隨意地；無拘束地；直率地","collocations":"speak freely, move freely, freely available","example":"Students should be able to express their opinions freely in a respectful classroom.","translation":"學生應該能在互相尊重的教室中自由表達意見。"},{"id":"B2-1505-accountant","level":"B2","word":"accountant","pos":"n.","meaning":"會計人員；會計師","collocations":"an accountant, work as an accountant, ask an accountant","example":"My neighbour works as an accountant in the city.","translation":"我的鄰居在城裡擔任「會計人員」。"},{"id":"B2-1506-approve","level":"B2","word":"approve","pos":"v.","meaning":"贊同；核准；為...提供證據；讚許","collocations":"approve the proposal, need to approve, approve carefully","example":"The family needed to approve the proposal before making a final choice.","translation":"這家人在做最後選擇前，需要先「贊同」提案。"},{"id":"B2-1507-treasure","level":"B2","word":"treasure","pos":"n.","meaning":"寶物；財富；珍愛；重視","collocations":"changes in treasure, a lack of treasure, focus on treasure","example":"We saw how treasure can change people's plans.","translation":"我們看到「寶物」如何改變人們的計畫。"},{"id":"B2-1508-commander","level":"B2","word":"commander","pos":"n.","meaning":"司令官；指揮官","collocations":"a commander, work as a commander, ask a commander","example":"The commander explained the problem in simple words.","translation":"那位「司令官」用簡單的話解釋問題。"},{"id":"B2-1509-aside","level":"B2","word":"aside","pos":"n.","meaning":"小聲說的話；旁白；在一邊；離開","collocations":"changes in aside, a lack of aside, focus on aside","example":"I first learned about aside from a teacher at school.","translation":"我第一次從學校老師那裡學到「小聲說的話」。"},{"id":"B2-1510-distribute","level":"B2","word":"distribute","pos":"v.","meaning":"分配；散佈；分發","collocations":"distribute emergency supplies, need to distribute, distribute carefully","example":"It took several days to distribute emergency supplies properly.","translation":"要妥善「分配」緊急物資花了好幾天。"},{"id":"B2-1511-being","level":"B2","word":"being","pos":"n.","meaning":"存在；生物；人","collocations":"the importance of being, understand being, problems with being","example":"She wrote a note to remind herself why being mattered.","translation":"她寫了一張便條提醒自己為什麼「存在」很重要。"},{"id":"B2-1512-imagination","level":"B2","word":"imagination","pos":"n.","meaning":"想像；聽覺；想像力","collocations":"the importance of imagination, understand imagination, problems with imagination","example":"The lesson connected imagination to things we see every day.","translation":"這堂課把「想像」和我們每天看見的事物連結起來。"},{"id":"B2-1513-threaten","level":"B2","word":"threaten","pos":"v.","meaning":"恐嚇；威脅；預示...的凶兆；恫嚇","collocations":"threaten public safety, need to threaten, threaten carefully","example":"Please do not threaten public safety until you understand the details.","translation":"在瞭解細節之前，請不要「恐嚇」公共安全。"},{"id":"B2-1514-shade","level":"B2","word":"shade","pos":"n.","meaning":"蔭；陰暗；遮光物；燈罩","collocations":"in the shade, shade from the sun, light shade","example":"We sat in the shade because the afternoon sun was too strong.","translation":"下午陽光太強，所以我們坐在陰涼處。"},{"id":"B2-1515-scare","level":"B2","word":"scare","pos":"n.","meaning":"驚嚇；恐慌；使恐慌；受驚","collocations":"the importance of scare, understand scare, problems with scare","example":"It took me a while to understand scare.","translation":"我花了一段時間才理解「驚嚇」。"},{"id":"B2-1516-anger","level":"B2","word":"anger","pos":"n.","meaning":"忿怒；激怒；使發怒；發怒","collocations":"a sense of anger, learn about anger, talk about anger","example":"The book included a chapter about anger.","translation":"這本書有一章談到「忿怒」。"},{"id":"B2-1517-fool","level":"B2","word":"fool","pos":"n.","meaning":"愚人；受騙者；奶油拌水果；愚弄","collocations":"a sense of fool, learn about fool, talk about fool","example":"She searched online for more information about fool.","translation":"她上網搜尋更多關於「愚人」的資訊。"},{"id":"B2-1518-artistic","level":"B2","word":"artistic","pos":"adj.","meaning":"藝術的；藝術家的；富有藝術性的","collocations":"feel artistic, seem artistic, a artistic day","example":"The new idea sounded artistic, but we decided to try it.","translation":"這個新點子聽起來很「藝術的」，但我們決定試試看。"},{"id":"B2-1519-devote","level":"B2","word":"devote","pos":"v.","meaning":"投入於；獻身","collocations":"devote more time to research, need to devote, devote carefully","example":"It took several days to devote more time to research properly.","translation":"要妥善「投入於」更多時間投入研究花了好幾天。"},{"id":"B2-1520-creation","level":"B2","word":"creation","pos":"n.","meaning":"創造；創作物；發明；產生","collocations":"the importance of creation, understand creation, problems with creation","example":"We saw how creation can change people's plans.","translation":"我們看到「創造」如何改變人們的計畫。"},{"id":"B2-1521-honour","level":"B2","word":"honour","pos":"n.","meaning":"榮譽；頭銜；信用；尊敬","collocations":"the importance of honour, understand honour, problems with honour","example":"Parents often talk about honour when planning for the future.","translation":"父母規劃未來時，常會談到「榮譽」。"},{"id":"B2-1522-investor","level":"B2","word":"investor","pos":"n.","meaning":"投資者","collocations":"private investor, foreign investor, investor confidence","example":"A local investor helped the bakery open a second shop.","translation":"一位本地投資人幫助這家麵包店開了第二間店。"},{"id":"B2-1523-trap","level":"B2","word":"trap","pos":"n.","meaning":"圈套；陷阱；詭計；存水彎","collocations":"the importance of trap, understand trap, problems with trap","example":"A simple classroom activity showed us trap.","translation":"一個簡單的課堂活動讓我們看見「圈套」。"},{"id":"B2-1524-confess","level":"B2","word":"confess","pos":"v.","meaning":"承認；坦白；懺悔；供認","collocations":"confess the truth, need to confess, confess carefully","example":"She learned how to confess the truth during her first month at work.","translation":"她在工作的第一個月學會如何「承認」真相。"},{"id":"B2-1525-bent","level":"B2","word":"bent","pos":"adj.","meaning":"彎曲的；決心的；愛好；bend的過去式和過去分詞","collocations":"a bent wall, a bent path, a bent shape","example":"The bent door was locked, so we used the front entrance.","translation":"那扇「彎曲的」的門鎖住了，所以我們走前門。"},{"id":"B2-1526-acid","level":"B2","word":"acid","pos":"n.","meaning":"酸；酸類物質；尖刻；迷幻藥","collocations":"an acid, use the acid, place the acid","example":"He found the acid in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「酸」。"},{"id":"B2-1527-thumb","level":"B2","word":"thumb","pos":"n.","meaning":"拇指；以拇指撥弄；笨拙地擺弄；用拇指翻舊","collocations":"a thumb, use the thumb, place the thumb","example":"The old thumb reminded her of her grandfather's house.","translation":"那個舊「拇指」讓她想起祖父的家。"},{"id":"B2-1528-declare","level":"B2","word":"declare","pos":"v.","meaning":"宣佈；聲明；申報；斷言","collocations":"declare a public emergency, need to declare, declare carefully","example":"They had to declare a public emergency before the end of the week.","translation":"他們必須在週末前「宣佈」公共緊急狀態。"},{"id":"B2-1529-loyal","level":"B2","word":"loyal","pos":"adj.","meaning":"忠誠的；忠實的；忠貞的","collocations":"a loyal choice, loyal at times, sound loyal","example":"The day felt loyal, so we changed our plans.","translation":"那天感覺很「忠誠的」，所以我們改變了計畫。"},{"id":"B2-1530-maximum","level":"B2","word":"maximum","pos":"n.","meaning":"極點；最大量；極大；最高的","collocations":"the importance of maximum, understand maximum, problems with maximum","example":"My friend gave a clear example of maximum.","translation":"我的朋友舉了一個清楚的「極點」例子。"},{"id":"B2-1531-licence","level":"B2","word":"licence","pos":"n.","meaning":"執照；許可證；特許；許可","collocations":"driving licence, licence fee, apply for a licence","example":"You need a driving licence before you can rent a car.","translation":"租車前你需要有駕照。"},{"id":"B2-1532-possess","level":"B2","word":"possess","pos":"v.","meaning":"持有；佔有；擁有；剋制","collocations":"possess strong communication skills, need to possess, possess carefully","example":"They had to possess strong communication skills before the end of the week.","translation":"他們必須在週末前「持有」良好的溝通能力。"},{"id":"B2-1533-bush","level":"B2","word":"bush","pos":"n.","meaning":"矮樹叢；管襯","collocations":"a bush, use the bush, place the bush","example":"The old bush reminded her of her grandfather's house.","translation":"那個舊「矮樹叢」讓她想起祖父的家。"},{"id":"B2-1534-pure","level":"B2","word":"pure","pos":"adj.","meaning":"純的；純淨的；純潔的；清白的","collocations":"feel pure, seem pure, a pure day","example":"The answer was pure enough for us to keep talking about it.","translation":"這個回答夠「純的」，讓我們繼續討論下去。"},{"id":"B2-1535-trading","level":"B2","word":"trading","pos":"n.","meaning":"交易","collocations":"the importance of trading, understand trading, problems with trading","example":"The book included a chapter about trading.","translation":"這本書有一章談到「交易」。"},{"id":"B2-1536-seek","level":"B2","word":"seek","pos":"v.","meaning":"尋求；尋找；探索；追求","collocations":"seek professional advice, need to seek, seek carefully","example":"They had to seek professional advice before the end of the week.","translation":"他們必須在週末前「尋求」專業建議。"},{"id":"B2-1537-absorb","level":"B2","word":"absorb","pos":"v.","meaning":"吸收；使全神貫注；同化；買進","collocations":"absorb new information, need to absorb, absorb carefully","example":"She learned how to absorb new information during her first month at work.","translation":"她在工作的第一個月學會如何「吸收」新資訊。"},{"id":"B2-1538-committee","level":"B2","word":"committee","pos":"n.","meaning":"委員會","collocations":"the importance of committee, understand committee, problems with committee","example":"A simple classroom activity showed us committee.","translation":"一個簡單的課堂活動讓我們看見「委員會」。"},{"id":"B2-1539-duration","level":"B2","word":"duration","pos":"n.","meaning":"持續時間；持續","collocations":"a sense of duration, learn about duration, talk about duration","example":"I first learned about duration from a teacher at school.","translation":"我第一次從學校老師那裡學到「持續時間」。"},{"id":"B2-1540-prime","level":"B2","word":"prime","pos":"n.","meaning":"最佳部分；初期；全盛期；主要的","collocations":"prime example, prime time, prime location","example":"The cafe is in a prime location near the train station.","translation":"這家咖啡店位於火車站附近的黃金地段。"},{"id":"B2-1541-interrupt","level":"B2","word":"interrupt","pos":"v.","meaning":"中斷；妨礙；插嘴；打斷","collocations":"interrupt the meeting, need to interrupt, interrupt carefully","example":"The family needed to interrupt the meeting before making a final choice.","translation":"這家人在做最後選擇前，需要先「中斷」會議。"},{"id":"B2-1542-assessment","level":"B2","word":"assessment","pos":"n.","meaning":"評估；估定；評定的款額","collocations":"changes in assessment, a lack of assessment, focus on assessment","example":"He used a drawing to show the meaning of assessment.","translation":"他用一張圖來說明「評估」的意思。"},{"id":"B2-1543-homeless","level":"B2","word":"homeless","pos":"adj.","meaning":"無家的；無養主的","collocations":"feel homeless, seem homeless, a homeless day","example":"The answer was homeless enough for us to keep talking about it.","translation":"這個回答夠「無家的」，讓我們繼續討論下去。"},{"id":"B2-1544-depressing","level":"B2","word":"depressing","pos":"adj.","meaning":"抑壓的；沉悶的；陰沉的","collocations":"a depressing choice, depressing at times, sound depressing","example":"She made a depressing choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「抑壓的」的選擇。"},{"id":"B2-1545-dump","level":"B2","word":"dump","pos":"n.","meaning":"垃圾場；傾倒；傾銷；倒垃圾","collocations":"a sense of dump, learn about dump, talk about dump","example":"It took me a while to understand dump.","translation":"我花了一段時間才理解「垃圾場」。"},{"id":"B2-1546-consistently","level":"B2","word":"consistently","pos":"adv.","meaning":"堅固；堅實；一致；始終如一","collocations":"perform consistently, consistently high, consistently support","example":"The athlete performed consistently well throughout the tournament.","translation":"這名運動員在整場錦標賽中表現一直很穩定。"},{"id":"B2-1547-sustainable","level":"B2","word":"sustainable","pos":"adj.","meaning":"足可支撐的；養得起的；可以忍受的","collocations":"sustainable development, sustainable growth, sustainable energy","example":"The city is investing in sustainable transport to reduce long-term emissions.","translation":"該市正在投資永續交通，以減少長期排放。"},{"id":"B2-1548-relatively","level":"B2","word":"relatively","pos":"adv.","meaning":"相對地；比較地；相當地；相關地","collocations":"change relatively, relatively different, relatively important","example":"The medicine worked relatively better after the second day.","translation":"第二天後，藥效「相對地」變好。"},{"id":"B2-1549-appropriately","level":"B2","word":"appropriately","pos":"adv.","meaning":"適當的；恰如其分的；恰當的；合適的","collocations":"respond appropriately, dress appropriately, appropriately designed","example":"Please dress appropriately for the interview, even if the company seems casual.","translation":"即使那家公司看起來很隨性，面試時也請穿著得體。"},{"id":"B2-1550-hopefully","level":"B2","word":"hopefully","pos":"adv.","meaning":"有希望地；如果希望能實現的話","collocations":"hopefully improve, hopefully return, hopefully soon","example":"Hopefully, the new policy will reduce waiting times at public hospitals.","translation":"希望這項新政策能縮短公立醫院的等候時間。"},{"id":"B2-1551-installation","level":"B2","word":"installation","pos":"n.","meaning":"安裝；裝置；就職；結構","collocations":"changes in installation, a lack of installation, focus on installation","example":"I noticed installation in a news story last night.","translation":"昨晚我在一則新聞中注意到「安裝」。"},{"id":"B2-1552-balanced","level":"B2","word":"balanced","pos":"adj.","meaning":"公平的；平衡的；對稱的；均衡的","collocations":"feel balanced, seem balanced, a balanced day","example":"The day felt balanced, so we changed our plans.","translation":"那天感覺很「公平的」，所以我們改變了計畫。"},{"id":"B2-1553-coverage","level":"B2","word":"coverage","pos":"n.","meaning":"覆蓋的範圍；保險總額；新聞報導；可達範圍","collocations":"the importance of coverage, understand coverage, problems with coverage","example":"One clear example made coverage easier to understand.","translation":"一個清楚的例子讓「覆蓋的範圍」更容易理解。"},{"id":"B2-1554-league","level":"B2","word":"league","pos":"n.","meaning":"同盟；聯盟；盟約；組聯盟","collocations":"football league, join a league, top of the league","example":"Her basketball team joined a local league this summer.","translation":"她的籃球隊今年夏天加入了地方聯盟。"},{"id":"B2-1555-edit","level":"B2","word":"edit","pos":"v.","meaning":"編輯；編校；修訂；剪輯","collocations":"edit the article, need to edit, edit carefully","example":"Our teacher asked us to edit the article using clear examples.","translation":"老師要求我們用清楚的例子來「編輯」文章。"},{"id":"B2-1556-measurement","level":"B2","word":"measurement","pos":"n.","meaning":"尺寸；度量；度量單位","collocations":"changes in measurement, a lack of measurement, focus on measurement","example":"The lesson connected measurement to things we see every day.","translation":"這堂課把「尺寸」和我們每天看見的事物連結起來。"},{"id":"B2-1557-trigger","level":"B2","word":"trigger","pos":"n.","meaning":"觸發器；扳機；觸發；發射","collocations":"a sense of trigger, learn about trigger, talk about trigger","example":"One clear example made trigger easier to understand.","translation":"一個清楚的例子讓「觸發器」更容易理解。"},{"id":"B2-1558-dramatic","level":"B2","word":"dramatic","pos":"adj.","meaning":"戲劇性的；生動的","collocations":"feel dramatic, seem dramatic, a dramatic day","example":"The new idea sounded dramatic, but we decided to try it.","translation":"這個新點子聽起來很「戲劇性的」，但我們決定試試看。"},{"id":"B2-1559-spectator","level":"B2","word":"spectator","pos":"n.","meaning":"觀眾；目擊者；旁觀者","collocations":"sports spectator, spectator area, spectator sport","example":"Spectators were asked to stay behind the yellow line.","translation":"觀眾被要求留在黃線後方。"},{"id":"B2-1560-consumption","level":"B2","word":"consumption","pos":"n.","meaning":"消費；消費量；癆病；消耗量","collocations":"a sense of consumption, learn about consumption, talk about consumption","example":"The video explained consumption in simple language.","translation":"這支影片用簡單的語言解釋「消費」。"},{"id":"B2-1561-delay","level":"B2","word":"delay","pos":"n.","meaning":"耽擱；遲滯；延遲；延時","collocations":"changes in delay, a lack of delay, focus on delay","example":"A simple classroom activity showed us delay.","translation":"一個簡單的課堂活動讓我們看見「耽擱」。"},{"id":"B2-1562-determination","level":"B2","word":"determination","pos":"n.","meaning":"決心；果斷；判定；測定","collocations":"a sense of determination, learn about determination, talk about determination","example":"The class used everyday examples to understand determination.","translation":"全班用日常例子來理解「決心」。"},{"id":"B2-1563-navigation","level":"B2","word":"navigation","pos":"n.","meaning":"航行；航海；導航；航空","collocations":"the importance of navigation, understand navigation, problems with navigation","example":"He used a drawing to show the meaning of navigation.","translation":"他用一張圖來說明「航行」的意思。"},{"id":"B2-1564-signature","level":"B2","word":"signature","pos":"n.","meaning":"簽字；識別標誌；調號；簽名附件","collocations":"a sense of signature, learn about signature, talk about signature","example":"Friends may disagree about signature, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「簽字」有不同看法。"},{"id":"B2-1565-universe","level":"B2","word":"universe","pos":"n.","meaning":"宇宙；星系；(思想等)範圍","collocations":"changes in universe, a lack of universe, focus on universe","example":"A friend helped me understand universe with a simple example.","translation":"一位朋友用簡單例子幫我理解「宇宙」。"},{"id":"B2-1566-saving","level":"B2","word":"saving","pos":"n.","meaning":"存款；挽救；節約；搭救的","collocations":"a sense of saving, learn about saving, talk about saving","example":"Friends may disagree about saving, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「存款」有不同看法。"},{"id":"B2-1567-outcome","level":"B2","word":"outcome","pos":"n.","meaning":"結果；出口","collocations":"positive outcome, final outcome, expected outcome","example":"The outcome of the meeting was better than we expected.","translation":"會議結果比我們預期的更好。"},{"id":"B2-1568-corporate","level":"B2","word":"corporate","pos":"adj.","meaning":"社團的；合夥的；公司的；團體的","collocations":"feel corporate, seem corporate, a corporate day","example":"The day felt corporate, so we changed our plans.","translation":"那天感覺很「社團的」，所以我們改變了計畫。"},{"id":"B2-1569-harm","level":"B2","word":"harm","pos":"v.","meaning":"傷害；害處；損害","collocations":"harm the relationship, need to harm, harm carefully","example":"They had to harm the relationship before the end of the week.","translation":"他們必須在週末前「傷害」關係。"},{"id":"B2-1570-mate","level":"B2","word":"mate","pos":"n.","meaning":"配偶；對手；助手；(象棋)將死","collocations":"classmate, flatmate, team-mate","example":"My flatmate cooked dinner because I came home late.","translation":"我回家晚了，所以室友煮了晚餐。"},{"id":"B2-1571-perception","level":"B2","word":"perception","pos":"n.","meaning":"知覺；感覺；領悟力；獲取","collocations":"the importance of perception, understand perception, problems with perception","example":"We heard about perception during a conversation at lunch.","translation":"我們午餐聊天時聽到了「知覺」。"},{"id":"B2-1572-significance","level":"B2","word":"significance","pos":"n.","meaning":"重要性；意義；意味；有效","collocations":"a sense of significance, learn about significance, talk about significance","example":"The book included a chapter about significance.","translation":"這本書有一章談到「重要性」。"},{"id":"B2-1573-tackle","level":"B2","word":"tackle","pos":"v.","meaning":"工具；復滑車；滑車；裝備","collocations":"need to tackle, try to tackle, help to tackle","example":"We need to tackle the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「工具」它。"},{"id":"B2-1574-dealer","level":"B2","word":"dealer","pos":"n.","meaning":"經銷商；商人；交易員；販賣商","collocations":"a dealer, work as a dealer, ask a dealer","example":"We asked a dealer for advice before making the decision.","translation":"做決定前，我們向一位「經銷商」請教。"},{"id":"B2-1575-grocery","level":"B2","word":"grocery","pos":"n.","meaning":"食品雜貨店；食品雜貨業","collocations":"the importance of grocery, understand grocery, problems with grocery","example":"The conversation at home turned to grocery after dinner.","translation":"晚餐後，家裡的談話轉到了「食品雜貨店」。"},{"id":"B2-1576-remark","level":"B2","word":"remark","pos":"n.","meaning":"評論；注意；談論；註釋","collocations":"a sense of remark, learn about remark, talk about remark","example":"The video showed why remark matters in real life.","translation":"這支影片說明瞭為什麼「評論」在現實生活中很重要。"},{"id":"B2-1577-deserve","level":"B2","word":"deserve","pos":"v.","meaning":"該得到；值得；應得報答","collocations":"deserve more recognition, need to deserve, deserve carefully","example":"Our teacher asked us to deserve more recognition using clear examples.","translation":"老師要求我們用清楚的例子來「該得到」更多肯定。"},{"id":"B2-1578-overcome","level":"B2","word":"overcome","pos":"v.","meaning":"戰勝；克服；勝過；得勝","collocations":"overcome the obstacle, need to overcome, overcome carefully","example":"They had to overcome the obstacle before the end of the week.","translation":"他們必須在週末前「戰勝」障礙。"},{"id":"B2-1579-accomplish","level":"B2","word":"accomplish","pos":"v.","meaning":"完成；達到；實現；使完美","collocations":"accomplish the goal, need to accomplish, accomplish carefully","example":"Please do not accomplish the goal until you understand the details.","translation":"在瞭解細節之前，請不要「完成」目標。"},{"id":"B2-1580-inform","level":"B2","word":"inform","pos":"v.","meaning":"通知；使瞭解；使充滿；提供資料","collocations":"inform local residents, need to inform, inform carefully","example":"Please do not inform local residents until you understand the details.","translation":"在瞭解細節之前，請不要「通知」當地居民。"},{"id":"B2-1581-exploit","level":"B2","word":"exploit","pos":"v.","meaning":"功績；勳績；開發；利用","collocations":"exploit natural resources, need to exploit, exploit carefully","example":"The family needed to exploit natural resources before making a final choice.","translation":"這家人在做最後選擇前，需要先「功績」自然資源。"},{"id":"B2-1582-domestic","level":"B2","word":"domestic","pos":"adj.","meaning":"家庭的；國內的；馴養的；家用的","collocations":"domestic advice, domestic reason, domestic choice","example":"Her advice was domestic, so I followed it the next day.","translation":"她的建議很「家庭的」，所以我隔天照做了。"},{"id":"B2-1583-abstract","level":"B2","word":"abstract","pos":"adj.","meaning":"抽象的；深奧的；摘要；抽象概念","collocations":"feel abstract, seem abstract, a abstract day","example":"The new idea sounded abstract, but we decided to try it.","translation":"這個新點子聽起來很「抽象的」，但我們決定試試看。"},{"id":"B2-1584-decline","level":"B2","word":"decline","pos":"v.","meaning":"衰退；跌落；下降；使降低","collocations":"need to decline, try to decline, help to decline","example":"We need to decline the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「衰退」它。"},{"id":"B2-1585-incorrect","level":"B2","word":"incorrect","pos":"adj.","meaning":"不正確的；不正確；錯誤的；不適當的","collocations":"feel incorrect, seem incorrect, a incorrect day","example":"The answer was incorrect enough for us to keep talking about it.","translation":"這個回答夠「不正確的」，讓我們繼續討論下去。"},{"id":"B2-1586-enthusiasm","level":"B2","word":"enthusiasm","pos":"n.","meaning":"巨大的熱情；熱心","collocations":"a sense of enthusiasm, learn about enthusiasm, talk about enthusiasm","example":"She wrote a note to remind herself why enthusiasm mattered.","translation":"她寫了一張便條提醒自己為什麼「巨大的熱情」很重要。"},{"id":"B2-1587-extent","level":"B2","word":"extent","pos":"n.","meaning":"範圍；程度；區域","collocations":"the importance of extent, understand extent, problems with extent","example":"The video showed why extent matters in real life.","translation":"這支影片說明瞭為什麼「範圍」在現實生活中很重要。"},{"id":"B2-1588-estimate","level":"B2","word":"estimate","pos":"v.","meaning":"估計；判斷；評價","collocations":"need to estimate, try to estimate, help to estimate","example":"We need to estimate the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「估計」它。"},{"id":"B2-1589-gang","level":"B2","word":"gang","pos":"n.","meaning":"隊；群；幫；成群結隊","collocations":"changes in gang, a lack of gang, focus on gang","example":"We saw how gang can change people's plans.","translation":"我們看到「隊」如何改變人們的計畫。"},{"id":"B2-1590-revision","level":"B2","word":"revision","pos":"n.","meaning":"校訂；修正；修訂本；修訂版","collocations":"a sense of revision, learn about revision, talk about revision","example":"A simple classroom activity showed us revision.","translation":"一個簡單的課堂活動讓我們看見「校訂」。"},{"id":"B2-1591-hearing","level":"B2","word":"hearing","pos":"n.","meaning":"聽；聽覺；聽訊","collocations":"changes in hearing, a lack of hearing, focus on hearing","example":"One clear example made hearing easier to understand.","translation":"一個清楚的例子讓「聽」更容易理解。"},{"id":"B2-1592-executive","level":"B2","word":"executive","pos":"n.","meaning":"執行部門；執行委員會；執行者；經理主管人員","collocations":"an executive, work as an executive, ask an executive","example":"The executive explained the problem in simple words.","translation":"那位「執行部門」用簡單的話解釋問題。"},{"id":"B2-1593-random","level":"B2","word":"random","pos":"n.","meaning":"隨意；隨機；任意的；隨便的","collocations":"changes in random, a lack of random, focus on random","example":"We heard about random during a conversation at lunch.","translation":"我們午餐聊天時聽到了「隨意」。"},{"id":"B2-1594-arise","level":"B2","word":"arise","pos":"v.","meaning":"出現；發生","collocations":"problems arise, arise from, arise unexpectedly","example":"Problems often arise when important information is shared too late.","translation":"重要資訊太晚分享時，問題往往會出現。"},{"id":"B2-1595-terribly","level":"B2","word":"terribly","pos":"adv.","meaning":"可怕地；甚為；非常","collocations":"change terribly, terribly different, terribly important","example":"The room was terribly quieter after they closed the windows.","translation":"他們關上窗戶後，房間「可怕地」安靜許多。"},{"id":"B2-1596-lean","level":"B2","word":"lean","pos":"v.","meaning":"瘦肉；傾斜；傾斜度；瘦的","collocations":"lean suddenly, lean over time, begin to lean","example":"Small arguments sometimes lean during long family trips.","translation":"長途家庭旅行中，有時會「瘦肉」小爭執。"},{"id":"B2-1597-lottery","level":"B2","word":"lottery","pos":"n.","meaning":"獎券；彩票；運氣；抽彩給獎法","collocations":"the importance of lottery, understand lottery, problems with lottery","example":"We saw how lottery can change people's plans.","translation":"我們看到「獎券」如何改變人們的計畫。"},{"id":"B2-1598-hidden","level":"B2","word":"hidden","pos":"adj.","meaning":"隱藏的；hide的過去分詞","collocations":"a hidden wall, a hidden path, a hidden shape","example":"The hidden door was locked, so we used the front entrance.","translation":"那扇「隱藏的」的門鎖住了，所以我們走前門。"},{"id":"B2-1599-examination","level":"B2","word":"examination","pos":"n.","meaning":"考試；測驗；審查；檢查","collocations":"changes in examination, a lack of examination, focus on examination","example":"The conversation at home turned to examination after dinner.","translation":"晚餐後，家裡的談話轉到了「考試」。"},{"id":"B2-1600-identical","level":"B2","word":"identical","pos":"adj.","meaning":"同一的；恆等的；完全相同的；同等的","collocations":"a identical choice, identical at times, sound identical","example":"She made a identical choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「同一的」的選擇。"},{"id":"B2-1601-disabled","level":"B2","word":"disabled","pos":"adj.","meaning":"殘廢的；有缺陷的；失效的","collocations":"a disabled choice, disabled at times, sound disabled","example":"The answer was disabled enough for us to keep talking about it.","translation":"這個回答夠「殘廢的」，讓我們繼續討論下去。"},{"id":"B2-1602-bullet","level":"B2","word":"bullet","pos":"n.","meaning":"子彈；彈；距節(馬)","collocations":"a sense of bullet, learn about bullet, talk about bullet","example":"Friends may disagree about bullet, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「子彈」有不同看法。"},{"id":"B2-1603-nevertheless","level":"B2","word":"nevertheless","pos":"adv.","meaning":"然而；雖然如此","collocations":"nevertheless important, nevertheless continued, nevertheless possible","example":"The task was difficult; nevertheless, the team completed it before the deadline.","translation":"這項任務很困難；然而，團隊仍在期限前完成。"},{"id":"B2-1604-impress","level":"B2","word":"impress","pos":"v.","meaning":"印象；特徵；印記；使有印象","collocations":"need to impress, try to impress, help to impress","example":"We need to impress the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「印象」它。"},{"id":"B2-1605-foundation","level":"B2","word":"foundation","pos":"n.","meaning":"基礎；根據；建立；地基","collocations":"changes in foundation, a lack of foundation, focus on foundation","example":"A friend helped me understand foundation with a simple example.","translation":"一位朋友用簡單例子幫我理解「基礎」。"},{"id":"B2-1606-terms","level":"B2","word":"terms","pos":"n.","meaning":"條件；說法；關係","collocations":"a sense of terms, learn about terms, talk about terms","example":"The video explained terms in simple language.","translation":"這支影片用簡單的語言解釋「條件」。"},{"id":"B2-1607-revenue","level":"B2","word":"revenue","pos":"n.","meaning":"收入；歲入；稅收；稅務局","collocations":"a sense of revenue, learn about revenue, talk about revenue","example":"She searched online for more information about revenue.","translation":"她上網搜尋更多關於「收入」的資訊。"},{"id":"B2-1608-cute","level":"B2","word":"cute","pos":"adj.","meaning":"可愛的；聰明的；伶俐的；品他病","collocations":"cute enough, become cute, look cute","example":"His room looked cute after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「可愛的」。"},{"id":"B2-1609-deny","level":"B2","word":"deny","pos":"v.","meaning":"否認；拒絕","collocations":"deny the accusation, need to deny, deny carefully","example":"They had to deny the accusation before the end of the week.","translation":"他們必須在週末前「否認」指控。"},{"id":"B2-1610-shaped","level":"B2","word":"shaped","pos":"adj.","meaning":"成某種形狀的；製成一定形狀的；有某種形狀的；合適的","collocations":"a shaped choice, shaped at times, sound shaped","example":"The answer was shaped enough for us to keep talking about it.","translation":"這個回答夠「成某種形狀的」，讓我們繼續討論下去。"},{"id":"B2-1611-unfortunate","level":"B2","word":"unfortunate","pos":"adj.","meaning":"不幸的；不合適的；不吉利的","collocations":"a unfortunate choice, unfortunate at times, sound unfortunate","example":"She made a unfortunate choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「不幸的」的選擇。"},{"id":"B2-1612-numerous","level":"B2","word":"numerous","pos":"adj.","meaning":"很多的；數目眾多的；多數的；甚多的","collocations":"feel numerous, seem numerous, a numerous day","example":"The answer was numerous enough for us to keep talking about it.","translation":"這個回答夠「很多的」，讓我們繼續討論下去。"},{"id":"B2-1613-emerge","level":"B2","word":"emerge","pos":"v.","meaning":"浮現；形成；出現；(事實)顯露","collocations":"emerge suddenly, emerge over time, begin to emerge","example":"Questions often emerge after students try the exercise themselves.","translation":"學生自己嘗試練習後，常常會「浮現」問題。"},{"id":"B2-1614-recall","level":"B2","word":"recall","pos":"v.","meaning":"回憶；召回；撤消；回想","collocations":"need to recall, try to recall, help to recall","example":"We need to recall the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「回憶」它。"},{"id":"B2-1615-divorce","level":"B2","word":"divorce","pos":"n.","meaning":"離婚；與...離婚","collocations":"the importance of divorce, understand divorce, problems with divorce","example":"I noticed divorce in a news story last night.","translation":"昨晚我在一則新聞中注意到「離婚」。"},{"id":"B2-1616-passage","level":"B2","word":"passage","pos":"n.","meaning":"通道；通過；移居；航行","collocations":"short passage, narrow passage, passage from a book","example":"The test included a short passage about city life.","translation":"測驗包含一篇關於城市生活的短文。"},{"id":"B2-1617-drought","level":"B2","word":"drought","pos":"n.","meaning":"乾旱；缺乏","collocations":"a sense of drought, learn about drought, talk about drought","example":"We saw how drought can change people's plans.","translation":"我們看到「乾旱」如何改變人們的計畫。"},{"id":"B2-1618-solar","level":"B2","word":"solar","pos":"adj.","meaning":"太陽的；日光的；源自太陽的；腹腔叢的","collocations":"a solar choice, solar at times, sound solar","example":"The day felt solar, so we changed our plans.","translation":"那天感覺很「太陽的」，所以我們改變了計畫。"},{"id":"B2-1619-shortage","level":"B2","word":"shortage","pos":"n.","meaning":"不足；缺乏；缺額","collocations":"a sense of shortage, learn about shortage, talk about shortage","example":"We heard about shortage during a conversation at lunch.","translation":"我們午餐聊天時聽到了「不足」。"},{"id":"B2-1620-chairman","level":"B2","word":"chairman","pos":"n.","meaning":"主席；會長","collocations":"a chairman, work as a chairman, ask a chairman","example":"She hopes to become a chairman after university.","translation":"她希望大學畢業後成為「主席」。"},{"id":"B2-1621-demonstrate","level":"B2","word":"demonstrate","pos":"v.","meaning":"示範；證明；示威","collocations":"demonstrate the effect, need to demonstrate, demonstrate carefully","example":"Our teacher asked us to demonstrate the effect using clear examples.","translation":"老師要求我們用清楚的例子來「示範」效果。"},{"id":"B2-1622-defender","level":"B2","word":"defender","pos":"n.","meaning":"防衛者；防護者；辯護者；辯護人","collocations":"a defender, work as a defender, ask a defender","example":"We asked a defender for advice before making the decision.","translation":"做決定前，我們向一位「防衛者」請教。"},{"id":"B2-1623-pile","level":"B2","word":"pile","pos":"n.","meaning":"堆；大堆；大廈；建築群","collocations":"a sense of pile, learn about pile, talk about pile","example":"One clear example made pile easier to understand.","translation":"一個清楚的例子讓「堆」更容易理解。"},{"id":"B2-1624-dot","level":"B2","word":"dot","pos":"n.","meaning":"點；圓點；小數點；小東西","collocations":"small dot, black dot, dot on the map","example":"There was a small red dot on the map showing our hotel.","translation":"地圖上有一個小紅點標示我們的飯店。"},{"id":"B2-1625-ultimate","level":"B2","word":"ultimate","pos":"n.","meaning":"終極；根本；頂點；基本原則","collocations":"changes in ultimate, a lack of ultimate, focus on ultimate","example":"She wrote a note to remind herself why ultimate mattered.","translation":"她寫了一張便條提醒自己為什麼「終極」很重要。"},{"id":"B2-1626-encounter","level":"B2","word":"encounter","pos":"n.","meaning":"相會；相遇；遭遇；遇見","collocations":"the importance of encounter, understand encounter, problems with encounter","example":"She wrote a note to remind herself why encounter mattered.","translation":"她寫了一張便條提醒自己為什麼「相會」很重要。"},{"id":"B2-1627-complicated","level":"B2","word":"complicated","pos":"adj.","meaning":"複雜的；併發的","collocations":"a complicated choice, complicated at times, sound complicated","example":"The new idea sounded complicated, but we decided to try it.","translation":"這個新點子聽起來很「複雜的」，但我們決定試試看。"},{"id":"B2-1628-associated","level":"B2","word":"associated","pos":"adj.","meaning":"聯合的；關聯的；結合的","collocations":"feel associated, seem associated, a associated day","example":"She made a associated choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「聯合的」的選擇。"},{"id":"B2-1629-psychologist","level":"B2","word":"psychologist","pos":"n.","meaning":"心理學家","collocations":"a psychologist, work as a psychologist, ask a psychologist","example":"My neighbour works as a psychologist in the city.","translation":"我的鄰居在城裡擔任「心理學家」。"},{"id":"B2-1630-kit","level":"B2","word":"kit","pos":"n.","meaning":"裝備；工具箱；成套工具；成套部件","collocations":"first-aid kit, tool kit, football kit","example":"Every car should have a small first-aid kit.","translation":"每輛車都應該有一個小型急救包。"},{"id":"B2-1631-organic","level":"B2","word":"organic","pos":"adj.","meaning":"器官的；有機的；組織的；根本的","collocations":"organic advice, organic reason, organic choice","example":"The change was organic enough for everyone to notice.","translation":"這項改變夠「器官的」，大家都注意到了。"},{"id":"B2-1632-reward","level":"B2","word":"reward","pos":"n.","meaning":"報酬；酬謝；賞金；獎賞","collocations":"a sense of reward, learn about reward, talk about reward","example":"Parents often talk about reward when planning for the future.","translation":"父母規劃未來時，常會談到「報酬」。"},{"id":"B2-1633-convey","level":"B2","word":"convey","pos":"v.","meaning":"傳達；運輸；轉讓；轉讓(財產等)","collocations":"convey a clear message, need to convey, convey carefully","example":"He helped the group convey a clear message without making the problem worse.","translation":"他幫助小組「傳達」明確訊息，而沒有讓問題變得更糟。"},{"id":"B2-1634-predictable","level":"B2","word":"predictable","pos":"adj.","meaning":"可預言的","collocations":"a predictable choice, predictable at times, sound predictable","example":"She made a predictable choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「可預言的」的選擇。"},{"id":"B2-1635-submit","level":"B2","word":"submit","pos":"v.","meaning":"使服從；使受到；委託；提交","collocations":"submit the application, need to submit, submit carefully","example":"He helped the group submit the application without making the problem worse.","translation":"他幫助小組「使服從」申請書，而沒有讓問題變得更糟。"},{"id":"B2-1636-minister","level":"B2","word":"minister","pos":"n.","meaning":"部長；牧師；公使；服侍","collocations":"a minister, work as a minister, ask a minister","example":"She hopes to become a minister after university.","translation":"她希望大學畢業後成為「部長」。"},{"id":"B2-1637-matching","level":"B2","word":"matching","pos":"adj.","meaning":"相同的；協調的；匹配；對比","collocations":"feel matching, seem matching, a matching day","example":"His room looked matching after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「相同的」。"},{"id":"B2-1638-breast","level":"B2","word":"breast","pos":"n.","meaning":"胸部；乳房；胸懷；以胸對著","collocations":"changes in breast, a lack of breast, focus on breast","example":"We heard about breast during a conversation at lunch.","translation":"我們午餐聊天時聽到了「胸部」。"},{"id":"B2-1639-construct","level":"B2","word":"construct","pos":"v.","meaning":"構造；建造；對...進行構思；作圖","collocations":"construct a bridge, need to construct, construct carefully","example":"The family needed to construct a bridge before making a final choice.","translation":"這家人在做最後選擇前，需要先「構造」橋梁。"},{"id":"B2-1640-founder","level":"B2","word":"founder","pos":"n.","meaning":"創立者；建立者；使沉沒；使摔倒","collocations":"a founder, work as a founder, ask a founder","example":"She hopes to become a founder after university.","translation":"她希望大學畢業後成為「創立者」。"},{"id":"B2-1641-humorous","level":"B2","word":"humorous","pos":"adj.","meaning":"富幽默感的；滑稽的；詼諧的","collocations":"humorous advice, humorous reason, humorous choice","example":"It is humorous to check the price before you buy something expensive.","translation":"買昂貴物品前先確認價格是「富幽默感的」的。"},{"id":"B2-1642-usage","level":"B2","word":"usage","pos":"n.","meaning":"用法；使用；習慣；慣用法","collocations":"changes in usage, a lack of usage, focus on usage","example":"The video explained usage in simple language.","translation":"這支影片用簡單的語言解釋「用法」。"},{"id":"B2-1643-assess","level":"B2","word":"assess","pos":"v.","meaning":"估定；對...徵稅；評定；估計","collocations":"assess the risk, need to assess, assess carefully","example":"The school plans to assess the risk after talking with parents.","translation":"學校和家長討論後，計畫「估定」風險。"},{"id":"B2-1644-somehow","level":"B2","word":"somehow","pos":"adv.","meaning":"不知何故","collocations":"somehow manage, somehow survive, somehow connected","example":"The team somehow managed to finish the project despite losing two weeks of work.","translation":"儘管損失了兩週的工作進度，團隊還是設法完成了專案。"},{"id":"B2-1645-obtain","level":"B2","word":"obtain","pos":"v.","meaning":"獲得；達到；流行；得到公認","collocations":"obtain official permission, need to obtain, obtain carefully","example":"The family needed to obtain official permission before making a final choice.","translation":"這家人在做最後選擇前，需要先「獲得」官方許可。"},{"id":"B2-1646-fund","level":"B2","word":"fund","pos":"n.","meaning":"基金；資金；存款；財源","collocations":"raise funds, emergency fund, fund a project","example":"The students raised funds for a new library corner.","translation":"學生們為新的圖書角募款。"},{"id":"B2-1647-isolated","level":"B2","word":"isolated","pos":"adj.","meaning":"孤立的；孤零零的；隔離的；絕緣的","collocations":"isolated enough, become isolated, look isolated","example":"His room looked isolated after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「孤立的」。"},{"id":"B2-1648-fabulous","level":"B2","word":"fabulous","pos":"adj.","meaning":"傳說的；寓言般的；難以置信的","collocations":"fabulous advice, fabulous reason, fabulous choice","example":"That was a fabulous choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「傳說的」的選擇。"},{"id":"B2-1649-miner","level":"B2","word":"miner","pos":"n.","meaning":"礦工；開礦機；坑道工兵","collocations":"a miner, work as a miner, ask a miner","example":"She hopes to become a miner after university.","translation":"她希望大學畢業後成為「礦工」。"},{"id":"B2-1650-angle","level":"B2","word":"angle","pos":"n.","meaning":"角；角度；角落；釣魚","collocations":"from a different angle, camera angle, right angle","example":"Try taking the photo from a different angle.","translation":"試著從不同角度拍這張照片。"},{"id":"B2-1651-nerve","level":"B2","word":"nerve","pos":"n.","meaning":"精神；勇氣；葉脈；神經","collocations":"lose your nerve, nerve damage, a lot of nerve","example":"She lost her nerve just before the speech began.","translation":"演講開始前，她突然失去勇氣。"},{"id":"B2-1652-criticism","level":"B2","word":"criticism","pos":"n.","meaning":"批評；評論；非難；批判","collocations":"the importance of criticism, understand criticism, problems with criticism","example":"A simple classroom activity showed us criticism.","translation":"一個簡單的課堂活動讓我們看見「批評」。"},{"id":"B2-1653-occasionally","level":"B2","word":"occasionally","pos":"adv.","meaning":"有時候；偶而","collocations":"occasionally visit, occasionally happen, occasionally need","example":"The manager occasionally visits each branch to hear employees' concerns directly.","translation":"經理偶爾會拜訪各分店，直接聽取員工的疑慮。"},{"id":"B2-1654-justice","level":"B2","word":"justice","pos":"n.","meaning":"正義；公平；公正；正確","collocations":"a sense of justice, learn about justice, talk about justice","example":"She wrote a note to remind herself why justice mattered.","translation":"她寫了一張便條提醒自己為什麼「正義」很重要。"},{"id":"B2-1655-short-term","level":"B2","word":"short-term","pos":"adj.","meaning":"短期的","collocations":"short-term enough, become short-term, look short-term","example":"The day felt short-term, so we changed our plans.","translation":"那天感覺很「短期的」，所以我們改變了計畫。"},{"id":"B2-1656-requirement","level":"B2","word":"requirement","pos":"n.","meaning":"需求；必要條件；要求；合同要求","collocations":"the importance of requirement, understand requirement, problems with requirement","example":"A short story helped the class discuss requirement.","translation":"一個短篇故事幫助全班討論「需求」。"},{"id":"B2-1657-warming","level":"B2","word":"warming","pos":"n.","meaning":"暖和；加溫；暖熱；溫暖","collocations":"the importance of warming, understand warming, problems with warming","example":"The class used everyday examples to understand warming.","translation":"全班用日常例子來理解「暖和」。"},{"id":"B2-1658-assure","level":"B2","word":"assure","pos":"v.","meaning":"保證；使確信；弄清楚；擔保","collocations":"assure the public, need to assure, assure carefully","example":"Please do not assure the public until you understand the details.","translation":"在瞭解細節之前，請不要「保證」大眾。"},{"id":"B2-1659-priority","level":"B2","word":"priority","pos":"n.","meaning":"優先權；優先；優先級","collocations":"the importance of priority, understand priority, problems with priority","example":"My friend gave a clear example of priority.","translation":"我的朋友舉了一個清楚的「優先權」例子。"},{"id":"B2-1660-proof","level":"B2","word":"proof","pos":"n.","meaning":"證據；證明；試驗；檢驗","collocations":"the importance of proof, understand proof, problems with proof","example":"I noticed proof in a news story last night.","translation":"昨晚我在一則新聞中注意到「證據」。"},{"id":"B2-1661-enjoyable","level":"B2","word":"enjoyable","pos":"adj.","meaning":"可從中得到樂趣的；令人愉快的","collocations":"a enjoyable choice, enjoyable at times, sound enjoyable","example":"His room looked enjoyable after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「可從中得到樂趣的」。"},{"id":"B2-1662-defeat","level":"B2","word":"defeat","pos":"n.","meaning":"敗北；失敗；擊敗；使落空","collocations":"changes in defeat, a lack of defeat, focus on defeat","example":"A friend helped me understand defeat with a simple example.","translation":"一位朋友用簡單例子幫我理解「敗北」。"},{"id":"B2-1663-expansion","level":"B2","word":"expansion","pos":"n.","meaning":"擴充；開展；膨脹；擴展","collocations":"business expansion, rapid expansion, expansion plan","example":"The restaurant hired more staff because of its expansion.","translation":"這家餐廳因擴張而僱用更多員工。"},{"id":"B2-1664-tribe","level":"B2","word":"tribe","pos":"n.","meaning":"宗族；部落；一群人；族(生物分類)","collocations":"a sense of tribe, learn about tribe, talk about tribe","example":"She learned about tribe after making a mistake.","translation":"她犯錯之後，學到了關於「宗族」的事。"},{"id":"B2-1665-novelist","level":"B2","word":"novelist","pos":"n.","meaning":"小說家","collocations":"a novelist, work as a novelist, ask a novelist","example":"My neighbour works as a novelist in the city.","translation":"我的鄰居在城裡擔任「小說家」。"},{"id":"B2-1666-regulate","level":"B2","word":"regulate","pos":"v.","meaning":"管理；控制；調節；調整","collocations":"regulate the industry, need to regulate, regulate carefully","example":"She learned how to regulate the industry during her first month at work.","translation":"她在工作的第一個月學會如何「管理」產業。"},{"id":"B2-1667-protester","level":"B2","word":"protester","pos":"n.","meaning":"抗議者；持異議者；拒付者；反對者","collocations":"peaceful protester, anti-war protester, protester outside","example":"Police asked the protesters to move away from the entrance.","translation":"警方要求抗議者離開入口。"},{"id":"B2-1668-mortgage","level":"B2","word":"mortgage","pos":"n.","meaning":"抵押；約束性義務；抵押借款；以...作擔保","collocations":"pay a mortgage, mortgage rate, apply for a mortgage","example":"They are saving money so they can get a mortgage next year.","translation":"他們正在存錢，希望明年能申請房貸。"},{"id":"B2-1669-reporting","level":"B2","word":"reporting","pos":"n.","meaning":"報道；報告；彙報","collocations":"news reporting, accurate reporting, reporting system","example":"Accurate reporting helped people understand what was happening during the storm.","translation":"準確的報導幫助人們瞭解暴風雨期間發生了什麼事。"},{"id":"B2-1670-frequency","level":"B2","word":"frequency","pos":"n.","meaning":"頻率；頻數","collocations":"a sense of frequency, learn about frequency, talk about frequency","example":"Friends may disagree about frequency, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「頻率」有不同看法。"},{"id":"B2-1671-disagreement","level":"B2","word":"disagreement","pos":"n.","meaning":"不合；爭論；不一致；不同意","collocations":"a sense of disagreement, learn about disagreement, talk about disagreement","example":"My friend gave a clear example of disagreement.","translation":"我的朋友舉了一個清楚的「不合」例子。"},{"id":"B2-1672-comprehensive","level":"B2","word":"comprehensive","pos":"adj.","meaning":"廣泛的；有理解力的；綜合的；全面的","collocations":"a comprehensive choice, comprehensive at times, sound comprehensive","example":"The day felt comprehensive, so we changed our plans.","translation":"那天感覺很「廣泛的」，所以我們改變了計畫。"},{"id":"B2-1673-making","level":"B2","word":"making","pos":"n.","meaning":"製造；(手工)製造業；製作；形成","collocations":"the importance of making, understand making, problems with making","example":"The conversation at home turned to making after dinner.","translation":"晚餐後，家裡的談話轉到了「製造」。"},{"id":"B2-1674-satisfy","level":"B2","word":"satisfy","pos":"v.","meaning":"使滿意；滿足；符合；使確信","collocations":"satisfy the requirements, need to satisfy, satisfy carefully","example":"Please do not satisfy the requirements until you understand the details.","translation":"在瞭解細節之前，請不要「使滿意」要求。"},{"id":"B2-1675-likewise","level":"B2","word":"likewise","pos":"adv.","meaning":"同樣地；也","collocations":"likewise important, likewise affected, likewise expected","example":"The first group received training, and the second group was treated likewise.","translation":"第一組接受了訓練，第二組也受到同樣的安排。"},{"id":"B2-1676-exception","level":"B2","word":"exception","pos":"n.","meaning":"例外；除外；異議；異常","collocations":"make an exception, rare exception, without exception","example":"The teacher made an exception and accepted the late homework.","translation":"老師破例收下了遲交的作業。"},{"id":"B2-1677-instant","level":"B2","word":"instant","pos":"n.","meaning":"立即；瞬間；緊急的；立即的","collocations":"the importance of instant, understand instant, problems with instant","example":"A simple classroom activity showed us instant.","translation":"一個簡單的課堂活動讓我們看見「立即」。"},{"id":"B2-1678-democracy","level":"B2","word":"democracy","pos":"n.","meaning":"民主政治；民主主義；民主；民主政體","collocations":"liberal democracy, defend democracy, democracy depends on","example":"A healthy democracy depends on informed citizens and fair elections.","translation":"健全的民主制度仰賴有知識的公民與公平的選舉。"},{"id":"B2-1679-confusion","level":"B2","word":"confusion","pos":"n.","meaning":"混亂；混淆；無秩序；含混","collocations":"changes in confusion, a lack of confusion, focus on confusion","example":"I first learned about confusion from a teacher at school.","translation":"我第一次從學校老師那裡學到「混亂」。"},{"id":"B2-1680-partnership","level":"B2","word":"partnership","pos":"n.","meaning":"合夥；合股；合作關係；合夥(合作)關係","collocations":"a sense of partnership, learn about partnership, talk about partnership","example":"I first learned about partnership from a teacher at school.","translation":"我第一次從學校老師那裡學到「合夥」。"},{"id":"B2-1681-ethnic","level":"B2","word":"ethnic","pos":"adj.","meaning":"人種的；種族的","collocations":"a ethnic choice, ethnic at times, sound ethnic","example":"The day felt ethnic, so we changed our plans.","translation":"那天感覺很「人種的」，所以我們改變了計畫。"},{"id":"B2-1682-headquarters","level":"B2","word":"headquarters","pos":"n.","meaning":"總部；司令部；總部人員；本部","collocations":"changes in headquarters, a lack of headquarters, focus on headquarters","example":"A short story helped the class discuss headquarters.","translation":"一個短篇故事幫助全班討論「總部」。"},{"id":"B2-1683-overseas","level":"B2","word":"overseas","pos":"adj.","meaning":"海外的；國外的；在海外；在國外","collocations":"a overseas choice, overseas at times, sound overseas","example":"The new idea sounded overseas, but we decided to try it.","translation":"這個新點子聽起來很「海外的」，但我們決定試試看。"},{"id":"B2-1684-recession","level":"B2","word":"recession","pos":"n.","meaning":"後退；凹處；衰退；歸還","collocations":"economic recession, deep recession, enter a recession","example":"During the recession, many families had to reduce unnecessary spending.","translation":"在經濟衰退期間，許多家庭不得不減少非必要支出。"},{"id":"B2-1685-fond","level":"B2","word":"fond","pos":"adj.","meaning":"喜歡的；寵愛的；溫柔的","collocations":"feel fond, seem fond, a fond day","example":"His room looked fond after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「喜歡的」。"},{"id":"B2-1686-initially","level":"B2","word":"initially","pos":"adv.","meaning":"最初；開頭","collocations":"initially planned, initially believed, initially refused","example":"The project was initially expected to finish in June, but it required more time.","translation":"這項專案原本預計六月完成，但後來需要更多時間。"},{"id":"B2-1687-troop","level":"B2","word":"troop","pos":"n.","meaning":"軍隊；一群；一隊；群集","collocations":"a sense of troop, learn about troop, talk about troop","example":"She searched online for more information about troop.","translation":"她上網搜尋更多關於「軍隊」的資訊。"},{"id":"B2-1688-clip","level":"B2","word":"clip","pos":"n.","meaning":"修剪；夾子；回形針；剪下來的東西","collocations":"a clip, use the clip, place the clip","example":"The old clip reminded her of her grandfather's house.","translation":"那個舊「修剪」讓她想起祖父的家。"},{"id":"B2-1689-comfort","level":"B2","word":"comfort","pos":"n.","meaning":"舒適；安慰；安慰者","collocations":"a sense of comfort, learn about comfort, talk about comfort","example":"She searched online for more information about comfort.","translation":"她上網搜尋更多關於「舒適」的資訊。"},{"id":"B2-1690-lyric","level":"B2","word":"lyric","pos":"n.","meaning":"抒情詩；歌詞；抒情的","collocations":"the importance of lyric, understand lyric, problems with lyric","example":"The book included a chapter about lyric.","translation":"這本書有一章談到「抒情詩」。"},{"id":"B2-1691-holy","level":"B2","word":"holy","pos":"adj.","meaning":"神聖的；聖潔的；至善的；神聖的東西","collocations":"feel holy, seem holy, a holy day","example":"The answer was holy enough for us to keep talking about it.","translation":"這個回答夠「神聖的」，讓我們繼續討論下去。"},{"id":"B2-1692-sponsorship","level":"B2","word":"sponsorship","pos":"n.","meaning":"發起；倡議；主辦；保證人的地位","collocations":"a sense of sponsorship, learn about sponsorship, talk about sponsorship","example":"She searched online for more information about sponsorship.","translation":"她上網搜尋更多關於「發起」的資訊。"},{"id":"B2-1693-protein","level":"B2","word":"protein","pos":"n.","meaning":"蛋白質；蛋白質的","collocations":"source of protein, protein intake, protein-rich food","example":"Eggs are a cheap source of protein for many families.","translation":"雞蛋對許多家庭來說是便宜的蛋白質來源。"},{"id":"B2-1694-outline","level":"B2","word":"outline","pos":"n.","meaning":"大綱；輪廓；概要；描畫輪廓","collocations":"a sense of outline, learn about outline, talk about outline","example":"It took me a while to understand outline.","translation":"我花了一段時間才理解「大綱」。"},{"id":"B2-1695-suspect","level":"B2","word":"suspect","pos":"n.","meaning":"被懷疑者；嫌疑犯；令人懷疑的；不可信的","collocations":"the importance of suspect, understand suspect, problems with suspect","example":"The video explained suspect in simple language.","translation":"這支影片用簡單的語言解釋「被懷疑者」。"},{"id":"B2-1696-tonne","level":"B2","word":"tonne","pos":"n.","meaning":"噸；公噸","collocations":"a tonne, use the tonne, place the tonne","example":"Please move the tonne away from the edge of the desk.","translation":"請把「噸」從桌子邊緣移開。"},{"id":"B2-1697-fee","level":"B2","word":"fee","pos":"n.","meaning":"費用；小費；封地；所有權","collocations":"school fee, entrance fee, pay a fee","example":"There is no entrance fee for children under twelve.","translation":"十二歲以下兒童免收入場費。"},{"id":"B2-1698-guarantee","level":"B2","word":"guarantee","pos":"v.","meaning":"擔保；抵押品；保證書；保證","collocations":"need to guarantee, try to guarantee, help to guarantee","example":"We need to guarantee the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「擔保」它。"},{"id":"B2-1699-lens","level":"B2","word":"lens","pos":"n.","meaning":"透鏡；鏡頭；鏡片；晶狀體","collocations":"a lens, use the lens, place the lens","example":"The old lens reminded her of her grandfather's house.","translation":"那個舊「透鏡」讓她想起祖父的家。"},{"id":"B2-1700-helmet","level":"B2","word":"helmet","pos":"n.","meaning":"鋼盔；盔；防護帽；給...戴頭盔","collocations":"a helmet, use the helmet, place the helmet","example":"The old helmet reminded her of her grandfather's house.","translation":"那個舊「鋼盔」讓她想起祖父的家。"},{"id":"B2-1701-virtual","level":"B2","word":"virtual","pos":"adj.","meaning":"實際上起作用的；虛的；實質的；有效的","collocations":"virtual advice, virtual reason, virtual choice","example":"That was a virtual choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「實際上起作用的」的選擇。"},{"id":"B2-1702-anniversary","level":"B2","word":"anniversary","pos":"n.","meaning":"週年紀念","collocations":"wedding anniversary, anniversary dinner, celebrate an anniversary","example":"My parents went out for dinner on their wedding anniversary.","translation":"我父母在結婚紀念日外出吃晚餐。"},{"id":"B2-1703-abandon","level":"B2","word":"abandon","pos":"v.","meaning":"放棄；拋棄；遺棄；使屈從","collocations":"abandon the original plan, need to abandon, abandon carefully","example":"Please do not abandon the original plan until you understand the details.","translation":"在瞭解細節之前，請不要「放棄」原本計畫。"},{"id":"B2-1704-pride","level":"B2","word":"pride","pos":"n.","meaning":"驕傲；自尊心；自豪；精華","collocations":"the importance of pride, understand pride, problems with pride","example":"The video showed why pride matters in real life.","translation":"這支影片說明瞭為什麼「驕傲」在現實生活中很重要。"},{"id":"B2-1705-heal","level":"B2","word":"heal","pos":"v.","meaning":"痊癒；使復原；使和解；治癒","collocations":"heal the wound, need to heal, heal carefully","example":"The school plans to heal the wound after talking with parents.","translation":"學校和家長討論後，計畫「痊癒」傷口。"},{"id":"B2-1706-mechanism","level":"B2","word":"mechanism","pos":"n.","meaning":"機械；機構；結構；機理","collocations":"the importance of mechanism, understand mechanism, problems with mechanism","example":"We heard about mechanism during a conversation at lunch.","translation":"我們午餐聊天時聽到了「機械」。"},{"id":"B2-1707-championship","level":"B2","word":"championship","pos":"n.","meaning":"冠軍身份；冠軍稱號；捍衛","collocations":"changes in championship, a lack of championship, focus on championship","example":"Parents often talk about championship when planning for the future.","translation":"父母規劃未來時，常會談到「冠軍身份」。"},{"id":"B2-1708-speculation","level":"B2","word":"speculation","pos":"n.","meaning":"沉思；推測；投機；投機交易","collocations":"a sense of speculation, learn about speculation, talk about speculation","example":"We heard about speculation during a conversation at lunch.","translation":"我們午餐聊天時聽到了「沉思」。"},{"id":"B2-1709-nightmare","level":"B2","word":"nightmare","pos":"n.","meaning":"夢魘；惡夢；可怕的事物(或情景、人物)","collocations":"changes in nightmare, a lack of nightmare, focus on nightmare","example":"A short story helped the class discuss nightmare.","translation":"一個短篇故事幫助全班討論「夢魘」。"},{"id":"B2-1710-immigration","level":"B2","word":"immigration","pos":"n.","meaning":"移民；移居","collocations":"immigration policy, immigration law, immigration officer","example":"The debate focused on how immigration policy affects local labour markets.","translation":"這場辯論聚焦於移民政策如何影響地方勞動市場。"},{"id":"B2-1711-objective","level":"B2","word":"objective","pos":"n.","meaning":"目的；目標；宗旨；賓格","collocations":"the importance of objective, understand objective, problems with objective","example":"The class used everyday examples to understand objective.","translation":"全班用日常例子來理解「目的」。"},{"id":"B2-1712-icon","level":"B2","word":"icon","pos":"n.","meaning":"畫像；肖像；偶像；圖標","collocations":"an icon, use the icon, place the icon","example":"She put the icon on the table before everyone arrived.","translation":"她在大家抵達前，把「畫像」放在桌上。"},{"id":"B2-1713-nursing","level":"B2","word":"nursing","pos":"n.","meaning":"看護；養育；護理；餵乳","collocations":"a sense of nursing, learn about nursing, talk about nursing","example":"The video showed why nursing matters in real life.","translation":"這支影片說明瞭為什麼「看護」在現實生活中很重要。"},{"id":"B2-1714-parade","level":"B2","word":"parade","pos":"n.","meaning":"遊行；炫耀；閱兵；(使)列隊行進","collocations":"a sense of parade, learn about parade, talk about parade","example":"The video explained parade in simple language.","translation":"這支影片用簡單的語言解釋「遊行」。"},{"id":"B2-1715-unity","level":"B2","word":"u
