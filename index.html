這個計畫很簡單。"},{"id":"C1-434-lap","level":"C1","word":"lap","pos":"n./v.","meaning":"膝蓋；一圈；舔；超車","collocations":"in your lap, lap of honour","example":"The winning runner completed a lap of honour.","translation":"獲勝的選手完成了一圈榮譽跑。"},{"id":"C1-435-generic","level":"C1","word":"generic","pos":"adj.","meaning":"通用的；一般性的","collocations":"generic term, generic drug","example":"She switched to a cheaper generic version of the drug.","translation":"她換用了一種更便宜的仿製藥。"},{"id":"C1-436-defensive","level":"C1","word":"defensive","pos":"adj.","meaning":"防禦的；防守的","collocations":"defensive strategy, become defensive","example":"The team adopted a more defensive approach in the second half.","translation":"下半場，球隊採取了更為防守的策略。"},{"id":"C1-437-alignment","level":"C1","word":"alignment","pos":"n.","meaning":"一致；排列；對齊","collocations":"in alignment with, political alignment","example":"The new policy is in alignment with the company's goals.","translation":"新政策與公司的目標一致。"},{"id":"C1-438-sole","level":"C1","word":"sole","pos":"adj./n.","meaning":"唯一的；獨有的；鞋底；鰈魚","collocations":"sole purpose, sole survivor","example":"She was the sole survivor of the accident.","translation":"她是這場事故唯一的倖存者。"},{"id":"C1-439-emergence","level":"C1","word":"emergence","pos":"n.","meaning":"出現；興起；崛起","collocations":"emergence of, recent emergence","example":"The emergence of new technologies is changing society.","translation":"新技術的崛起正在改變社會。"},{"id":"C1-440-replacement","level":"C1","word":"replacement","pos":"n.","meaning":"替代；取代；替代品","collocations":"find a replacement, replacement for","example":"A replacement was hired within two weeks.","translation":"兩週內就找到了替代人選。"},{"id":"C1-441-nomination","level":"C1","word":"nomination","pos":"n.","meaning":"提名；任命","collocations":"receive a nomination, Oscar nomination","example":"Her performance earned her a nomination for best actress.","translation":"她的表現為她贏得了最佳女演員的提名。"},{"id":"C1-442-aluminium","level":"C1","word":"aluminium","pos":"n.","meaning":"鋁","collocations":"aluminium can, aluminium alloy","example":"Aluminium cans are fully recyclable.","translation":"鋁罐可以完全回收再利用。"},{"id":"C1-443-upgrade","level":"C1","word":"upgrade","pos":"v./n.","meaning":"升級；改善；提高","collocations":"software upgrade, upgrade to","example":"He upgraded to the latest version of the software.","translation":"他升級到了最新版本的軟體。"},{"id":"C1-444-breed","level":"C1","word":"breed","pos":"v./n.","meaning":"繁殖；培育；品種","collocations":"breed contempt, breed cattle","example":"Overcrowding can breed resentment among residents.","translation":"過度擁擠可能在居民中滋生怨恨情緒。"},{"id":"C1-445-damaging","level":"C1","word":"damaging","pos":"adj.","meaning":"有害的；損害性的","collocations":"damaging report, damaging to reputation","example":"The leak was damaging to the company's reputation.","translation":"資訊外洩對公司聲譽造成了損害。"},{"id":"C1-446-encouraging","level":"C1","word":"encouraging","pos":"adj.","meaning":"令人鼓舞的；有希望的","collocations":"encouraging signs, encouraging news","example":"The early results were very encouraging.","translation":"早期的結果非常令人鼓舞。"},{"id":"C1-447-misery","level":"C1","word":"misery","pos":"n.","meaning":"痛苦；悲慘；不幸","collocations":"cause misery, in misery","example":"The flood caused immense misery for local residents.","translation":"洪水給當地居民帶來了巨大的痛苦。"},{"id":"C1-448-intermediate","level":"C1","word":"intermediate","pos":"adj./n.","meaning":"中級的；中間的；中級者","collocations":"intermediate level, intermediate stage","example":"She enrolled in an intermediate English course.","translation":"她報名參加了一個中級英語課程。"},{"id":"C1-449-dictator","level":"C1","word":"dictator","pos":"n.","meaning":"獨裁者；專制者","collocations":"military dictator, brutal dictator","example":"The dictator ruled the country for over 30 years.","translation":"那位獨裁者統治這個國家超過三十年。"},{"id":"C1-450-blend","level":"C1","word":"blend","pos":"v./n.","meaning":"混合；調和","collocations":"blend of styles, blend together","example":"The film is a blend of comedy and drama.","translation":"這部電影是喜劇與劇情的融合。"},{"id":"C1-451-outrage","level":"C1","word":"outrage","pos":"n./v.","meaning":"義憤；憤怒；激怒","collocations":"cause outrage, public outrage","example":"The verdict caused widespread outrage among protesters.","translation":"這項裁決在抗議者中引發了廣泛的憤慨。"},{"id":"C1-452-warrant","level":"C1","word":"warrant","pos":"v./n.","meaning":"授權；搜查令；理由","collocations":"search warrant, warrant concern","example":"The situation warrants further investigation.","translation":"這種情況需要進一步調查。"},{"id":"C1-453-incidence","level":"C1","word":"incidence","pos":"n.","meaning":"發生率；發病率","collocations":"incidence of disease, high incidence","example":"The incidence of diabetes has risen dramatically.","translation":"糖尿病的發病率急劇上升。"},{"id":"C1-454-punch","level":"C1","word":"punch","pos":"v./n.","meaning":"打拳；衝孔；力度","collocations":"punch above one's weight, punch line","example":"The startup punched above its weight in the global market.","translation":"這家新創公司在全球市場上的表現遠超其規模。"},{"id":"C1-455-rip","level":"C1","word":"rip","pos":"v./n.","meaning":"撕裂；撕開","collocations":"rip apart, let rip","example":"She ripped open the envelope excitedly.","translation":"她興奮地撕開信封。"},{"id":"C1-456-adaptation","level":"C1","word":"adaptation","pos":"n.","meaning":"改編；適應","collocations":"film adaptation, adaptation to change","example":"The adaptation of the novel was well received.","translation":"這部小說的改編作品獲得了良好的反響。"},{"id":"C1-457-coordinate","level":"C1","word":"coordinate","pos":"v.","meaning":"協調；統籌","collocations":"coordinate efforts, coordinate response","example":"UN agencies coordinated the emergency relief effort.","translation":"聯合國各機構協調展開緊急救援工作。"},{"id":"C1-458-snap","level":"C1","word":"snap","pos":"v./n.","meaning":"突然折斷；抓拍；鏡頭","collocations":"snap a photo, snap decision","example":"She snapped a quick photo before the opportunity was gone.","translation":"她在機會稍縱即逝前迅速拍下了一張照片。"},{"id":"C1-459-ego","level":"C1","word":"ego","pos":"n.","meaning":"自我；自尊心；自大","collocations":"inflated ego, bruised ego","example":"His huge ego made it difficult to work with him.","translation":"他的強烈自我意識讓人難以與他共事。"},{"id":"C1-460-respective","level":"C1","word":"respective","pos":"adj.","meaning":"各自的；分別的","collocations":"in their respective roles, respective countries","example":"Both countries have their respective strengths.","translation":"兩個國家各有其優勢。"},{"id":"C1-461-prosecutor","level":"C1","word":"prosecutor","pos":"n.","meaning":"檢察官；起訴人","collocations":"lead prosecutor, state prosecutor","example":"The prosecutor demanded a life sentence for the accused.","translation":"檢察官要求對被告判處無期徒刑。"},{"id":"C1-462-mathematical","level":"C1","word":"mathematical","pos":"adj.","meaning":"數學的；精確的","collocations":"mathematical formula, mathematical precision","example":"The solution required a complex mathematical equation.","translation":"這個解決方案需要一個複雜的數學方程式。"},{"id":"C1-463-appoint","level":"C1","word":"appoint","pos":"v.","meaning":"任命；指定","collocations":"appoint as, newly appointed","example":"She was appointed CEO of the company in January.","translation":"她於一月份被任命為公司的執行長。"},{"id":"C1-464-robust","level":"C1","word":"robust","pos":"adj.","meaning":"強健的；穩健的","collocations":"robust economy, robust debate","example":"The new security system is robust and difficult to breach.","translation":"新的安全系統堅固可靠，難以被攻破。"},{"id":"C1-465-displace","level":"C1","word":"displace","pos":"v.","meaning":"移置；取代；使流離失所","collocations":"displace workers, be displaced","example":"Thousands of families were displaced by the flooding.","translation":"數千個家庭因洪水而流離失所。"},{"id":"C1-466-retreat","level":"C1","word":"retreat","pos":"v./n.","meaning":"撤退；靜修","collocations":"beat a retreat, strategic retreat","example":"The army was forced to retreat from the city.","translation":"軍隊被迫從城市撤退。"},{"id":"C1-467-detain","level":"C1","word":"detain","pos":"v.","meaning":"拘留；扣押","collocations":"detain a suspect, be detained","example":"Two suspects were detained for questioning.","translation":"兩名嫌疑人被拘留接受訊問。"},{"id":"C1-468-applaud","level":"C1","word":"applaud","pos":"v.","meaning":"鼓掌；稱讚","collocations":"applaud efforts, applaud a decision","example":"The audience applauded loudly at the end of the performance.","translation":"演出結束時，觀眾報以熱烈的掌聲。"},{"id":"C1-469-inclusion","level":"C1","word":"inclusion","pos":"n.","meaning":"包容；納入；包含","collocations":"social inclusion, promote inclusion","example":"The school has a strong commitment to inclusion.","translation":"學校對融合教育有著堅定的承諾。"},{"id":"C1-470-linear","level":"C1","word":"linear","pos":"adj.","meaning":"線性的；直線的","collocations":"linear growth, linear model","example":"The relationship between the two variables is not linear.","translation":"兩個變數之間的關係並非線性的。"},{"id":"C1-471-fate","level":"C1","word":"fate","pos":"n.","meaning":"命運；結局","collocations":"seal one's fate, fate of","example":"The fate of the missing sailors remains unknown.","translation":"那些失蹤水手的命運至今下落不明。"},{"id":"C1-472-encompass","level":"C1","word":"encompass","pos":"v.","meaning":"包含；涵蓋","collocations":"encompass all aspects, encompass a wide range","example":"The report encompasses a wide range of issues.","translation":"這份報告涵蓋了廣泛的議題。"},{"id":"C1-473-embed","level":"C1","word":"embed","pos":"v.","meaning":"嵌入；植入；深植","collocations":"embed in, deeply embedded","example":"The journalist was embedded with the army unit.","translation":"這位記者隨軍採訪，深入部隊。"},{"id":"C1-474-haunt","level":"C1","word":"haunt","pos":"v.","meaning":"縈繞；鬼魂出沒；使煩惱","collocations":"haunt someone, haunt a place","example":"The memory of that day continued to haunt him.","translation":"那一天的記憶持續縈繞著他，揮之不去。"},{"id":"C1-475-yell","level":"C1","word":"yell","pos":"v./n.","meaning":"大叫；吼叫","collocations":"yell at, let out a yell","example":"He yelled at the top of his voice for help.","translation":"他扯開嗓子大聲呼救。"},{"id":"C1-476-torture","level":"C1","word":"torture","pos":"v./n.","meaning":"折磨；拷打；嚴刑","collocations":"endure torture, psychological torture","example":"The use of torture is banned under international law.","translation":"使用酷刑在國際法下是被明文禁止的。"},{"id":"C1-477-revelation","level":"C1","word":"revelation","pos":"n.","meaning":"揭露；啟示；天啟","collocations":"shocking revelation, divine revelation","example":"The documentary made several shocking revelations.","translation":"這部紀錄片揭露了幾個令人震驚的真相。"},{"id":"C1-478-distinction","level":"C1","word":"distinction","pos":"n.","meaning":"區別；差異；卓越","collocations":"make a distinction, academic distinction","example":"There is an important distinction between the two concepts.","translation":"這兩個概念之間有一個重要的區別。"},{"id":"C1-479-outing","level":"C1","word":"outing","pos":"n.","meaning":"出遊；公開（他人性向）","collocations":"family outing, a day out","example":"The children enjoyed their outing to the zoo.","translation":"孩子們很享受去動物園的郊遊活動。"},{"id":"C1-480-notable","level":"C1","word":"notable","pos":"adj.","meaning":"值得注意的；著名的","collocations":"notable achievement, notable exception","example":"One notable exception to the rule was the CEO herself.","translation":"執行長本人是這條規則的一個值得關注的例外。"},{"id":"C1-481-parameter","level":"C1","word":"parameter","pos":"n.","meaning":"參數；範圍；限制","collocations":"set parameters, within the parameters","example":"The discussion should stay within the agreed parameters.","translation":"討論應限於雙方商定的範疇內進行。"},{"id":"C1-482-attendance","level":"C1","word":"attendance","pos":"n.","meaning":"出席；出勤；到場人數","collocations":"school attendance, poor attendance","example":"Attendance at the meeting was higher than expected.","translation":"到場出席的人數超出了預期。"},{"id":"C1-483-fluid","level":"C1","word":"fluid","pos":"adj./n.","meaning":"流動的；靈活的；流體","collocations":"fluid situation, body fluid","example":"The situation remains fluid and could change at any time.","translation":"局勢依然不穩定，隨時可能發生變化。"},{"id":"C1-484-disastrous","level":"C1","word":"disastrous","pos":"adj.","meaning":"災難性的；極糟的","collocations":"disastrous consequences, disastrous decision","example":"The campaign was a disastrous failure.","translation":"這次競選以失敗告終。"},{"id":"C1-485-pit","level":"C1","word":"pit","pos":"n./v.","meaning":"坑；礦坑；使對抗","collocations":"pit against, gravel pit","example":"The two rivals were pitted against each other in the final.","translation":"兩位對手在決賽中正面交鋒。"},{"id":"C1-486-hardware","level":"C1","word":"hardware","pos":"n.","meaning":"硬體；五金器具","collocations":"computer hardware, military hardware","example":"The new hardware was installed over the weekend.","translation":"新硬體在週末完成了安裝。"},{"id":"C1-487-tolerate","level":"C1","word":"tolerate","pos":"v.","meaning":"容忍；忍受","collocations":"tolerate behaviour, zero tolerance","example":"She refused to tolerate any form of bullying.","translation":"她拒絕容忍任何形式的霸凌行為。"},{"id":"C1-488-expenditure","level":"C1","word":"expenditure","pos":"n.","meaning":"支出；花費；消耗","collocations":"public expenditure, capital expenditure","example":"Government expenditure on education rose by 5%.","translation":"政府在教育上的支出增加了百分之五。"},{"id":"C1-489-dawn","level":"C1","word":"dawn","pos":"n./v.","meaning":"黎明；開始；（逐漸）明白","collocations":"at dawn, dawn of a new era","example":"Officers arrived at dawn to conduct the search.","translation":"警察在黎明時分抵達執行搜查任務。"},{"id":"C1-490-crystal","level":"C1","word":"crystal","pos":"n./adj.","meaning":"水晶；晶體；清澈的","collocations":"crystal clear, crystal ball","example":"The water in the lake was crystal clear.","translation":"湖中的水清澈見底。"},{"id":"C1-491-stimulus","level":"C1","word":"stimulus","pos":"n.","meaning":"刺激；刺激物；經濟刺激","collocations":"economic stimulus, stimulus package","example":"The government announced a new economic stimulus plan.","translation":"政府宣布了一項新的經濟刺激計畫。"},{"id":"C1-492-seemingly","level":"C1","word":"seemingly","pos":"adv.","meaning":"表面上；看似","collocations":"seemingly endless, seemingly impossible","example":"The task was seemingly impossible, yet they succeeded.","translation":"這項任務看似不可能完成，但他們最終還是成功了。"},{"id":"C1-493-optimism","level":"C1","word":"optimism","pos":"n.","meaning":"樂觀；樂觀主義","collocations":"cautious optimism, sense of optimism","example":"There is growing optimism about the economy.","translation":"對於經濟前景，樂觀情緒正在與日俱增。"},{"id":"C1-494-insertion","level":"C1","word":"insertion","pos":"n.","meaning":"插入；嵌入；插頁","collocations":"insertion of data, surgical insertion","example":"The insertion of the new clause surprised negotiators.","translation":"新條款的加入讓談判代表大感意外。"},{"id":"C1-495-summit","level":"C1","word":"summit","pos":"n.","meaning":"峰會；山頂；頂點","collocations":"hold a summit, G20 summit","example":"World leaders gathered at the climate summit.","translation":"世界各國領導人齊聚氣候峰會。"},{"id":"C1-496-reform","level":"C1","word":"reform","pos":"n./v.","meaning":"改革；改造","collocations":"economic reform, reform the system","example":"The government launched sweeping economic reforms.","translation":"政府推行了大規模的經濟改革。"},{"id":"C1-497-contemplate","level":"C1","word":"contemplate","pos":"v.","meaning":"考慮；沉思","collocations":"contemplate options, contemplate the future","example":"She contemplated leaving her job for months.","translation":"她考慮辭職的念頭已縈繞心頭數月之久。"},{"id":"C1-498-militant","level":"C1","word":"militant","pos":"n./adj.","meaning":"鬥士；激進分子；好戰的","collocations":"militant group, militant stance","example":"Militant groups launched attacks along the border.","translation":"武裝組織沿邊境發動了攻擊。"},{"id":"C1-499-physician","level":"C1","word":"physician","pos":"n.","meaning":"醫師；內科醫生","collocations":"family physician, consulting physician","example":"She consulted her physician before starting the new diet.","translation":"她在開始新的飲食計畫前先諮詢了醫生。"},{"id":"C1-500-supplement","level":"C1","word":"supplement","pos":"n./v.","meaning":"補充；補品；增刊","collocations":"dietary supplement, supplement income","example":"He supplements his salary by teaching part-time.","translation":"他以兼職教學來補貼收入。"},{"id":"C1-501-treaty","level":"C1","word":"treaty","pos":"n.","meaning":"條約；協定","collocations":"peace treaty, sign a treaty","example":"The two countries signed a peace treaty.","translation":"兩國簽署了和平條約。"},{"id":"C1-502-provoke","level":"C1","word":"provoke","pos":"v.","meaning":"激怒；引起；挑釁","collocations":"provoke a reaction, provoke conflict","example":"His remarks provoked a fierce public outcry.","translation":"他的言論引發了強烈的公眾抗議。"},{"id":"C1-503-manifest","level":"C1","word":"manifest","pos":"v./adj.","meaning":"顯示；表明；顯而易見的","collocations":"manifest itself, manifest destiny","example":"Stress can manifest itself in many physical symptoms.","translation":"壓力可能以多種身體症狀的形式表現出來。"},{"id":"C1-504-curiosity","level":"C1","word":"curiosity","pos":"n.","meaning":"好奇心；奇物","collocations":"out of curiosity, intellectual curiosity","example":"Curiosity drove him to explore the old mansion.","translation":"好奇心驅使他去探索那座古老的宅邸。"},{"id":"C1-505-congregation","level":"C1","word":"congregation","pos":"n.","meaning":"會眾；聚集","collocations":"church congregation, address the congregation","example":"The pastor spoke to the congregation about forgiveness.","translation":"這位牧師向會眾講述了寬恕的主題。"},{"id":"C1-506-venture","level":"C1","word":"venture","pos":"n./v.","meaning":"冒險；投機；大膽嘗試","collocations":"business venture, venture out","example":"She ventured into the competitive world of fashion.","translation":"她勇敢地踏入了競爭激烈的時尚界。"},{"id":"C1-507-melody","level":"C1","word":"melody","pos":"n.","meaning":"旋律；曲調","collocations":"catchy melody, musical melody","example":"The melody of the song stayed in his head all day.","translation":"那首歌的旋律在他腦海中縈繞了一整天。"},{"id":"C1-508-mandatory","level":"C1","word":"mandatory","pos":"adj.","meaning":"強制的；義務的","collocations":"mandatory sentence, mandatory training","example":"Attendance at the induction is mandatory.","translation":"出席本次入職培訓是強制性要求。"},{"id":"C1-509-distress","level":"C1","word":"distress","pos":"n./v.","meaning":"悲痛；困境；使痛苦","collocations":"in distress, cause distress","example":"The news caused great distress to the family.","translation":"這個消息讓這家人深感悲痛。"},{"id":"C1-510-coordination","level":"C1","word":"coordination","pos":"n.","meaning":"協調；統籌","collocations":"lack of coordination, coordination of efforts","example":"Effective coordination between departments is essential.","translation":"各部門之間的有效協調至關重要。"},{"id":"C1-511-revolutionary","level":"C1","word":"revolutionary","pos":"adj./n.","meaning":"革命性的；革命者","collocations":"revolutionary change, revolutionary leader","example":"The invention was seen as truly revolutionary.","translation":"這項發明被視為真正具有革命性的創新。"},{"id":"C1-512-aspire","level":"C1","word":"aspire","pos":"v.","meaning":"渴望；志向","collocations":"aspire to, aspire towards","example":"She aspired to become a world-class scientist.","translation":"她立志成為一位世界級的科學家。"},{"id":"C1-513-license","level":"C1","word":"license","pos":"n./v.","meaning":"執照；許可；授權","collocations":"driving license, license to operate","example":"The restaurant lost its license after health violations.","translation":"餐廳因違反健康法規而被吊銷執照。"},{"id":"C1-514-threshold","level":"C1","word":"threshold","pos":"n.","meaning":"門檻；閾值","collocations":"pain threshold, cross a threshold","example":"The poverty threshold was set at a new level.","translation":"貧困線被設定在新的水平。"},{"id":"C1-515-complication","level":"C1","word":"complication","pos":"n.","meaning":"併發症；複雜因素","collocations":"medical complication, lead to complications","example":"Complications arose during the surgery.","translation":"手術過程中出現了併發症。"},{"id":"C1-516-bounce","level":"C1","word":"bounce","pos":"v./n.","meaning":"彈跳；反彈；振作","collocations":"bounce back, bounce ideas","example":"The economy began to bounce back after the recession.","translation":"經濟在衰退後開始復甦。"},{"id":"C1-517-burial","level":"C1","word":"burial","pos":"n.","meaning":"葬禮；埋葬","collocations":"burial site, Christian burial","example":"The soldier was given a military burial.","translation":"這名士兵接受了軍葬。"},{"id":"C1-518-correspond","level":"C1","word":"correspond","pos":"v.","meaning":"通訊；對應；符合","collocations":"correspond with, correspond to","example":"His account does not correspond with the facts.","translation":"他的陳述與事實不符。"},{"id":"C1-519-rear","level":"C1","word":"rear","pos":"n./v./adj.","meaning":"後面；後部；撫養；後面的","collocations":"bring up the rear, rear guard","example":"She was raised in the rear of the building.","translation":"她在建築物的後部長大。"},{"id":"C1-520-enforce","level":"C1","word":"enforce","pos":"v.","meaning":"執行；強制","collocations":"enforce laws, enforce rules","example":"Police were brought in to enforce the curfew.","translation":"警察被調派執行宵禁令。"},{"id":"C1-521-processor","level":"C1","word":"processor","pos":"n.","meaning":"處理器；加工者","collocations":"food processor, central processor","example":"The new processor is twice as fast as the old one.","translation":"新處理器的速度是舊款的兩倍。"},{"id":"C1-522-segment","level":"C1","word":"segment","pos":"n./v.","meaning":"部分；區段；分割","collocations":"market segment, segment the market","example":"The market is segmented by age and income.","translation":"市場按年齡和收入進行細分。"},{"id":"C1-523-latter","level":"C1","word":"latter","pos":"adj./n.","meaning":"後者；後面的","collocations":"the latter, latter half","example":"Of the two options, I prefer the latter.","translation":"在這兩個選項中，我比較喜歡後者。"},{"id":"C1-524-subscription","level":"C1","word":"subscription","pos":"n.","meaning":"訂閱；訂費","collocations":"monthly subscription, subscription service","example":"The magazine offers a discounted annual subscription.","translation":"這本雜誌提供打折的年度訂閱方案。"},{"id":"C1-525-strand","level":"C1","word":"strand","pos":"n./v.","meaning":"線；股；困境；使擱淺","collocations":"stranded passengers, strand of DNA","example":"Thousands of passengers were stranded at the airport.","translation":"數千名乘客滯留在機場。"},{"id":"C1-526-harsh","level":"C1","word":"harsh","pos":"adj.","meaning":"嚴酷的；苛刻的","collocations":"harsh conditions, harsh criticism","example":"The judge issued a harsh sentence.","translation":"法官做出了嚴厲的判決。"},{"id":"C1-527-toxic","level":"C1","word":"toxic","pos":"adj.","meaning":"有毒的；有害的","collocations":"toxic substance, toxic relationship","example":"The chemical was highly toxic and required special handling.","translation":"這種化學物質毒性極強，需要特殊處理。"},{"id":"C1-528-ministry","level":"C1","word":"ministry","pos":"n.","meaning":"部長辦公室；事工","collocations":"Ministry of Finance, foreign ministry","example":"The ministry announced a new education policy.","translation":"教育部宣布了新的教育政策。"},{"id":"C1-529-distort","level":"C1","word":"distort","pos":"v.","meaning":"扭曲；歪曲","collocations":"distort the truth, distort reality","example":"The media was accused of distorting the facts.","translation":"媒體被指控歪曲事實。"},{"id":"C1-530-province","level":"C1","word":"province","pos":"n.","meaning":"省份；領域；管轄範圍","collocations":"northern province, within the province of","example":"The northern province was hit hardest by the drought.","translation":"北部省份受到乾旱的衝擊最為嚴重。"},{"id":"C1-531-constituency","level":"C1","word":"constituency","pos":"n.","meaning":"選區；選民群體","collocations":"marginal constituency, represent a constituency","example":"She has represented the same constituency for 20 years.","translation":"她在同一個選區代表選民已達二十年之久。"},{"id":"C1-532-meaningful","level":"C1","word":"meaningful","pos":"adj.","meaning":"有意義的；重要的","collocations":"meaningful change, meaningful relationship","example":"She wanted to make a meaningful contribution to society.","translation":"她希望能對社會做出有意義的貢獻。"},{"id":"C1-533-consecutive","level":"C1","word":"consecutive","pos":"adj.","meaning":"連續的；相繼的","collocations":"consecutive wins, consecutive years","example":"The team won five consecutive matches.","translation":"球隊連續贏得了五場比賽。"},{"id":"C1-534-intervention","level":"C1","word":"intervention","pos":"n.","meaning":"干預；介入；調停","collocations":"military intervention, early intervention","example":"Early intervention can prevent minor issues from escalating.","translation":"早期介入可以防止小問題演變成大問題。"},{"id":"C1-535-motive","level":"C1","word":"motive","pos":"n.","meaning":"動機；誘因","collocations":"underlying motive, political motive","example":"Police are still trying to establish the motive for the crime.","translation":"警方仍在試圖查明此案的犯罪動機。"},{"id":"C1-536-vanish","level":"C1","word":"vanish","pos":"v.","meaning":"消失；不見","collocations":"vanish into thin air, vanish without trace","example":"The suspect vanished before police could make an arrest.","translation":"警察趕到之前，嫌疑人已無影無蹤。"},{"id":"C1-537-articulate","level":"C1","word":"articulate","pos":"v./adj.","meaning":"清楚表達；口才好的","collocations":"clearly articulate, highly articulate","example":"She was able to articulate her concerns clearly.","translation":"她能夠清晰地表達自己的顧慮。"},{"id":"C1-538-propaganda","level":"C1","word":"propaganda","pos":"n.","meaning":"宣傳；政治宣傳","collocations":"political propaganda, spread propaganda","example":"The regime used state media for propaganda purposes.","translation":"該政權將官方媒體用於宣傳目的。"},{"id":"C1-539-assault","level":"C1","word":"assault","pos":"n./v.","meaning":"攻擊；侵犯","collocations":"sexual assault, assault on","example":"He was charged with assault following the altercation.","translation":"他因這次衝突而被控傷害罪。"},{"id":"C1-540-contributor","level":"C1","word":"contributor","pos":"n.","meaning":"貢獻者；撰稿人；贊助者","collocations":"major contributor, regular contributor","example":"She is a regular contributor to the financial newspaper.","translation":"她是這份財經報紙的固定撰稿人。"},{"id":"C1-541-processing","level":"C1","word":"processing","pos":"n.","meaning":"處理；加工；運算","collocations":"data processing, food processing","example":"The processing of applications can take several weeks.","translation":"申請案件的處理可能需要數週時間。"},{"id":"C1-542-thrilled","level":"C1","word":"thrilled","pos":"adj.","meaning":"興奮的；激動的","collocations":"absolutely thrilled, be thrilled by","example":"She was thrilled to receive the award.","translation":"她對獲得這個獎項感到無比興奮。"},{"id":"C1-543-stereotype","level":"C1","word":"stereotype","pos":"n./v.","meaning":"刻板印象；以刻板印象看待","collocations":"reinforce stereotypes, gender stereotype","example":"We should challenge rather than reinforce stereotypes.","translation":"我們應該挑戰，而非強化刻板印象。"},{"id":"C1-544-congratulate","level":"C1","word":"congratulate","pos":"v.","meaning":"祝賀；恭喜","collocations":"congratulate on, warmly congratulate","example":"We congratulated him on his outstanding achievement.","translation":"我們祝賀他取得了傑出的成就。"},{"id":"C1-545-chronic","level":"C1","word":"chronic","pos":"adj.","meaning":"慢性的；長期的","collocations":"chronic disease, chronic shortage","example":"He suffers from chronic back pain.","translation":"他長期受慢性背痛所苦。"},{"id":"C1-546-regulatory","level":"C1","word":"regulatory","pos":"adj.","meaning":"監管的；法規的","collocations":"regulatory body, regulatory framework","example":"The company must meet strict regulatory requirements.","translation":"公司必須符合嚴格的監管要求。"},{"id":"C1-547-uphold","level":"C1","word":"uphold","pos":"v.","meaning":"支持；維持；上訴維持原判","collocations":"uphold a decision, uphold the law","example":"The appeal court upheld the original sentence.","translation":"上訴法院維持了原判。"},{"id":"C1-548-republic","level":"C1","word":"republic","pos":"n.","meaning":"共和國；共和政體","collocations":"democratic republic, republic of Ireland","example":"Ireland is a parliamentary republic.","translation":"愛爾蘭是一個議會共和國。"},{"id":"C1-549-accessible","level":"C1","word":"accessible","pos":"adj.","meaning":"可及的；易懂的；無障礙的","collocations":"accessible to all, wheelchair accessible","example":"The building was made accessible to wheelchair users.","translation":"這棟建築已增設了無障礙設施，供輪椅使用者使用。"},{"id":"C1-550-radical","level":"C1","word":"radical","pos":"adj./n.","meaning":"根本的；激進的；激進分子","collocations":"radical change, political radical","example":"The new policy was seen as too radical by conservatives.","translation":"保守派人士認為這項新政策過於激進。"},{"id":"C1-551-adverse","level":"C1","word":"adverse","pos":"adj.","meaning":"不利的；逆向的","collocations":"adverse effects, adverse conditions","example":"The drug may have adverse side effects.","translation":"這種藥物可能有不良的副作用。"},{"id":"C1-552-abuse","level":"C1","word":"abuse","pos":"n./v.","meaning":"濫用；虐待","collocations":"child abuse, drug abuse","example":"He was arrested for substance abuse and disorderly conduct.","translation":"他因濫用藥物及擾亂公共秩序而被捕。"},{"id":"C1-553-suburban","level":"C1","word":"suburban","pos":"adj.","meaning":"郊區的","collocations":"suburban area, suburban lifestyle","example":"The family moved from the city to a quiet suburban neighbourhood.","translation":"這家人從市區搬到了一個安靜的郊區社區。"},{"id":"C1-554-grind","level":"C1","word":"grind","pos":"v./n.","meaning":"研磨；苦熬；日常繁瑣事","collocations":"daily grind, grind to a halt","example":"The machine ground to a halt halfway through production.","translation":"機器在生產進行到一半時突然停了下來。"},{"id":"C1-555-coup","level":"C1","word":"coup","pos":"n.","meaning":"政變；出色之舉","collocations":"military coup, coup d'état","example":"The military staged a coup and seized control of the government.","translation":"軍方發動政變，奪取了政府的控制權。"},{"id":"C1-556-widen","level":"C1","word":"widen","pos":"v.","meaning":"加寬；擴大；拓展","collocations":"widen the gap, widen the search","example":"The investigation was widened to include new suspects.","translation":"調查範圍已擴大，將新的嫌疑人也納入其中。"},{"id":"C1-557-colonial","level":"C1","word":"colonial","pos":"adj.","meaning":"殖民地的；殖民時期的","collocations":"colonial era, colonial power","example":"The museum explores the country's colonial history.","translation":"博物館探索了這個國家的殖民歷史。"},{"id":"C1-558-representation","level":"C1","word":"representation","pos":"n.","meaning":"代表；代理；表現","collocations":"political representation, legal representation","example":"Women's representation in parliament has increased.","translation":"女性在議會中的代表比例有所提升。"},{"id":"C1-559-ambassador","level":"C1","word":"ambassador","pos":"n.","meaning":"大使；代言人","collocations":"brand ambassador, UN ambassador","example":"She was appointed ambassador to France.","translation":"她被任命為法國大使。"},{"id":"C1-560-nonetheless","level":"C1","word":"nonetheless","pos":"adv.","meaning":"盡管如此；然而","collocations":"nonetheless true, nonetheless important","example":"The plan had weaknesses; nonetheless, it was approved.","translation":"這個計畫存在弱點；儘管如此，它還是獲得了批准。"},{"id":"C1-561-glory","level":"C1","word":"glory","pos":"n.","meaning":"榮耀；光榮；榮耀時期","collocations":"past glory, glory days","example":"The athlete recalled the glory of her Olympic win.","translation":"這位運動員回憶起她贏得奧運金牌的輝煌時刻。"},{"id":"C1-562-peculiar","level":"C1","word":"peculiar","pos":"adj.","meaning":"奇特的；特有的","collocations":"peculiar behaviour, peculiar to","example":"The smell is peculiar to certain types of cheese.","translation":"這種氣味是某些類型的乳酪所特有的。"},{"id":"C1-563-behalf","level":"C1","word":"behalf","pos":"n.","meaning":"代表；利益","collocations":"on behalf of, on my behalf","example":"She spoke on behalf of the entire team.","translation":"她代表整個團隊發言。"},{"id":"C1-564-humanitarian","level":"C1","word":"humanitarian","pos":"adj./n.","meaning":"人道主義的；人道主義者","collocations":"humanitarian aid, humanitarian crisis","example":"The UN launched a humanitarian relief operation.","translation":"聯合國發起了一項人道主義救援行動。"},{"id":"C1-565-plunge","level":"C1","word":"plunge","pos":"v./n.","meaning":"下跌；猛跌；跳入","collocations":"plunge into, sharp plunge","example":"Stock prices plunged after the announcement.","translation":"公告發布後，股價大幅下跌。"},{"id":"C1-566-dual","level":"C1","word":"dual","pos":"adj.","meaning":"雙重的；兩用的","collocations":"dual nationality, dual purpose","example":"She holds dual citizenship in the UK and France.","translation":"她擁有英國和法國的雙重國籍。"},{"id":"C1-567-high-profile","level":"C1","word":"high-profile","pos":"adj.","meaning":"備受矚目的；知名度高的","collocations":"high-profile case, high-profile event","example":"The high-profile trial attracted worldwide media attention.","translation":"這場備受矚目的審判吸引了全球媒體的目光。"},{"id":"C1-568-renew","level":"C1","word":"renew","pos":"v.","meaning":"更新；重新開始；延續","collocations":"renew a contract, renew interest","example":"She renewed her passport before the trip.","translation":"她在出行前更新了護照。"},{"id":"C1-569-diplomat","level":"C1","word":"diplomat","pos":"n.","meaning":"外交官；有外交手腕的人","collocations":"senior diplomat, career diplomat","example":"The diplomat was recalled after the dispute.","translation":"這位外交官在爭端發生後被召回本國。"},{"id":"C1-570-amend","level":"C1","word":"amend","pos":"v.","meaning":"修正；修改","collocations":"amend the law, amend a contract","example":"The government proposed to amend the constitution.","translation":"政府提議修訂憲法。"},{"id":"C1-571-willingness","level":"C1","word":"willingness","pos":"n.","meaning":"意願；樂意","collocations":"show willingness, willingness to","example":"She showed a willingness to cooperate with authorities.","translation":"她表示願意配合當局的調查。"},{"id":"C1-572-regain","level":"C1","word":"regain","pos":"v.","meaning":"重新獲得；恢復","collocations":"regain consciousness, regain control","example":"The party worked hard to regain public trust.","translation":"政黨努力重建公眾的信任。"},{"id":"C1-573-sigh","level":"C1","word":"sigh","pos":"v./n.","meaning":"嘆氣；歎息","collocations":"breathe a sigh, heavy sigh","example":"She let out a sigh of relief when it was over.","translation":"事情結束後，她鬆了一口氣。"},{"id":"C1-574-solely","level":"C1","word":"solely","pos":"adv.","meaning":"唯一地；僅僅","collocations":"solely responsible, focus solely","example":"The decision was made solely on financial grounds.","translation":"這個決定純粹基於財務考量。"},{"id":"C1-575-cult","level":"C1","word":"cult","pos":"n.","meaning":"崇拜；邪教；文化小圈子","collocations":"cult following, religious cult","example":"The film has developed a cult following over the years.","translation":"這部電影多年來積累了一批忠實的追隨者。"},{"id":"C1-576-injustice","level":"C1","word":"injustice","pos":"n.","meaning":"不公正；不公平","collocations":"social injustice, fight injustice","example":"She dedicated her life to fighting injustice.","translation":"她將一生奉獻給了對抗不公義的事業。"},{"id":"C1-577-grave","level":"C1","word":"grave","pos":"adj./n.","meaning":"嚴重的；墳墓","collocations":"grave concern, mass grave","example":"The situation raised grave concerns for national security.","translation":"這種情況引發了對國家安全的嚴重憂慮。"},{"id":"C1-578-heritage","level":"C1","word":"heritage","pos":"n.","meaning":"遺產；傳統；文化遺址","collocations":"cultural heritage, heritage site","example":"The ancient ruins are part of the country's heritage.","translation":"這些古老的遺跡是這個國家文化遺產的一部分。"},{"id":"C1-579-dedication","le ","example":"The donor wished to remain anonymous.","translation":"捐款人希望保持匿名。"},{"id":"C1-588-deployment","level":"C1","word":"deployment","pos":"n.","meaning":"部署；調遣","collocations":"troop deployment, deployment of resources","example":"The deployment of peacekeepers was approved by the UN.","translation":"聯合國批准了部署維和人員的決定。"},{"id":"C1-589-magistrate","level":"C1","word":"magistrate","pos":"n.","meaning":"地方法官；治安法官","collocations":"district magistrate, appear before a magistrate","example":"The case was first heard before a local magistrate.","translation":"此案最初在地方法庭審理。"},{"id":"C1-590-transmission","level":"C1","word":"transmission","pos":"n.","meaning":"傳播；傳輸；變速箱","collocations":"disease transmission, data transmission","example":"The transmission of the virus can be prevented by vaccination.","translation":"病毒的傳播可以透過接種疫苗來預防。"},{"id":"C1-591-verify","level":"C1","word":"verify","pos":"v.","meaning":"核實；驗證","collocations":"verify information, verify identity","example":"Please verify your email address to complete registration.","translation":"請驗證您的電子郵件地址以完成註冊。"},{"id":"C1-592-guerrilla","level":"C1","word":"guerrilla","pos":"n./adj.","meaning":"游擊隊；游擊的","collocations":"guerrilla warfare, guerrilla fighter","example":"Guerrilla forces launched attacks from the mountains.","translation":"游擊隊從山區發動了攻擊。"},{"id":"C1-593-firearm","level":"C1","word":"firearm","pos":"n.","meaning":"槍支；火器","collocations":"illegal firearm, firearm offence","example":"He was arrested for possession of an illegal firearm.","translation":"他因非法持有槍枝而遭到逮捕。"},{"id":"C1-594-residue","level":"C1","word":"residue","pos":"n.","meaning":"殘留物；殘留","collocations":"chemical residue, pesticide residue","example":"Tests found traces of chemical residue in the water.","translation":"檢測發現水中含有化學殘留物。"},{"id":"C1-595-superior","level":"C1","word":"superior","pos":"adj./n.","meaning":"上級的；優越的；上司","collocations":"superior quality, report to a superior","example":"She felt her work was superior to her colleagues'.","translation":"她認為自己的工作優於同事的。"},{"id":"C1-596-aide","level":"C1","word":"aide","pos":"n.","meaning":"助手；助理；助理人員","collocations":"presidential aide, senior aide","example":"A senior aide confirmed the appointment.","translation":"一位高階助理確認了這項任命。"},{"id":"C1-597-infect","level":"C1","word":"infect","pos":"v.","meaning":"感染；傳染；影響","collocations":"infect with a virus, infect others","example":"The virus can infect thousands before symptoms appear.","translation":"症狀出現之前，病毒可能已感染數千人。"},{"id":"C1-598-filter","level":"C1","word":"filter","pos":"v./n.","meaning":"過濾；篩選；濾波器","collocations":"filter out, spam filter","example":"The water filtration system filters out impurities.","translation":"這套水過濾系統可以過濾掉雜質。"},{"id":"C1-599-irony","level":"C1","word":"irony","pos":"n.","meaning":"諷刺；反語；矛盾","collocations":"the irony is, dramatic irony","example":"The irony is that the safety device caused the accident.","translation":"諷刺的是，這個安全裝置反而導致了事故的發生。"},{"id":"C1-600-destructive","level":"C1","word":"destructive","pos":"adj.","meaning":"毀滅性的；破壞性的","collocations":"destructive force, destructive behaviour","example":"The typhoon had a destructive impact on the coast.","translation":"颱風對海岸造成了毀滅性的衝擊。"},{"id":"C1-601-grid","level":"C1","word":"grid","pos":"n.","meaning":"電網；格線；電力網","collocations":"national grid, power grid","example":"The storm knocked out several sections of the power grid.","translation":"這場暴風雨導致多個電網區域停電。"},{"id":"C1-602-confirmation","level":"C1","word":"confirmation","pos":"n.","meaning":"確認；確認書","collocations":"await confirmation, official confirmation","example":"We are awaiting confirmation of the appointment.","translation":"我們正在等待任命的確認通知。"},{"id":"C1-603-faction","level":"C1","word":"faction","pos":"n.","meaning":"派系；派別；小集團","collocations":"rival faction, party faction","example":"A breakaway faction opposed the peace deal.","translation":"一個分裂派系反對這項和平協議。"},{"id":"C1-604-pastor","level":"C1","word":"pastor","pos":"n.","meaning":"牧師；教會領袖","collocations":"senior pastor, djacent building","example":"The car park is adjacent to the main entrance.","translation":"停車場毗鄰正門。"},{"id":"C1-622-disturbing","level":"C1","word":"disturbing","pos":"adj.","meaning":"令人不安的；令人擔憂的","collocations":"disturbing news, disturbing trend","example":"There are disturbing signs of increasing inequality.","translation":"不平等加劇的跡象令人憂慮。"},{"id":"C1-623-mob","level":"C1","word":"mob","pos":"n.","meaning":"暴民；烏合之眾","collocations":"angry mob, mob mentality","example":"An angry mob gathered outside the courthouse.","translation":"一群憤怒的人群聚集在法院外。"},{"id":"C1-624-overlook","level":"C1","word":"overlook","pos":"v.","meaning":"忽視；俯瞰；寬恕","collocations":"overlook a mistake, overlook the city","example":"The hotel room overlooked the beautiful coastline.","translation":"酒店房間俯瞰著美麗的海岸線。"},{"id":"C1-625-surplus","level":"C1","word":"surplus","pos":"n./adj.","meaning":"剩餘；盈餘；過剩的","collocations":"budget surplus, trade surplus","example":"The government announced a rare budget surplus.","translation":"政府宣布了罕見的財政盈餘。"},{"id":"C1-626-limb","level":"C1","word":"limb","pos":"n.","meaning":"肢體；樹幹","collocations":"out on a limb, lower limb","example":"The accident resulted in the loss of a limb.","translation":"這次事故導致當事人失去了一條肢體。"},{"id":"C1-627-maximize","level":"C1","word":"maximize","pos":"v.","meaning":"最大化；充分利用","collocations":"maximize profit, maximize potential","example":"The company aims to maximize shareholder value.","translation":"公司的目標是最大化股東價值。"},{"id":"C1-628-subscriber","level":"C1","word":"subscriber","pos":"n.","meaning":"訂閱者；訂戶","collocations":"magazine subscriber, paid subscriber","example":"The platform gained a million subscribers within a week.","translation":"這個平台在一週內就獲得了一百萬名訂閱者。"},{"id":"C1-629-line-up","level":"C1","word":"line-up","pos":"n.","meaning":"陣容；名單；排隊辨認","collocations":"strong line-up, star-studded line-up","example":"The festival boasted an impressive musical line-up.","translation":"音樂節匯集了令人印象深刻的豪華陣容。"},{"id":"C1-630-density","level":"C1","word":"density","pos":"n.","meaning":"密度；稠密","collocations":"population density, housing density","example":"Urban areas tend to have a higher population density.","translation":"城市地區的人口密度往往較高。"},{"id":"C1-631-compassion","level":"C1","word":"compassion","pos":"n.","meaning":"憐憫；同情心","collocations":"show compassion, with compassion","example":"She treated patients with great compassion.","translation":"她以極大的同情心對待病患。"},{"id":"C1-632-non-profit","level":"C1","word":"non-profit","pos":"adj./n.","meaning":"非營利的；非盈利組織","collocations":"non-profit organisation, run as non-profit","example":"The charity is registered as a non-profit organisation.","translation":"該慈善機構登記為非營利組織。"},{"id":"C1-633-buddy","level":"C1","word":"buddy","pos":"n.","meaning":"夥伴；好朋友","collocations":"buddy system, close buddy","example":"They were buddies who had known each other for years.","translation":"他們是多年的好友，相識已久。"},{"id":"C1-634-effectiveness","level":"C1","word":"effectiveness","pos":"n.","meaning":"效果；效力；有效性","collocations":"measure effectiveness, overall effectiveness","example":"The effectiveness of the new drug is still being evaluated.","translation":"新藥的有效性仍在評估中。"},{"id":"C1-635-offering","level":"C1","word":"offering","pos":"n.","meaning":"提供物；祭品；產品","collocations":"product offering, special offering","example":"The company expanded its product offering significantly.","translation":"公司大幅擴展了其產品線。"},{"id":"C1-636-subsidy","level":"C1","word":"subsidy","pos":"n.","meaning":"補貼；補助金","collocations":"government subsidy, farm subsidy","example":"Farmers received government subsidies to cope with the drought.","translation":"農民獲得政府補貼，以應對旱災的衝擊。"},{"id":"C1-637-sphere","level":"C1","word":"sphere","pos":"n.","meaning":"領域；球體；天體","collocations":"political sphere, sphere of influence","example":"Education falls within the sphere of the local authority.","translation":"教育屬於地方政府的職責範疇。"},{"id":"C1-638-seldom","level":"C1","word":"seldom","pos":"adv.","meaning":"很少；難得","collocations":"seldom seen, seldom happens","example":"She seldom visits the office in person.","translation":"她很少親自到辦公室來。"},{"id":"C1-639-merely","level":"C1","word":"merely","pos":"adv.","meaning":"只是；僅僅","collocations":"merely a suggestion, not merely","example":"His comment was merely a suggestion, not an order.","translation":"他的評論只是一個建議，並非命令。"},{"id":"C1-640-debris","level":"C1","word":"debris","pos":"n.","meaning":"碎片；殘骸；廢墟","collocations":"clear debris, search through debris","example":"Rescue teams searched through debris for survivors.","translation":"救援隊在瓦礫中搜尋倖存者。"},{"id":"C1-641-philosopher","level":"C1","word":"philosopher","pos":"n.","meaning":"哲學家；思想家","collocations":"ancient philosopher, moral philosopher","example":"The philosopher argued that knowledge is subjective.","translation":"這位哲學家主張知識是主觀的。"},{"id":"C1-642-presidency","level":"C1","word":"presidency","pos":"n.","meaning":"總統任期；總裁職位","collocations":"during his presidency, run for presidency","example":"During her presidency, the economy grew rapidly.","translation":"在她擔任總統期間，經濟快速增長。"},{"id":"C1-643-cooperative","level":"C1","word":"cooperative","pos":"adj./n.","meaning":"合作的；協作的；合作社","collocations":"cooperative approach, agricultural cooperative","example":"The cooperative model allows farmers to share resources.","translation":"合作社模式讓農民得以共享資源。"},{"id":"C1-644-allegation","level":"C1","word":"allegation","pos":"n.","meaning":"指控；指稱","collocations":"deny allegations, face allegations","example":"She denied all allegations of misconduct.","translation":"她否認了所有失職的指控。"},{"id":"C1-645-alliance","level":"C1","word":"alliance","pos":"n.","meaning":"同盟；聯盟","collocations":"military alliance, form an alliance","example":"The two parties formed an unlikely political alliance.","translation":"兩個政黨組成了一個令人意想不到的政治聯盟。"},{"id":"C1-646-premier","level":"C1","word":"premier","pos":"n./adj.","meaning":"首相；首要的；最重要的","collocations":"premier league, premier position","example":"She became the country's first female premier.","translation":"她成為了這個國家第一位女性總理。"},{"id":"C1-647-partial","level":"C1","word":"partial","pos":"adj.","meaning":"部分的；偏袒的","collocations":"partial success, partial to","example":"He showed a partial understanding of the issue.","translation":"他對這個問題只有片面的了解。"},{"id":"C1-648-erect","level":"C1","word":"erect","pos":"v./adj.","meaning":"建立；豎立；直立的","collocations":"erect a building, stand erect","example":"A statue was erected in his memory.","translation":"一座雕像為紀念他而豎立。"},{"id":"C1-649-minimal","level":"C1","word":"minimal","pos":"adj.","meaning":"最少的；極小的","collocations":"minimal impact, minimal effort","example":"The damage from the storm was minimal.","translation":"暴風雨造成的損失微乎其微。"},{"id":"C1-650-legacy","level":"C1","word":"legacy","pos":"n.","meaning":"遺產；遺留問題；傳承","collocations":"political legacy, leave a legacy","example":"She left behind a remarkable legacy of public service.","translation":"她留下了一份傑出的公共服務遺產。"},{"id":"C1-651-conceive","level":"C1","word":"conceive","pos":"v.","meaning":"構想；懷孕；設想","collocations":"conceive an idea, hard to conceive","example":"He conceived the plan during a long walk.","translation":"他在一次長途散步中構思出了這個計畫。"},{"id":"C1-652-circulate","level":"C1","word":"circulate","pos":"v.","meaning":"流通；傳閱；循環","collocations":"circulate information, blood circulates","example":"The memo was circulated among senior staff.","translation":"這份備忘錄在高層員工中傳閱。"},{"id":"C1-653-undoubtedly","level":"C1","word":"undoubtedly","pos":"adv.","meaning":"毫無疑問地；確定地","collocations":"undoubtedly true, undoubtedly the best","example":"She is undoubtedly one of the best writers of her generation.","translation":"她無疑是她那一代最優秀的作家之一。"},{"id":"C1-654-marine","level":"C1","word":"marine","pos":"adj./n.","meaning":"海洋的；海軍陸戰隊員","collocations":"marine life, marine biology","example":"Pollution threatens marine life in the ocean.","translation":"污染威脅著海洋中的生物。"},{"id":"C1-655-companion","level":"C1","word":"companion","pos":"n.","meaning":"同伴；陪伴","collocations":"close companion, travel companion","example":"She was his companion for over 30 years.","translation":"她是他三十多年來的伴侶。"},{"id":"C1-656-functional","level":"C1","word":"functional","pos":"adj.","meaning":"功能性的；可使用的","collocations":"fully functional, functional design","example":"The new system is not yet fully functional.","translation":"新系統尚未完全投入運作。"},{"id":"C1-657-classification","level":"C1","word":"classification","pos":"n.","meaning":"分類；分級","collocations":"risk classification, system of classification","example":"The classification of the documents was strictly controlled.","translation":"這些文件的分類受到嚴格管控。"},{"id":"C1-658-outbreak","level":"C1","word":"outbreak","pos":"n.","meaning":"爆發；突然發生","collocations":"disease outbreak, outbreak of violence","example":"Health authorities acted quickly to contain the outbreak.","translation":"衛生當局迅速採取行動，控制了這次疫情的爆發。"},{"id":"C1-659-fierce","level":"C1","word":"fierce","pos":"adj.","meaning":"激烈的；兇猛的；強烈的","collocations":"fierce competition, fierce debate","example":"The two companies engaged in fierce competition.","translation":"兩家公司展開了激烈的競爭。"},{"id":"C1-660-indicator","level":"C1","word":"indicator","pos":"n.","meaning":"指標；標誌","collocations":"economic indicator, key indicator","example":"GDP is a key indicator of economic performance.","translation":"國內生產毛額是衡量經濟表現的關鍵指標。"},{"id":"C1-661-unprecedented","level":"C1","word":"unprecedented","pos":"adj.","meaning":"前所未有的；空前的","collocations":"unprecedented success, unprecedented scale","example":"The crisis was of unprecedented proportions.","translation":"這場危機的規模是前所未有的。"},{"id":"C1-662-authorize","level":"C1","word":"authorize","pos":"v.","meaning":"授權；批准","collocations":"authorize action, officially authorize","example":"The board authorized the sale of the property.","translation":"董事會授權出售該房產。"},{"id":"C1-663-ecological","level":"C1","word":"ecological","pos":"adj.","meaning":"生態的；生態學的","collocations":"ecological damage, ecological system","example":"The oil spill caused significant ecological damage.","translation":"石油洩漏造成了嚴重的生態破壞。"},{"id":"C1-664-personnel","level":"C1","word":"personnel","pos":"n.","meaning":"人員；員工；人事部門","collocations":"military personnel, personnel department","example":"All personnel must be cleared by security.","translation":"所有人員必須通過安全審查。"},{"id":"C1-665-horizon","level":"C1","word":"horizon","pos":"n.","meaning":"地平線；視野；前景","collocations":"on the horizon, expand horizons","example":"New opportunities appeared on the horizon.","translation":"新的機遇出現在眼前。"},{"id":"C1-666-tobacco","level":"C1","word":"tobacco","pos":"n.","meaning":"煙草；菸草","collocations":"tobacco industry, tobacco products","example":"The government increased taxes on tobacco products.","translation":"政府提高了菸草產品的稅率。"},{"id":"C1-667-fragile","level":"C1","word":"fragile","pos":"adj.","meaning":"脆弱的；易碎的；精細的","collocations":"fragile peace, fragile economy","example":"The fragile peace between the two sides was at risk.","translation":"雙方之間脆弱的和平局面面臨威脅。"},{"id":"C1-668-suicide","level":"C1","word":"suicide","pos":"n.","meaning":"自殺；自取滅亡","collocations":"commit suicide, suicide attempt","example":"Suicide prevention programmes need more funding.","translation":"自殺預防計畫需要更多資金支持。"},{"id":"C1-669-timber","level":"C1","word":"timber","pos":"n.","meaning":"木材；木頭","collocations":"timber industry, timber frame","example":"The house was built with a timber frame.","translation":"這棟房子以木架結構建造而成。"},{"id":"C1-670-hierarchy","level":"C1","word":"hierarchy","pos":"n.","meaning":"層級；等級制度","collocations":"social hierarchy, corporate hierarchy","example":"She rose rapidly through the corporate hierarchy.","translation":"她在企業階層中迅速晉升。"},{"id":"C1-671-dilemma","level":"C1","word":"dilemma","pos":"n.","meaning":"兩難困境；難題","collocations":"face a dilemma, ethical dilemma","example":"The doctor faced an ethical dilemma over the treatment.","translation":"醫生面臨著一個關於治療方案的倫理困境。"},{"id":"C1-672-alike","level":"C1","word":"alike","pos":"adj./adv.","meaning":"相似的；同樣地","collocations":"young and old alike, look alike","example":"The decision was criticised by experts and the public alike.","translation":"這個決定遭到了專家和公眾的同聲批評。"},{"id":"C1-673-gaze","level":"C1","word":"gaze","pos":"v./n.","meaning":"凝視；注視","collocations":"gaze at, steady gaze","example":"He gazed out of the window at the empty street.","translation":"他凝視著窗外空曠的街道。"},{"id":"C1-674-prosperity","level":"C1","word":"prosperity","pos":"n.","meaning":"繁榮；興旺","collocations":"economic prosperity, shared prosperity","example":"The nation enjoyed decades of peace and prosperity.","translation":"這個國家享受了數十年的和平與繁榮。"},{"id":"C1-675-thought-provoking","level":"C1","word":"thought-provoking","pos":"adj.","meaning":"發人深省的","collocations":"thought-provoking question, thought-provoking film","example":"The documentary was truly thought-provoking.","translation":"這部紀錄片確實發人深省。"},{"id":"C1-676-judicial","level":"C1","word":"judicial","pos":"adj.","meaning":"司法的；法律的","collocations":"judicial review, judicial system","example":"A judicial inquiry was launched into the allegations.","translation":"針對這些指控，發起了一項司法調查。"},{"id":"C1-677-enquire","level":"C1","word":"enquire","pos":"v.","meaning":"詢問；查詢（英式拼法）","collocations":"enquire about, enquire into","example":"She enquired about the availability of tickets.","translation":"她詢問了票務的供應情況。"},{"id":"C1-678-revival","level":"C1","word":"revival","pos":"n.","meaning":"復甦；復興；重演","collocations":"economic revival, cultural revival","example":"There has been a revival of interest in traditional crafts.","translation":"人們對傳統工藝的興趣重新燃起。"},{"id":"C1-679-coincide","level":"C1","word":"coincide","pos":"v.","meaning":"同時發生；巧合；一致","collocations":"coincide with, timing coincided","example":"The event coincided with the anniversary of his death.","translation":"這次活動恰好與他的忌日重合。"},{"id":"C1-680-discretion","level":"C1","word":"discretion","pos":"n.","meaning":"謹慎；斟酌；自由裁量","collocations":"use discretion, at your discretion","example":"The decision was left to the manager's discretion.","translation":"這個決定由管理者自行裁量。"},{"id":"C1-681-confine","level":"C1","word":"confine","pos":"v.","meaning":"限制；關押；局限","collocations":"confine to, be confined","example":"The patient was confined to bed for a week.","translation":"病人在床上臥床休息了一週。"},{"id":"C1-682-compel","level":"C1","word":"compel","pos":"v.","meaning":"強迫；迫使；驅使","collocations":"compel someone to, feel compelled","example":"He felt compelled to speak out against the decision.","translation":"他感到不得不對這項決定公開表態。"},{"id":"C1-683-structural","level":"C1","word":"structural","pos":"adj.","meaning":"結構性的；結構上的","collocations":"structural change, structural problem","example":"The company faces deep structural problems.","translation":"這家公司面臨著深層的結構性問題。"},{"id":"C1-684-appetite","level":"C1","word":"appetite","pos":"n.","meaning":"食慾；渴望；強烈慾望","collocations":"lose appetite, appetite for change","example":"There is a growing appetite for political reform.","translation":"社會對政治改革的渴望日益強烈。"},{"id":"C1-685-compensation","level":"C1","word":"compensation","pos":"n.","meaning":"補償；賠償；薪資","collocations":"seek compensation, compensation package","example":"She received financial compensation for her injuries.","translation":"她因傷獲得了經濟賠償。"},{"id":"C1-686-absent","level":"C1","word":"absent","pos":"adj.","meaning":"缺席的；心不在焉的","collocations":"be absent from, absent-minded","example":"He was absent from the meeting without explanation.","translation":"他無故缺席了這次會議。"},{"id":"C1-687-objection","level":"C1","word":"objection","pos":"n.","meaning":"反對；異議","collocations":"raise objections, no objection","example":"Several committee members raised objections to the proposal.","translation":"幾位委員會成員對這項提案提出了反對意見。"},{"id":"C1-688-landlord","level":"C1","word":"landlord","pos":"n.","meaning":"房東；地主","collocations":"private landlord, dispute with landlord","example":"The tenants complained to their landlord about repairs.","translation":"租戶就維修問題向房東投訴。"},{"id":"C1-689-bleed","level":"C1","word":"bleed","pos":"v.","meaning":"出血；使流血；滲色","collocations":"bleed to death, bleed funds","example":"The government was bleeding money through inefficiency.","translation":"政府因低效率而大量消耗資源。"},{"id":"C1-690-senator","level":"C1","word":"senator","pos":"n.","meaning":"參議員；上院議員","collocations":"US senator, senior senator","example":"The senator voted against the bill.","translation":"這位參議員投票反對該法案。"},{"id":"C1-691-substantial","level":"C1","word":"substantial","pos":"adj.","meaning":"大量的；重大的；實質性的","collocations":"substantial increase, substantial evidence","example":"There is substantial evidence of wrongdoing.","translation":"有大量的不法行為證據。"},{"id":"C1-692-suppress","level":"C1","word":"suppress","pos":"v.","meaning":"壓制；鎮壓；壓抑","collocations":"suppress dissent, suppress emotions","example":"The government suppressed all opposition media.","translation":"政府壓制了所有反對派媒體。"},{"id":"C1-693-radar","level":"C1","word":"radar","pos":"n.","meaning":"雷達；感知範圍","collocations":"off the radar, under the radar","example":"The new artist came under the radar of major labels.","translation":"這位新興藝術家引起了各大唱片公司的關注。"},{"id":"C1-694-persist","level":"C1","word":"persist","pos":"v.","meaning":"持續；堅持","collocations":"persist in, if symptoms persist","example":"If symptoms persist, consult your doctor.","translation":"如果症狀持續，請就醫診治。"},{"id":"C1-695-merit","level":"C1","word":"merit","pos":"n./v.","meaning":"優點；功績；值得","collocations":"on its merits, merit an award","example":"The proposal has considerable merit and deserves attention.","translation":"這份提案具有相當的優點，值得關注。"},{"id":"C1-696-imagery","level":"C1","word":"imagery","pos":"n.","meaning":"意象；意像；圖像","collocations":"visual imagery, poetic imagery","example":"The poem uses powerful nature imagery throughout.","translation":"這首詩全篇運用了強而有力的自然意象。"},{"id":"C1-697-intervene","level":"C1","word":"intervene","pos":"v.","meaning":"干預；介入；調停","collocations":"intervene in a conflict, intervene to stop","example":"The police intervened to prevent further violence.","translation":"警察介入，以防止暴力事件進一步升級。"},{"id":"C1-698-whilst","level":"C1","word":"whilst","pos":"conj.","meaning":"當…時；雖然（英式 ":"Students receive academic guidance from tutors.","translation":"學生從導師那裡獲得學業方面的指導。"},{"id":"C1-707-faculty","level":"C1","word":"faculty","pos":"n.","meaning":"全體教職員；能力；院系","collocations":"law faculty, faculty member","example":"The faculty voted against the proposed change.","translation":"教職員投票反對這項提議的變更。"},{"id":"C1-708-competence","level":"C1","word":"competence","pos":"n.","meaning":"能力；勝任；技能","collocations":"professional competence, linguistic competence","example":"She demonstrated remarkable competence under pressure.","translation":"她在壓力下展現了非凡的勝任能力。"},{"id":"C1-709-drain","level":"C1","word":"drain","pos":"v./n.","meaning":"排乾；消耗；流失","collocations":"brain drain, drain resources","example":"The conflict continued to drain the country's resources.","translation":"衝突不斷消耗著這個國家的資源。"},{"id":"C1-710-scrutiny","level":"C1","word":"scrutiny","pos":"n.","meaning":"仔細審查；監督","collocations":"public scrutiny, face scrutiny","example":"All government spending should be subject to scrutiny.","translation":"所有政府支出都應受到監督審查。"},{"id":"C1-711-relevance","level":"C1","word":"relevance","pos":"n.","meaning":"相關性；關聯性","collocations":"question the relevance, lose relevance","example":"The report's relevance to current events is clear.","translation":"這份報告與當前時事的關聯性顯而易見。"},{"id":"C1-712-defy","level":"C1","word":"defy","pos":"v.","meaning":"違抗；蔑視；使…徒勞","collocations":"defy expectations, defy logic","example":"He defied his doctor's orders and returned to work early.","translation":"他違抗醫生的囑咐，提早返回工作崗位。"},{"id":"C1-713-fairness","level":"C1","word":"fairness","pos":"n.","meaning":"公平；公正；合理性","collocations":"sense of fairness, fairness in","example":"All employees should be treated with basic fairness.","translation":"所有員工都應受到基本公平的對待。"},{"id":"C1-714-acute","level":"C1","word":"acute","pos":"adj.","meaning":"嚴重的；急性的；敏銳的","collocations":"acute pain, acute shortage","example":"There is an acute shortage of affordable housing.","translation":"可負擔的住房嚴重短缺。"},{"id":"C1-715-profitable","level":"C1","word":"profitable","pos":"adj.","meaning":"有利可圖的；獲利的","collocations":"highly profitable, profitable business","example":"The new line of products proved highly profitable.","translation":"新產品線被證明非常有利可圖。"},{"id":"C1-716-confront","level":"C1","word":"confront","pos":"v.","meaning":"面對；對峙；使正視","collocations":"confront a problem, confront someone","example":"He was confronted with evidence of his misconduct.","translation":"他被出示了其違規行為的相關證據。"},{"id":"C1-717-mill","level":"C1","word":"mill","pos":"n./v.","meaning":"磨坊；工廠；研磨","collocations":"run-of-the-mill, steel mill","example":"The old steel mill was converted into luxury apartments.","translation":"老舊的鋼鐵廠被改建成豪華公寓。"},{"id":"C1-718-varied","level":"C1","word":"varied","pos":"adj.","meaning":"多樣的；各種各樣的","collocations":"varied experience, varied approach","example":"The programme includes a wide and varied curriculum.","translation":"課程涵蓋了廣泛多元的學習內容。"},{"id":"C1-719-supreme","level":"C1","word":"supreme","pos":"adj.","meaning":"最高的；至高的；極大的","collocations":"supreme court, supreme effort","example":"The case was taken to the supreme court.","translation":"此案被上訴至最高法院。"},{"id":"C1-720-hostility","level":"C1","word":"hostility","pos":"n.","meaning":"敵意；敵對；仇恨","collocations":"show hostility, hostility towards","example":"There was widespread hostility to the proposed changes.","translation":"提議的變更遭到了廣泛的敵對反應。"},{"id":"C1-721-whereby","level":"C1","word":"whereby","pos":"conj.","meaning":"憑藉；根據","collocations":"a system whereby, mechanism whereby","example":"They created a system whereby employees could raise concerns.","translation":"他們建立了一套機制，讓員工可以提出顧慮。"},{"id":"C1-722-capitalism","level":"C1","word":"capitalism","pos":"n.","meaning":"資本主義","collocations":"free-market capitalism, corporate capitalism","example":"Capitalism relies on private ownership and free markets.","translation":"資本主義依賴私有財產和自由市場。"},{"id":"C1-723-outlet","level":"C1","word":"outlet","pos":"n.","meaning":"出口；發洩；零售商","collocations":"retail outlet, emotio kable grace.","translation":"她以非凡的優雅接受了批評。"},{"id":"C1-741-soar","level":"C1","word":"soar","pos":"v.","meaning":"急劇上升；高飛；翱翔","collocations":"prices soar, soar above","example":"Property prices soared in the capital last year.","translation":"首都的房地產價格去年急劇攀升。"},{"id":"C1-742-canvas","level":"C1","word":"canvas","pos":"n.","meaning":"帆布；畫布；活動範圍","collocations":"blank canvas, canvas painting","example":"The artist used a large canvas for the mural.","translation":"這位藝術家使用了一塊大型畫布繪製壁畫。"},{"id":"C1-743-violate","level":"C1","word":"violate","pos":"v.","meaning":"違反；侵犯；褻瀆","collocations":"violate rights, violate a rule","example":"The action was seen to violate international law.","translation":"這一行動被認為違反了國際法。"},{"id":"C1-744-correspondent","level":"C1","word":"correspondent","pos":"n.","meaning":"記者；通訊員；通信者","collocations":"foreign correspondent, war correspondent","example":"The BBC's foreign correspondent reported from the scene.","translation":"英國廣播公司的駐外記者在現場進行了報導。"},{"id":"C1-745-width","level":"C1","word":"width","pos":"n.","meaning":"寬度；寬廣程度","collocations":"full width, width of the road","example":"The width of the river makes it difficult to cross.","translation":"這條河的寬度使其難以橫渡。"},{"id":"C1-746-auto","level":"C1","word":"auto","pos":"adj./n.","meaning":"自動的；汽車","collocations":"auto industry, auto repair","example":"She works in the auto industry as an engineer.","translation":"她在汽車業擔任工程師。"},{"id":"C1-747-undermine","level":"C1","word":"undermine","pos":"v.","meaning":"削弱；損害；在…下面挖","collocations":"undermine authority, undermine trust","example":"The scandal undermined confidence in the government.","translation":"醜聞動搖了公眾對政府的信任。"},{"id":"C1-748-bless","level":"C1","word":"bless","pos":"v.","meaning":"祝福；賜福；感謝","collocations":"bless someone, be blessed with","example":"She was blessed with an incredible talent for music.","translation":"她被賦予了驚人的音樂天賦。"},{"id":"C1-749-glorious","level":"C1","word":"glorious","pos":"adj.","meaning":"輝煌的；壯麗的；極好的","collocations":"glorious h ease","example":"The new system will ease the burden on staff.","translation":"新系統將減輕員工的工作負擔。"},{"id":"C1-775-practitioner","level":"C1","word":"practitioner","pos":"n.","meaning":"從業者；醫療從業者","collocations":"general practitioner, legal practitioner","example":"A general practitioner referred her to a specialist.","translation":"一位全科醫生將她轉介給了一位專科醫生。"},{"id":"C1-776-stabilize","level":"C1","word":"stabilize","pos":"v.","meaning":"穩定；使穩定","collocations":"stabilize the economy, patient stabilized","example":"The patient's condition was stabilized in hospital.","translation":"病人的病情在醫院裡趨於穩定。"},{"id":"C1-777-counselling","level":"C1","word":"counselling","pos":"n.","meaning":"諮商；輔導","collocations":"relationship counselling, counselling session","example":"She attended weekly counselling sessions.","translation":"她每週參加輔導課程。"},{"id":"C1-778-rental","level":"C1","word":"rental","pos":"n./adj.","meaning":"租金；出租的","collocations":"rental income, rental property","example":"Rental prices have risen significantly in the city.","translation":"市內的租金已大幅上漲。"},{"id":"C1-779-sentiment","level":"C1","word":"sentiment","pos":"n.","meaning":"情感；看法；觀點","collocations":"popular sentiment, anti-war sentiment","example":"There was growing public sentiment against the war.","translation":"公眾的反戰情緒日益高漲。"},{"id":"C1-780-infant","level":"C1","word":"infant","pos":"n.","meaning":"嬰兒；幼兒","collocations":"infant mortality, infant school","example":"The infection is especially dangerous for infants.","translation":"這種感染對嬰兒尤其危險。"},{"id":"C1-781-biography","level":"C1","word":"biography","pos":"n.","meaning":"傳記；人物傳記","collocations":"write a biography, authorised biography","example":"She published an authorised biography of the former president.","translation":"她出版了一部由前總統授權的傳記。"},{"id":"C1-782-nursery","level":"C1","word":"nursery","pos":"n.","meaning":"托兒所；苗圃","collocations":"nursery school, tree nursery","example":"The children attend a nursery near their home.","translation":"孩子們就讀於住家附近的一所幼兒園。"},{"id" istance","example":"He took a passive approach instead of speaking up.","translation":"他採取了消極的態度，而非主動發聲。"},{"id":"C1-792-capitalist","level":"C1","word":"capitalist","pos":"n./adj.","meaning":"資本家；資本主義的","collocations":"capitalist economy, wealthy capitalist","example":"They argued that a capitalist system rewards innovation.","translation":"他們認為資本主義制度獎勵創新。"},{"id":"C1-793-cemetery","level":"C1","word":"cemetery","pos":"n.","meaning":"墓地；公墓","collocations":"war cemetery, local cemetery","example":"He visited his father's grave at the local cemetery.","translation":"他去當地的墓地祭拜了父親的墳墓。"},{"id":"C1-794-dimension","level":"C1","word":"dimension","pos":"n.","meaning":"維度；層面；尺寸","collocations":"new dimension, political dimension","example":"The scandal added a new dimension to the investigation.","translation":"醜聞為這項調查增添了新的維度。"},{"id":"C1-795-underlying","level":"C1","word":"underlying","pos":"adj.","meaning":"根本的；潛在的；深層的","collocations":"underlying cause, underlying issue","example":"The underlying cause of the problem was inadequate funding.","translation":"問題的根本原因是資金不足。"},{"id":"C1-796-civic","level":"C1","word":"civic","pos":"adj.","meaning":"市民的；公民的；城市的","collocations":"civic duty, civic engagement","example":"Voting is a fundamental civic responsibility.","translation":"投票是公民的一項基本責任。"},{"id":"C1-797-suite","level":"C1","word":"suite","pos":"n.","meaning":"套房；套件；組曲","collocations":"hotel suite, software suite","example":"They booked a suite at a five-star hotel.","translation":"他們在一家五星級酒店訂了一間套房。"},{"id":"C1-798-establishment","level":"C1","word":"establishment","pos":"n.","meaning":"機構；權貴體制；建立","collocations":"political establishment, media establishment","example":"He was seen as an outsider challenging the establishment.","translation":"他被視為挑戰現有體制的局外人。"},{"id":"C1-799-declaration","level":"C1","word":"declaration","pos":"n.","meaning":"宣言；申報；聲明","collocations":"declaration of war, customs declaration","example":"The country issued a formal declaration of independence example":"There is growing frustration over the lack of progress.","translation":"對缺乏進展感到越來越沮喪。"},{"id":"C1-809-liberal","level":"C1","word":"liberal","pos":"adj./n.","meaning":"自由的；開放的；自由主義者","collocations":"liberal values, liberal democracy","example":"The proposal was opposed by liberal members of parliament.","translation":"這項提案遭到議會中自由派議員的反對。"},{"id":"C1-810-mature","level":"C1","word":"mature","pos":"adj./v.","meaning":"成熟的；到期；成熟","collocations":"mature approach, mature economy","example":"The market has matured significantly over the past decade.","translation":"過去十年，這個市場已相當成熟。"},{"id":"C1-811-tenant","level":"C1","word":"tenant","pos":"n.","meaning":"租客；房客；佃農","collocations":"long-term tenant, private tenant","example":"The tenant complained about the lack of heating.","translation":"這位房客抱怨沒有暖氣可用。"},{"id":"C1-812-endure","level":"C1","word":"endure","pos":"v.","meaning":"忍受；持久；經歷","collocations":"endure hardship, endure for centuries","example":"She endured years of hardship before achieving success.","translation":"她在成功之前忍受了多年的艱辛。"},{"id":"C1-813-parental","level":"C1","word":"parental","pos":"adj.","meaning":"父母的；親子的","collocations":"parental guidance, parental leave","example":"The school requires parental consent for all excursions.","translation":"學校要求家長對所有戶外活動簽署同意書。"},{"id":"C1-814-precedent","level":"C1","word":"precedent","pos":"n.","meaning":"先例；前例","collocations":"set a precedent, legal precedent","example":"The ruling sets a dangerous precedent for future cases.","translation":"這項裁決為未來的案件樹立了危險的先例。"},{"id":"C1-815-substitute","level":"C1","word":"substitute","pos":"v./n.","meaning":"替代；代替；代用品","collocations":"substitute for, sugar substitute","example":"She substituted olive oil for butter in the recipe.","translation":"她在食譜中用橄欖油代替了奶油。"},{"id":"C1-816-contender","level":"C1","word":"contender","pos":"n.","meaning":"競爭者；角逐者；候選人","collocations":"top contender, strong contender","example":"He is a strong contender for the party leadership.","translation":"他是爭奪黨魁職位的有力競爭者。"},{"id":"C1-817-intact","level":"C1","word":"intact","pos":"adj.","meaning":"完整的；未受損的","collocations":"remain intact, left intact","example":"Miraculously, the ancient manuscript remained intact.","translation":"奇蹟般地，這份古老的手稿完好無損。"},{"id":"C1-818-turnout","level":"C1","word":"turnout","pos":"n.","meaning":"投票率；出席人數；成果","collocations":"voter turnout, low turnout","example":"The election saw a record low voter turnout.","translation":"這次選舉的投票率創下了歷史新低。"},{"id":"C1-819-reproduction","level":"C1","word":"reproduction","pos":"n.","meaning":"繁殖；複製；再現","collocations":"sexual reproduction, reproduction of art","example":"The museum sells high-quality reproductions of famous artworks.","translation":"博物館出售著名藝術作品的高品質複製品。"},{"id":"C1-820-weed","level":"C1","word":"weed","pos":"n./v.","meaning":"雜草；淘汰；除草","collocations":"weed out, garden weed","example":"He spent the afternoon weeding the garden.","translation":"他在下午花時間在花園裡除草。"},{"id":"C1-821-architectural","level":"C1","word":"architectural","pos":"adj.","meaning":"建築學的；建築風格的","collocations":"architectural design, architectural heritage","example":"The building is a stunning architectural achievement.","translation":"這棟建築是一項令人歎為觀止的建築成就。"},{"id":"C1-822-constitute","level":"C1","word":"constitute","pos":"v.","meaning":"構成；組成；建立","collocations":"constitute a crime, constitute a majority","example":"Her actions could constitute a breach of the contract.","translation":"她的行為可能構成違約。"},{"id":"C1-823-obsession","level":"C1","word":"obsession","pos":"n.","meaning":"執念；強迫意念；沉迷","collocations":"unhealthy obsession, obsession with","example":"His obsession with perfection affected his relationships.","translation":"他對完美的偏執影響了他的人際關係。"},{"id":"C1-824-trailer","level":"C1","word":"trailer","pos":"n.","meaning":"預告片；拖車；活動板房","collocations":"movie trailer, trailer park","example":"The official trailer for the film was released online.","translation":"這部電影的官方預告片在網路上發布了。"},{"id":"C1-825-entity","level":"C1","word":"entity","po ctacle, public spectacle","example":"The opening ceremony was a breathtaking spectacle.","translation":"開幕式是一場令人歎為觀止的壯觀演出。"},{"id":"C1-834-sin","level":"C1","word":"sin","pos":"n./v.","meaning":"罪；罪過；犯罪","collocations":"mortal sin, original sin","example":"Pride was considered the greatest sin.","translation":"驕傲被認為是最大的罪孽。"},{"id":"C1-835-premium","level":"C1","word":"premium","pos":"n./adj.","meaning":"溢價；保費；高端的","collocations":"premium price, pay a premium","example":"High quality comes at a premium.","translation":"高品質往往需要付出更高的代價。"},{"id":"C1-836-grief","level":"C1","word":"grief","pos":"n.","meaning":"悲痛；悲傷；哀傷","collocations":"overcome with grief, grief counselling","example":"She was overcome with grief after the loss of her child.","translation":"失去孩子的悲痛讓她不堪承受。"},{"id":"C1-837-commentary","level":"C1","word":"commentary","pos":"n.","meaning":"評論；解說；實況播報","collocations":"political commentary, running commentary","example":"The journalist provided sharp political commentary.","translation":"這位記者提供了敏銳的政治評論。"},{"id":"C1-838-gathering","level":"C1","word":"gathering","pos":"n.","meaning":"聚會；收集；集合","collocations":"large gathering, social gathering","example":"A large gathering of supporters attended the rally.","translation":"大批支持者出席了集會。"},{"id":"C1-839-pathway","level":"C1","word":"pathway","pos":"n.","meaning":"途徑；小徑；路徑","collocations":"career pathway, pathway to success","example":"Education provides a pathway to a better future.","translation":"教育是通往更美好未來的途徑。"},{"id":"C1-840-shed","level":"C1","word":"shed","pos":"v./n.","meaning":"脫落；流；棚子；散發","collocations":"shed light on, shed tears","example":"The new evidence shed light on the mystery.","translation":"新的證據為這個謎團帶來了一絲曙光。"},{"id":"C1-841-pulse","level":"C1","word":"pulse","pos":"n./v.","meaning":"脈搏；脈衝；跳動","collocations":"pulse rate, take someone's pulse","example":"Her pulse quickened as she heard the news.","translation":"聽到這個消息，她的心跳加速了。"},{"id":"C1-842-assemble","level":"C1","word":"assemble","pos":"v.","meaning":"集合；組裝；召集","collocations":"assemble troops, assemble furniture","example":"The team assembled in the conference room.","translation":"團隊在會議室集合。"},{"id":"C1-843-ironically","level":"C1","word":"ironically","pos":"adv.","meaning":"諷刺地；具有諷刺意義地","collocations":"ironically enough, quite ironically","example":"Ironically, the campaign designed to increase trust backfired.","translation":"諷刺的是，這場旨在增進信任的運動適得其反。"},{"id":"C1-844-magnitude","level":"C1","word":"magnitude","pos":"n.","meaning":"規模；量級；重要性","collocations":"of great magnitude, earthquake magnitude","example":"Scientists measured the magnitude of the quake at 7.2.","translation":"科學家測定這次地震的規模為七點二級。"},{"id":"C1-845-straightforward","level":"C1","word":"straightforward","pos":"adj.","meaning":"直截了當的；簡單的","collocations":"straightforward process, straightforward answer","example":"The instructions were clear and straightforward.","translation":"指示清晰明瞭。"},{"id":"C1-846-reliability","level":"C1","word":"reliability","pos":"n.","meaning":"可靠性；可信度","collocations":"prove reliability, lack of reliability","example":"The system's reliability has been questioned.","translation":"系統的可靠性受到質疑。"},{"id":"C1-847-boom","level":"C1","word":"boom","pos":"n./v.","meaning":"繁榮；快速發展；轟隆聲","collocations":"economic boom, boom in demand","example":"The housing market experienced a major boom.","translation":"房地產市場經歷了一次大繁榮。"},{"id":"C1-848-frustrated","level":"C1","word":"frustrated","pos":"adj.","meaning":"沮喪的；受挫的","collocations":"feel frustrated, deeply frustrated","example":"She was frustrated by the lack of progress.","translation":"她對進展遲緩感到沮喪。"},{"id":"C1-849-pump","level":"C1","word":"pump","pos":"v./n.","meaning":"泵；注入；抽取","collocations":"pump money into, pump up","example":"The government pumped billions into the ailing economy.","translation":"政府向疲弱的經濟注入了數十億資金。"},{"id":"C1-850-cynical","level":"C1","word":"cynical","pos":"adj.","meaning":"憤世嫉俗的；懷疑的","collocations":"cynical view, become cynical","example":"After years of politics, he grew deeply cynical.","translation":"從政多年後，他變得極為憤世嫉俗。"},{"id":"C1-851-pronounced","level":"C1","word":"pronounced","pos":"adj.","meaning":"明顯的；顯著的；發音的","collocations":"pronounced effect, pronounced accent","example":"Her French accent is quite pronounced.","translation":"她的法語口音相當濃重。"},{"id":"C1-852-correlation","level":"C1","word":"correlation","pos":"n.","meaning":"相關性；關聯","collocations":"strong correlation, correlation between","example":"There is a direct correlation between poverty and crime.","translation":"貧窮與犯罪之間有著直接的相關性。"},{"id":"C1-853-prosecute","level":"C1","word":"prosecute","pos":"v.","meaning":"起訴；檢察；追究責任","collocations":"prosecute a criminal, decide to prosecute","example":"The government decided to prosecute those involved.","translation":"政府決定對涉案人員提起訴訟。"},{"id":"C1-854-nest","level":"C1","word":"nest","pos":"n./v.","meaning":"巢；集結地；安家","collocations":"nest egg, nest in","example":"Birds nested in the tree outside her window.","translation":"鳥兒在她窗外的樹上築巢。"},{"id":"C1-855-notably","level":"C1","word":"notably","pos":"adv.","meaning":"尤其；特別地；著名地","collocations":"most notably, notably absent","example":"Several countries, most notably France, opposed the plan.","translation":"有幾個國家，尤其是法國，反對這項計畫。"},{"id":"C1-856-revive","level":"C1","word":"revive","pos":"v.","meaning":"復甦；重振；使甦醒","collocations":"revive the economy, revive interest","example":"The new management team set out to revive the company.","translation":"新的管理團隊著手振興公司。"},{"id":"C1-857-intriguing","level":"C1","word":"intriguing","pos":"adj.","meaning":"有趣的；引人入勝的；神秘的","collocations":"intriguing question, intriguing story","example":"The detective found the mystery intriguing.","translation":"這位偵探覺得這個謎案十分有趣。"},{"id":"C1-858-flee","level":"C1","word":"flee","pos":"v.","meaning":"逃跑；逃離；逃避","collocations":"flee the country, flee to safety","example":"Thousands were forced to flee their homes during the conflict.","translation":"衝突期間，數千人被迫逃離家園。"},{"id":"C1-859-neglect","level":"C1","word":"neglect hmark","pos":"n.","meaning":"基準；標竿；衡量標準","collocations":"set a benchmark, industry benchmark","example":"The results set a new benchmark for the industry.","translation":"這些結果為業界樹立了新的標竿。"},{"id":"C1-1005-authentic","level":"C1","word":"authentic","pos":"adj.","meaning":"真實的；正宗的；可信的","collocations":"authentic experience, authentic cuisine","example":"The restaurant is known for its authentic Thai food.","translation":"這家餐廳以其道地的泰式料理聞名。"},{"id":"C1-1006-sexuality","level":"C1","word":"sexuality","pos":"n.","meaning":"性行為；性取向；性特徵","collocations":"human sexuality, explore sexuality","example":"Sexuality is a complex aspect of human identity.","translation":"性取向是人類身份認同的一個複雜面向。"},{"id":"C1-1007-gross","level":"C1","word":"gross","pos":"adj./n.","meaning":"總計的；嚴重的；噁心的；十二打","collocations":"gross income, gross misconduct","example":"He was dismissed for gross misconduct.","translation":"他因嚴重失職而遭到解僱。"},{"id":"C1-1008-foreigner","level":"C1","word":"foreigner","pos":"n.","meaning":"外國人；外地人","collocations":"local foreigner, treat as a foreigner","example":"Foreigners are required to register at the immigration office.","translation":"外國人須在移民局辦理登記手續。"},{"id":"C1-1009-allowance","level":"C1","word":"allowance","pos":"n.","meaning":"津貼；允許量；零用錢","collocations":"monthly allowance, make allowances","example":"She receives a clothing allowance from her employer.","translation":"她從雇主那裡獲得了服裝津貼。"},{"id":"C1-1010-momentum","level":"C1","word":"momentum","pos":"n.","meaning":"動力；勢頭；趨勢","collocations":"build momentum, lose momentum","example":"The campaign gained momentum in the final weeks.","translation":"在最後幾週，這場運動的聲勢逐漸壯大。"},{"id":"C1-1011-dense","level":"C1","word":"dense","pos":"adj.","meaning":"密集的；濃密的；難懂的","collocations":"dense forest, dense fog","example":"The city centre is densely populated.","translation":"市中心人口密集。"},{"id":"C1-1012-exert","level":"C1","word":"exert","pos":"v.","meaning":"施加；運用；使盡力","collocations":"exert pressure, exert influence","example":"The union exerted signi
