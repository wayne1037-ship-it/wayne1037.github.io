nity","pos":"n.","meaning":"一致；聯合；單一(性)；個體","collocations":"changes in unity, a lack of unity, focus on unity","example":"The book included a chapter about unity.","translation":"這本書有一章談到「一致」。"},{"id":"B2-1716-self","level":"B2","word":"self","pos":"n.","meaning":"自我；自己","collocations":"a sense of self, learn about self, talk about self","example":"One clear example made self easier to understand.","translation":"一個清楚的例子讓「自我」更容易理解。"},{"id":"B2-1717-judgement","level":"B2","word":"judgement","pos":"n.","meaning":"審判；判決；判斷；判定","collocations":"a sense of judgement, learn about judgement, talk about judgement","example":"We saw how judgement can change people's plans.","translation":"我們看到「審判」如何改變人們的計畫。"},{"id":"B2-1718-heaven","level":"B2","word":"heaven","pos":"n.","meaning":"天堂；上帝；天空","collocations":"the importance of heaven, understand heaven, problems with heaven","example":"The conversation at home turned to heaven after dinner.","translation":"晚餐後，家裡的談話轉到了「天堂」。"},{"id":"B2-1719-assign","level":"B2","word":"assign","pos":"v.","meaning":"分配；指派；賦值","collocations":"assign the task, need to assign, assign carefully","example":"The family needed to assign the task before making a final choice.","translation":"這家人在做最後選擇前，需要先「分配」任務。"},{"id":"B2-1720-split","level":"B2","word":"split","pos":"v.","meaning":"劈開；裂片；裂縫；分裂","collocations":"need to split, try to split, help to split","example":"We need to split the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「劈開」它。"},{"id":"B2-1721-teens","level":"B2","word":"teens","pos":"n.","meaning":"十三歲到十九歲","collocations":"a sense of teens, learn about teens, talk about teens","example":"The conversation at home turned to teens after dinner.","translation":"晚餐後，家裡的談話轉到了「十三歲到十九歲」。"},{"id":"B2-1722-slight","level":"B2","word":"slight","pos":"adj.","meaning":"輕微的；不重要的","collocations":"feel slight, seem slight, a slight day","example":"She made a slight choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「輕微的」的選擇。"},{"id":"B2-1723-deposit","level":"B2","word":"deposit","pos":"n.","meaning":"存款；定金；堆積物；存放","collocations":"the importance of deposit, understand deposit, problems with deposit","example":"I first learned about deposit from a teacher at school.","translation":"我第一次從學校老師那裡學到「存款」。"},{"id":"B2-1724-genuinely","level":"B2","word":"genuinely","pos":"adv.","meaning":"真誠地；誠實地","collocations":"genuinely interested, genuinely believe, genuinely helpful","example":"She seemed genuinely interested in understanding the community's concerns.","translation":"她似乎真心想了解社區的疑慮。"},{"id":"B2-1725-recover","level":"B2","word":"recover","pos":"v.","meaning":"重新獲得；恢復；復原；拯救","collocations":"recover suddenly, recover over time, begin to recover","example":"New habits rarely recover overnight; they take time to build.","translation":"新習慣很少一夜之間「重新獲得」，它們需要時間養成。"},{"id":"B2-1726-optimistic","level":"B2","word":"optimistic","pos":"adj.","meaning":"樂觀的；樂觀主義的；樂天的","collocations":"feel optimistic, seem optimistic, become optimistic","example":"He looked optimistic when he heard the good news.","translation":"聽到好消息時，他看起來很「樂觀的」。"},{"id":"B2-1727-fault","level":"B2","word":"fault","pos":"n.","meaning":"過錯；故障；毛病；挑剔","collocations":"a sense of fault, learn about fault, talk about fault","example":"I first learned about fault from a teacher at school.","translation":"我第一次從學校老師那裡學到「過錯」。"},{"id":"B2-1728-rural","level":"B2","word":"rural","pos":"adj.","meaning":"鄉下的；田園的；鄉村風味的；農村的","collocations":"rural enough, become rural, look rural","example":"The day felt rural, so we changed our plans.","translation":"那天感覺很「鄉下的」，所以我們改變了計畫。"},{"id":"B2-1729-demand","level":"B2","word":"demand","pos":"n.","meaning":"要求；需求；需要；查詢","collocations":"changes in demand, a lack of demand, focus on demand","example":"A friend helped me understand demand with a simple example.","translation":"一位朋友用簡單例子幫我理解「要求」。"},{"id":"B2-1730-deliberately","level":"B2","word":"deliberately","pos":"adv.","meaning":"故意地","collocations":"deliberately avoid, deliberately choose, deliberately misleading","example":"The company deliberately avoided publishing the most damaging figures.","translation":"該公司刻意避免公佈最不利的數據。"},{"id":"B2-1731-certificate","level":"B2","word":"certificate","pos":"n.","meaning":"證書；證明書；發給證明書；用證書批准","collocations":"a sense of certificate, learn about certificate, talk about certificate","example":"She wrote a note to remind herself why certificate mattered.","translation":"她寫了一張便條提醒自己為什麼「證書」很重要。"},{"id":"B2-1732-defend","level":"B2","word":"defend","pos":"v.","meaning":"防護；辯護；防衛；作...的辯護律師","collocations":"defend the decision, need to defend, defend carefully","example":"Our teacher asked us to defend the decision using clear examples.","translation":"老師要求我們用清楚的例子來「防護」決定。"},{"id":"B2-1733-fully","level":"B2","word":"fully","pos":"adv.","meaning":"十分地；完全地；充分地","collocations":"change fully, fully different, fully important","example":"The price changed fully during the holiday season.","translation":"假期期間，價格「十分地」變動。"},{"id":"B2-1734-elect","level":"B2","word":"elect","pos":"v.","meaning":"當選人；被選的人；被選的；選出的","collocations":"elect a new mayor, need to elect, elect carefully","example":"The family needed to elect a new mayor before making a final choice.","translation":"這家人在做最後選擇前，需要先「當選人」新市長。"},{"id":"B2-1735-grab","level":"B2","word":"grab","pos":"n.","meaning":"抓握；掠奪；強佔；東方沿岸帆船","collocations":"the importance of grab, understand grab, problems with grab","example":"He used a drawing to show the meaning of grab.","translation":"他用一張圖來說明「抓握」的意思。"},{"id":"B2-1736-prior","level":"B2","word":"prior","pos":"adj.","meaning":"更重要的；較早的；在先的；小隱修院院長","collocations":"prior enough, become prior, look prior","example":"She made a prior choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「更重要的」的選擇。"},{"id":"B2-1737-firefighter","level":"B2","word":"firefighter","pos":"n.","meaning":"<美>消防隊員","collocations":"a firefighter, work as a firefighter, ask a firefighter","example":"She hopes to become a firefighter after university.","translation":"她希望大學畢業後成為「<美>消防隊員」。"},{"id":"B2-1738-unexpected","level":"B2","word":"unexpected","pos":"adj.","meaning":"料想不到的；突然的；意外的；不能預料的","collocations":"feel unexpected, seem unexpected, a unexpected day","example":"The new idea sounded unexpected, but we decided to try it.","translation":"這個新點子聽起來很「料想不到的」，但我們決定試試看。"},{"id":"B2-1739-blanket","level":"B2","word":"blanket","pos":"n.","meaning":"毛毯；毯子；掩蓋；覆蓋","collocations":"a blanket, use the blanket, place the blanket","example":"The child pointed at the blanket and asked what it was used for.","translation":"孩子指著「毛毯」，問它是用來做什麼的。"},{"id":"B2-1740-beyond","level":"B2","word":"beyond","pos":"prep.","meaning":"超過；在那一邊；遲於；在遠處","collocations":"beyond control, beyond doubt, beyond the city","example":"The effects of the decision went beyond the company and influenced the whole industry.","translation":"這項決策的影響超出公司範圍，並影響了整個產業。"},{"id":"B2-1741-enthusiastic","level":"B2","word":"enthusiastic","pos":"adj.","meaning":"狂熱的；熱心的；熱烈的","collocations":"feel enthusiastic, seem enthusiastic, become enthusiastic","example":"She felt enthusiastic after finishing the work on time.","translation":"準時完成工作後，她感到「狂熱的」。"},{"id":"B2-1742-psychological","level":"B2","word":"psychological","pos":"adj.","meaning":"心理學的；精神上的；心靈的；心理上的","collocations":"psychological pressure, psychological support, psychological effect","example":"Long working hours can create serious psychological pressure for employees.","translation":"長時間工作可能為員工帶來嚴重的心理壓力。"},{"id":"B2-1743-finance","level":"B2","word":"finance","pos":"n.","meaning":"財政；財務；供給...經費；負擔經費","collocations":"the importance of finance, understand finance, problems with finance","example":"It took me a while to understand finance.","translation":"我花了一段時間才理解「財政」。"},{"id":"B2-1744-convention","level":"B2","word":"convention","pos":"n.","meaning":"大會；協定；慣例；約定","collocations":"changes in convention, a lack of convention, focus on convention","example":"A short story helped the class discuss convention.","translation":"一個短篇故事幫助全班討論「大會」。"},{"id":"B2-1745-occupation","level":"B2","word":"occupation","pos":"n.","meaning":"職業；佔有；佔有期；佔領","collocations":"full-time occupation, previous occupation, occupation details","example":"Please write your occupation on the form.","translation":"請在表格上填寫你的職業。"},{"id":"B2-1746-gaming","level":"B2","word":"gaming","pos":"n.","meaning":"賭博；賭勝負；賭賽","collocations":"a sense of gaming, learn about gaming, talk about gaming","example":"She wrote a note to remind herself why gaming mattered.","translation":"她寫了一張便條提醒自己為什麼「賭博」很重要。"},{"id":"B2-1747-purely","level":"B2","word":"purely","pos":"adv.","meaning":"純粹地；清白地；貞潔地","collocations":"change purely, purely different, purely important","example":"His answer was purely different from what I expected.","translation":"他的回答和我預期的「純粹地」不同。"},{"id":"B2-1748-failed","level":"B2","word":"failed","pos":"adj.","meaning":"已失敗的；失敗的","collocations":"failed enough, become failed, look failed","example":"His room looked failed after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「已失敗的」。"},{"id":"B2-1749-motor","level":"B2","word":"motor","pos":"n.","meaning":"馬達；發動機；原動力；汽車","collocations":"a motor, use the motor, place the motor","example":"He found the motor in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「馬達」。"},{"id":"B2-1750-disappoint","level":"B2","word":"disappoint","pos":"v.","meaning":"使失望","collocations":"disappoint many supporters, need to disappoint, disappoint carefully","example":"Please do not disappoint many supporters until you understand the details.","translation":"在瞭解細節之前，請不要「使失望」許多支持者。"},{"id":"B2-1751-placement","level":"B2","word":"placement","pos":"n.","meaning":"放置；佈置；工作安排；編班","collocations":"changes in placement, a lack of placement, focus on placement","example":"Parents often talk about placement when planning for the future.","translation":"父母規劃未來時，常會談到「放置」。"},{"id":"B2-1752-scholar","level":"B2","word":"scholar","pos":"n.","meaning":"學者；獎學金獲得者；有文化者；學習者","collocations":"a scholar, work as a scholar, ask a scholar","example":"My neighbour works as a scholar in the city.","translation":"我的鄰居在城裡擔任「學者」。"},{"id":"B2-1753-invade","level":"B2","word":"invade","pos":"v.","meaning":"侵入；擁入；侵略；侵襲","collocations":"invade a country, invade privacy, invade someone's space","example":"The army invaded the country at dawn.","translation":"軍隊在黎明時入侵了那個國家。"},{"id":"B2-1754-severe","level":"B2","word":"severe","pos":"adj.","meaning":"嚴格的；尖銳的；嚴肅的；嚴重的","collocations":"a severe choice, severe at times, sound severe","example":"The day felt severe, so we changed our plans.","translation":"那天感覺很「嚴格的」，所以我們改變了計畫。"},{"id":"B2-1755-transportation","level":"B2","word":"transportation","pos":"n.","meaning":"運輸；輸送；交通車輛；運轉","collocations":"changes in transportation, a lack of transportation, focus on transportation","example":"The video showed why transportation matters in real life.","translation":"這支影片說明瞭為什麼「運輸」在現實生活中很重要。"},{"id":"B2-1756-wildlife","level":"B2","word":"wildlife","pos":"n.","meaning":"野生動植物","collocations":"changes in wildlife, a lack of wildlife, focus on wildlife","example":"I first learned about wildlife from a teacher at school.","translation":"我第一次從學校老師那裡學到「野生動植物」。"},{"id":"B2-1757-compose","level":"B2","word":"compose","pos":"v.","meaning":"組成；寫作；作曲；使平靜","collocations":"compose a short piece of music, need to compose, compose carefully","example":"Our teacher asked us to compose a short piece of music using clear examples.","translation":"老師要求我們用清楚的例子來「組成」一首短曲。"},{"id":"B2-1758-automatic","level":"B2","word":"automatic","pos":"n.","meaning":"自動手槍；自動機械；自動的；機械的","collocations":"the importance of automatic, understand automatic, problems with automatic","example":"A simple classroom activity showed us automatic.","translation":"一個簡單的課堂活動讓我們看見「自動手槍」。"},{"id":"B2-1759-core","level":"B2","word":"core","pos":"n.","meaning":"核心；果心；要點；挖...的核","collocations":"changes in core, a lack of core, focus on core","example":"Parents often talk about core when planning for the future.","translation":"父母規劃未來時，常會談到「核心」。"},{"id":"B2-1760-visible","level":"B2","word":"visible","pos":"adj.","meaning":"看得見的；明顯的；顯然的；可見物","collocations":"visible edge, visible layer, visible surface","example":"The visible door was locked, so we used the front entrance.","translation":"那扇「看得見的」的門鎖住了，所以我們走前門。"},{"id":"B2-1761-funding","level":"B2","word":"funding","pos":"n.","meaning":"債務轉期","collocations":"a sense of funding, learn about funding, talk about funding","example":"A simple classroom activity showed us funding.","translation":"一個簡單的課堂活動讓我們看見「債務轉期」。"},{"id":"B2-1762-voluntary","level":"B2","word":"voluntary","pos":"adj.","meaning":"自動的；自願的；故意的；志願的","collocations":"voluntary enough, become voluntary, look voluntary","example":"The new idea sounded voluntary, but we decided to try it.","translation":"這個新點子聽起來很「自動的」，但我們決定試試看。"},{"id":"B2-1763-spiritual","level":"B2","word":"spiritual","pos":"adj.","meaning":"精神上的；神聖的；崇高的；高尚的","collocations":"a spiritual choice, spiritual at times, sound spiritual","example":"The answer was spiritual enough for us to keep talking about it.","translation":"這個回答夠「精神上的」，讓我們繼續討論下去。"},{"id":"B2-1764-sometime","level":"B2","word":"sometime","pos":"adj.","meaning":"以前的；某一時間的；改天；來日","collocations":"feel sometime, seem sometime, a sometime day","example":"The new idea sounded sometime, but we decided to try it.","translation":"這個新點子聽起來很「以前的」，但我們決定試試看。"},{"id":"B2-1765-therapist","level":"B2","word":"therapist","pos":"n.","meaning":"治療學家","collocations":"a therapist, work as a therapist, ask a therapist","example":"My neighbour works as a therapist in the city.","translation":"我的鄰居在城裡擔任「治療學家」。"},{"id":"B2-1766-spare","level":"B2","word":"spare","pos":"adj.","meaning":"剩餘；備用品；備件；備用零件","collocations":"a spare choice, spare at times, sound spare","example":"The answer was spare enough for us to keep talking about it.","translation":"這個回答夠「剩餘」，讓我們繼續討論下去。"},{"id":"B2-1767-eliminate","level":"B2","word":"eliminate","pos":"v.","meaning":"除去；排除；剔除；消除","collocations":"eliminate unnecessary waste, need to eliminate, eliminate carefully","example":"They had to eliminate unnecessary waste before the end of the week.","translation":"他們必須在週末前「除去」不必要的浪費。"},{"id":"B2-1768-craft","level":"B2","word":"craft","pos":"n.","meaning":"技藝；手藝；詭計；精心製作","collocations":"a sense of craft, learn about craft, talk about craft","example":"I noticed craft in a news story last night.","translation":"昨晚我在一則新聞中注意到「技藝」。"},{"id":"B2-1769-cabin","level":"B2","word":"cabin","pos":"n.","meaning":"小屋；客艙；關在小屋","collocations":"a cabin, use the cabin, place the cabin","example":"The old cabin reminded her of her grandfather's house.","translation":"那個舊「小屋」讓她想起祖父的家。"},{"id":"B2-1770-potentially","level":"B2","word":"potentially","pos":"adv.","meaning":"可能地；潛在地","collocations":"change potentially, potentially different, potentially important","example":"Her English improved potentially after she practised every day.","translation":"她每天練習後，英文「可能地」進步。"},{"id":"B2-1771-forbid","level":"B2","word":"forbid","pos":"v.","meaning":"禁止；不準；妨礙；不許","collocations":"forbid smoking indoors, need to forbid, forbid carefully","example":"Our teacher asked us to forbid smoking indoors using clear examples.","translation":"老師要求我們用清楚的例子來「禁止」室內吸菸。"},{"id":"B2-1772-intense","level":"B2","word":"intense","pos":"adj.","meaning":"非常的；強烈的；緊張的；熱情的","collocations":"a intense choice, intense at times, sound intense","example":"His room looked intense after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「非常的」。"},{"id":"B2-1773-exposure","level":"B2","word":"exposure","pos":"n.","meaning":"暴露；揭發；揭露；曝光量","collocations":"a sense of exposure, learn about exposure, talk about exposure","example":"She wrote a note to remind herself why exposure mattered.","translation":"她寫了一張便條提醒自己為什麼「暴露」很重要。"},{"id":"B2-1774-handle","level":"B2","word":"handle","pos":"v.","meaning":"柄；把手；把柄；柄狀物","collocations":"need to handle, try to handle, help to handle","example":"We need to handle the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「柄」它。"},{"id":"B2-1775-embrace","level":"B2","word":"embrace","pos":"n.","meaning":"擁抱；互相擁抱；包含；收買","collocations":"changes in embrace, a lack of embrace, focus on embrace","example":"The conversation at home turned to embrace after dinner.","translation":"晚餐後，家裡的談話轉到了「擁抱」。"},{"id":"B2-1776-crucial","level":"B2","word":"crucial","pos":"adj.","meaning":"決定性的；重要的；嚴厲的；十字形的","collocations":"crucial advice, crucial reason, crucial choice","example":"The change was crucial enough for everyone to notice.","translation":"這項改變夠「決定性的」，大家都注意到了。"},{"id":"B2-1777-intended","level":"B2","word":"intended","pos":"adj.","meaning":"有意的；故意的；未婚夫(妻)","collocations":"feel intended, seem intended, a intended day","example":"His room looked intended after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「有意的」。"},{"id":"B2-1778-auction","level":"B2","word":"auction","pos":"n.","meaning":"拍賣","collocations":"changes in auction, a lack of auction, focus on auction","example":"Parents often talk about auction when planning for the future.","translation":"父母規劃未來時，常會談到「拍賣」。"},{"id":"B2-1779-reveal","level":"B2","word":"reveal","pos":"v.","meaning":"露出；顯示；透露；揭露","collocations":"reveal important evidence, need to reveal, reveal carefully","example":"It took several days to reveal important evidence properly.","translation":"要妥善「露出」重要證據花了好幾天。"},{"id":"B2-1780-precious","level":"B2","word":"precious","pos":"adj.","meaning":"寶貴的；珍貴的；過於精緻的；珍愛的","collocations":"precious advice, precious reason, precious choice","example":"The change was precious enough for everyone to notice.","translation":"這項改變夠「寶貴的」，大家都注意到了。"},{"id":"B2-1781-inspector","level":"B2","word":"inspector","pos":"n.","meaning":"檢查員；巡視員","collocations":"an inspector, work as an inspector, ask an inspector","example":"She hopes to become an inspector after university.","translation":"她希望大學畢業後成為「檢查員」。"},{"id":"B2-1782-aircraft","level":"B2","word":"aircraft","pos":"n.","meaning":"航空器；飛機","collocations":"an aircraft, use the aircraft, place the aircraft","example":"The old aircraft reminded her of her grandfather's house.","translation":"那個舊「航空器」讓她想起祖父的家。"},{"id":"B2-1783-specify","level":"B2","word":"specify","pos":"v.","meaning":"詳列；指定；說明","collocations":"specify the exact date, need to specify, specify carefully","example":"Please do not specify the exact date until you understand the details.","translation":"在瞭解細節之前，請不要「詳列」確切日期。"},{"id":"B2-1784-critically","level":"B2","word":"critically","pos":"adv.","meaning":"批評性地；審慎地；精密地","collocations":"change critically, critically different, critically important","example":"The room was critically quieter after they closed the windows.","translation":"他們關上窗戶後，房間「批評性地」安靜許多。"},{"id":"B2-1785-fever","level":"B2","word":"fever","pos":"n.","meaning":"發燒；發熱；熱病；熱","collocations":"high fever, have a fever, fever medicine","example":"He stayed home because he had a high fever.","translation":"他因為發高燒而待在家裡。"},{"id":"B2-1786-extract","level":"B2","word":"extract","pos":"v.","meaning":"榨出物；精汁；摘錄；選段","collocations":"extract useful data, need to extract, extract carefully","example":"Please do not extract useful data until you understand the details.","translation":"在瞭解細節之前，請不要「榨出物」有用資料。"},{"id":"B2-1787-tragedy","level":"B2","word":"tragedy","pos":"n.","meaning":"悲劇；慘案；悲劇作品；慘事","collocations":"terrible tragedy, family tragedy, avoid tragedy","example":"The fire was a tragedy for the whole neighbourhood.","translation":"這場火災對整個社區來說都是悲劇。"},{"id":"B2-1788-reasonable","level":"B2","word":"reasonable","pos":"adj.","meaning":"合理的；明理的；適當的；公道的","collocations":"reasonable advice, reasonable reason, reasonable choice","example":"The rule seemed reasonable once the teacher explained the reason.","translation":"老師說明原因後，這條規則似乎很「合理的」。"},{"id":"B2-1789-attempt","level":"B2","word":"attempt","pos":"n.","meaning":"嘗試；企圖","collocations":"changes in attempt, a lack of attempt, focus on attempt","example":"The book included a chapter about attempt.","translation":"這本書有一章談到「嘗試」。"},{"id":"B2-1790-obligation","level":"B2","word":"obligation","pos":"n.","meaning":"義務；責任；約束；契約","collocations":"changes in obligation, a lack of obligation, focus on obligation","example":"One clear example made obligation easier to understand.","translation":"一個清楚的例子讓「義務」更容易理解。"},{"id":"B2-1791-delete","level":"B2","word":"delete","pos":"v.","meaning":"刪除","collocations":"delete the file, need to delete, delete carefully","example":"Please do not delete the file until you understand the details.","translation":"在瞭解細節之前，請不要「刪除」檔案。"},{"id":"B2-1792-excuse","level":"B2","word":"excuse","pos":"v.","meaning":"原諒；申辯；做為...的託辭；致歉","collocations":"excuse dishonest behaviour, need to excuse, excuse carefully","example":"The family needed to excuse dishonest behaviour before making a final choice.","translation":"這家人在做最後選擇前，需要先「原諒」不誠實的行為。"},{"id":"B2-1793-spokesperson","level":"B2","word":"spokesperson","pos":"n.","meaning":"發言人；代言人","collocations":"a spokesperson, work as a spokesperson, ask a spokesperson","example":"My neighbour works as a spokesperson in the city.","translation":"我的鄰居在城裡擔任「發言人」。"},{"id":"B2-1794-accommodate","level":"B2","word":"accommodate","pos":"v.","meaning":"使適應；調和；通融；容納","collocations":"accommodate more guests, need to accommodate, accommodate carefully","example":"The family needed to accommodate more guests before making a final choice.","translation":"這家人在做最後選擇前，需要先「使適應」更多客人。"},{"id":"B2-1795-graphic","level":"B2","word":"graphic","pos":"adj.","meaning":"生動的；輪廓分明的；繪畫似的；圖解的","collocations":"a graphic choice, graphic at times, sound graphic","example":"The answer was graphic enough for us to keep talking about it.","translation":"這個回答夠「生動的」，讓我們繼續討論下去。"},{"id":"B2-1796-furious","level":"B2","word":"furious","pos":"adj.","meaning":"狂怒的；激烈的；吵鬧的","collocations":"furious enough, become furious, look furious","example":"She made a furious choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「狂怒的」的選擇。"},{"id":"B2-1797-chief","level":"B2","word":"chief","pos":"n.","meaning":"領袖；酋長；長官；主要部分","collocations":"the importance of chief, understand chief, problems with chief","example":"The video explained chief in simple language.","translation":"這支影片用簡單的語言解釋「領袖」。"},{"id":"B2-1798-institute","level":"B2","word":"institute","pos":"n.","meaning":"學會；學院；協會；創立","collocations":"changes in institute, a lack of institute, focus on institute","example":"She wrote a note to remind herself why institute mattered.","translation":"她寫了一張便條提醒自己為什麼「學會」很重要。"},{"id":"B2-1799-sensitive","level":"B2","word":"sensitive","pos":"adj.","meaning":"敏感的；易感的；靈敏的；感光的","collocations":"sensitive advice, sensitive reason, sensitive choice","example":"Her advice was sensitive, so I followed it the next day.","translation":"她的建議很「敏感的」，所以我隔天照做了。"},{"id":"B2-1800-launch","level":"B2","word":"launch","pos":"v.","meaning":"下水；汽艇；發射；使下水","collocations":"need to launch, try to launch, help to launch","example":"We need to launch the problem before it becomes harder to solve.","translation":"我們需要在問題變得更難解決之前先「下水」它。"},{"id":"B2-1801-extensive","level":"B2","word":"extensive","pos":"adj.","meaning":"廣的；廣泛的；多方面的；廣大的","collocations":"feel extensive, seem extensive, a extensive day","example":"The new idea sounded extensive, but we decided to try it.","translation":"這個新點子聽起來很「廣的」，但我們決定試試看。"},{"id":"B2-1802-offence","level":"B2","word":"offence","pos":"n.","meaning":"犯罪；冒犯；違反；罪過","collocations":"a sense of offence, learn about offence, talk about offence","example":"I noticed offence in a news story last night.","translation":"昨晚我在一則新聞中注意到「犯罪」。"},{"id":"B2-1803-independence","level":"B2","word":"independence","pos":"n.","meaning":"獨立；自立；自主；自主性","collocations":"changes in independence, a lack of independence, focus on independence","example":"My friend gave a clear example of independence.","translation":"我的朋友舉了一個清楚的「獨立」例子。"},{"id":"B2-1804-accuse","level":"B2","word":"accuse","pos":"v.","meaning":"指責；控告；歸咎於","collocations":"accuse someone of, falsely accuse, accuse without evidence","example":"Do not accuse someone of lying unless you have evidence.","translation":"除非你有證據，否則不要指控別人說謊。"},{"id":"B2-1805-additionally","level":"B2","word":"additionally","pos":"adv.","meaning":"另外；此外","collocations":"additionally important, additionally required, additionally provide","example":"Additionally, new staff will receive two weeks of training.","translation":"此外，新進員工將接受兩週訓練。"},{"id":"B2-1806-shadow","level":"B2","word":"shadow","pos":"n.","meaning":"陰影；蔭；影子；影像","collocations":"the importance of shadow, understand shadow, problems with shadow","example":"One clear example made shadow easier to understand.","translation":"一個清楚的例子讓「陰影」更容易理解。"},{"id":"B2-1807-rely","level":"B2","word":"rely","pos":"v.","meaning":"信賴；依賴；信任","collocations":"rely suddenly, rely over time, begin to rely","example":"Questions often rely after students try the exercise themselves.","translation":"學生自己嘗試練習後，常常會「信賴」問題。"},{"id":"B2-1808-cell","level":"B2","word":"cell","pos":"n.","meaning":"單元；細胞；電池","collocations":"a cell, use the cell, place the cell","example":"He found the cell in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「單元」。"},{"id":"B2-1809-hesitate","level":"B2","word":"hesitate","pos":"v.","meaning":"猶豫；遲疑","collocations":"hesitate to ask, hesitate before deciding, hesitate for a moment","example":"She did not hesitate to ask for advice when the situation became unclear.","translation":"當情況變得不明朗時，她毫不猶豫地尋求建議。"},{"id":"B2-1810-disc","level":"B2","word":"disc","pos":"n.","meaning":"圓盤；唱片；灌唱片","collocations":"a disc, use the disc, place the disc","example":"The old disc reminded her of her grandfather's house.","translation":"那個舊「圓盤」讓她想起祖父的家。"},{"id":"B2-1811-jury","level":"B2","word":"jury","pos":"n.","meaning":"陪審團；評判委員會；應急的","collocation locations":"the importance of wrap, understand wrap, problems with wrap","example":"The lesson connected wrap to things we see every day.","translation":"這堂課把「外套」和我們每天看見的事物連結起來。"},{"id":"B2-1827-urgent","level":"B2","word":"urgent","pos":"adj.","meaning":"緊急的；急迫的；催逼的","collocations":"urgent advice, urgent reason, urgent choice","example":"Her advice was urgent, so I followed it the next day.","translation":"她的建議很「緊急的」，所以我隔天照做了。"},{"id":"B2-1828-annually","level":"B2","word":"annually","pos":"adv.","meaning":"一年一次；每年；年度的；每年的","collocations":"reported annually, paid annually, annually reviewed","example":"The school holds a sports day annually for students and parents.","translation":"學校每年為學生和家長舉辦一次運動會。"},{"id":"B2-1829-nowadays","level":"B2","word":"nowadays","pos":"adv.","meaning":"現在；現時；當今；時下","collocations":"nowadays common, nowadays often, nowadays more likely","example":"Nowadays, many people use online services to manage their bank accounts.","translation":"如今，許多人使用線上服務管理銀行帳戶。"},{"id":"B2-1830-failure","level":"B2","word":"failure","pos":"n.","meaning":"失敗；失敗者；不足；缺乏","collocations":"a sense of failure, learn about failure, talk about failure","example":"My friend gave a clear example of failure.","translation":"我的朋友舉了一個清楚的「失敗」例子。"},{"id":"B2-1831-rat","level":"B2","word":"rat","pos":"n.","meaning":"鼠；卑鄙的人；破壞者；變節者","collocations":"a rat, use the rat, place the rat","example":"The child pointed at the rat and asked what it was used for.","translation":"孩子指著「鼠」，問它是用來做什麼的。"},{"id":"B2-1832-dare","level":"B2","word":"dare","pos":"n.","meaning":"挑戰；挑動；大膽；敢","collocations":"the importance of dare, understand dare, problems with dare","example":"He used a drawing to show the meaning of dare.","translation":"他用一張圖來說明「挑戰」的意思。"},{"id":"B2-1833-stock","level":"B2","word":"stock","pos":"n.","meaning":"樹幹；祖先；血統；原料","collocations":"a stock, use the stock, place the stock","example":"Please move the stock away from the edge of the desk.","translation":"請把「樹幹」從桌子邊緣移開。"},{"id":" 46-vision","level":"B2","word":"vision","pos":"n.","meaning":"視覺；眼光；視力；幻想","collocations":"the importance of vision, understand vision, problems with vision","example":"The video showed why vision matters in real life.","translation":"這支影片說明瞭為什麼「視覺」在現實生活中很重要。"},{"id":"B2-2047-jet","level":"B2","word":"jet","pos":"n.","meaning":"噴射流；噴嘴；煤玉；射出","collocations":"a jet, use the jet, place the jet","example":"Please move the jet away from the edge of the desk.","translation":"請把「噴射流」從桌子邊緣移開。"},{"id":"B2-2048-dozen","level":"B2","word":"dozen","pos":"n.","meaning":"打；十二個；一打的","collocations":"the importance of dozen, understand dozen, problems with dozen","example":"He used a drawing to show the meaning of dozen.","translation":"他用一張圖來說明「打」的意思。"},{"id":"B2-2049-adapt","level":"B2","word":"adapt","pos":"v.","meaning":"使適應；改編；適應","collocations":"adapt the course, need to adapt, adapt carefully","example":"The school plans to adapt the course after talking with parents.","translation":"學校和家長討論後，計畫「使適應」課程。"},{"id":"B2-2050-confidence","level":"B2","word":"confidence","pos":"n.","meaning":"信心；可靠","collocations":"a sense of confidence, learn about confidence, talk about confidence","example":"The video showed why confidence matters in real life.","translation":"這支影片說明瞭為什麼「信心」在現實生活中很重要。"},{"id":"B2-2051-fulfil","level":"B2","word":"fulfil","pos":"v.","meaning":"實踐；履行；實行；完成","collocations":"fulfil the promise, need to fulfil, fulfil carefully","example":"The school plans to fulfil the promise after talking with parents.","translation":"學校和家長討論後，計畫「實踐」承諾。"},{"id":"B2-2052-conspiracy","level":"B2","word":"conspiracy","pos":"n.","meaning":"同謀；陰謀；陰謀集團；通謀","collocations":"a sense of conspiracy, learn about conspiracy, talk about conspiracy","example":"The video explained conspiracy in simple language.","translation":"這支影片用簡單的語言解釋「同謀」。"},{"id":"B2-2053-alter","level":"B2","word":"alter","pos":"v.","meaning":"改變","collocations":"alter the schedule, need to alter, alter carefully","example" ns":"feel impatient, seem impatient, become impatient","example":"They became impatient after seeing the results.","translation":"看到結果後，他們變得「不耐煩的」。"},{"id":"B2-2091-tune","level":"B2","word":"tune","pos":"n.","meaning":"歌曲；主旋律；心情；聲調","collocations":"a sense of tune, learn about tune, talk about tune","example":"The video showed why tune matters in real life.","translation":"這支影片說明瞭為什麼「歌曲」在現實生活中很重要。"},{"id":"B2-2092-rub","level":"B2","word":"rub","pos":"n.","meaning":"摩擦；困難；障礙；磨損處","collocations":"changes in rub, a lack of rub, focus on rub","example":"A simple classroom activity showed us rub.","translation":"一個簡單的課堂活動讓我們看見「摩擦」。"},{"id":"B2-2093-survivor","level":"B2","word":"survivor","pos":"n.","meaning":"生還者；倖存者；生存者；辛存者","collocations":"a sense of survivor, learn about survivor, talk about survivor","example":"Friends may disagree about survivor, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「生還者」有不同看法。"},{"id":"B2-2094-primarily","level":"B2","word":"primarily","pos":"adv.","meaning":"主要地；首先地","collocations":"change primarily, primarily different, primarily important","example":"Her English improved primarily after she practised every day.","translation":"她每天練習後，英文「主要地」進步。"},{"id":"B2-2095-nearby","level":"B2","word":"nearby","pos":"adv.","meaning":"附近的；近旁的；在附近；近旁地","collocations":"move nearby, live nearby, work nearby","example":"She found a quiet cafe nearby and studied there for an hour.","translation":"她在「附近的」找到一家安靜的咖啡店，並在那裡讀了一小時。"},{"id":"B2-2096-full-time","level":"B2","word":"full-time","pos":"adj.","meaning":"全部時間的；專任的","collocations":"a full-time choice, full-time at times, sound full-time","example":"She made a full-time choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「全部時間的」的選擇。"},{"id":"B2-2097-herb","level":"B2","word":"herb","pos":"n.","meaning":"藥草；香草；草；草本","collocations":"a herb, use the herb, place the herb","example":"The child pointed at the herb and asked what it was used for.","translation":"孩子指著「藥草」，問它是用來做什麼的。"},{"id":"B2-2098-compulsory","level":"B2","word":"compulsory","pos":"adj.","meaning":"被強制的；強迫的；義務的；強制的","collocations":"compulsory advice, compulsory reason, compulsory choice","example":"The rule seemed compulsory once the teacher explained the reason.","translation":"老師說明原因後，這條規則似乎很「被強制的」。"},{"id":"B2-2099-adopt","level":"B2","word":"adopt","pos":"v.","meaning":"採用；正式通過；收養；接受","collocations":"adopt a new approach, need to adopt, adopt carefully","example":"They had to adopt a new approach before the end of the week.","translation":"他們必須在週末前「採用」新方法。"},{"id":"B2-2100-massive","level":"B2","word":"massive","pos":"adj.","meaning":"大而重的；寬大的；宏偉的；大塊的","collocations":"massive advice, massive reason, massive choice","example":"That was a massive choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「大而重的」的選擇。"},{"id":"B2-2101-tag","level":"B2","word":"tag","pos":"n.","meaning":"標籤；附屬物；碎片；結束語","collocations":"a tag, use the tag, place the tag","example":"He found the tag in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「標籤」。"},{"id":"B2-2102-rebuild","level":"B2","word":"rebuild","pos":"v.","meaning":"改建；重建；改造","collocations":"rebuild the damaged school, need to rebuild, rebuild carefully","example":"It took several days to rebuild the damaged school properly.","translation":"要妥善「改建」受損的學校花了好幾天。"},{"id":"B2-2103-mount","level":"B2","word":"mount","pos":"n.","meaning":"乘騎用馬；框；襯紙；山","collocations":"changes in mount, a lack of mount, focus on mount","example":"A short story helped the class discuss mount.","translation":"一個短篇故事幫助全班討論「乘騎用馬」。"},{"id":"B2-2104-harbour","level":"B2","word":"harbour","pos":"n.","meaning":"港；避難所；庇護；藏匿","collocations":"a harbour, use the harbour, place the harbour","example":"She put the harbour on the table before everyone arrived.","translation":"她在大家抵達前，把「港」放在桌上。"},{"id":"B2-2105-myth","level":"B2","word":"myth","pos":"n.","meaning":"神話；虛構的事；虛構的人","collocations":"a sense of myth, learn about myth, talk about myth","example":"Friends may disagree about myth, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「神話」有不同看法。"},{"id":"B2-2106-regional","level":"B2","word":"regional","pos":"adj.","meaning":"地方的；地域性的；區的；部位的","collocations":"feel regional, seem regional, a regional day","example":"The answer was regional enough for us to keep talking about it.","translation":"這個回答夠「地方的」，讓我們繼續討論下去。"},{"id":"B2-2107-permit","level":"B2","word":"permit","pos":"n.","meaning":"許可證；許可；執照；通行證","collocations":"a sense of permit, learn about permit, talk about permit","example":"The book included a chapter about permit.","translation":"這本書有一章談到「許可證」。"},{"id":"B2-2108-lung","level":"B2","word":"lung","pos":"n.","meaning":"肺；肺臟；空地","collocations":"a lung, use the lung, place the lung","example":"Please move the lung away from the edge of the desk.","translation":"請把「肺」從桌子邊緣移開。"},{"id":"B2-2109-limited","level":"B2","word":"limited","pos":"adj.","meaning":"有限制的；有限的；有限責任的；特別快車","collocations":"feel limited, seem limited, a limited day","example":"The answer was limited enough for us to keep talking about it.","translation":"這個回答夠「有限制的」，讓我們繼續討論下去。"},{"id":"B2-2110-adequately","level":"B2","word":"adequately","pos":"adv.","meaning":"足夠地；適當地","collocations":"change adequately, adequately different, adequately important","example":"The price changed adequately during the holiday season.","translation":"假期期間，價格「足夠地」變動。"},{"id":"B2-2111-evaluation","level":"B2","word":"evaluation","pos":"n.","meaning":"評估；估價；求值；鑑定","collocations":"a sense of evaluation, learn about evaluation, talk about evaluation","example":"The lesson connected evaluation to things we see every day.","translation":"這堂課把「評估」和我們每天看見的事物連結起來。"},{"id":"B2-2112-alongside","level":"B2","word":"alongside","pos":"adv.","meaning":"在旁邊；靠攏著；在...旁邊；與...在一起","collocations":"move alongside, live alongside, work alongside","example":"She found a quiet cafe alongside and studied there for an hour.","translation":"她在「在旁邊」找到一家安靜的咖啡店，並  slide, understand slide, problems with slide","example":"A friend helped me understand slide with a simple example.","translation":"一位朋友用簡單例子幫我理解「滑」。"},{"id":"B2-2121-necessity","level":"B2","word":"necessity","pos":"n.","meaning":"需要；必需品；必然；必要性","collocations":"changes in necessity, a lack of necessity, focus on necessity","example":"The conversation at home turned to necessity after dinner.","translation":"晚餐後，家裡的談話轉到了「需要」。"},{"id":"B2-2122-curious","level":"B2","word":"curious","pos":"adj.","meaning":"好奇的；求知的；古怪的","collocations":"curious enough, become curious, look curious","example":"His room looked curious after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「好奇的」。"},{"id":"B2-2123-efficiently","level":"B2","word":"efficiently","pos":"adv.","meaning":"生效；能勝任；有能力；效率高","collocations":"work efficiently, run efficiently, efficiently manage","example":"The new software helps staff process applications more efficiently.","translation":"新軟體幫助員工更有效率地處理申請。"},{"id":"B2-2124-illusion","level":"B2","word":"illusion","pos":"n.","meaning":"幻影；錯覺；幻想","collocations":"a sense of illusion, learn about illusion, talk about illusion","example":"A simple classroom activity showed us illusion.","translation":"一個簡單的課堂活動讓我們看見「幻影」。"},{"id":"B2-2125-harmful","level":"B2","word":"harmful","pos":"adj.","meaning":"有害的；傷害的","collocations":"harmful advice, harmful reason, harmful choice","example":"Her advice was harmful, so I followed it the next day.","translation":"她的建議很「有害的」，所以我隔天照做了。"},{"id":"B2-2126-miserable","level":"B2","word":"miserable","pos":"adj.","meaning":"悲慘的；痛苦的；卑鄙的","collocations":"feel miserable, seem miserable, become miserable","example":"She felt miserable after finishing the work on time.","translation":"準時完成工作後，她感到「悲慘的」。"},{"id":"B2-2127-hell","level":"B2","word":"hell","pos":"n.","meaning":"地獄；邪惡勢力；苦境；陰間","collocations":"the importance of hell, understand hell, problems with hell","example":"We heard about hell during a conversation at lunch."," ratch, learn about scratch, talk about scratch","example":"My friend gave a clear example of scratch.","translation":"我的朋友舉了一個清楚的「抓痕」例子。"},{"id":"B2-2358-reduction","level":"B2","word":"reduction","pos":"n.","meaning":"減少；縮影；變化；還原","collocations":"the importance of reduction, understand reduction, problems with reduction","example":"The video explained reduction in simple language.","translation":"這支影片用簡單的語言解釋「減少」。"},{"id":"B2-2359-prompt","level":"B2","word":"prompt","pos":"n.","meaning":"激勵；提示；提醒物；提詞","collocations":"changes in prompt, a lack of prompt, focus on prompt","example":"She searched online for more information about prompt.","translation":"她上網搜尋更多關於「激勵」的資訊。"},{"id":"B2-2360-agriculture","level":"B2","word":"agriculture","pos":"n.","meaning":"農業；農學","collocations":"a sense of agriculture, learn about agriculture, talk about agriculture","example":"We heard about agriculture during a conversation at lunch.","translation":"我們午餐聊天時聽到了「農業」。"},{"id":"B2-2361-popularity","level":"B2","word":"popularity","pos":"n.","meaning":"名聲；受大眾歡迎；流行","collocations":"a sense of popularity, learn about popularity, talk about popularity","example":"A short story helped the class discuss popularity.","translation":"一個短篇故事幫助全班討論「名聲」。"},{"id":"B2-2362-emphasize","level":"B2","word":"emphasize","pos":"v.","meaning":"強調；加強語氣；著重","collocations":"emphasize the importance of safety, need to emphasize, emphasize carefully","example":"Our teacher asked us to emphasize the importance of safety using clear examples.","translation":"老師要求我們用清楚的例子來「強調」安全的重要性。"},{"id":"B2-2363-obesity","level":"B2","word":"obesity","pos":"n.","meaning":"肥胖；多脂","collocations":"changes in obesity, a lack of obesity, focus on obesity","example":"The book included a chapter about obesity.","translation":"這本書有一章談到「肥胖」。"},{"id":"B2-2364-astonishing","level":"B2","word":"astonishing","pos":"adj.","meaning":"令人驚訝的","collocations":"feel astonishing, seem astonishing, a astonishing day","example":"She made a astonishi pace","pos":"n.","meaning":"速度；步調；步法；踱步","collocations":"the importance of pace, understand pace, problems with pace","example":"A short story helped the class discuss pace.","translation":"一個短篇故事幫助全班討論「速度」。"},{"id":"B2-2395-limitation","level":"B2","word":"limitation","pos":"n.","meaning":"限制；缺陷；限額；限界","collocations":"changes in limitation, a lack of limitation, focus on limitation","example":"The video showed why limitation matters in real life.","translation":"這支影片說明瞭為什麼「限制」在現實生活中很重要。"},{"id":"B2-2396-welfare","level":"B2","word":"welfare","pos":"n.","meaning":"福利；安寧；幸福；福利事業","collocations":"the importance of welfare, understand welfare, problems with welfare","example":"He used a drawing to show the meaning of welfare.","translation":"他用一張圖來說明「福利」的意思。"},{"id":"B2-2397-approval","level":"B2","word":"approval","pos":"n.","meaning":"贊成；批准；核准","collocations":"changes in approval, a lack of approval, focus on approval","example":"She wrote a note to remind herself why approval mattered.","translation":"她寫了一張便條提醒自己為什麼「贊成」很重要。"},{"id":"B2-2398-increasingly","level":"B2","word":"increasingly","pos":"adv.","meaning":"逐漸地；漸增地","collocations":"change increasingly, increasingly different, increasingly important","example":"His answer was increasingly different from what I expected.","translation":"他的回答和我預期的「逐漸地」不同。"},{"id":"B2-2399-democratic","level":"B2","word":"democratic","pos":"adj.","meaning":"民主的；民主政體的；平民的","collocations":"democratic enough, become democratic, look democratic","example":"She made a democratic choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「民主的」的選擇。"},{"id":"B2-2400-programming","level":"B2","word":"programming","pos":"n.","meaning":"節目的計劃；編制程序；程序設計；程序編制","collocations":"changes in programming, a lack of programming, focus on programming","example":"A simple classroom activity showed us programming.","translation":"一個簡單的課堂活動讓我們看見「節目的計劃」。"},{"id":"B2-2401-delighted","level":"B2","word":"delighted","pos":"adj.","meaning":"高興的；快樂的", locations":"skilled advice, skilled reason, skilled choice","example":"The change was skilled enough for everyone to notice.","translation":"這項改變夠「熟練的」，大家都注意到了。"},{"id":"B2-2424-recruit","level":"B2","word":"recruit","pos":"n.","meaning":"新兵；新手；新會員；補給品","collocations":"the importance of recruit, understand recruit, problems with recruit","example":"My friend gave a clear example of recruit.","translation":"我的朋友舉了一個清楚的「新兵」例子。"},{"id":"B2-2425-decoration","level":"B2","word":"decoration","pos":"n.","meaning":"裝飾；裝飾品","collocations":"changes in decoration, a lack of decoration, focus on decoration","example":"One clear example made decoration easier to understand.","translation":"一個清楚的例子讓「裝飾」更容易理解。"},{"id":"B2-2426-basket","level":"B2","word":"basket","pos":"n.","meaning":"籃；籃子；裝入籃","collocations":"a basket, use the basket, place the basket","example":"The old basket reminded her of her grandfather's house.","translation":"那個舊「籃」讓她想起祖父的家。"},{"id":"B2-2427-alien","level":"B2","word":"alien","pos":"n.","meaning":"外國人；外星人；陌生的","collocations":"alien culture, alien species, feel alien","example":"At first, the new school system felt completely alien to the exchange students.","translation":"一開始，新的學校制度讓交換學生感到非常陌生。"},{"id":"B2-2428-electronics","level":"B2","word":"electronics","pos":"n.","meaning":"電子學","collocations":"a sense of electronics, learn about electronics, talk about electronics","example":"A short story helped the class discuss electronics.","translation":"一個短篇故事幫助全班討論「電子學」。"},{"id":"B2-2429-wisdom","level":"B2","word":"wisdom","pos":"n.","meaning":"智慧；明智行為；學識；名言","collocations":"changes in wisdom, a lack of wisdom, focus on wisdom","example":"A simple classroom activity showed us wisdom.","translation":"一個簡單的課堂活動讓我們看見「智慧」。"},{"id":"B2-2430-racist","level":"B2","word":"racist","pos":"n.","meaning":"種族主義者；種族主義的；種族歧視","collocations":"the importance of racist, understand racist, problems with racist","example":"One clear example made racist easier to understand.","t .","meaning":"慚愧的；羞恥的","collocations":"feel ashamed, seem ashamed, become ashamed","example":"They became ashamed after seeing the results.","translation":"看到結果後，他們變得「慚愧的」。"},{"id":"B2-2439-stunning","level":"B2","word":"stunning","pos":"adj.","meaning":"打昏迷的；弄得人昏頭昏腦的；令人震驚的","collocations":"stunning enough, become stunning, look stunning","example":"She made a stunning choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「打昏迷的」的選擇。"},{"id":"B2-2440-federal","level":"B2","word":"federal","pos":"adj.","meaning":"聯邦的；聯合的；同盟的；聯邦制的","collocations":"feel federal, seem federal, a federal day","example":"His room looked federal after he spent the morning cleaning it.","translation":"他花了一個早上打掃後，房間看起來很「聯邦的」。"},{"id":"B2-2441-decrease","level":"B2","word":"decrease","pos":"n.","meaning":"減少；減少量","collocations":"a sense of decrease, learn about decrease, talk about decrease","example":"She searched online for more information about decrease.","translation":"她上網搜尋更多關於「減少」的資訊。"},{"id":"B2-2442-equip","level":"B2","word":"equip","pos":"v.","meaning":"裝備；配備；設備；裝置","collocations":"equip the lab, need to equip, equip carefully","example":"He helped the group equip the lab without making the problem worse.","translation":"他幫助小組「裝備」實驗室，而沒有讓問題變得更糟。"},{"id":"B2-2443-sporting","level":"B2","word":"sporting","pos":"adj.","meaning":"喜好運動的；運動用的；冒險性的","collocations":"sporting enough, become sporting, look sporting","example":"She made a sporting choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「喜好運動的」的選擇。"},{"id":"B2-2444-commission","level":"B2","word":"commission","pos":"n.","meaning":"委任狀；任官令；所委職責；佣金","collocations":"a sense of commission, learn about commission, talk about commission","example":"She wrote a note to remind herself why commission mattered.","translation":"她寫了一張便條提醒自己為什麼「委任狀」很重要。"},{"id":"B2-2445-discipline","level":"B2","word":"discipline","pos":"n.","meaning":"訓練；紀律；懲罰","collocations":"the importance of discipline, understand discipline, },{"id":"B2-2468-select","level":"B2","word":"select","pos":"adj.","meaning":"挑選出來的；極好的；選擇；挑選","collocations":"select enough, become select, look select","example":"The day felt select, so we changed our plans.","translation":"那天感覺很「挑選出來的」，所以我們改變了計畫。"},{"id":"B2-2469-tropical","level":"B2","word":"tropical","pos":"adj.","meaning":"熱帶的；熱情的","collocations":"look tropical, feel tropical, become tropical","example":"She touched the tropical surface and noticed it was still wet.","translation":"她摸了那個「熱帶的」的表面，發現它還是濕的。"},{"id":"B2-2470-stream","level":"B2","word":"stream","pos":"n.","meaning":"水流；小河；流出；趨勢","collocations":"a stream, use the stream, place the stream","example":"The child pointed at the stream and asked what it was used for.","translation":"孩子指著「水流」，問它是用來做什麼的。"},{"id":"B2-2471-risky","level":"B2","word":"risky","pos":"adj.","meaning":"危險的","collocations":"risky advice, risky reason, risky choice","example":"The rule seemed risky once the teacher explained the reason.","translation":"老師說明原因後，這條規則似乎很「危險的」。"},{"id":"B2-2472-unfold","level":"B2","word":"unfold","pos":"v.","meaning":"展開；打開；披露；開展","collocations":"unfold suddenly, unfold over time, begin to unfold","example":"New habits rarely unfold overnight; they take time to build.","translation":"新習慣很少一夜之間「展開」，它們需要時間養成。"},{"id":"B2-2473-roughly","level":"B2","word":"roughly","pos":"adv.","meaning":"概略地；粗糙地；粗暴地","collocations":"change roughly, roughly different, roughly important","example":"His answer was roughly different from what I expected.","translation":"他的回答和我預期的「概略地」不同。"},{"id":"B2-2474-pupil","level":"B2","word":"pupil","pos":"n.","meaning":"學生；門生；未成年人；瞳孔","collocations":"a pupil, work as a pupil, ask a pupil","example":"The pupil explained the problem in simple words.","translation":"那位「學生」用簡單的話解釋問題。"},{"id":"B2-2475-criticize","level":"B2","word":"criticize","pos":"v.","meaning":"批評；吹毛求疵；非難","collocations":"criticize the decision, need to criticize, criticize carefully","example":"Our teacher asked us to criticize the decision using clear examples.","translation":"老師要求我們用清楚的例子來「批評」決定。"},{"id":"B2-2476-wander","level":"B2","word":"wander","pos":"v.","meaning":"遊蕩；漫步；徘徊；迷路","collocations":"wander suddenly, wander over time, begin to wander","example":"Small arguments sometimes wander during long family trips.","translation":"長途家庭旅行中，有時會「遊蕩」小爭執。"},{"id":"B2-2477-considerably","level":"B2","word":"considerably","pos":"adv.","meaning":"非常地；很；頗","collocations":"change considerably, considerably different, considerably important","example":"The medicine worked considerably better after the second day.","translation":"第二天後，藥效「非常地」變好。"},{"id":"B2-2478-differ","level":"B2","word":"differ","pos":"v.","meaning":"不一致；不同；差異","collocations":"differ suddenly, differ over time, begin to differ","example":"Questions often differ after students try the exercise themselves.","translation":"學生自己嘗試練習後，常常會「不一致」問題。"},{"id":"B2-2479-evaluate","level":"B2","word":"evaluate","pos":"v.","meaning":"評估；評價；賦值","collocations":"evaluate the programme, need to evaluate, evaluate carefully","example":"It took several days to evaluate the programme properly.","translation":"要妥善「評估」計畫花了好幾天。"},{"id":"B2-2480-division","level":"B2","word":"division","pos":"n.","meaning":"分；分開；除法；部門(如部、處、系等)","collocations":"changes in division, a lack of division, focus on division","example":"She wrote a note to remind herself why division mattered.","translation":"她寫了一張便條提醒自己為什麼「分」很重要。"},{"id":"B2-2481-emotionally","level":"B2","word":"emotionally","pos":"adv.","meaning":"在情緒上","collocations":"emotionally affected, emotionally difficult, respond emotionally","example":"Many survivors were emotionally affected by the public hearing.","translation":"許多倖存者在情感上受到公開聽證會影響。"},{"id":"B2-2482-beside","level":"B2","word":"beside","pos":"prep.","meaning":"在旁邊","collocations":"beside the process, beside the city, beside several areas","example":"We kept walking beside the river until we reached the old bridge.","translation":"我們沿著河「在旁邊」一直走，直到抵達那座老橋。"},{"id":"B2-2483-visual","level":"B2","word":"visual","pos":"adj.","meaning":"視覺的；視力的；視覺性記憶優勢者","collocations":"feel visual, seem visual, a visual day","example":"The day felt visual, so we changed our plans.","translation":"那天感覺很「視覺的」，所以我們改變了計畫。"},{"id":"B2-2484-basically","level":"B2","word":"basically","pos":"adv.","meaning":"基本上；主要地","collocations":"change basically, basically different, basically important","example":"His answer was basically different from what I expected.","translation":"他的回答和我預期的「基本上」不同。"},{"id":"B2-2485-infrastructure","level":"B2","word":"infrastructure","pos":"n.","meaning":"基礎結構；基礎設施","collocations":"transport infrastructure, digital infrastructure, invest in infrastructure","example":"Reliable infrastructure is essential for economic growth in rural areas.","translation":"可靠的基礎建設對農村地區的經濟成長至關重要。"},{"id":"B2-2486-precise","level":"B2","word":"precise","pos":"adj.","meaning":"精確的；嚴謹的；明確的；精密的","collocations":"precise advice, precise reason, precise choice","example":"The rule seemed precise once the teacher explained the reason.","translation":"老師說明原因後，這條規則似乎很「精確的」。"},{"id":"B2-2487-bargain","level":"B2","word":"bargain","pos":"n.","meaning":"交易；買賣協定；特價商品；講價","collocations":"the importance of bargain, understand bargain, problems with bargain","example":"It took me a while to understand bargain.","translation":"我花了一段時間才理解「交易」。"},{"id":"B2-2488-capture","level":"B2","word":"capture","pos":"n.","meaning":"抓取；戰利品；捕獲之物；獲得","collocations":"a sense of capture, learn about capture, talk about capture","example":"One clear example made capture easier to understand.","translation":"一個清楚的例子讓「抓取」更容易理解。"},{"id":"B2-2489-undergo","level":"B2","word":"undergo","pos":"v.","meaning":"遭受；經歷；忍受；經受","collocations":"undergo major surgery, need to undergo, undergo carefully","example":"He helped the group undergo major surgery without making the problem worse.","translation":"他幫助小組「遭受」重大手術，而沒有讓問題變得更糟。"},{"id":"B2-2490-stall","level":"B2 e front entrance.","translation":"那扇「尖的」的門鎖住了，所以我們走前門。"},{"id":"B2-2564-info","level":"B2","word":"info","pos":"n.","meaning":"資訊","collocations":"changes in info, a lack of info, focus on info","example":"Friends may disagree about info, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「資訊」有不同看法。"},{"id":"B2-2565-bound","level":"B2","word":"bound","pos":"adj.","meaning":"一定會；受約束的；開往","collocations":"bound to happen, legally bound, bound for Taipei","example":"If costs continue to rise, the company is bound to review its budget.","translation":"如果成本持續上升，公司勢必會重新檢視預算。"},{"id":"B2-2566-adjust","level":"B2","word":"adjust","pos":"v.","meaning":"調整；使適應於；校準；適應於","collocations":"adjust the settings, need to adjust, adjust carefully","example":"Please do not adjust the settings until you understand the details.","translation":"在瞭解細節之前，請不要「調整」設定。"},{"id":"B2-2567-spite","level":"B2","word":"spite","pos":"n.","meaning":"惡意；怨恨；使人煩惱的事物；故意刁難","collocations":"a sense of spite, learn about spite, talk about spite","example":"A simple classroom activity showed us spite.","translation":"一個簡單的課堂活動讓我們看見「惡意」。"},{"id":"B2-2568-heel","level":"B2","word":"heel","pos":"n.","meaning":"腳後跟；踵；後部；傾側","collocations":"a heel, use the heel, place the heel","example":"The old heel reminded her of her grandfather's house.","translation":"那個舊「腳後跟」讓她想起祖父的家。"},{"id":"B2-2569-counter","level":"B2","word":"counter","pos":"n.","meaning":"計算器；計算者；櫃檯；籌碼","collocations":"a counter, use the counter, place the counter","example":"Please move the counter away from the edge of the desk.","translation":"請把「計算器」從桌子邊緣移開。"},{"id":"B2-2570-scheme","level":"B2","word":"scheme","pos":"n.","meaning":"方案；計劃；組合；系統","collocations":"changes in scheme, a lack of scheme, focus on scheme","example":"A short story helped the class discuss scheme.","translation":"一個短篇故事幫助全班討論「方案」。"},{"id":"B2-2571-patience","level":"B2","word":"patience","pos":"n.","meaning":"耐性；忍耐","collocations":"the importance of patience, understand patience, problems with patience","example":"The video explained patience in simple language.","translation":"這支影片用簡單的語言解釋「耐性」。"},{"id":"B2-2572-rank","level":"B2","word":"rank","pos":"n.","meaning":"等級；排；橫列；隊伍","collocations":"changes in rank, a lack of rank, focus on rank","example":"Friends may disagree about rank, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「等級」有不同看法。"},{"id":"B2-2573-rob","level":"B2","word":"rob","pos":"v.","meaning":"搶奪；搶掠；剝奪","collocations":"rob the store, need to rob, rob carefully","example":"Please do not rob the store until you understand the details.","translation":"在瞭解細節之前，請不要「搶奪」商店。"},{"id":"B2-2574-strictly","level":"B2","word":"strictly","pos":"adv.","meaning":"嚴格地；確實地","collocations":"strictly follow, strictly limited, strictly necessary","example":"Access to the laboratory is strictly limited to trained staff.","translation":"實驗室僅嚴格限受過訓練的員工進入。"},{"id":"B2-2575-generate","level":"B2","word":"generate","pos":"v.","meaning":"產生；發生；導致","collocations":"generate income, generate interest, generate electricity","example":"The new training programme could generate better results across several departments.","translation":"新的訓練計畫可能在數個部門產生更好的成果。"},{"id":"B1-2576-rough","level":"B1","word":"rough","pos":"adj.","meaning":"粗糙的；粗暴的；蓬亂的；草率的","collocations":"rough road, rough idea, rough day","example":"The road was rough, so we had to drive slowly.","translation":"那條路很崎嶇，所以我們得慢慢開。"},{"id":"B1-2577-fry","level":"B1","word":"fry","pos":"v.","meaning":"煎；油炸","collocations":"fry an egg, fry vegetables, fried rice","example":"My brother learned to fry an egg without burning it.","translation":"我弟弟學會了煎蛋，而且沒有煎焦。"},{"id":"B1-2578-roll","level":"B1","word":"roll","pos":"n.","meaning":"滾動；卷；麵包卷","collocations":"roll down, roll out, bread roll","example":"The ball rolled under the sofa, and we could not reach it.","translation":"球滾到沙發底下，我們拿不到。"},{"id":"B1-2579-ugly","level":"B1","word":"ugly","pos":"adj.","meaning":"醜陋的；難看的","collocations":"ugly building, ugly mark, ugly argument","example":"The old wall looked ugly after years of rain and dirt.","translation":"多年雨水和灰塵後，那面舊牆看起來很難看。"},{"id":"B1-2580-grain","level":"B1","word":"grain","pos":"n.","meaning":"穀物；穀粒","collocations":"grain of rice, whole grain, grain field","example":"My grandmother keeps rice and other grains in large containers.","translation":"我祖母把米和其他穀物放在大容器裡。"},{"id":"B1-2581-aim","level":"B1","word":"aim","pos":"n.","meaning":"目標；目的；瞄準","collocations":"main aim, aim to improve, achieve an aim","example":"Her main aim is to save enough money for university.","translation":"她的主要目標是存夠上大學的錢。"},{"id":"B1-2582-relaxed","level":"B1","word":"relaxed","pos":"adj.","meaning":"鬆懈的；不嚴密的；不嚴格的；放鬆的","collocations":"feel relaxed, relaxed atmosphere, relaxed about","example":"I felt relaxed after walking by the river.","translation":"沿著河邊散步後，我感到放鬆。"},{"id":"B1-2583-frightening","level":"B1","word":"frightening","pos":"adj.","meaning":"令人恐懼的；引起突然驚恐的","collocations":"frightening experience, frightening noise, frightening film","example":"The noise outside was frightening, so we closed the windows.","translation":"外面的聲音很嚇人，所以我們關上窗戶。"},{"id":"B1-2584-mall","level":"B1","word":"mall","pos":"n.","meaning":"購物中心","collocations":"shopping mall, crowded mall, mall entrance","example":"We met at the shopping mall after school.","translation":"放學後，我們在購物中心見面。"},{"id":"B1-2585-ambition","level":"B1","word":"ambition","pos":"n.","meaning":"野心；志向","collocations":"great ambition, personal ambition, ambition to succeed","example":"Her ambition is to become a doctor.","translation":"她的志向是成為醫生。"},{"id":"B1-2586-rarely","level":"B1","word":"rarely","pos":"adv.","meaning":"很少地；罕有地","collocations":"rarely eat out, rarely happen, rarely see","example":"We rarely eat out during the week.","translation":"我們週間很少外食。"},{"id":"B1-2587-covered","level":"B1","word":"covered","pos":"adj.","meaning":"隱蔽著的；掩藏著的；有屋頂的","collocations":"covered in snow, covered with dust, covered area","example":"The car was covered in dust after the long trip.","translation":"長途旅行後，車子滿是灰塵。"},{"id":"B1-2588-portrait","level":"B1","word":"portrait","pos":"n.","meaning":"肖像；人像；半身像；描寫","collocations":"paint a portrait, family portrait, portrait of","example":"The artist painted a portrait of the old fisherman.","translation":"那位藝術家畫了一幅老漁夫的肖像。"},{"id":"B1-2589-hurry","level":"B1","word":"hurry","pos":"n.","meaning":"匆忙；急忙；急促","collocations":"in a hurry, hurry up, hurry to school","example":"I left my keys at home because I was in a hurry.","translation":"我因為趕時間，把鑰匙忘在家裡。"},{"id":"B1-2590-statistic","level":"B1","word":"statistic","pos":"n.","meaning":"統計數字；統計資料","collocations":"official statistic, useful statistic, surprising statistic","example":"One statistic showed that most students walked to school.","translation":"一項統計數字顯示，大多數學生走路上學。"},{"id":"B1-2591-essential","level":"B1","word":"essential","pos":"adj.","meaning":"必要的；重要的；本質的","collocations":"essential skill, essential for, essential information","example":"A warm coat is essential in winter.","translation":"冬天一件暖和的外套很重要。"},{"id":"B1-2592-truth","level":"B1","word":"truth","pos":"n.","meaning":"事實；實情","collocations":"tell the truth, know the truth, hide the truth","example":"She was afraid, but she still told the truth.","translation":"她很害怕，但仍然說了實話。"},{"id":"B1-2593-commit","level":"B1","word":"commit","pos":"v.","meaning":"承諾；犯下","collocations":"commit to a plan, commit a crime, fully committed","example":"He promised to commit to the training plan for three months.","translation":"他承諾會投入這項為期三個月的訓練計畫。"},{"id":"B1-2594-mix","level":"B1","word":"mix","pos":"v.","meaning":"混合；拌和","collocations":"mix ingredients, mix with water, mix together","example":"Mix the flour with water before you add the eggs.","translation":"加蛋之前，先把麵粉和水混合。"},{"id":"B1-2595-wing","level":"B1","word":"wing","pos":"n.","meaning":"翅膀；翼；機翼；派別","collocations":"bird wing, airplane wing, chicken wing","example":"The bird could not fly because its wing was injured.","translation":"那隻鳥因為翅膀受傷而無法飛行。"},{"id":"B1-2596-previously","level":"B1","word":"previously","pos":"adv.","meaning":"先；先前；以前；前","collocations":"previously lived, previously worked, previously unknown","example":"I had previously met him at a school event.","translation":"我以前在學校活動中見過他。"},{"id":"B1-2597-amazed","level":"B1","word":"amazed","pos":"adj.","meaning":"吃驚的；驚奇的","collocations":"amazed by, amazed at, look amazed","example":"We were amazed by how quickly the children learned the song.","translation":"孩子們那麼快學會那首歌，讓我們很驚訝。"},{"id":"B1-2598-management","level":"B1","word":"management","pos":"n.","meaning":"經營；支配；管理","collocations":"time management, hotel management, management team","example":"Good time management helped her finish the project early.","translation":"良好的時間管理幫助她提早完成專案。"},{"id":"B1-2599-locate","level":"B1","word":"locate","pos":"v.","meaning":"找出；設於；位於；定居","collocations":"locate the nearest station, need to locate, locate carefully","example":"They need to locate the nearest station today.","translation":"他們今天需要「找出」最近的車站。"},{"id":"B1-2600-enemy","level":"B1","word":"enemy","pos":"n.","meaning":"敵人；仇敵；敵軍","collocations":"old enemy, enemy soldier, make an enemy","example":"The two teams were enemies on the field but friends after the game.","translation":"兩隊在場上是對手，賽後卻是朋友。"},{"id":"B1-2601-eastern","level":"B1","word":"eastern","pos":"adj.","meaning":"東方的；向東的；自東的","collocations":"eastern coast, eastern part, eastern Europe","example":"My grandparents live on the eastern side of the island.","translation":"我的祖父母住在島的東側。"},{"id":"B1-2602-volunteer","level":"B1","word":"volunteer","pos":"n.","meaning":"志願者","collocations":"volunteer work, volunteer group, work as a volunteer","example":"She works as a volunteer at the animal shelter every weekend.","translation":"她每個週末在動物收容所當志工。"},{"id":"B1-2603-agreement","level":"B1","word":"agreement","pos":"n.","meaning":"同意；合約；協議","collocations":"reach an agreement, sign an agreement, rental agreement","example":"They reached an agreement after a long discussion.","translation":"經過長時間討論後，他們達成協議。"},{"id":"B1-2604-curtain","level":"B1","word":"curtain","pos":"n.","meaning":"帳；幕；窗簾","collocations":"draw the curtain, curtain opens, shower curtain","example":"She opened the curtains to let in the morning light.","translation":"她拉開窗簾，讓晨光照進來。"},{"id":"B1-2605-youth","level":"B1","word":"youth","pos":"n.","meaning":"年輕；青年時代；青年們；青春","collocations":"local youth, youth club, youth culture","example":"The town opened a sports centre for local youth.","translation":"這座城鎮為當地青年開設了一座運動中心。"},{"id":"B1-2606-whether","level":"B1","word":"whether","pos":"conj.","meaning":"是否；不論","collocations":"whether or not, whether to go, ask whether","example":"I do not know whether I should call him tonight.","translation":"我不知道今晚是否該打電話給他。"},{"id":"B1-2607-assignment","level":"B1","word":"assignment","pos":"n.","meaning":"分配；功課；任務；轉讓","collocations":"homework assignment, complete an assignment, writing assignment","example":"I finished my history assignment before dinner.","translation":"晚餐前，我完成了歷史作業。"},{"id":"B1-2608-tax","level":"B1","word":"tax","pos":"n.","meaning":"稅；稅款；重負；會費","collocations":"pay tax, income tax, tax office","example":"Everyone has to pay tax on the money they earn.","translation":"每個人都必須為所得繳稅。"},{"id":"B1-2609-contact","level":"B1","word":"contact","pos":"n.","meaning":"聯繫；交際；熟人；接觸","collocations":"keep in contact, emergency contact, contact number","example":"Please write your emergency contact on the form.","translation":"請在表格上填寫緊急聯絡人。"},{"id":"B1-2610-layer","level":"B1","word":"layer","pos":"n.","meaning":"層；產卵雞；放置者","collocations":"top layer, thin layer, layer of paint","example":"Put another layer of cheese on the bread.","translation":"在麵包上再放一層起司。"},{"id":"B1-2611-familiar","level":"B1","word":"familiar","pos":"adj.","meaning":"熟悉的；常見的；親密的","collocations":"familiar face, familiar with, sound familiar","example":"Her voice sounded familiar, but I could not remember her name.","translation":"她的聲音聽起來很熟悉，但我想不起她的名字。"},{"id":"B1-2612-length","level":"B1","word":"length","pos":"n.","meaning":"長度；長；期間；一段","collocations":"length of time, full length, measure the length","example":"Measure the length of the desk before buying it.","translation":"購買前先測量書桌的長度。"},{"id":"B1-2613-effort","level":"B1","word":"effort","pos":"n.","meaning":"努力；成就","collocations":"make an effort, extra effort, team effort","example":"He made an effort to arrive on time every morning.","translation":"他努力每天早上準時到達。"},{"id":"B1-2614-update","level":"B1","word":"update","pos":"v.","meaning":"更新；使現代化","collocations":"update the app, need to update, update carefully","example":"Please do not update the app until you understand the details.","translation":"在瞭解細節之前，請不要「更新」應用程式。"},{"id":"B1-2615-folk","level":"B1","word":"folk","pos":"n.","meaning":"人們；家人；親屬；民族","collocations":"folk music, folk tale, local folk","example":"My grandmother enjoys listening to folk music.","translation":"我祖母喜歡聽民謠音樂。"},{"id":"B1-2616-photographer","level":"B1","word":"photographer","pos":"n.","meaning":"攝影師；攝影者","collocations":"wedding photographer, professional photographer, wildlife photographer","example":"The photographer took pictures of the children in the park.","translation":"攝影師在公園裡替孩子們拍照。"},{"id":"B1-2617-financial","level":"B1","word":"financial","pos":"adj.","meaning":"財政的；金融的","collocations":"financial help, financial problem, financial advice","example":"The family needed financial help after the father lost his job.","translation":"父親失業後，這家人需要財務上的幫助。"},{"id":"B1-2618-file","level":"B1","word":"file","pos":"n.","meaning":"檔案；公文箱；文件夾；文件","collocations":"save a file, open a file, file name","example":"Please save the file before you close the computer.","translation":"關電腦前請先儲存檔案。"},{"id":"B1-2619-effectively","level":"B1","word":"effectively","pos":"adv.","meaning":"有效地；有力地；實際上","collocations":"work effectively, communicate effectively, use effectively","example":"The new timetable helped students use their time more effectively.","translation":"新的時間表幫助學生更有效地利用時間。"},{"id":"B1-2620-supply","level":"B1","word":"supply","pos":"v.","meaning":"補給；供給；提供；補充","collocations":"supply fresh water, need to supply, supply carefully","example":"We learned how to supply fresh water in class.","translation":"我們在課堂上學會如何「補給」乾淨的水。"},{"id":"B1-2621-spoken","level":"B1","word":"spoken","pos":"adj.","meaning":"口頭講的；口語的","collocations":"spoken English, spoken language, spoken message","example":"Her spoken English improved after she joined a conversation group.","translation":"加入會話小組後，她的英語口說進步了。"},{"id":"B1-2622-central","level":"B1","word":"central","pos":"adj.","meaning":"中央的；重要的","collocations":"central station, central idea, central role","example":"The central station is only ten minutes from my home.","translation":"中央車站離我家只有十分鐘。"},{"id":"B1-2623-set","level":"B1","word":"set","pos":"v.","meaning":"設定；放置","collocations":"set the alarm, set a goal, set the table","example":"I set the alarm for seven because I had an early class.","translation":"我把鬧鐘設定在七點，因為我早上有課。"},{"id":"B1-2624-generation","level":"B1","word":"generation","pos":"n.","meaning":"一代；一世；產生","collocations":"younger generation, older generation, next generation","example":"The younger generation uses phones in a very different way.","translation":"年輕一代使用手機的方式很不一樣。"},{"id":"B1-2625-flag","level":"B1","word":"flag","pos":"n.","meaning":"標誌；旗標；旗子；信號旗","collocations":"national flag, raise a flag, flag of a country","example":"Students raised the flag during the morning ceremony.","translation":"學生們在早會時升旗。"},{"id":"B1-2626-container","level":"B1","word":"container","pos":"n.","meaning":"容器；集裝箱","collocations":"plastic container, food container, shipping container","example":"Put the soup in a container before you put it in the fridge.","translation":"把湯放進容器後再放入冰箱。"},{"id":"B1-2627-election","level":"B1","word":"election","pos":"n.","meaning":"選舉；當選；選擇權","collocations":"general election, 條件；限制","collocations":"academic qualification, professional qualification, gain a qualification","example":"This job requires a teaching qualification.","translation":"這份工作需要教師資格。"},{"id":"B1-2636-injure","level":"B1","word":"injure","pos":"v.","meaning":"傷害；損害；使受冤屈","collocations":"injure his knee, need to injure, injure carefully","example":"We learned how to injure his knee in class.","translation":"我們在課堂上學會如何「傷害」膝蓋。"},{"id":"B1-2637-arrival","level":"B1","word":"arrival","pos":"n.","meaning":"到達；抵達；到達者","collocations":"late arrival, arrival time, on arrival","example":"Our arrival at the hotel was delayed by heavy traffic.","translation":"因為交通壅塞，我們抵達飯店的時間延誤了。"},{"id":"B1-2638-breathe","level":"B1","word":"breathe","pos":"v.","meaning":"呼吸","collocations":"breathe deeply, breathe slowly, hard to breathe","example":"Take a moment to breathe deeply before you speak.","translation":"說話前花一點時間深呼吸。"},{"id":"B1-2639-ingredient","level":"B1","word":"ingredient","pos":"n.","meaning":"成分；因素","collocations":"fresh ingredient, main ingredient, secret ingredient","example":"Tomatoes are the main ingredient in this sauce.","translation":"番茄是這個醬汁的主要食材。"},{"id":"B1-2640-currently","level":"B1","word":"currently","pos":"adv.","meaning":"現在；當前；一般；普通","collocations":"currently working, currently available, currently living","example":"She is currently working in a small hotel.","translation":"她目前在一家小飯店工作。"},{"id":"B1-2641-generous","level":"B1","word":"generous","pos":"adj.","meaning":"慷慨的；有雅量的；大量的；豐富的","collocations":"generous gift, generous person, generous amount","example":"It was generous of him to pay for everyone's lunch.","translation":"他請大家吃午餐，真的很慷慨。"},{"id":"B1-2642-necessarily","level":"B1","word":"necessarily","pos":"adv.","meaning":"必然地；必須地；必要地","collocations":"not necessarily, necessarily true, necessarily mean","example":"The cheapest option is not necessarily the best.","translation":"最便宜的選項不一定是最好的。"},{"id":"B1-2643-invest","level":"B1","word":"invest","pos":"v.","meaning":"投資；花費；籠罩；授予","collocations":"invest money in training, need to invest, invest carefully","example":"Please invest money in training carefully.","translation":"請仔細「投資」錢投入訓練。"},{"id":"B1-2644-bomb","level":"B1","word":"bomb","pos":"n.","meaning":"炸彈","collocations":"bomb explodes, bomb attack, plant a bomb","example":"Police closed the street after finding a bomb nearby.","translation":"警方在附近發現炸彈後封鎖了街道。"},{"id":"B1-2645-hire","level":"B1","word":"hire","pos":"v.","meaning":"僱請；出租；受僱","collocations":"hire a new assistant, need to hire, hire carefully","example":"They need to hire a new assistant today.","translation":"他們今天需要「僱請」新助理。"},{"id":"B1-2646-protest","level":"B1","word":"protest","pos":"v.","meaning":"反對；抗議；斷言","collocations":"protest the new rule, need to protest, protest carefully","example":"Please protest the new rule carefully.","translation":"請仔細「反對」新規定。"},{"id":"B1-2647-remind","level":"B1","word":"remind","pos":"v.","meaning":"提醒；使想起","collocations":"remind me about the meeting, need to remind, remind carefully","example":"It is easier to remind me about the meeting when you have enough time.","translation":"時間充足時，比較容易「提醒」我開會的事。"},{"id":"B1-2648-stranger","level":"B1","word":"stranger","pos":"n.","meaning":"陌生人；門外漢","collocations":"a sense of stranger, learn about stranger, talk about stranger","example":"I first learned about stranger from a teacher at school.","translation":"我第一次從學校老師那裡學到「陌生人」。"},{"id":"B1-2649-limit","level":"B1","word":"limit","pos":"v.","meaning":"限制；限定","collocations":"limit screen time, need to limit, limit carefully","example":"It is easier to limit screen time when you have enough time.","translation":"時間充足時，比較容易「限制」使用螢幕的時間。"},{"id":"B1-2650-journal","level":"B1","word":"journal","pos":"n.","meaning":"日記；雜誌；日報","collocations":"travel journal, science journal, keep a journal","example":"She wrote about the trip in her journal every night.","translation":"她每晚在日記裡寫下旅行的事。"},{"id":"B1-2651-sharp","level":"B1","word":"sharp","pos":"adj.","meaning":"鋒利的；明顯的；敏銳的；急劇的","collocations":"sharp knife, sharp pain, sharp turn","example":"Be careful with that sharp knife.","translation":"小心那把鋒利的刀。"},{"id":"B1-2652-indeed","level":"B1","word":"indeed","pos":"adv.","meaning":"的確；實在；真正地；甚至","collocations":"indeed true, indeed possible, indeed a problem","example":"The test was difficult indeed, but most students passed.","translation":"這次考試確實很難，但大多數學生都通過了。"},{"id":"B1-2653-historic","level":"B1","word":"historic","pos":"adj.","meaning":"歷史上著名的；有歷史性的","collocations":"historic building, historic event, historic moment","example":"We visited a historic building in the old city.","translation":"我們參觀了老城裡的一棟歷史建築。"},{"id":"B1-2654-prepared","level":"B1","word":"prepared","pos":"adj.","meaning":"準備好的；特製的","collocations":"well prepared, prepared for, prepared food","example":"She was well prepared for the interview.","translation":"她為面試做了充分準備。"},{"id":"B1-2655-channel","level":"B1","word":"channel","pos":"n.","meaning":"海峽；航道；頻道","collocations":"a sense of channel, learn about channel, talk about channel","example":"We heard about channel during a conversation at lunch.","translation":"我們午餐聊天時聽到了「海峽」。"},{"id":"B1-2656-trend","level":"B1","word":"trend","pos":"n.","meaning":"趨勢；傾向；走向","collocations":"the importance of trend, understand trend, problems with trend","example":"A short story helped the class discuss trend.","translation":"一個短篇故事幫助全班討論「趨勢」。"},{"id":"B1-2657-receipt","level":"B1","word":"receipt","pos":"n.","meaning":"收據；收入；收到","collocations":"the importance of receipt, understand receipt, problems with receipt","example":"I noticed receipt in a news story last night.","translation":"昨晚我在一則新聞中注意到「收據」。"},{"id":"B1-2658-horror","level":"B1","word":"horror","pos":"n.","meaning":"驚駭；恐怖；慘狀","collocations":"changes in horror, a lack of horror, focus on horror","example":"One clear example made horror easier to understand.","translation":"一個清楚的例子讓「驚駭」更容易理解。"},{"id":"B1-2659-throughout","level":"B1","word" pos":"adv.","meaning":"完全地","collocations":"totally different, totally agree, totally wrong","example":"The second film was totally different from the first one.","translation":"第二部電影和第一部完全不同。"},{"id":"B1-2668-keyboard","level":"B1","word":"keyboard","pos":"n.","meaning":"鍵盤","collocations":"a sense of keyboard, learn about keyboard, talk about keyboard","example":"A short story helped the class discuss keyboard.","translation":"一個短篇故事幫助全班討論「鍵盤」。"},{"id":"B1-2669-confuse","level":"B1","word":"confuse","pos":"v.","meaning":"使混亂；使狼狽；使困惑","collocations":"confuse the children, need to confuse, confuse carefully","example":"Please do not confuse the children until you understand the details.","translation":"在瞭解細節之前，請不要「使混亂」孩子們。"},{"id":"B1-2670-attract","level":"B1","word":"attract","pos":"v.","meaning":"吸引；誘惑；有吸引力","collocations":"attract more visitors, need to attract, attract carefully","example":"Please do not attract more visitors until you understand the details.","translation":"在瞭解細節之前，請不要「吸引」更多訪客。"},{"id":"B1-2671-personally","level":"B1","word":"personally","pos":"adv.","meaning":"親自地；個別地；當面；就本人而言","collocations":"personally believe, personally prefer, personally speaking","example":"Personally, I prefer quiet restaurants.","translation":"就我個人而言，我比較喜歡安靜的餐廳。"},{"id":"B1-2672-unpleasant","level":"B1","word":"unpleasant","pos":"adj.","meaning":"使人不愉快的；使人厭惡的；煞風景的","collocations":"unpleasant smell, unpleasant experience, unpleasant surprise","example":"There was an unpleasant smell in the kitchen.","translation":"廚房裡有一股難聞的味道。"},{"id":"B1-2673-dirt","level":"B1","word":"dirt","pos":"n.","meaning":"汙垢；泥土","collocations":"a sense of dirt, learn about dirt, talk about dirt","example":"We saw how dirt can change people's plans.","translation":"我們看到「汙垢」如何改變人們的計畫。"},{"id":"B1-2674-specifically","level":"B1","word":"specifically","pos":"adv.","meaning":"特定地；明確地；按特性","collocations":"specifically ask, specifically designed, specifically for","example":"This room is specifically designed for young children.","translation":"這個房間是專為幼兒設計的。"},{"id":"B1-2675-diamond","level":"B1","word":"diamond","pos":"n.","meaning":"鑽石；菱形","collocations":"a sense of diamond, learn about diamond, talk about diamond","example":"She learned about diamond after making a mistake.","translation":"她犯錯之後，學到了關於「鑽石」的事。"},{"id":"B1-2676-poet","level":"B1","word":"poet","pos":"n.","meaning":"詩人","collocations":"changes in poet, a lack of poet, focus on poet","example":"I noticed poet in a news story last night.","translation":"昨晚我在一則新聞中注意到「詩人」。"},{"id":"B1-2677-collection","level":"B1","word":"collection","pos":"n.","meaning":"收集；採集；(一批)收藏品；募捐","collocations":"a sense of collection, learn about collection, talk about collection","example":"I first learned about collection from a teacher at school.","translation":"我第一次從學校老師那裡學到「收集」。"},{"id":"B1-2678-surface","level":"B1","word":"surface","pos":"n.","meaning":"面；表面；水面；外表","collocations":"flat surface, water surface, surface of the table","example":"Please clean the surface of the table after lunch.","translation":"午餐後請把桌面擦乾淨。"},{"id":"B1-2679-needle","level":"B1","word":"needle","pos":"n.","meaning":"針；尖","collocations":"a sense of needle, learn about needle, talk about needle","example":"The video explained needle in simple language.","translation":"這支影片用簡單的語言解釋「針」。"},{"id":"B1-2680-mainly","level":"B1","word":"mainly","pos":"adv.","meaning":"主要地；大抵","collocations":"mainly because, mainly used, mainly about","example":"The cafe is mainly busy after school.","translation":"這家咖啡店主要在放學後比較忙。"},{"id":"B1-2681-sink","level":"B1","word":"sink","pos":"v.","meaning":"下沉；水槽","collocations":"sink slowly, kitchen sink, sink into","example":"The toy boat began to sink after water got inside.","translation":"水進去後，玩具船開始下沉。"},{"id":"B1-2682-producer","level":"B1","word":"producer","pos":"n.","meaning":"生產者；製作者；製作人","collocations":"the importance of producer, understand producer, problems with producer","example":"Friends may disagree ab
