nslation":"他放學後常去看祖父母。"},{"id":"B1-2943-queue","level":"B1","word":"queue","pos":"n.","meaning":"辮子；一隊人；隊列","collocations":"long queue, join a queue, queue for tickets","example":"We waited in a long queue to buy concert tickets.","translation":"我們排了很長的隊買演唱會門票。"},{"id":"B1-2944-solid","level":"B1","word":"solid","pos":"adj.","meaning":"堅硬的；穩固的；固體的；實心的","collocations":"solid wood, solid wall, solid evidence","example":"The table is made of solid wood.","translation":"這張桌子是實木做的。"},{"id":"B1-2945-organizer","level":"B1","word":"organizer","pos":"n.","meaning":"組織者；編制者；創立者；組織導體","collocations":"event organizer, professional organizer, organizer of","example":"The organizer checked every name on the list.","translation":"主辦人核對了名單上的每個名字。"},{"id":"B1-2946-reality","level":"B1","word":"reality","pos":"n.","meaning":"實在；事實；實體；逼真","collocations":"in reality, face reality, escape reality","example":"In reality, the job was harder than it looked.","translation":"事實上，這份工作比看起來更難。"},{"id":"B1-2947-old-fashioned","level":"B1","word":"old-fashioned","pos":"adj.","meaning":"舊式的；過時的；保守的；大人模樣的","collocations":"old-fashioned clothes, old-fashioned idea, old-fashioned phone","example":"My grandfather still uses an old-fashioned radio.","translation":"我祖父仍然使用一臺老式收音機。"},{"id":"B1-2948-injured","level":"B1","word":"injured","pos":"adj.","meaning":"受傷的；受損害的；被觸怒的","collocations":"injured player, injured in, seriously injured","example":"The injured player left the field slowly.","translation":"受傷的球員慢慢離開球場。"},{"id":"B1-2949-poison","level":"B1","word":"poison","pos":"n.","meaning":"毒藥；毒；毒物；有毒害的事物","collocations":"the importance of poison, understand poison, problems with poison","example":"The video showed why poison matters in real life.","translation":"這支影片說明瞭為什麼「毒藥」在現實生活中很重要。"},{"id":"B1-2950-similarly","level":"B1","word":"similarly","pos":"adv.","meaning":"相像地；類似於","collocations":"similarly important, similarly priced, similarly sized","example":"My brother likes history; similarly, I enjoy old stories.","translation":"我弟弟喜歡歷史；同樣地，我也喜歡老故事。"},{"id":"B1-2951-fancy","level":"B1","word":"fancy","pos":"adj.","meaning":"想象的；精美的；新奇的；奇特的","collocations":"fancy restaurant, fancy dress, fancy hotel","example":"We went to a fancy restaurant for her birthday.","translation":"我們去一家高級餐廳慶祝她生日。"},{"id":"B1-2952-religious","level":"B1","word":"religious","pos":"adj.","meaning":"宗教性的；虔誠的；宗教上的；嚴謹的","collocations":"religious festival, religious belief, religious leader","example":"The town holds a religious festival every spring.","translation":"這座城鎮每年春天舉辦宗教節慶。"},{"id":"B1-2953-staff","level":"B1","word":"staff","pos":"n.","meaning":"全體人員；工作班子；棍棒；杆","collocations":"the importance of staff, understand staff, problems with staff","example":"The video showed why staff matters in real life.","translation":"這支影片說明瞭為什麼「全體人員」在現實生活中很重要。"},{"id":"B1-2954-rent","level":"B1","word":"rent","pos":"v.","meaning":"租用；租出；出租","collocations":"rent a small flat, need to rent, rent carefully","example":"Please rent a small flat carefully.","translation":"請仔細「租用」一間小公寓。"},{"id":"B1-2955-breath","level":"B1","word":"breath","pos":"n.","meaning":"呼吸；氣息；瞬間","collocations":"take a breath, deep breath, out of breath","example":"Take a deep breath before you answer.","translation":"回答前先深呼吸。"},{"id":"B1-2956-content","level":"B1","word":"content","pos":"n.","meaning":"內容；滿足；意義；要旨","collocations":"online content, video content, course content","example":"The course content was useful for beginners.","translation":"這門課的內容對初學者很有用。"},{"id":"B1-2957-impact","level":"B1","word":"impact","pos":"n.","meaning":"衝擊；衝突；影響；效果","collocations":"changes in impact, a lack of impact, focus on impact","example":"I noticed impact in a news story last night.","translation":"昨晚我在一則新聞中注意到「衝擊」。"},{"id":"B1-2958-substance","level":"B1","word":"substance","pos":"n.","meaning":"物質；實質；主旨；資產","collocations":"changes in substance, a lack of substance, focus on substance","example":"I noticed substance in a news story last night.","translation":"昨晚我在一則新聞中注意到「物質」。"},{"id":"B1-2959-scan","level":"B1","word":"scan","pos":"v.","meaning":"細看；瀏覽；掃描；詳細調查","collocations":"scan the document, need to scan, scan carefully","example":"We learned how to scan the document in class.","translation":"我們在課堂上學會如何「細看」文件。"},{"id":"B1-2960-attraction","level":"B1","word":"attraction","pos":"n.","meaning":"吸引；吸引人的事物；吸引力","collocations":"the importance of attraction, understand attraction, problems with attraction","example":"We heard about attraction during a conversation at lunch.","translation":"我們午餐聊天時聽到了「吸引」。"},{"id":"B1-2961-simply","level":"B1","word":"simply","pos":"adv.","meaning":"簡單地；只是；簡直；簡樸地","collocations":"simply because, simply amazing, simply put","example":"I stayed home simply because I was tired.","translation":"我待在家只是因為累了。"},{"id":"B1-2962-located","level":"B1","word":"located","pos":"adj.","meaning":"處於；位於；坐落的","collocations":"located near, conveniently located, centrally located","example":"The hotel is located near the train station.","translation":"這家飯店位於火車站附近。"},{"id":"B1-2963-require","level":"B1","word":"require","pos":"v.","meaning":"需要；命令；要求","collocations":"require more time, need to require, require carefully","example":"We learned how to require more time in class.","translation":"我們在課堂上學會如何「需要」更多時間。"},{"id":"B1-2964-hardly","level":"B1","word":"hardly","pos":"adv.","meaning":"剛剛；幾乎不；勉強是","collocations":"hardly ever, hardly know, hardly possible","example":"We hardly ever watch television during dinner.","translation":"我們吃晚餐時幾乎不看電視。"},{"id":"B1-2965-fuel","level":"B1","word":"fuel","pos":"n.","meaning":"燃料；木炭","collocations":"changes in fuel, a lack of fuel, focus on fuel","example":"Friends may disagree about fuel, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「燃料」有不同看法。"},{"id":"B1-2966-latest","level":"B1","word":"latest","pos":"adj.","meaning":"最近的","collocations":"latest news, latest model, latest version","example":"Have you seen the latest version of thi mple":"She felt confident after practising the speech many times.","translation":"多次練習演講後，她感到有信心。"},{"id":"B1-2991-outdoors","level":"B1","word":"outdoors","pos":"adv.","meaning":"在戶外；在野外","collocations":"play outdoors, work outdoors, outdoors in summer","example":"The children played outdoors until it got dark.","translation":"孩子們在戶外玩到天黑。"},{"id":"B1-2992-production","level":"B1","word":"production","pos":"n.","meaning":"製造；生產；產物","collocations":"a sense of production, learn about production, talk about production","example":"We saw how production can change people's plans.","translation":"我們看到「製造」如何改變人們的計畫。"},{"id":"B1-2993-ignore","level":"B1","word":"ignore","pos":"v.","meaning":"不理睬；忽視；駁回；忽略","collocations":"ignore the warning, need to ignore, ignore carefully","example":"He helped his friend ignore the warning.","translation":"他幫朋友「不理睬」警告。"},{"id":"B1-2994-muscle","level":"B1","word":"muscle","pos":"n.","meaning":"肌肉；臂力","collocations":"the importance of muscle, understand muscle, problems with muscle","example":"She wrote a note to remind herself why muscle mattered.","translation":"她寫了一張便條提醒自己為什麼「肌肉」很重要。"},{"id":"B1-2995-combine","level":"B1","word":"combine","pos":"v.","meaning":"(使)聯合；(使)結合","collocations":"combine work and study, need to combine, combine carefully","example":"We learned how to combine work and study in class.","translation":"我們在課堂上學會如何「聯合」工作和學習。"},{"id":"B1-2996-total","level":"B1","word":"total","pos":"adj.","meaning":"全體的；總的；全然的","collocations":"total cost, total amount, total number","example":"The total cost of the trip was lower than expected.","translation":"這趟旅行的總花費比預期低。"},{"id":"B1-2997-authority","level":"B1","word":"authority","pos":"n.","meaning":"權力；當權者；當局；權威","collocations":"changes in authority, a lack of authority, focus on authority","example":"She wrote a note to remind herself why authority mattered.","translation":"她寫了一張便條提醒自己為什麼「權力」很重要。"},{"id":"B1-2998-attitude","level":"B1","word":"attitude","pos":"n.","meaning":"態度；看法；姿勢","collocations":"the importance of attitude, understand attitude, problems with attitude","example":"Friends may disagree about attitude, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「態度」有不同看法。"},{"id":"B1-2999-equal","level":"B1","word":"equal","pos":"adj.","meaning":"相等的；平等的","collocations":"equal rights, equal size, equal chance","example":"All students should have an equal chance to join the activity.","translation":"所有學生都應有平等機會參加活動。"},{"id":"B1-3000-spread","level":"B1","word":"spread","pos":"v.","meaning":"展開；鋪開；傳播；推廣","collocations":"spread the news, need to spread, spread carefully","example":"It is easier to spread the news when you have enough time.","translation":"時間充足時，比較容易「展開」消息。"},{"id":"B1-3001-doubt","level":"B1","word":"doubt","pos":"v.","meaning":"懷疑；不信","collocations":"doubt his story, need to doubt, doubt carefully","example":"My brother forgot to doubt his story.","translation":"我弟弟忘了「懷疑」他的說法。"},{"id":"B1-3002-attach","level":"B1","word":"attach","pos":"v.","meaning":"附上；使依附；使附屬；使喜愛","collocations":"attach the file, need to attach, attach carefully","example":"We learned how to attach the file in class.","translation":"我們在課堂上學會如何「附上」檔案。"},{"id":"B1-3003-poetry","level":"B1","word":"poetry","pos":"n.","meaning":"詩；韻文；詩歌藝術","collocations":"write poetry, modern poetry, poetry book","example":"She started writing poetry when she was fifteen.","translation":"她十五歲時開始寫詩。"},{"id":"B1-3004-participate","level":"B1","word":"participate","pos":"v.","meaning":"參加；分享；參與；帶有","collocations":"participate in the discussion, need to participate, participate carefully","example":"My brother forgot to participate in the discussion.","translation":"我弟弟忘了「參加」討論。"},{"id":"B1-3005-historical","level":"B1","word":"historical","pos":"adj.","meaning":"歷史的；史實的；歷史上的","collocations":"historical novel, historical site, historical fact","example":"The museum is full of historical objects.","translation":"這座博物館裡有許多歷史文物。"},{"id":"B1-3006-theirs","level":"B1","word":"theirs","pos":"pron.","meaning":"他們的","collocations":"the importance of theirs, understand theirs, problems with theirs","example":"We saw how theirs can change people's plans.","translation":"我們看到「他們的」如何改變人們的計畫。"},{"id":"B1-3007-waste","level":"B1","word":"waste","pos":"v.","meaning":"浪費；消耗；使荒蕪；變消瘦","collocations":"waste too much food, need to waste, waste carefully","example":"He helped his friend waste too much food.","translation":"他幫朋友「浪費」太多食物。"},{"id":"B1-3008-bend","level":"B1","word":"bend","pos":"v.","meaning":"變彎曲；屈服；使彎曲；使屈服","collocations":"bend the wire, need to bend, bend carefully","example":"Please bend the wire carefully.","translation":"請仔細「變彎曲」鐵絲。"},{"id":"B1-3009-sculpture","level":"B1","word":"sculpture","pos":"n.","meaning":"雕刻；雕塑","collocations":"stone sculpture, modern sculpture, sculpture garden","example":"There is a large sculpture outside the museum.","translation":"博物館外有一座大型雕塑。"},{"id":"B1-3010-pleasant","level":"B1","word":"pleasant","pos":"adj.","meaning":"愉快的；可愛的；活潑的；親切的","collocations":"pleasant weather, pleasant surprise, pleasant smell","example":"We had a pleasant walk in the park.","translation":"我們在公園散了一次愉快的步。"},{"id":"B1-3011-pretend","level":"B1","word":"pretend","pos":"v.","meaning":"假裝；偽稱；自命；自稱","collocations":"pretend to be asleep, need to pretend, pretend carefully","example":"She decided to pretend to be asleep before leaving.","translation":"她離開前決定「假裝」自己睡著了。"},{"id":"B1-3012-analyse","level":"B1","word":"analyse","pos":"v.","meaning":"分析；細察；分解","collocations":"analyse the results, need to analyse, analyse carefully","example":"We learned how to analyse the results in class.","translation":"我們在課堂上學會如何「分析」結果。"},{"id":"B1-3013-spirit","level":"B1","word":"spirit","pos":"n.","meaning":"精神；心靈；靈魂；態度","collocations":"the importance of spirit, understand spirit, problems with spirit","example":"Parents often talk about spirit when planning for the future.","translation":"父母規劃未來時，常會談到「精神」。"},{"id":"B1-3014-breathing","level":"B1","word":"breathing","pos":"n.","meaning":"呼吸；瞬間；微風","collocations":"a sense of breathing, learn about breathing, talk about breathing","example":"The lesson connected breathing to things we see every day.","translation":"這堂課把「呼吸」和我們每天看見的事物連結起來。"},{"id":"B1-3015-economy","level":"B1","word":"economy","pos":"n.","meaning":"經濟；理財；節約","collocations":"local economy, strong economy, world economy","example":"Tourism is important to the local economy.","translation":"觀光對當地經濟很重要。"},{"id":"B1-3016-fasten","level":"B1","word":"fasten","pos":"v.","meaning":"拴緊；使固定；系；集中於","collocations":"fasten your seat belt, need to fasten, fasten carefully","example":"Please fasten your seat belt carefully.","translation":"請仔細「拴緊」安全帶。"},{"id":"B1-3017-imaginary","level":"B1","word":"imaginary","pos":"adj.","meaning":"想像的；虛構的；假想的","collocations":"imaginary friend, imaginary world, imaginary line","example":"The story takes place in an imaginary city.","translation":"這個故事發生在一座想像中的城市。"},{"id":"B1-3018-cruel","level":"B1","word":"cruel","pos":"adj.","meaning":"殘酷的；令人極痛苦的","collocations":"cruel joke, cruel treatment, cruel person","example":"It was cruel to laugh at his mistake.","translation":"嘲笑他的錯誤很殘忍。"},{"id":"B1-3019-sight","level":"B1","word":"sight","pos":"n.","meaning":"景觀；視力；眼界；閱讀","collocations":"lose sight, beautiful sight, at first sight","example":"The mountains were a beautiful sight in the morning.","translation":"早晨的群山是一幅美麗景象。"},{"id":"B1-3020-typically","level":"B1","word":"typically","pos":"adv.","meaning":"代表性地；作為特色地","collocations":"typically takes, typically includes, typically used","example":"The journey typically takes about forty minutes.","translation":"這趟路程通常需要大約四十分鐘。"},{"id":"B1-3021-slice","level":"B1","word":"slice","pos":"n.","meaning":"薄的切片；一部分；菜刀","collocations":"a sense of slice, learn about slice, talk about slice","example":"I noticed slice in a news story last night.","translation":"昨晚我在一則新聞中注意到「薄的切片」。"},{"id":"B1-3022-educate","level":"B1","word":"educate","pos":"v.","meaning":"教育；培養；訓練","collocations":"educate young children, need to educate, educate carefully","example":"Please do not educate young children until you understand the details.","translation":"在瞭解細節之前，請不要「教育」幼童。"},{"id":"B1-3023-cotton","level":"B1","word":"cotton","pos":"n.","meaning":"棉花","collocations":"a sense of cotton, learn about cotton, talk about cotton","example":"We heard about cotton during a conversation at lunch.","translation":"我們午餐聊天時聽到了「棉花」。"},{"id":"B1-3024-unfair","level":"B1","word":"unfair","pos":"adj.","meaning":"不公平的；不正直的；不正當的","collocations":"unfair rule, unfair treatment, unfair advantage","example":"The new rule seems unfair to younger students.","translation":"這項新規定對年幼學生似乎不公平。"},{"id":"B1-3025-documentary","level":"B1","word":"documentary","pos":"n.","meaning":"記錄片","collocations":"the importance of documentary, understand documentary, problems with documentary","example":"Parents often talk about documentary when planning for the future.","translation":"父母規劃未來時，常會談到「記錄片」。"},{"id":"B1-3026-destination","level":"B1","word":"destination","pos":"n.","meaning":"目的地；目標；目的","collocations":"tourist destination, final destination, popular destination","example":"Tokyo was our final destination on the trip.","translation":"東京是我們這趟旅行的最終目的地。"},{"id":"B1-3027-coal","level":"B1","word":"coal","pos":"n.","meaning":"煤；木炭","collocations":"burn coal, coal mine, coal power","example":"The old factory used coal to produce heat.","translation":"那座老工廠以前用煤產生熱能。"},{"id":"B1-3028-location","level":"B1","word":"location","pos":"n.","meaning":"位置；場所；特定區域","collocations":"good location, exact location, location on a map","example":"The hotel is in a convenient location near the station.","translation":"這家飯店位於車站附近，地點很方便。"},{"id":"B1-3029-revise","level":"B1","word":"revise","pos":"v.","meaning":"校訂；修正；校正","collocations":"revise the lesson, need to revise, revise carefully","example":"My brother forgot to revise the lesson.","translation":"我弟弟忘了「校訂」課程內容。"},{"id":"B1-3030-upon","level":"B1","word":"upon","pos":"prep.","meaning":"在...之上；迫近；緊接著","collocations":"upon the process, upon the city, upon several areas","example":"We kept walking upon the river until we reached the old bridge.","translation":"我們沿著河「在...之上」一直走，直到抵達那座老橋。"},{"id":"B1-3031-explore","level":"B1","word":"explore","pos":"v.","meaning":"探險；探測；探究","collocations":"explore the old town, need to explore, explore carefully","example":"It is easier to explore the old town when you have enough time.","translation":"時間充足時，比較容易「探險」老城區。"},{"id":"B1-3032-risk","level":"B1","word":"risk","pos":"n.","meaning":"冒險；危險；保險額","collocations":"a sense of risk, learn about risk, talk about risk","example":"A friend helped me understand risk with a simple example.","translation":"一位朋友用簡單例子幫我理解「冒險」。"},{"id":"B1-3033-properly","level":"B1","word":"properly","pos":"adv.","meaning":"適當地；相當地","collocations":"do properly, work properly, properly dressed","example":"The door will not close properly.","translation":"這扇門關不太好。"},{"id":"B1-3034-suffer","level":"B1","word":"suffer","pos":"v.","meaning":"受苦；遭受","collocations":"suffer from, suffer pain, suffer a loss","example":"Many children suffer from allergies in spring.","translation":"許多孩子春天會受過敏所苦。"},{"id":"B1-3035-whenever","level":"B1","word":"whenever","pos":"conj.","meaning":"每當","collocations":"whenever the result, whenever it seems, whenever necessary","example":"I wanted to leave early, whenever my friend still needed help.","translation":"我想早點離開，每當我的朋友仍然需要幫忙。"},{"id":"B1-3036-emergency","level":"B1","word":"emergency","pos":"n.","meaning":"緊急狀況；緊急事件；緊急需要","collocations":"changes in emergency, a lack of emergency, focus on emergency","example":"A short story helped the class discuss emergency.","translation":"一個短篇故事幫助全班討論「緊急狀況」。"},{"id":"B1-3037-reaction","level":"B1","word":"reaction","pos":"n.","meaning":"反應；反作用；反動","collocations":"the importance of reaction, understand reaction, problems with reaction","example":"We saw how reaction can change people's plans.","translation":"我們看到「反應」如何改變人們的計畫。"},{"id":"B1-3038-used","level":"B1","word":"used","pos":"adj.","meaning":"使用過的；二手的；習慣的","collocations":"used car, used to, rarely used","example":"They bought a used car to save money.","translation":"他們為了省錢買了一輛中古車。"},{"id":"B1-3039-technical","level":"B1","word":"technical","pos":"adj.","meaning":"技術上的；專門的；工業的；嚴格根據法律的","collocations":"technical problem, technical support, technical skill","example":"We called support because of a technical problem.","translation":"因為技術問題，我們打電話給客服。"},{"id":"B1-3040-marriage","level":"B1","word":"marriage","pos":"n.","meaning":"婚姻；結婚；婚禮；合併","collocations":"a sense of marriage, learn about marriage, talk about marriage","example":"The video showed why marriage matters in real life.","translation":"這支影片說明瞭為什麼「婚姻」在現實生活中很重要。"},{"id":"B1-3041-determine","level":"B1","word":"determine","pos":"v.","meaning":"決定；決心","collocations":"determine the cause, need to determine, determine carefully","example":"We learned how to determine the cause in class.","translation":"我們在課堂上學會如何「決定」原因。"},{"id":"B1-3042-luxury","level":"B1","word":"luxury","pos":"n.","meaning":"奢侈；豪華","collocations":"luxury hotel, luxury goods, live in luxury","example":"A hot shower felt like a luxury after the long hike.","translation":"長途健行後，洗個熱水澡感覺像奢侈享受。"},{"id":"B1-3043-account","level":"B1","word":"account","pos":"n.","meaning":"帳戶；描述；說明","collocations":"bank account, email account, give an account","example":"I opened a bank account after I got my first job.","translation":"我找到第一份工作後開了一個銀行帳戶。"},{"id":"B1-3044-academic","level":"B1","word":"academic","pos":"adj.","meaning":"學院的；學術的；不切實際的","collocations":"academic year, academic subject, academic success","example":"The academic year starts in September.","translation":"學年在九月開始。"},{"id":"B1-3045-occur","level":"B1","word":"occur","pos":"v.","meaning":"發生；出現","collocations":"occur suddenly, occur often, occur to someone","example":"Small accidents can occur when people hurry.","translation":"人們匆忙時，小意外可能會發生。"},{"id":"B1-3046-belief","level":"B1","word":"belief","pos":"n.","meaning":"信念；相信；信仰","collocations":"strong belief, personal belief, belief in","example":"Her belief in hard work helped her through difficult times.","translation":"她對努力的信念幫助她度過困難時期。"},{"id":"B1-3047-therefore","level":"B1","word":"therefore","pos":"adv.","meaning":"因此；所以","collocations":"therefore need, therefore decided, therefore important","example":"The road was closed; therefore, we took the train.","translation":"道路封閉了，因此我們搭火車。"},{"id":"B1-3048-bother","level":"B1","word":"bother","pos":"v.","meaning":"煩擾；迷惑；煩惱；操心","collocations":"bother the neighbours, need to bother, bother carefully","example":"He helped his friend bother the neighbours.","translation":"他幫朋友「煩擾」鄰居。"},{"id":"B1-3049-union","level":"B1","word":"union","pos":"n.","meaning":"聯盟；聯合；結合；工會","collocations":"the importance of union, understand union, problems with union","example":"We heard about union during a conversation at lunch.","translation":"我們午餐聊天時聽到了「聯盟」。"},{"id":"B1-3050-wool","level":"B1","word":"wool","pos":"n.","meaning":"羊毛；毛織物；毛線；絨線","collocations":"wool coat, wool sweater, sheep wool","example":"This sweater is made of wool.","translation":"這件毛衣是羊毛做的。"},{"id":"B1-3051-announcement","level":"B1","word":"announcement","pos":"n.","meaning":"公告；發表；告知","collocations":"make an announcement, official announcement, announcement about","example":"The principal made an announcement after lunch.","translation":"校長在午餐後發布了一項公告。"},{"id":"B1-3052-photography","level":"B1","word":"photography","pos":"n.","meaning":"攝影；攝影術","collocations":"changes in photography, a lack of photography, focus on photography","example":"We saw how photography can change people's plans.","translation":"我們看到「攝影」如何改變人們的計畫。"},{"id":"B1-3053-release","level":"B1","word":"release","pos":"v.","meaning":"釋放；解除；放鬆；豁免","collocations":"release a new song, need to release, release carefully","example":"Please release a new song carefully.","translation":"請仔細「釋放」新歌。"},{"id":"B1-3054-pipe","level":"B1","word":"pipe","pos":"n.","meaning":"管；導管；輸送管；管狀器官","collocations":"the importance of pipe, understand pipe, problems with pipe","example":"I first learned about pipe from a teacher at school.","translation":"我第一次從學校老師那裡學到「管」。"},{"id":"B1-3055-pleasure","level":"B1","word":"pleasure","pos":"n.","meaning":"快樂；愉快；令人高興的事；娛樂","collocations":"the importance of pleasure, understand pleasure, problems with pleasure","example":"Parents often talk about pleasure when planning for the future.","translation":"父母規劃未來時，常會談到「快樂」。"},{"id":"B1-3056-careless","level":"B1","word":"careless","pos":"adj.","meaning":"粗心的；不關心的；無憂無慮的","collocations":"careless mistake, careless driver, careless with","example":"A careless mistake cost him ten points.","translation":"一個粗心錯誤讓他少了十分。"},{"id":"B1-3057-silly","level":"B1","word":"silly","pos":"adj.","meaning":"愚蠢的；糊塗的","collocations":"silly mistake, silly joke, feel silly","example":"It was a silly mistake, but everyone laughed.","translation":"那是個傻傻的錯誤，但大家都笑了。"},{"id":"B1-3058-security","level":"B1","word":"security","pos":"n.","meaning":"安全；安全性；防護物；保安","collocations":"a sense of security, learn about security, talk about security","example":"One clear example made security easier to understand.","translation":"一個清楚的例子讓「安全」更容易理解。"},{"id":"B1-3059-rugby","level":"B1","word":"rugby","pos":"n.","meaning":"橄欖球；橄欖球賽","collocations":"the importance of rugby, understand rugby, problems with rugby","example":"We heard about rugby during a conversation at lunch.","translation":"我們午餐聊天時聽到了「橄欖球」。"},{"id":"B1-3060-commercial","level":"B1","word":"commercial","pos":"adj.","meaning":"商業的；商用的；商品化的","collocations":"commercial break, commercial area, commercial success","example":"The programme stopped for a commercial break.","translation":"節目暫停進入廣告時間。"},{"id":"B1-3061-friendship","level":"B1","word":"friendship","pos":"n.","meaning":"友誼；友愛；友善","collocations":"a sense of friendship, learn about friendship, talk about friendship","example":"I first learned about friendship from a teacher at school.","translation":"我第一次從學校老師那裡學到「友誼」。"},{"id":"B1-3062-afford","level":"B1","word":"afford","pos":"v.","meaning":"買得起；足以；給予","collocations":"afford a new car, need to afford, afford carefully","example":"She decided to afford a new car before leaving.","translation":"她離開前決定「買得起」新車。"},{"id":"B1-3063-engaged","level":"B1","word":"engaged","pos":"adj.","meaning":"忙碌的；使用中的","collocations":"engaged couple, engaged in, get engaged","example":"They got engaged during their holiday in Italy.","translation":"他們在義大利度假時訂婚了。"},{"id":"B1-3064-lonely","level":"B1","word":"lonely","pos":"adj.","meaning":"孤單的；孤寂的；荒涼的","collocations":"feel lonely, lonely place, lonely child","example":"She felt lonely after moving to a new city.","translation":"搬到新城市後，她感到孤單。"},{"id":"B1-3065-relaxing","level":"B1","word":"relaxing","pos":"adj.","meaning":"令人輕鬆的","collocations":"relaxing music, relaxing holiday, relaxing bath","example":"Soft music makes the room feel more relaxing.","translation":"輕柔的音樂讓房間感覺更放鬆。"},{"id":"B1-3066-powerful","level":"B1","word":"powerful","pos":"adj.","meaning":"有力的；有權力的；強大的","collocations":"powerful engine, powerful message, powerful leader","example":"The speech had a powerful message about hope.","translation":"那場演講傳達了關於希望的有力訊息。"},{"id":"B1-3067-laboratory","level":"B1","word":"laboratory","pos":"n.","meaning":"實驗室；研究室；化工廠","collocations":"science laboratory, school laboratory, laboratory test","example":"Students must wear glasses in the laboratory.","translation":"學生在實驗室裡必須戴護目鏡。"},{"id":"B1-3068-mild","level":"B1","word":"mild","pos":"adj.","meaning":"溫和的；溫柔的；淡味的；適度的","collocations":"mild weather, mild flavour, mild pain","example":"The curry has a mild flavour.","translation":"這道咖哩味道溫和。"},{"id":"B1-3069-difficulty","level":"B1","word":"difficulty","pos":"n.","meaning":"困難；難點","collocations":"have difficulty, face difficulty, learning difficulty","example":"He had difficulty understanding the map at first.","translation":"一開始他看不懂那張地圖。"},{"id":"B1-3070-racing","level":"B1","word":"racing","pos":"n.","meaning":"賽馬；賽車","collocations":"the importance of racing, understand racing, problems with racing","example":"I first learned about racing from a teacher at school.","translation":"我第一次從學校老師那裡學到「賽馬」。"},{"id":"B1-3071-worth","level":"B1","word":"worth","pos":"adj.","meaning":"值...的；值得的","collocations":"worth visiting, worth the money, worth doing","example":"The museum is worth visiting if you like history.","translation":"如果你喜歡歷史，這座博物館值得參觀。"},{"id":"B1-3072-eventually","level":"B1","word":"eventually","pos":"adv.","meaning":"最後；終於","collocations":"eventually became, eventually found, eventually agreed","example":"After many tries, she eventually found her lost ring.","translation":"試了很多次後，她終於找到遺失的戒指。"},{"id":"B1-3073-editor","level":"B1","word":"editor","pos":"n.","meaning":"編者；編輯；主筆；編輯器","collocations":"newspaper editor, magazine editor, video editor","example":"The editor corrected the article before it was published.","translation":"編輯在文章發表前修正了它。"},{"id":"B1-3074-cheat","level":"B1","word":"cheat","pos":"v.","meaning":"欺騙；逃脫；騙取","collocations":"cheat on the test, need to cheat, cheat carefully","example":"We learned how to cheat on the test in class.","translation":"我們在課堂上學會如何「欺騙」考試作弊。"},{"id":"B1-3075-talent","level":"B1","word":"talent","pos":"n.","meaning":"天才；才能；有才幹的人；天資","collocations":"a sense of talent, learn about talent, talk about talent","example":"Friends may disagree about talent, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「天才」有不同看法。"},{"id":"B1-3076-respect","level":"B1","word":"respect","pos":"v.","meaning":"尊敬；注意；遵守","collocations":"respect other people's opinions, need to respect, respect carefully","example":"My brother forgot to respect other people's opinions.","translation":"我弟弟忘了「尊敬」別人的意見。"},{"id":"B1-3077-basis","level":"B1","word":"basis","pos":"n.","meaning":"基礎；主要成分","collocations":"changes in basis, a lack of basis, focus on basis","example":"The lesson connected basis to things we see every day.","translation":"這堂課把「基礎」和我們每天看見的事物連結起來。"},{"id":"B1-3078-improvement","level":"B1","word":"improvement","pos":"n.","meaning":"進步；改善；利用","collocations":"a sense of improvement, learn about improvement, talk about improvement","example":"My friend gave a clear example of improvement.","translation":"我的朋友舉了一個清楚的「進步」例子。"},{"id":"B1-3079-base","level":"B1","word":"base","pos":"v.","meaning":"以...作基礎","collocations":"base the story on real events, need to base, base carefully","example":"Please do not base the story on real events until you understand the details.","translation":"在瞭解細節之前，請不要「以...作基礎」真實事件改編故事。"},{"id":"B1-3080-clause","level":"B1","word":"clause","pos":"n.","meaning":"子句；條款","collocations":"grammar clause, contract clause, relative clause","example":"The teacher explained the clause with three simple sentences.","translation":"老師用三個簡單句子解釋這個子句。"},{"id":"B1-3081-stick","level":"B1","word":"stick","pos":"v.","meaning":"黏貼；卡住；棍子","collocations":"stick a note, stick to a plan, wooden stick","example":"She stuck a note on the fridge to remind her family.","translation":"她在冰箱上貼了一張便條提醒家人。"},{"id":"B1-3082-switch","level":"B1","word":"switch","pos":"v.","meaning":"轉變；切換；擺動；轉換","collocations":"switch the lights off, need to switch, switch carefully","example":"She decided to switch the lights off before leaving.","translation":"她離開前決定「轉變」關燈。"},{"id":"B1-3083-conclude","level":"B1","word":"conclude","pos":"v.","meaning":"結束；作結論；推斷","collocations":"conclude the lesson, need to conclude, conclude carefully","example":"We learned how to conclude the lesson in class.","translation":"我們在課堂上學會如何「結束」課程。"},{"id":"B1-3084-till","level":"B1","word":"till","pos":"prep.","meaning":"直到；在...以前；迄","collocations":"till the process, till the city, till several areas","example":"We kept walking till the river until we reached the old bridge.","translation":"我們沿著河「直到」一直走，直到抵達那座老橋。"},{"id":"B1-3085-educated","level":"B1","word":"educated","pos":"adj.","meaning":"受過教育的；有教養的","collocations":"well educated, educated person, educated guess","example":"Her parents are well educated and love reading.","translation":"她的父母受過良好教育，也熱愛閱讀。"},{"id":"B1-3086-property","level":"B1","word":"property","pos":"n.","meaning":"財產；所有權；性質；屬性","collocations":"private property, property price, property owner","example":"The sign says this field is private property.","translation":"告示牌寫著這片田是私人財產。"},{"id":"B1-3087-shoot","level":"B1","word":"shoot","pos":"v.","meaning":"拍攝；射擊","collocations":"shoot a video, shoot a scene, shoot at a target","example":"We used a phone to shoot a short video for class.","translation":"我們用手機為課堂拍了一支短片。"},{"id":"B1-3088-immediate","level":"B1","word":"immediate","pos":"adj.","meaning":"立即的；直接的；接近的","collocations":"immediate help, immediate answer, immediate effect","example":"The medicine had an immediate effect on the pain.","translation":"這藥對疼痛有立即效果。"},{"id":"B1-3089-fascinating","level":"B1","word":"fascinating","pos":"adj.","meaning":"迷人的；吸引人的；使人神魂顛倒的","collocations":"fascinating story, fascinating place, fascinating idea","example":"The documentary about the ocean was fascinating.","translation":"那部關於海洋的紀錄片很迷人。"},{"id":"B1-3090-clue","level":"B1","word":"clue","pos":"n.","meaning":"線索；暗示","collocations":"changes in clue, a lack of clue, focus on clue","example":"Parents often talk about clue when planning for the future.","translation":"父母規劃未來時，常會談到「線索」。"},{"id":"B1-3091-beauty","level":"B1","word":"beauty","pos":"n.","meaning":"美；美人","collocations":"changes in beauty, a lack of beauty, focus on beauty","example":"I first learned about beauty from a teacher at school.","translation":"我第一次從學校老師那裡學到「美」。"},{"id":"B1-3092-underwear","level":"B1","word":"underwear","pos":"n.","meaning":"內衣","collocations":"the importance of underwear, understand underwear, problems with underwear","example":"The video explained underwear in simple language.","translation":"這支影片用簡單的語言解釋「內衣」。"},{"id":"B1-3093-plenty","level":"B1","word":"plenty","pos":"n.","meaning":"充分；很多；豐富","collocations":"changes in plenty, a lack of plenty, focus on plenty","example":"One clear example made plenty easier to understand.","translation":"一個清楚的例子讓「充分」更容易理解。"},{"id":"B1-3094-apologize","level":"B1","word":"apologize","pos":"v.","meaning":"道歉；辯解","collocations":"apologize for being late, need to apologize, apologize carefully","example":"She decided to apologize for being late before leaving.","translation":"她離開前決定「道歉」遲到。"},{"id":"B1-3095-court","level":"B1","word":"court","pos":"n.","meaning":"法院；庭院；奉承","collocations":"changes in court, a lack of court, focus on court","example":"Parents often talk about court when planning for the future.","translation":"父母規劃未來時，常會談到「法院」。"},{"id":"B1-3096-complex","level":"B1","word":"complex","pos":"adj.","meaning":"複雜的；組合的","collocations":"complex problem, complex system, complex idea","example":"The problem is complex, so we need more time.","translation":"這個問題很複雜，所以我們需要更多時間。"},{"id":"B1-3097-environmental","level":"B1","word":"environmental","pos":"adj.","meaning":"周圍的；環境的","collocations":"environmental problem, environmental protection, environmental group","example":"The class discussed environmental problems in big cities.","translation":"全班討論了大城市的環境問題。"},{"id":"B1-3098-politician","level":"B1","word":"politician","pos":"n.","meaning":"政客；政治家；從事黨派政治的人","collocations":"a sense of politician, learn about politician, talk about politician","example":"I first learned about politician from a teacher at school.","translation":"我第一次從學校老師那裡學到「政客」。"},{"id":"B1-3099-prince","level":"B1","word":"prince","pos":"n.","meaning":"王子；親王；國君；貴族","collocations":"changes in prince, a lack of prince, focus on prince","example":"We heard about prince during a conversation at lunch.","translation":"我們午餐聊天時聽到了「王子」。"},{"id":"B1-3100-painful","level":"B1","word":"painful","pos":"adj.","meaning":"痛苦的；困難的；令人煩惱的","collocations":"painful injury, painful memory, painful experience","example":"The cut was small but painful.","translation":"傷口很小，但很痛。"},{"id":"B1-3101-headline","level":"B1","word":"headline","pos":"n.","meaning":"大標題；新聞摘要","collocations":"the importance of headline, understand headline, problems with headline","example":"I first learned about headline from a teacher at school.","translation":"我第一次從學校老師那裡學到「大標題」。"},{"id":"B1-3102-apart","level":"B1","word":"apart","pos":"adv.","meaning":"成零碎；成距離；分別地；分離著","collocations":"fall apart, live apart, apart from","example":"The old shoes fell apart after the long walk.","translation":"走了很長一段路後，那雙舊鞋壞掉了。"},{"id":"B1-3103-atmosphere","level":"B1","word":"atmosphere","pos":"n.","meaning":"大氣；空氣；氣氛","collocations":"a sense of atmosphere, learn about atmosphere, talk about atmosphere","example":"The lesson connected atmosphere to things we see every day.","translation":"這堂課把「大氣」和我們每天看見的事物連結起來。"},{"id":"B1-3104-entry","level":"B1","word":"entry","pos":"n.","meaning":"登錄；條目；進入；入口","collocations":"the importance of entry, understand entry, problems with entry","example":"I first learned about entry from a teacher at school.","translation":"我第一次從學校老師那裡學到「登錄」。"},{"id":"B1-3105-obviously","level":"B1","word":"obviously","pos":"adv.","meaning":"顯而易見地；明顯地","collocations":"obviously wrong, obviously tired, obviously important","example":"He was obviously tired after working all day.","translation":"工作一整天後，他顯然很累。"},{"id":"B1-3106-indirect","level":"B1","word":"indirect","pos":"adj.","meaning":"間接的；非直截了當的；不坦率的","collocations":"indirect way, indirect question, indirect route","example":"We took an indirect route to avoid the traffic.","translation":"我們走了一條繞路，以避開車潮。"},{"id":"B1-3107-trick","level":"B1","word":"trick","pos":"v.","meaning":"愚弄；欺騙；裝飾；哄騙","collocations":"trick his friend, need to trick, trick carefully","example":"We learned how to trick his friend in class.","translation":"我們在課堂上學會如何「愚弄」他的朋友。"},{"id":"B1-3108-payment","level":"B1","word":"payment","pos":"n.","meaning":"付款；支付的款項(或實物)；償還；報應","collocations":"the importance of payment, understand payment, problems with payment","example":"My friend gave a clear example of payment.","translation":"我的朋友舉了一個清楚的「付款」例子。"},{"id":"B1-3109-summarize","level":"B1","word":"summarize","pos":"v.","meaning":"概述；總結","collocations":"summarize the article, need to summarize, summarize carefully","example":"We learned how to summarize the article in class.","translation":"我們在課堂上學會如何「概述」文章。"},{"id":"B1-3110-aged","level":"B1","word":"aged","pos":"adj.","meaning":"老的；陳的；有...歲的","collocations":"aged ten, middle-aged, aged parent","example":"The class is for children aged eight to ten.","translation":"這門課是給八到十歲的孩子上的。"},{"id":"B1-3111-printing","level":"B1","word":"printing","pos":"n.","meaning":"印刷；印刷術；印花","collocations":"changes in printing, a lack of printing, focus on printing","example":"We saw how printing can change people's plans.","translation":"我們看到「印刷」如何改變人們的計畫。"},{"id":"B1-3112-alcohol","level":"B1","word":"alcohol","pos":"n.","meaning":"酒精；酒","collocations":"a sense of alcohol, learn about alcohol, talk about alcohol","example":"I first learned about alcohol from a teacher at school.","translation":"我第一次從學校老師那裡學到「酒精」。"},{"id":"B1-3113-ours","level":"B1","word":"ours","pos":"pron.","meaning":"我們的","collocations":"the importance of ours, understand ours, problems with ours","example":"We saw how ours can change people's plans.","translation":"我們看到「我們的」如何改變人們的計畫。"},{"id":"B1-3114-kiss","level":"B1","word":"kiss","pos":"v.","meaning":"吻；接吻","collocations":"kiss the baby, need to kiss, kiss carefully","example":"She decided to kiss the baby before leaving.","translation":"她離開前決定「吻」寶寶。"},{"id":"B1-3115-countryside","level":"B1","word":"countryside","pos":"n.","meaning":"鄉下地方；鄉下居民","collocations":"beautiful countryside, live in the countryside, countryside view","example":"We spent the weekend walking in the countryside.","translation":"我們週末在鄉間散步。"},{"id":"B1-3116-originally","level":"B1","word":"originally","pos":"adv.","meaning":"本來；原來；最初；就起源而論","collocations":"originally planned, originally from, originally built","example":"The house was originally built for a large family.","translation":"這棟房子原本是為一個大家庭建造的。"},{"id":"B1-3117-intention","level":"B1","word":"intention","pos":"n.","meaning":"意圖；目的；含義","collocations":"a sense of intention, learn about intention, talk about intention","example":"He used a drawing to show the meaning of intention.","translation":"他用一張圖來說明「意圖」的意思。"},{"id":"B1-3118-treatment","level":"B1","word":"treatment","pos":"n.","meaning":"治療；待遇；處理","collocations":"changes in treatment, a lack of treatment, focus on treatment","example":"I first learned about treatment from a teacher at school.","translation":"我第一次從學校老師那裡學到「治療」。"},{"id":"B1-3119-mad","level":"B1","word":"mad","pos":"adj.","meaning":"瘋狂的；發瘋的；生氣的；愚蠢的","collocations":"go mad, mad at, mad idea","example":"She was mad at me for losing her book.","translation":"她因為我弄丟她的書而生我的氣。"},{"id":"B1-3120-talented","level":"B1","word":"talented","pos":"adj.","meaning":"天資高的；有才能的","collocations":"talented musician, talented student, very talented","example":"She is a talented singer with a clear voice.","translation":"她是一位有天分的歌手，聲音很清亮。"},{"id":"B1-3121-proud","level":"B1","word":"proud","pos":"adj.","meaning":"驕傲的；自大的；自豪的；輝煌的","collocations":"proud of, proud moment, proud parent","example":"His parents were proud of his hard work.","translation":"他的父母為他的努力感到驕傲。"},{"id":"B1-3122-perfectly","level":"B1","word":"perfectly","pos":"adv.","meaning":"完全地；無瑕疵地；完整地","collocations":"perfectly clear, perfectly normal, perfectly safe","example":"It is perfectly normal to feel nervous before a test.","translation":"考試前感到緊張是完全正常的。"},{"id":"B1-3123-outdoor","level":"B1","word":"outdoor","pos":"adj.","meaning":"戶外的；屋外的；露天的","collocations":"outdoor activity, outdoor pool, outdoor market","example":"The school cancelled the outdoor activity because of rain.","translation":"學校因下雨取消了戶外活動。"},{"id":"B1-3124-shiny","level":"B1","word":"shiny","pos":"adj.","meaning":"有光澤的；發光的；輝煌的；磨光的","collocations":"shiny shoes, shiny surface, shiny hair","example":"He wore shiny black shoes to the ceremony.","translation":"他穿著亮亮的黑鞋參加典禮。"},{"id":"B1-3125-organized","level":"B1","word":"organized","pos":"adj.","meaning":"有組織的；組織起來的","collocations":"well organized, organized person, organized event","example":"Her notes are clear and well organized.","translation":"她的筆記清楚且井然有序。"},{"id":"B1-3126-due","level":"B1","word":"due","pos":"adj.","meaning":"到期的；應得的；應付的；約定的","collocations":"due date, due to, payment due","example":"The homework is due on Friday.","translation":"作業星期五到期。"},{"id":"B1-3127-survive","level":"B1","word":"survive","pos":"v.","meaning":"比...活得長；生存；生還；倖免於","collocations":"survive the accident, need to survive, survive carefully","example":"He helped his friend survive the accident.","translation":"他幫朋友「比...活得長」事故。"},{"id":"B1-3128-global","level":"B1","word":"global","pos":"adj.","meaning":"通用的；全球的；球形的；綜合的","collocations":"global problem, global market, global warming","example":"Climate change is a global problem.","translation":"氣候變遷是全球性問題。"},{"id":"B1-3129-port","level":"B1","word":"port","pos":"n.","meaning":"港口；埠；艙門；避風港","collocations":"a sense of port, learn about port, talk about port","example":"A short story helped the class discuss port.","translation":"一個短篇故事幫助全班討論「港口」。"},{"id":"B1-3130-poisonous","level":"B1","word":"poisonous","pos":"adj.","meaning":"有毒的；惡毒的；討厭的","collocations":"poisonous plant, poisonous snake, poisonous gas","example":"Do not touch that mushroom; it may be poisonous.","translation":"不要碰那朵蘑菇，它可能有毒。"},{"id":"B1-3131-passion","level":"B1","word":"passion","pos":"n.","meaning":"激情；酷愛；熱愛；強烈感情","collocations":"a sense of passion, learn about passion, talk about passion","example":"We saw how passion can change people's plans.","translation":"我們看到「激情」如何改變人們的計畫。"},{"id":"B1-3132-advanced","level":"B1","word":"advanced","pos":"adj.","meaning":"在前的；高級的；先進的；年老的","collocations":"advanced course, advanced level, advanced technology","example":"This is an advanced course for experienced students.","translation":"這是給有經驗學生上的進階課程。"},{"id":"B1-3133-quote","level":"B1","word":"quote","pos":"v.","meaning":"引述；舉證；報(價)；引用","collocations":"quote a famous writer, need to quote, quote carefully","example":"My brother forgot to quote a famous writer.","translation":"我弟弟忘了「引述」一位知名作家。"},{"id":"B1-3134-chain","level":"B1","word":"chain","pos":"n.","meaning":"鏈；枷鎖；束縛","collocations":"key chain, chain of shops, bicycle chain","example":"The bicycle chain broke on the way to school.","translation":"上學途中腳踏車鏈條斷了。"},{"id":"B1-3135-gather","level":"B1","word":"gather","pos":"v.","meaning":"聚集；集合；漸增；使聚集","collocations":"gather information, need to gather, gather carefully","example":"Please do not gather information until you understand the details.","translation":"在瞭解細節之前，請不要「聚集」資訊。"},{"id":"B1-3136-frame","level":"B1","word":"frame","pos":"n.","meaning":"框；結構；體格","collocations":"the importance of frame, understand frame, problems with frame","example":"We saw how frame can change people's plans.","translation":"我們看到「框」如何改變人們的計畫。"},{"id":"B1-3137-setting","level":"B1","word":"setting","pos":"n.","meaning":"環境；背景；佈景；鑲嵌","collocations":"the importance of setting, understand setting, problems with setting","example":"My friend gave a clear example of setting.","translation":"我的朋友舉了一個清楚的「環境」例子。"},{"id":"B1-3138-annoy","level":"B1","word":"annoy","pos":"v.","meaning":"使惱怒；騷擾","collocations":"annoy his sister, need to annoy, annoy carefully","example":"We learned how to annoy his sister in class.","translation":"我們在課堂上學會如何「使惱怒」他妹妹。"},{"id":"B1-3139-whatever","level":"B1","word":"whatever","pos":"pron.","meaning":"無論什麼","collocations":"a sense of whatever, learn about whatever, talk about whatever","example":"I first learned about whatever from a teacher at school.","translation":"我第一次從學校老師那裡學到「無論什麼」。"},{"id":"B1-3140-operation","level":"B1","word":"operation","pos":"n.","meaning":"操作；動作；手術；運算","collocations":"business operation, rescue operation, medical operation","example":"The operation on his knee lasted two hours.","translation":"他的膝蓋手術持續了兩小時。"},{"id":"B1-3141-similarity","level":"B1","word":"similarity","pos":"n.","meaning":"類似；類似處","collocations":"a sense of similarity, learn about similarity, talk about similarity","example":"We saw how similarity can change people's plans.","translation":"我們看到「類似」如何改變人們的計畫。"},{"id":"B1-3142-worldwide","level":"B1","word":"worldwide","pos":"adj.","meaning":"全世界的","collocations":"worldwide success, worldwide problem, worldwide audience","example":"The song became popular worldwide.","translation":"這首歌在全球流行起來。"},{"id":"B1-3143-conclusion","level":"B1","word":"conclusion","pos":"n.","meaning":"結論；結尾；推論","collocations":"changes in conclusion, a lack of conclusion, focus on conclusion","example":"Parents often talk about conclusion when planning for the future.","translation":"父母規劃未來時，常會談到「結論」。"},{"id":"B1-3144-export","level":"B1","word":"export","pos":"n.","meaning":"輸出品；輸出","collocations":"export goods, export business, export market","example":"The company exports tea to several countries.","translation":"這家公司把茶葉出口到幾個國家。"},{"id":"B1-3145-shy","level":"B1","word":"shy","pos":"n.","meaning":"驚跳；驚避","collocations":"the importance of shy, understand shy, problems with shy","example":"Friends may disagree about shy, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「驚跳」有不同看法。"},{"id":"B1-3146-throat","level":"B1","word":"throat","pos":"n.","meaning":"咽喉；喉嚨；嗓音","collocations":"sore throat, clear your throat, throat pain","example":"She stayed home because she had a sore throat.","translation":"她因為喉嚨痛而待在家裡。"},{"id":"B1-3147-prove","level":"B1","word":"prove","pos":"v.","meaning":"證明；查驗；檢驗；勘探","collocations":"prove his point, need to prove, prove carefully","example":"He helped his friend prove his point.","translation":"他幫朋友「證明」他的觀點。"},{"id":"B1-3148-standard","level":"B1","word":"standard","pos":"n.","meaning":"標準；規格；旗；軍旗","collocations":"a sense of standard, learn about standard, talk about standard","example":"A short story helped the class discuss standard.","translation":"一個短篇故事幫助全班討論「標準」。"},{"id":"B1-3149-expedition","level":"B1","word":"expedition","pos":"n.","meaning":"遠征；探險隊；迅速","collocations":"the importance of expedition, understand expedition, problems with expedition","example":"We heard about expedition during a conversation at lunch.","translation":"我們午餐聊天時聽到了「遠征」。"},{"id":"B1-3150-challenge","level":"B1","word":"challenge","pos":"v.","meaning":"向...挑戰；要求；懷疑；挑戰","collocations":"challenge the champion, need to challenge, challenge carefully","example":"Please do not challenge the champion until you understand the details.","translation":"在瞭解細節之前，請不要「向...挑戰」冠軍。"},{"id":"B1-3151-experienced","level":"B1","word":"experienced","pos":"adj.","meaning":"富有經驗的；老練的；熟練的","collocations":"experienced teacher, experienced driver, experienced worker","example":"An experienced nurse checked the baby's temperature.","translation":"一位有經驗的護士量了寶寶的體溫。"},{"id":"B1-3152-trade","level":"B1","word":"trade","pos":"v.","meaning":"進行交易；做買賣；經商；對換","collocations":"trade old books, need to trade, trade carefully","example":"They need to trade old books today.","translation":"他們今天需要「進行交易」舊書。"},{"id":"B1-3153-tongue","level":"B1","word":"tongue","pos":"n.","meaning":"舌；語言能力；講話方式；語言","collocations":"mother tongue, stick out your tongue, tongue hurts","example":"The doctor asked him to stick out his tongue.","translation":"醫生要他伸出舌頭。"},{"id":"B1-3154-relative","level":"B1","word":"relative","pos":"n.","meaning":"親戚；關係詞","collocations":"changes in relative, a lack of relative, focus on relative","example":"The lesson connected relative to things we see every day.","translation":"這堂課把「親戚」和我們每天看見的事物連結起來。"},{"id":"B1-3155-tape","level":"B1","word":"tape","pos":"n.","meaning":"帶子；錄音帶；磁帶；窄帶","collocations":"a sense of tape, learn about tape, talk about tape","example":"One clear example made tape easier to understand.","translation":"一個清楚的例子讓「帶子」更容易理解。"},{"id":"B1-3156-economic","level":"B1","word":"economic","pos":"adj.","meaning":"經濟上的；實用的；節省的","collocations":"economic growth, economic problem, economic policy","example":"The town depends on tourism for economic growth.","translation":"這座城鎮仰賴觀光帶動經濟成長。"},{"id":"B1-3157-educational","level":"B1","word":"educational","pos":"adj.","meaning":"教育的；教育性的","collocations":"educational game, educational programme, educational value","example":"The museum visit was fun and educational.","translation":"這次博物館參觀既有趣又有教育意義。"},{"id":"B1-3158-flour","level":"B1","word":"flour","pos":"n.","meaning":"麵粉；粉沫；碎粉","collocations":"a sense of flour, learn about flour, talk about flour","example":"The lesson connected flour to things we see every day.","translation":"這堂課把「麵粉」和我們每天看見的事物連結起來。"},{"id":"B1-3159-bake","level":"B1","word":"bake","pos":"v.","meaning":"烘焙；烤；烤麵包","collocations":"bake a cake, need to bake, bake carefully","example":"Please do not bake a cake until you understand the details.","translation":"在瞭解細節之前，請不要「烘焙」蛋糕。"},{"id":"B1-3160-horrible","level":"B1","word":"horrible","pos":"adj.","meaning":"可怕的；遭透的；極討厭的","collocations":"horrible smell, horrible weather, horrible mistake","example":"There was a horrible smell coming from the bin.","translation":"垃圾桶傳來一股很難聞的味道。"},{"id":"B1-3161-stuff","level":"B1","word":"stuff","pos":"n.","meaning":"原料；要素；東西；材料","collocations":"a sense of stuff, learn about stuff, talk about stuff","example":"The lesson connected stuff to things we see every day.","translation":"這堂課把「原料」和我們每天看見的事物連結起來。"},{"id":"B1-3162-reliable","level":"B1","word":"reliable","pos":"adj.","meaning":"可靠的；可信賴的","collocations":"reliable friend, reliable information, reliable car","example":"This website gives reliable travel information.","translation":"這個網站提供可靠的旅遊資訊。"},{"id":"B1-3163-claim","level":"B1","word":"claim","pos":"v.","meaning":"要求；認領；主張；提出要求","collocations":"claim the money, need to claim, claim carefully","example":"My brother forgot to claim the money.","translation":"我弟弟忘了「要求」那筆錢。"},{"id":"B1-3164-tiny","level":"B1","word":"tiny","pos":"adj.","meaning":"很少的；微小的","collocations":"tiny room, tiny mistake, tiny village","example":"They live in a tiny apartment near the station.","translation":"他們住在車站附近的一間小公寓。"},{"id":"B1-3165-range","level":"B1","word":"range","pos":"n.","meaning":"排；行；山脈；範圍","collocations":"wide range, price range, age range","example":"The shop sells a wide range of sports shoes.","translation":"這家店販售各式各樣的運動鞋。"},{"id":"B1-3166-announce","level":"B1","word":"announce","pos":"v.","meaning":"宣佈；聲稱；顯示；預告","collocations":"announce the winner, need to announce, announce carefully","example":"It is easier to announce the winner when you have enough time.","translation":"時間充足時，比較容易「宣佈」得獎者。"},{"id":"B1-3167-meanwhile","level":"B1","word":"meanwhile","pos":"adv.","meaning":"同時；於此時","collocations":"meanwhile at home, meanwhile the children, meanwhile continued","example":"I cooked dinner; meanwhile, my sister set the table.","translation":"我煮晚餐；同時，我妹妹擺餐具。"},{"id":"B1-3168-cloth","level":"B1","word":"cloth","pos":"n.","meaning":"布料；織品；布","collocations":"the importance of cloth, understand cloth, problems with cloth","example":"Friends may disagree about cloth, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「布料」有不同看法。"},{"id":"B1-3169-highlight","level":"B1","word":"highlight","pos":"n.","meaning":"加亮區；精彩場面","collocations":"the importance of highlight, understand highlight, problems with highlight","example":"She learned about highlight after making a mistake.","translation":"她犯錯之後，學到了關於「加亮區」的事。"},{"id":"B1-3170-recommendation","level":"B1","word":"recommendation","pos":"n.","meaning":"推薦；介紹；推薦信；勸告","collocations":"make a recommendation, strong recommendation, recommendation letter","example":"I chose the restaurant because of your recommendation.","translation":"我因為你的推薦選了那家餐廳。"},{"id":"B1-3171-vote","level":"B1","word":"vote","pos":"v.","meaning":"投票；選舉；投票選舉；投票決定","collocations":"vote for a new leader, need to vote, vote carefully","example":"My brother forgot to vote for a new leader.","translation":"我弟弟忘了「投票」新領袖。"},{"id":"B1-3172-political","level":"B1","word":"political","pos":"adj.","meaning":"政治的；政治上的；政黨的；從事政治的","collocations":"political party, political leader, political decision","example":"The newspaper discussed the political situation.","translation":"報紙討論了政治情勢。"},{"id":"B1-3173-reservation","level":"B1","word":"reservation","pos":"n.","meaning":"保留；預定；保留品；保留地","collocations":"make a reservation, hotel reservation, dinner reservation","example":"I made a dinner reservation for seven o'clock.","translation":"我訂了七點的晚餐座位。"},{"id":"B1-3174-nor","level":"B1","word":"nor","pos":"conj.","meaning":"也不；也沒有","collocations":"nor the result, nor it seems, nor necessary","example":"I wanted to leave early, nor my friend still needed help.","translation":"我想早點離開，也不我的朋友仍然需要幫忙。"},{"id":"B1-3175-tent","level":"B1","word":"tent","pos":"n.","meaning":"帳篷；帷幕；住處；塞條","collocations":"changes in tent, a lack of tent, focus on tent","example":"We heard about tent during a conversation at lunch.","translation":"我們午餐聊天時聽到了「帳篷」。"},{"id":"B1-3176-mood","level":"B1","word":"mood","pos":"n.","meaning":"心情；氣氛；生氣；基調","collocations":"changes in mood, a lack of mood, focus on mood","example":"A short story helped the class discuss mood.","translation":"一個短篇故事幫助全班討論「心情」。"},{"id":"B1-3177-shift","level":"B1","word":"shift","pos":"v.","meaning":"替換；轉移；改變；推卸","collocations":"shift the table, need to shift, shift carefully","example":"My brother forgot to shift the table.","translation":"我弟弟忘了「替換」桌子。"},{"id":"B1-3178-charge","level":"B1","word":"charge","pos":"v.","meaning":"控訴；加罪於；使充滿；使充電","collocations":"charge the phone, need to charge, charge carefully","example":"She decided to charge the phone  unemployment, a lack of unemployment, focus on unemployment","example":"The video explained unemployment in simple language.","translation":"這支影片用簡單的語言解釋「失業」。"},{"id":"B1-3187-convenient","level":"B1","word":"convenient","pos":"adj.","meaning":"方便的；合宜的","collocations":"convenient location, convenient time, convenient way","example":"The shop is in a convenient location near my office.","translation":"這家店位於我辦公室附近，地點很方便。"},{"id":"B1-3188-uncomfortable","level":"B1","word":"uncomfortable","pos":"adj.","meaning":"不舒服的；不自在的；不安的","collocations":"feel uncomfortable, uncomfortable chair, uncomfortable situation","example":"The chair was uncomfortable, so I changed seats.","translation":"那張椅子不舒服，所以我換了座位。"},{"id":"B1-3189-hang","level":"B1","word":"hang","pos":"v.","meaning":"懸掛；吊著","collocations":"hang a picture, hang on the wall, hang clothes","example":"We hung the picture above the sofa.","translation":"我們把那幅畫掛在沙發上方。"},{"id":"B1-3190-explode","level":"B1","word":"explode","pos":"v.","meaning":"爆炸；爆發","collocations":"explode suddenly, bomb explodes, explode with anger","example":"The bottle may explode if it gets too hot.","translation":"如果瓶子變得太熱，可能會爆炸。"},{"id":"B1-3191-qualify","level":"B1","word":"qualify","pos":"v.","meaning":"取得資格；有資格；使有資格；使合格","collocations":"qualify for the final, need to qualify, qualify carefully","example":"Please do not qualify for the final until you understand the details.","translation":"在瞭解細節之前，請不要「取得資格」決賽資格。"},{"id":"B1-3192-translation","level":"B1","word":"translation","pos":"n.","meaning":"翻譯；譯文；轉化；調任","collocations":"changes in translation, a lack of translation, focus on translation","example":"She wrote a note to remind herself why translation mattered.","translation":"她寫了一張便條提醒自己為什麼「翻譯」很重要。"},{"id":"B1-3193-ceiling","level":"B1","word":"ceiling","pos":"n.","meaning":"天花板","collocations":"changes in ceiling, a lack of ceiling, focus on ceiling","example":"The video explained ceiling in simple language.","translation":"這支影片用簡單的語言解釋「天花板 ","example":"Could you do me a favour and water the plants?","translation":"你可以幫我一個忙，替植物澆水嗎？"},{"id":"B1-3265-strength","level":"B1","word":"strength","pos":"n.","meaning":"力量；實力；強度；濃度","collocations":"physical strength, inner strength, build strength","example":"Swimming helped him build strength after the injury.","translation":"游泳幫助他在受傷後恢復力量。"}]</script>

      window.VOCAB_DATA = JSON.parse(document.getElementById("vocab-data").textContent);

    <script>
const STORAGE_KEY = "b1c1-vocab-progress-v1";
const PAGE_SIZE = 80;

const state = {
  vocab: [],
  filtered: [],
  activeLevel: "ALL",
  activeStatus: "all",
  query: "",
  selectedId: null,
  visibleCount: PAGE_SIZE,
  progress: {
    todayDate: todayKey(),
    todayCount: 0,
    items: {},
  },
  quiz: null,
};

const els = {
  totalCount: document.getElementById("totalCount"),
  masteredCount: document.getElementById("masteredCount"),
  wrongCount: document.getElementById("wrongCount"),
  todayCount: document.getElementById("todayCount"),
  resultSummary: document.getElementById("resultSummary"),
  searchInput: document.getElementById("searchInput"),
  wordList: document.getElementById("wordList"),
  detailView: document.getElementById("detailView"),
  quizView: document.getElementById("quizView"),
  quizBody: document.getElementById("quizBody"),
  quizSource: document.getElementById("quizSource"),
  wrongList: document.getElementById("wrongList"),
  nextQuizButton: document.getElementById("nextQuizButton"),
  resetProgressButton: document.getElementById("resetProgressButton"),
};

init();

async function init() {
  loadProgress();
  bindEvents();
  await loadData();
  applyFilters();
  selectWord(state.filtered[0]?.id || state.vocab[0]?.id);
  renderAll();
}

function bindEvents() {
  els.searchInput.addEventListener("input", (event) => {
    state.query = event.target.value.trim();
    state.visibleCount = PAGE_SIZE;
    applyFilters();
    renderLibrary();
  });

  document.querySelectorAll("[data-level]").forEach((button) => {
    button.addEventListener("click", () => {
      state.activeLevel = button.dataset.level;
      state.visibleCount = PAGE_SIZE;
      setActiveButton("[data-level]", button);
      applyFilters();
      renderLibrary();
    });
  });

  document.querySelectorAll("[data-status]").forEach((button) => {
    button.addEventListener("click", () => {
      state.activeStatus = button.dataset.status;
      state.visibleCount = PAGE_SIZE;
      setActiveButton("[data-status]", button);
      applyFilters();
      renderLibrary();
    });
  });

  document.querySelectorAll("[data-view]").forEach((button) => {
    button.addEventListener("click", () => showView(button.dataset.view));
  });

  els.wordList.addEventListener("scroll", () => {
    const nearBottom = els.wordList.scrollTop + els.wordList.clientHeight >= els.wordList.scrollHeight - 180;
    if (nearBottom && state.visibleCount < state.filtered.length) {
      state.visibleCount += PAGE_SIZE;
      renderLibrary();
    }
  });

  els.nextQuizButton.addEventListener("click", () => {
    startQuiz();
    showView("quiz");
  });

  els.resetProgressButton.addEventListener("click", () => {
    if (!confirm("要清除這台裝置上的熟記、錯題和今日練習紀錄嗎？")) return;
    localStorage.removeItem(STORAGE_KEY);
    state.progress = { todayDate: todayKey(), todayCount: 0, items: {} };
    state.quiz = null;
    saveProgress();
    applyFilters();
    renderAll();
  });
}

async function loadData() {
  state.vocab = window.VOCAB_DATA;
}

function loadProgress() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (stored && typeof stored === "object" && stored.items) {
      state.progress = stored;
    }
  } catch {
    state.progress = { todayDate: todayKey(), todayCount: 0, items: {} };
  }
  if (state.progress.todayDate !== todayKey()) {
    state.progress.todayDate = todayKey();
    state.progress.todayCount = 0;
    saveProgress();
  }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function itemProgress(id) {
  if (!state.progress.items[id]) {
    state.progress.items[id] = {
      mastered: false,
      wrongCount: 0,
      correctCount: 0,
      correctStreak: 0,
      lastWrongAt: null,
      lastReviewedAt: null,
    };
  }
  return state.progress.items[id];
}

function readProgress(id) {
  return state.progress.items[id] || {};
}

function isWrong(id) {
  const item = readProgress(id);
  return (item.wrongCount || 0) > 0 && (item.correctStreak || 0) < 2;
}

function isMastered(id) {
  return !!readProgress(id).mastered && !isWrong(id);
}

function applyFilters() {
  const query = state.query.toLocaleLowerCase();
  state.filtered = state.vocab.filter((item) => {
    if (state.activeLevel !== "ALL" && item.level !== state.activeLevel) return false;
    if (state.activeStatus === "wrong" && !isWrong(item.id)) return false;
    if (state.activeStatus === "mastered" && !isMastered(item.id)) return false;
    if (state.activeStatus === "learning" && (isWrong(item.id) || isMastered(item.id))) return false;
    if (!query) return true;
    return [item.word, item.pos, item.meaning, item.collocations, item.example, item.translation]
      .join(" ")
      .toLocaleLowerCase()
      .includes(query);
  });
}

function renderAll() {
  renderStats();
  renderLibrary();
  renderDetail();
  renderWrongList();
  if (state.quiz) renderQuiz();
}

function renderStats() {
  const mastered = state.vocab.filter((item) => isMastered(item.id)).length;
  const wrong = state.vocab.filter((item) => isWrong(item.id)).length;
  els.totalCount.textContent = state.vocab.length.toLocaleString();
  els.masteredCount.textContent = mastered.toLocaleString();
  els.wrongCount.textContent = wrong.toLocaleString();
  els.todayCount.textContent = (state.progress.todayCount || 0).toLocaleString();
}

function renderLibrary() {
  els.resultSummary.textContent = `${state.filtered.length.toLocaleString()} / ${state.vocab.length.toLocaleString()} 筆`;
  const visible = state.filtered.slice(0, state.visibleCount);
  els.wordList.innerHTML = visible.map(renderWordRow).join("");
  if (state.visibleCount < state.filtered.length) {
    els.wordList.insertAdjacentHTML("beforeend", `<div class="empty-state">往下滑載入更多單字</div>`);
  }
}

function renderWordRow(item) {
  const progressBadges = [];
  if (isWrong(item.id)) progressBadges.push(`<span class="badge wrong">錯題</span>`);
  if (isMastered(item.id)) progressBadges.push(`<span class="badge mastered">熟記</span>`);
  const active = item.id === state.selectedId ? " active" : "";
  return `
    <button class="word-row${active}" type="button" role="listitem" onclick="selectWord('${escapeAttr(item.id)}')">
      <span class="word-main">
        <span class="word-title">
          <strong>${escapeHtml(item.word)}</strong>
          <span class="pos">${escapeHtml(item.pos)}</span>
        </span>
        <span class="meaning">${escapeHtml(item.meaning)}</span>
      </span>
      <span class="row-badges">
        <span class="badge level-${item.level}">${item.level}</span>
        ${progressBadges.join("")}
      </span>
    </button>`;
}

function selectWord(id) {
  if (!id) return;
  state.selectedId = id;
  renderLibrary();
  renderDetail();
}

window.selectWord = selectWord;

function renderDetail() {
  const item = getSelectedItem();
  if (!item) {
    els.detailView.innerHTML = `<div class="empty-state">選一個單字查看詳情。</div>`;
    return;
  }
  const progress = readProgress(item.id);
  const masteredText = isMastered(item.id) ? "取消熟記" : "標記熟記";
  const reviewText = isWrong(item.id) ? "已在錯題" : "加入複習";
  els.detailView.innerHTML = `
    <div class="detail-head">
      <div>
        <h2 class="detail-word">${escapeHtml(item.word)}</h2>
        <div class="row-badges">
          <span class="badge level-${item.level}">${item.level}</span>
          <span class="badge">${escapeHtml(item.pos)}</span>
          ${isWrong(item.id) ? `<span class="badge wrong">錯題 ${progress.correctStreak || 0}/2</span>` : ""}
          ${isMastered(item.id) ? `<span class="badge mastered">熟記</span>` : ""}
        </div>
      </div>
      <div class="detail-actions">
        <button class="primary-button" type="button" onclick="toggleMastered('${escapeAttr(item.id)}')">${masteredText}</button>
        <button class="ghost-button" type="button" onclick="markWrong('${escapeAttr(item.id)}')">${reviewText}</button>
        <button class="secondary-button" type="button" onclick="quizThisWord('${escapeAttr(item.id)}')">練這個字</button>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-block">
        <label>中文意思</label>
        <p>${escapeHtml(item.meaning)}</p>
      </div>
      <div class="info-block">
        <label>常用搭配</label>
        <p>${escapeHtml(item.collocations)}</p>
      </div>
      <div class="info-block">
        <label>例句</label>
        <p class="example">${escapeHtml(item.example)}</p>
      </div>
      <div class="info-block">
        <label>例句翻譯</label>
        <p>${escapeHtml(item.translation)}</p>
      </div>
    </div>`;
}

function getSelectedItem() {
  return state.vocab.find((item) => item.id === state.selectedId) || null;
}

function toggleMastered(id) {
  const progress = itemProgress(id);
  progress.mastered = !isMastered(id);
  if (progress.mastered) {
    progress.correctStreak = Math.max(progress.correctStreak || 0, 2);
  }
  progress.lastReviewedAt = Date.now();
  saveProgress();
  applyFilters();
  renderAll();
}

function markWrong(id) {
  const progress = itemProgress(id);
  progress.mastered = false;
  progress.wrongCount = Math.max(1, progress.wrongCount || 0);
  progress.correctStreak = 0;
  progress.lastWrongAt = Date.now();
  progress.lastReviewedAt = Date.now();
  saveProgress();
  applyFilters();
  renderAll();
}

function quizThisWord(id) {
  const item = state.vocab.find((entry) => entry.id === id);
  if (!item) return;
  state.quiz = createQuestion(item);
  renderQuiz();
  showView("quiz");
}

window.toggleMastered = toggleMastered;
window.markWrong = markWrong;
window.quizThisWord = quizThisWord;

function showView(view) {
  document.querySelectorAll("[data-view]").forEach((button) => {
    button.classList.toggle("active", button.dataset.view === view);
  });
  document.querySelectorAll(".view").forEach((panel) => panel.classList.remove("active"));
  document.getElementById(`${view}View`).classList.add("active");
  if (view === "wrong") renderWrongList();
}

function startQuiz() {
  const item = chooseQuizItem();
  state.quiz = createQuestion(item);
  renderQuiz();
}

function chooseQuizItem() {
  const wrong = state.vocab.filter((item) => isWrong(item.id));
  if (wrong.length) {
    els.quizSource.textContent = "錯題優先";
    return sample(wrong);
  }
  const learning = state.vocab.filter((item) => !isMastered(item.id));
  els.quizSource.textContent = learning.length ? "未熟記單字" : "全部單字";
  return sample(learning.length ? learning : state.vocab);
}

function createQuestion(item) {
  const blank = makeBlank(item.example, item.word);
  return {
    item,
    options: makeOptions(item),
    blankHtml: blank.html,
    matched: blank.matched,
    answered: false,
    selected: null,
  };
}

function makeOptions(correct) {
  const sameLevelPos = state.vocab.filter(
    (item) => item.id !== correct.id && item.level === correct.level && item.pos === correct.pos,
  );
  const sameLevel = state.vocab.filter((item) => item.id !== correct.id && item.level === correct.level);
  const all = state.vocab.filter((item) => item.id !== correct.id);
  const distractors = [];
  fillUnique(distractors, sameLevelPos, 3);
  fillUnique(distractors, sameLevel, 3);
  fillUnique(distractors, all, 3);
  return shuffle([correct, ...distractors.slice(0, 3)]);
}

function fillUnique(target, pool, targetCount) {
  const shuffled = shuffle(pool);
  for (const item of shuffled) {
    if (target.length >= targetCount) break;
    if (!target.some((existing) => existing.id === item.id)) target.push(item);
  }
}

function renderQuiz() {
  const quiz = state.quiz;
  if (!quiz) {
    els.quizBody.innerHTML = `<div class="empty-state">按「下一題」開始用例句練習。</div>`;
    return;
  }
  const item = quiz.item;
  const instruction = quiz.matched ? "從例句空格選出正確單字。" : "選出最符合例句的單字。";
  els.quizBody.innerHTML = `
    <div class="quiz-question">
      <div class="row-badges">
        <span class="badge level-${item.level}">${item.level}</span>
        <span class="badge">${escapeHtml(item.pos)}</span>
      </div>
      <p>${quiz.blankHtml}</p>
    </div>
    <div class="info-block">
      <label>${instruction}</label>
      <p>${escapeHtml(item.translation)}</p>
    </div>
    <div class="answers">
      ${quiz.options.map((option) => renderAnswer(option, quiz)).join("")}
    </div>
    ${quiz.answered ? renderFeedback(quiz) : ""}`;
}

function renderAnswer(option, quiz) {
  let className = "answer-button";
  if (quiz.answered && option.id === quiz.item.id) className += " correct";
  if (quiz.answered && option.id === quiz.selected && option.id !== quiz.item.id) className += " incorrect";
  return `<button class="${className}" type="button" ${quiz.answered ? "disabled" : ""} onclick="answerQuiz('${escapeAttr(option.id)}')">${escapeHtml(option.word)}</button>`;
}

function renderFeedback(quiz) {
  const correct = quiz.selected === quiz.item.id;
  const progress = readProgress(quiz.item.id);
  return `
    <div class="feedback ${correct ? "good" : "bad"}">
      <strong>${correct ? "答對了" : `答錯了，正確答案是 ${escapeHtml(quiz.item.word)}`}</strong><br />
      ${escapeHtml(quiz.item.meaning)}<br />
      ${escapeHtml(quiz.item.example)}<br />
      ${escapeHtml(quiz.item.translation)}
      ${isWrong(quiz.item.id) ? `<br />錯題連對進度：${progress.correctStreak || 0}/2` : ""}
    </div>`;
}

function answerQuiz(selectedId) {
  const quiz = state.quiz;
  if (!quiz || quiz.answered) return;
  quiz.answered = true;
  quiz.selected = selectedId;

  const progress = itemProgress(quiz.item.id);
  progress.lastReviewedAt = Date.now();
  state.progress.todayDate = todayKey();
  state.progress.todayCount = (state.progress.todayCount || 0) + 1;

  if (selectedId === quiz.item.id) {
    progress.correctCount = (progress.correctCount || 0) + 1;
    progress.correctStreak = (progress.correctStreak || 0) + 1;
    if (!isWrong(quiz.item.id) && progress.correctCount >= 3) {
      progress.mastered = true;
    }
    if ((progress.wrongCount || 0) > 0 && progress.correctStreak >= 2) {
      progress.mastered = progress.correctCount >= 3;
    }
  } else {
    progress.mastered = false;
    progress.wrongCount = (progress.wrongCount || 0) + 1;
    progress.correctStreak = 0;
    progress.lastWrongAt = Date.now();
  }

  saveProgress();
  applyFilters();
  renderAll();
  showView("quiz");
}

window.answerQuiz = answerQuiz;

function renderWrongList() {
  const wrong = state.vocab.filter((item) => isWrong(item.id));
  if (!wrong.length) {
    els.wrongList.innerHTML = `<div class="empty-state">目前沒有錯題。答錯的單字會出現在這裡。</div>`;
    return;
  }
  els.wrongList.innerHTML = wrong
    .sort((a, b) => (readProgress(b.id).lastWrongAt || 0) - (readProgress(a.id).lastWrongAt || 0))
    .map((item) => {
      const progress = readProgress(item.id);
      return `
        <article class="wrong-item">
          <div>
            <strong>${escapeHtml(item.word)} <span class="pos">${escapeHtml(item.pos)}</span></strong>
            <p>${escapeHtml(item.meaning)}</p>
            <p>錯 ${progress.wrongCount || 0} 次，連對 ${progress.correctStreak || 0}/2</p>
          </div>
          <button class="secondary-button" type="button" onclick="quizThisWord('${escapeAttr(item.id)}')">練習</button>
        </article>`;
    })
    .join("");
}

function makeBlank(example, word) {
  const forms = buildForms(word).sort((a, b) => b.length - a.length);
  for (const form of forms) {
    const regex = new RegExp(`\\b${escapeRegExp(form)}\\b`, "i");
    const match = example.match(regex);
    if (match) {
      const start = match.index;
      const end = start + match[0].length;
      return {
        matched: true,
        html: `${escapeHtml(example.slice(0, start))}<span class="blank">____</span>${escapeHtml(example.slice(end))}`,
      };
    }
  }
  return { matched: false, html: escapeHtml(example) };
}

function buildForms(word) {
  const lower = word.toLowerCase();
  const forms = new Set([word, lower, `${lower}s`, `${lower}es`, `${lower}ed`, `${lower}d`, `${lower}ing`]);
  if (lower.endsWith("e")) forms.add(`${lower.slice(0, -1)}ing`);
  if (lower.endsWith("y")) {
    forms.add(`${lower.slice(0, -1)}ies`);
    forms.add(`${lower.slice(0, -1)}ied`);
  }
  if (lower.match(/^[a-z]+$/) && lower.length > 3) {
    const last = lower.at(-1);
    const prev = lower.at(-2);
    if ("bcdfghjklmnpqrstvwxyz".includes(last) && "aeiou".includes(prev)) {
      forms.add(`${lower}${last}ed`);
      forms.add(`${lower}${last}ing`);
    }
  }
  return [...forms];
}

function setActiveButton(selector, activeButton) {
  document.querySelectorAll(selector).forEach((button) => button.classList.remove("active"));
  activeButton.classList.add("active");
}

function sample(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function shuffle(items) {
  const copy = [...items];
  for (let i = copy.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return escapeHtml(value).replaceAll("`", "&#096;");
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function registerServiceWorker() {
  if (!("serviceWorker" in navigator)) return;
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
