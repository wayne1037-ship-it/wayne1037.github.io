./n.","meaning":"跳躍；飛越；大幅增加","collocations":"leap forward, leap of faith","example":"She took a leap of faith and started her own business.","translation":"她鼓起勇氣，創立了自己的事業。"},{"id":"C1-1022-squad","level":"C1","word":"squad","pos":"n.","meaning":"隊；小隊；特警隊","collocations":"death squad, national squad","example":"She was selected for the national squad for the first time.","translation":"她首次入選了國家代表隊。"},{"id":"C1-1023-resume","level":"C1","word":"resume","pos":"v./n.","meaning":"恢復；繼續；簡歷","collocations":"resume work, submit a resume","example":"He resumed his duties after a period of sick leave.","translation":"病假結束後，他恢復了工作職責。"},{"id":"C1-1024-allocation","level":"C1","word":"allocation","pos":"n.","meaning":"分配；配額；撥款","collocations":"budget allocation, resource allocation","example":"The allocation of resources was the subject of dispute.","translation":"資源分配問題成了爭議的焦點。"},{"id":"C1-1025-deficiency","level":"C1","word":"deficiency","pos":"n.","meaning":"缺乏；不足；缺陷","collocations":"nutritional deficiency, vitamin deficiency","example":"Iron deficiency can cause tiredness and weakness.","translation":"缺鐵可能導致疲倦和虛弱。"},{"id":"C1-1026-bail","level":"C1","word":"bail","pos":"n./v.","meaning":"保釋；棄保；舀水","collocations":"grant bail, bail out","example":"He was released on bail pending trial.","translation":"他在等待審判期間以交保方式獲得釋放。"},{"id":"C1-1027-slash","level":"C1","word":"slash","pos":"v./n.","meaning":"大幅削減；斜線；砍","collocations":"slash prices, slash costs","example":"The company slashed its workforce by 20%.","translation":"公司裁減了百分之二十的員工。"},{"id":"C1-1028-utilize","level":"C1","word":"utilize","pos":"v.","meaning":"利用；使用；運用","collocations":"utilize resources, utilize skills","example":"Companies must utilize technology to remain competitive.","translation":"企業必須善用科技才能保持競爭力。"},{"id":"C1-1029-provincial","level":"C1","word":"provincial","pos":"adj.","meaning":"省的；地方性的；保守的","collocations":"provincial government, provincial city","example":"The provincial authorities announced a new development plan.","translation":"地方當局宣布了新的發展計畫。"},{"id":"C1-1030-mobility","level":"C1","word":"mobility","pos":"n.","meaning":"流動性；可動性；靈活性","collocations":"social mobility, labour mobility","example":"Greater social mobility leads to a fairer society.","translation":"更大的社會流動性有助於建立更公平的社會。"},{"id":"C1-1031-verse","level":"C1","word":"verse","pos":"n.","meaning":"詩句；韻文；段落","collocations":"first verse, free verse","example":"The first verse of the song is the most memorable.","translation":"這首歌的第一段是最令人印象深刻的。"},{"id":"C1-1032-formula","level":"C1","word":"formula","pos":"n.","meaning":"公式；方程式；配方；方案","collocations":"winning formula, mathematical formula","example":"They created a formula for dealing with the crisis.","translation":"他們制定了一套應對危機的方案。"},{"id":"C1-1033-inequality","level":"C1","word":"inequality","pos":"n.","meaning":"不平等；不均等","collocations":"income inequality, social inequality","example":"Income inequality has widened significantly in recent decades.","translation":"近幾十年來，收入不平等問題顯著加劇。"},{"id":"C1-1034-fibre","level":"C1","word":"fibre","pos":"n.","meaning":"纖維；光纖；品格","collocations":"dietary fibre, fibre optic","example":"Eating more fibre is good for digestive health.","translation":"多吃膳食纖維有益於消化健康。"},{"id":"C1-1035-symbolic","level":"C1","word":"symbolic","pos":"adj.","meaning":"象徵性的；符號的","collocations":"symbolic gesture, symbolic importance","example":"The handshake was seen as a symbolic act of reconciliation.","translation":"握手被視為和解的象徵性行為。"},{"id":"C1-1036-synthesis","level":"C1","word":"synthesis","pos":"n.","meaning":"綜合；合成；融合","collocations":"information synthesis, chemical synthesis","example":"The report provides a synthesis of the latest research.","translation":"這份報告整合了最新的研究成果。"},{"id":"C1-1037-debut","level":"C1","word":"debut","pos":"n./v.","meaning":"初次登場；首次亮相","collocations":"make one's debut, album debut","example":"She made her professional debut at the age of 18.","translation":"她在十八歲時完成了她的職業首秀。"},{"id":"C1-1038-amid","level":"C1","word":"amid" ege to work alongside such talented people.","translation":"能與這樣一群才華洋溢的人共事是一種殊榮。"},{"id":"C1-1047-dictate","level":"C1","word":"dictate","pos":"v./n.","meaning":"命令；口授；左右；決定","collocations":"dictate terms, dictate policy","example":"The market ultimately dictates prices.","translation":"市場最終決定了商品的價格。"},{"id":"C1-1048-critique","level":"C1","word":"critique","pos":"v./n.","meaning":"批評；評論；批判","collocations":"offer a critique, literary critique","example":"The professor provided a detailed critique of the essay.","translation":"教授對這篇文章提供了詳盡的評析。"},{"id":"C1-1049-reassure","level":"C1","word":"reassure","pos":"v.","meaning":"安慰；使放心；再保證","collocations":"reassure someone, reassure the public","example":"The doctor reassured her that the operation was routine.","translation":"醫生向她保證，這是一個例行手術。"},{"id":"C1-1050-eager","level":"C1","word":"eager","pos":"adj.","meaning":"熱切的；渴望的；積極的","collocations":"eager to, eager learner","example":"She was eager to prove herself in her new role.","translation":"她渴望在新職位上一展身手。"},{"id":"C1-1051-integrated","level":"C1","word":"integrated","pos":"adj.","meaning":"整合的；統一的；融合的","collocations":"integrated system, integrated approach","example":"The school uses an integrated learning system.","translation":"學校採用了一套整合式學習系統。"},{"id":"C1-1052-demon","level":"C1","word":"demon","pos":"n.","meaning":"惡魔；鬼怪；心魔","collocations":"fight one's demons, personal demon","example":"He struggled with personal demons throughout his life.","translation":"他一生都在與內心的困擾抗爭。"},{"id":"C1-1053-mainland","level":"C1","word":"mainland","pos":"n.","meaning":"大陸；本土","collocations":"mainland China, mainland Europe","example":"Trade between the island and the mainland is growing.","translation":"島嶼與大陸之間的貿易往來日益增長。"},{"id":"C1-1054-regulator","level":"C1","word":"regulator","pos":"n.","meaning":"監管機構；調節器","collocations":"financial regulator, industry regulator","example":"The regulator fined the company for breaking rules.","translation":"監管機構因違規而對公司開出了罰款。"},{"id":"C1-1055-confer", orm of identification, personal identification","example":"Voters must show a valid form of identification.","translation":"選民必須出示有效的身份證明文件。"},{"id":"C1-1064-wholly","level":"C1","word":"wholly","pos":"adv.","meaning":"完全地；全部地","collocations":"wholly responsible, wholly wrong","example":"The report was wholly inaccurate and misleading.","translation":"這份報告完全不實，且具有誤導性。"},{"id":"C1-1065-quest","level":"C1","word":"quest","pos":"n.","meaning":"追求；探索；任務","collocations":"quest for truth, quest for knowledge","example":"The quest for a cure for cancer continues.","translation":"尋找癌症治療方法的努力仍在持續。"},{"id":"C1-1066-engagement","level":"C1","word":"engagement","pos":"n.","meaning":"參與；婚約；接觸","collocations":"public engagement, political engagement","example":"The campaign increased political engagement among young people.","translation":"這場運動提升了年輕人的政治參與度。"},{"id":"C1-1067-linger","level":"C1","word":"linger","pos":"v.","meaning":"徘徊；逗留；持續存在","collocations":"linger on, linger in the memory","example":"The smell of smoke lingered long after the fire was out.","translation":"火災撲滅後很久，煙味仍久久不散。"},{"id":"C1-1068-indulge","level":"C1","word":"indulge","pos":"v.","meaning":"沉溺；縱容；允許享受","collocations":"indulge in, indulge a child","example":"He rarely indulged in extravagance.","translation":"他極少沉溺於奢靡的享樂之中。"},{"id":"C1-1069-advocate","level":"C1","word":"advocate","pos":"v./n.","meaning":"提倡；支持；倡導者","collocations":"advocate for, legal advocate","example":"She advocates for the rights of refugees.","translation":"她為難民的權利奔走倡議。"},{"id":"C1-1070-boundary","level":"C1","word":"boundary","pos":"n.","meaning":"邊界；界限；範圍","collocations":"push boundaries, set a boundary","example":"The reforms pushed the boundaries of acceptable policy.","translation":"這些改革突破了可接受政策的邊界。"},{"id":"C1-1071-brutal","level":"C1","word":"brutal","pos":"adj.","meaning":"殘忍的；兇殘的；無情的","collocations":"brutal attack, brutal honesty","example":"The dictator's regime was known for its brutal tactics.","translation":"這位獨裁者的政權以其殘 cations":"naval base, naval officer","example":"The naval base was strategically located on the coast.","translation":"這個海軍基地在戰略上位居沿海要地。"},{"id":"C1-1081-cling","level":"C1","word":"cling","pos":"v.","meaning":"依附；堅持；緊抓","collocations":"cling to, cling together","example":"She clung to the hope that he would return safely.","translation":"她緊緊抓住他會安全返回的希望。"},{"id":"C1-1082-lifelong","level":"C1","word":"lifelong","pos":"adj.","meaning":"畢生的；終身的","collocations":"lifelong friend, lifelong learning","example":"She developed a lifelong passion for literature.","translation":"她從小就培養出了對文學的終身熱愛。"},{"id":"C1-1083-accusation","level":"C1","word":"accusation","pos":"n.","meaning":"指控；指責","collocations":"face accusations, deny accusations","example":"He denied all accusations of financial misconduct.","translation":"他否認了所有關於財務違規的指控。"},{"id":"C1-1084-remains","level":"C1","word":"remains","pos":"n.","meaning":"遺體；遺跡；剩餘物","collocations":"human remains, remains of","example":"The remains of the ancient temple were discovered.","translation":"古廟的遺跡被發現了。"},{"id":"C1-1085-contradiction","level":"C1","word":"contradiction","pos":"n.","meaning":"矛盾；對立；否定","collocations":"apparent contradiction, contradiction in","example":"There is an obvious contradiction in his argument.","translation":"他的論點中存在明顯的自相矛盾。"},{"id":"C1-1086-absurd","level":"C1","word":"absurd","pos":"adj.","meaning":"荒謬的；可笑的；不合理的","collocations":"completely absurd, absurd claim","example":"It would be absurd to deny the existence of climate change.","translation":"否認氣候變遷的存在是荒謬的。"},{"id":"C1-1087-availability","level":"C1","word":"availability","pos":"n.","meaning":"可用性；可獲得性","collocations":"limited availability, subject to availability","example":"Tickets are subject to availability.","translation":"門票依現有供應情況而定。"},{"id":"C1-1088-stem","level":"C1","word":"stem","pos":"v./n.","meaning":"遏制；源自；莖；幹細胞","collocations":"stem from, stem the flow","example":"His success stems from years of hard work and dedication.","translation":"他的成功源自多年的努力工作與奉獻精神。"},{"id":"C1-1089-divine","level":"C1","word":"divine","pos":"adj./v.","meaning":"神聖的；神的；占卜","collocations":"divine intervention, divine right","example":"It was almost divine intervention that saved the village.","translation":"拯救這個村莊的事，幾乎像是神靈的庇佑。"},{"id":"C1-1090-spin","level":"C1","word":"spin","pos":"v./n.","meaning":"旋轉；紡紗；宣傳","collocations":"spin a story, put a spin on","example":"The politician tried to put a positive spin on the poll results.","translation":"這位政治人物試圖對民調結果做出正面的詮釋。"},{"id":"C1-1091-lesbian","level":"C1","word":"lesbian","pos":"n./adj.","meaning":"女同性戀者；女同性戀的","collocations":"lesbian relationship, lesbian community","example":"She identified publicly as a lesbian in the interview.","translation":"她在採訪中公開表明自己是女同性戀。"},{"id":"C1-1092-disposal","level":"C1","word":"disposal","pos":"n.","meaning":"處置；丟棄；支配","collocations":"waste disposal, at your disposal","example":"The safe disposal of chemical waste is regulated by law.","translation":"化學廢物的安全處置受到法律的規範。"},{"id":"C1-1093-agricultural","level":"C1","word":"agricultural","pos":"adj.","meaning":"農業的；農耕的","collocations":"agricultural land, agricultural sector","example":"The agricultural sector employs millions of people.","translation":"農業部門雇用了數百萬人。"},{"id":"C1-1094-plead","level":"C1","word":"plead","pos":"v.","meaning":"懇請；辯護；認罪","collocations":"plead guilty, plead for mercy","example":"He pleaded not guilty to all charges.","translation":"他對所有指控提出了無罪抗辯。"},{"id":"C1-1095-corresponding","level":"C1","word":"corresponding","pos":"adj.","meaning":"相應的；對應的；通訊的","collocations":"corresponding period, corresponding changes","example":"A rise in costs led to a corresponding rise in prices.","translation":"成本上漲帶動了相應的售價上漲。"},{"id":"C1-1096-well-being","level":"C1","word":"well-being","pos":"n.","meaning":"幸福；健康；福祉","collocations":"sense of well-being, promote well-being","example":"Exercise has a positive impact on mental well-being.","translation":"運動對心理健康有著正面的影響。"},{"id":"C1-1097-cargo","level":"C1","word":"cargo","pos":"n.","meaning":"貨物；貨運","collocations":"cargo ship, dangerous cargo","example":"The cargo ship was carrying oil from the Middle East.","translation":"這艘貨船正在從中東運載石油。"},{"id":"C1-1098-odds","level":"C1","word":"odds","pos":"n.","meaning":"可能性；機率；困難","collocations":"against the odds, odds of success","example":"She succeeded against all the odds.","translation":"她排除萬難，最終取得了成功。"},{"id":"C1-1099-bizarre","level":"C1","word":"bizarre","pos":"adj.","meaning":"奇異的；離奇的；怪誕的","collocations":"bizarre behaviour, bizarre claim","example":"His behaviour became increasingly bizarre.","translation":"他的行為變得越來越怪異。"},{"id":"C1-1100-patron","level":"C1","word":"patron","pos":"n.","meaning":"贊助人；顧客；守護者","collocations":"patron saint, arts patron","example":"The gallery owes its success to a generous patron.","translation":"這個畫廊的成功有賴於一位慷慨贊助人的支持。"},{"id":"C1-1101-alert","level":"C1","word":"alert","pos":"adj./v./n.","meaning":"警覺的；警告；警報","collocations":"on the alert, issue an alert","example":"The public was alerted to a possible health risk.","translation":"公眾被告知可能存在健康風險。"},{"id":"C1-1102-appealing","level":"C1","word":"appealing","pos":"adj.","meaning":"有吸引力的；懇求的","collocations":"appealing option, visually appealing","example":"The offer seemed very appealing to new graduates.","translation":"這個機會對應屆畢業生來說相當吸引人。"},{"id":"C1-1103-methodology","level":"C1","word":"methodology","pos":"n.","meaning":"方法論；研究方法","collocations":"research methodology, scientific methodology","example":"The study's methodology has been widely praised.","translation":"這項研究的方法論獲得了廣泛的好評。"},{"id":"C1-1104-liver","level":"C1","word":"liver","pos":"n.","meaning":"肝臟；居住者","collocations":"liver disease, fatty liver","example":"Excessive alcohol consumption can damage the liver.","translation":"過量飲酒會損害肝臟。"},{"id":"C1-1105-accumulate","level":"C1","word":"accumulate","pos":"v.","meaning":"積累；累積；聚積","collocations":"accumulate wealth, accumulate evidence","example":"Evidence against the suspect began to accumulate.","translation":"針對嫌疑人的證據開始不斷累積。"},{"id":"C1-1106-cultivate","level":"C1","word":"cultivate","pos":"v.","meaning":"培養；耕種；發展","collocations":"cultivate relationships, cultivate skills","example":"She cultivated strong ties with the international business community.","translation":"她與國際商業界建立了穩固的關係。"},{"id":"C1-1107-concede","level":"C1","word":"concede","pos":"v.","meaning":"承認；讓步；允許","collocations":"concede defeat, concede a point","example":"He finally conceded that he had made a mistake.","translation":"他終於承認自己犯了一個錯誤。"},{"id":"C1-1108-instrumental","level":"C1","word":"instrumental","pos":"adj.","meaning":"有幫助的；工具性的；器樂的","collocations":"instrumental in, instrumental music","example":"She was instrumental in bringing the two sides together.","translation":"她在促使雙方坐到談判桌前發揮了關鍵作用。"},{"id":"C1-1109-neighbouring","level":"C1","word":"neighbouring","pos":"adj.","meaning":"鄰近的；相鄰的","collocations":"neighbouring country, neighbouring town","example":"Refugees fled to neighbouring countries for safety.","translation":"難民逃往鄰國尋求庇護。"},{"id":"C1-1110-operational","level":"C1","word":"operational","pos":"adj.","meaning":"運作中的；業務的；操作的","collocations":"fully operational, operational cost","example":"The new headquarters is now fully operational.","translation":"新總部現已全面投入運作。"},{"id":"C1-1111-dub","level":"C1","word":"dub","pos":"v.","meaning":"配音；稱呼；冠以名稱","collocations":"dub into, dubbed as","example":"The film was dubbed into Chinese for local audiences.","translation":"這部電影被配音成中文，以服務當地觀眾。"},{"id":"C1-1112-casino","level":"C1","word":"casino","pos":"n.","meaning":"賭場；娛樂場","collocations":"luxury casino, casino resort","example":"He spent the evening at the casino.","translation":"他在賭場度過了那個夜晚。"},{"id":"C1-1113-presumably","level":"C1","word":"presumably","pos":"adv.","meaning":"大概；推測；假設","collocations":"presumably true, presumably aware","example":"He was presumably unaware of the risks involved.","translation":"他大概不知道其中所涉及的風險。"},{"id":"C1-1114-deputy","level":"C1","word":"deputy","pos":"n.","meaning":"副手；代理人；代理局長","collocations":"deputy minister, deputy director","example":"The deputy prime minister chaired the meeting.","translation":"副首相主持了這次會議。"},{"id":"C1-1115-pledge","level":"C1","word":"pledge","pos":"v./n.","meaning":"承諾；保證；抵押","collocations":"pledge support, make a pledge","example":"The president pledged to cut carbon emissions by 50%.","translation":"總統承諾將碳排放量削減百分之五十。"},{"id":"C1-1116-dedicated","level":"C1","word":"dedicated","pos":"adj.","meaning":"奉獻的；專用的；專心的","collocations":"dedicated team, dedicated to","example":"She is a dedicated public servant.","translation":"她是一位盡忠職守的公務員。"},{"id":"C1-1117-enact","level":"C1","word":"enact","pos":"v.","meaning":"制定（法律）；頒布；扮演","collocations":"enact legislation, enact a law","example":"Parliament enacted new regulations to combat money laundering.","translation":"議會制定了新規定，以打擊洗錢行為。"},{"id":"C1-1118-respectively","level":"C1","word":"respectively","pos":"adv.","meaning":"分別地；各自地","collocations":"first and second respectively","example":"The silver and bronze medals went to Canada and Australia, respectively.","translation":"銀牌和銅牌分別由加拿大和澳大利亞獲得。"},{"id":"C1-1119-nonsense","level":"C1","word":"nonsense","pos":"n.","meaning":"胡說；廢話；無稽之談","collocations":"utter nonsense, talk nonsense","example":"He dismissed the claims as complete nonsense.","translation":"他斥責這些說法純屬無稽之談。"},{"id":"C1-1120-prejudice","level":"C1","word":"prejudice","pos":"n.","meaning":"偏見；偏見的損害；成見","collocations":"racial prejudice, without prejudice","example":"The case was dismissed without prejudice.","translation":"案件在不損害原告權益的情況下被駁回。"},{"id":"C1-1121-toss","level":"C1","word":"toss","pos":"v./n.","meaning":"拋；投；搖動","collocations":"coin toss, toss away","example":"He tossed the report onto his desk without reading it.","translation":"他沒有看就把報告扔到了桌上。"},{"id":"C1-1122-loom","level":"C1","word":"loom","pos":"v./n.","meaning":"籠罩；隱現；威脅","collocations":"loom large, loom on the horizon","example":"The threat of recession is looming on the horizon.","translation":"衰退的威脅正在地平線上隱約逼近。"},{"id":"C1-1123-junction","level":"C1","word":"junction","pos":"n.","meaning":"交叉口；連接點；接合","collocations":"road junction, at the junction","example":"Turn left at the next junction.","translation":"在下一個路口左轉。"},{"id":"C1-1124-horn","level":"C1","word":"horn","pos":"n.","meaning":"號角；喇叭；角","collocations":"car horn, blow the horn","example":"He honked his horn at the slow-moving traffic.","translation":"他對著緩慢行駛的車流按喇叭。"},{"id":"C1-1125-probe","level":"C1","word":"probe","pos":"v./n.","meaning":"調查；探查；探針","collocations":"launch a probe, space probe","example":"The committee launched an inquiry to probe the allegations.","translation":"委員會發起調查，以深入查明這些指控。"},{"id":"C1-1126-banner","level":"C1","word":"banner","pos":"n.","meaning":"橫幅；旗幟；大標語","collocations":"campaign banner, under the banner","example":"Protesters marched under a banner calling for equality.","translation":"抗議者在一幅呼籲平等的旗幟下遊行。"},{"id":"C1-1127-disruption","level":"C1","word":"disruption","pos":"n.","meaning":"干擾；中斷；顛覆","collocations":"cause disruption, major disruption","example":"The strike caused widespread disruption to transport.","translation":"罷工對交通造成了廣泛的影響。"},{"id":"C1-1128-congressional","level":"C1","word":"congressional","pos":"adj.","meaning":"國會的；議會的（美國）","collocations":"congressional hearing, congressional approval","example":"The bill faces a tough congressional vote.","translation":"這項法案在國會面臨艱難的表決。"},{"id":"C1-1129-clarity","level":"C1","word":"clarity","pos":"n.","meaning":"清晰；明確；透明","collocations":"lack of clarity, seek clarity","example":"She spoke with remarkable clarity and conviction.","translation":"她以非凡的清晰度和堅定的信念發言。"},{"id":"C1-1130-glimpse","level":"C1","word":"glimpse","pos":"v./n.","meaning":"瞥見；短暫一瞥","collocations":"catch a glimpse, glimpse into","example":"The documentary offers a rare glimpse into their daily lives.","translation":"這部紀錄片讓人得以一窺他們日常生活的難得一面。"},{"id":"C1-1131-contempt","level":"C1","word":"contempt","pos": egardless","example":"She continued, regardless of the opposition she faced.","translation":"無論面對何種阻力，她都繼續前行。"},{"id":"C1-1182-upcoming","level":"C1","word":"upcoming","pos":"adj.","meaning":"即將到來的","collocations":"upcoming event, upcoming election","example":"Voters are preparing for the upcoming election.","translation":"選民正在為即將到來的選舉做好準備。"},{"id":"C1-1183-accomplishment","level":"C1","word":"accomplishment","pos":"n.","meaning":"成就；完成；才藝","collocations":"remarkable accomplishment, personal accomplishment","example":"Winning the award was a remarkable accomplishment.","translation":"贏得這個獎項是一項了不起的成就。"},{"id":"C1-1184-counterpart","level":"C1","word":"counterpart","pos":"n.","meaning":"對應的人或物；副本","collocations":"American counterpart, foreign counterpart","example":"The minister met with his French counterpart for talks.","translation":"這位部長與法國的對等官員舉行了會談。"},{"id":"C1-1185-thereafter","level":"C1","word":"thereafter","pos":"adv.","meaning":"此後；從那以後","collocations":"shortly thereafter, long thereafter","example":"She graduated and thereafter moved abroad.","translation":"她畢業後便移居海外。"},{"id":"C1-1186-gallon","level":"C1","word":"gallon","pos":"n.","meaning":"加侖（液體容量單位）","collocations":"per gallon, gallon of water","example":"Fuel consumption is measured in miles per gallon.","translation":"燃油消耗量以每加侖英里數來計算。"},{"id":"C1-1187-veteran","level":"C1","word":"veteran","pos":"n./adj.","meaning":"老兵；資深人士；經驗豐富的","collocations":"combat veteran, industry veteran","example":"The veteran soldier spoke of his wartime experiences.","translation":"這位老兵談述了他的戰時經歷。"},{"id":"C1-1188-exclusively","level":"C1","word":"exclusively","pos":"adv.","meaning":"獨家地；排外地；唯獨","collocations":"sold exclusively, available exclusively","example":"The product is sold exclusively through our website.","translation":"這款產品僅在我們的官方網站上獨家販售。"},{"id":"C1-1189-projection","level":"C1","word":"projection","pos":"n.","meaning":"預測；投影；突出物","collocations":"growth projection, financial projection","example":"The company's l":"C1","word":"magnetic","pos":"adj.","meaning":"有磁性的；有吸引力的","collocations":"magnetic personality, magnetic field","example":"She has a magnetic personality that draws people to her.","translation":"她有著令人著迷的個人魅力，讓人忍不住靠近。"},{"id":"C1-1199-premise","level":"C1","word":"premise","pos":"n.","meaning":"前提；假設；地點（複數）","collocations":"on the premise that, basic premise","example":"The argument rests on the false premise that all data is reliable.","translation":"這個論點建立在一個虛假的前提之上，即所有資料都是可信的。"},{"id":"C1-1200-passing","level":"C1","word":"passing","pos":"adj./n.","meaning":"過去的；去世；一時的","collocations":"passing comment, passing grade","example":"He mentioned it in passing, without much detail.","translation":"他只是順帶一提，沒有深入詳述。"},{"id":"C1-1201-invisible","level":"C1","word":"invisible","pos":"adj.","meaning":"看不見的；無形的","collocations":"invisible barrier, become invisible","example":"The problems were invisible until it was too late.","translation":"這些問題在為時已晚之前始終不為人所察覺。"},{"id":"C1-1202-competent","level":"C1","word":"competent","pos":"adj.","meaning":"有能力的；勝任的；稱職的","collocations":"competent professional, highly competent","example":"She is a competent and respected manager.","translation":"她是一位能幹且備受尊重的管理者。"},{"id":"C1-1203-transformation","level":"C1","word":"transformation","pos":"n.","meaning":"轉型；變革；蛻變","collocations":"dramatic transformation, social transformation","example":"The country underwent a remarkable economic transformation.","translation":"這個國家經歷了一場卓越的經濟轉型。"},{"id":"C1-1204-sheer","level":"C1","word":"sheer","pos":"adj.","meaning":"純粹的；極大的；陡峭的","collocations":"sheer volume, sheer determination","example":"She succeeded through sheer determination.","translation":"她憑藉著純粹的意志力取得了成功。"},{"id":"C1-1205-rebellion","level":"C1","word":"rebellion","pos":"n.","meaning":"叛亂；反抗；造反","collocations":"armed rebellion, student rebellion","example":"The rebellion was quickly put down by government forces.","translation":"這場叛亂被政府軍迅速平息。"},{"id":"C1-1206-acceptance","level":"C1","word":"acceptance","pos":"n.","meaning":"接受；接納；認可","collocations":"gain acceptance, acceptance of","example":"Her acceptance of the situation came gradually.","translation":"她對現實情況的接受是逐漸形成的。"},{"id":"C1-1207-seal","level":"C1","word":"seal","pos":"v./n.","meaning":"密封；確定；蓋章；海豹","collocations":"seal a deal, seal an envelope","example":"The two leaders sealed the deal with a handshake.","translation":"兩位領導人以握手確認了這筆交易。"},{"id":"C1-1208-configuration","level":"C1","word":"configuration","pos":"n.","meaning":"配置；布局；排列","collocations":"system configuration, configuration settings","example":"The default configuration can be changed in settings.","translation":"預設的設定可以在設定中更改。"},{"id":"C1-1209-worthwhile","level":"C1","word":"worthwhile","pos":"adj.","meaning":"值得的；有意義的","collocations":"worthwhile experience, prove worthwhile","example":"The extra effort made the project truly worthwhile.","translation":"額外的付出讓這個項目真正地物有所值。"},{"id":"C1-1210-specification","level":"C1","word":"specification","pos":"n.","meaning":"規格；說明書；詳細描述","collocations":"technical specification, meet specifications","example":"The product must comply with all technical specifications.","translation":"產品必須符合所有技術規格。"},{"id":"C1-1211-charm","level":"C1","word":"charm","pos":"n./v.","meaning":"魅力；符咒；迷人之物；使著迷","collocations":"personal charm, charm offensive","example":"He used his considerable charm to win over the audience.","translation":"他運用自身非凡的魅力，贏得了觀眾的心。"},{"id":"C1-1212-shatter","level":"C1","word":"shatter","pos":"v.","meaning":"打碎；使破滅","collocations":"shatter dreams, shatter hopes","example":"The loss shattered his hopes of winning the championship.","translation":"這次失利粉碎了他奪得冠軍的希望。"},{"id":"C1-1213-cluster","level":"C1","word":"cluster","pos":"n./v.","meaning":"群；簇；聚集","collocations":"cluster of cases, cluster around","example":"A cluster of new infections was reported in the north.","translation":"北部地區報告了一批新的群聚感染案例。"},{"id":"C1-1214-ratio","level":"C1","word":"ratio","pos":"n.","meaning":"比例；比率","collocations":"student-teacher ratio, risk ratio","example":"The ratio of staff to patients needs to be improved.","translation":"員工與病患的比例需要改善。"},{"id":"C1-1215-inject","level":"C1","word":"inject","pos":"v.","meaning":"注射；注入；添加","collocations":"inject funds, inject enthusiasm","example":"The government injected capital into the struggling bank.","translation":"政府向陷入困境的銀行注入了資金。"},{"id":"C1-1216-accumulation","level":"C1","word":"accumulation","pos":"n.","meaning":"積累；堆積；積聚","collocations":"gradual accumulation, accumulation of evidence","example":"There has been a dangerous accumulation of debt.","translation":"債務已出現危險性的積累。"},{"id":"C1-1217-circulation","level":"C1","word":"circulation","pos":"n.","meaning":"流通；循環；發行量","collocations":"blood circulation, newspaper circulation","example":"The newspaper has a daily circulation of one million.","translation":"這份報紙的日發行量達一百萬份。"},{"id":"C1-1218-refuge","level":"C1","word":"refuge","pos":"n.","meaning":"避難所；庇護；安慰","collocations":"seek refuge, place of refuge","example":"Thousands fled to neighbouring countries in search of refuge.","translation":"數千人逃往鄰國尋求庇護。"},{"id":"C1-1219-kidney","level":"C1","word":"kidney","pos":"n.","meaning":"腎臟；腎","collocations":"kidney disease, kidney transplant","example":"He was placed on the waiting list for a kidney transplant.","translation":"他被列在腎臟移植的等候名單上。"},{"id":"C1-1220-smash","level":"C1","word":"smash","pos":"v./n.","meaning":"打碎；砸碎；粉碎；大成功","collocations":"smash a record, smash hit","example":"The film was a smash hit at the box office.","translation":"這部電影在票房上大獲成功。"},{"id":"C1-1221-presently","level":"C1","word":"presently","pos":"adv.","meaning":"目前；不久；現在","collocations":"presently engaged, presently available","example":"She is presently working on her second novel.","translation":"她目前正在撰寫她的第二部小說。"},{"id":"C1-1222-rejection","level":"C1","word":"rejection","pos":"n.","meaning":"拒絕；排斥；被否決","collocations":"face rejection, letter of rejection","example":"He took the rejection of his proposal very hard.","translation":"他對提案遭到拒絕這件事耿耿於懷。"},{"id":"C1-1223-terrific","level":"C1","word":"terrific","pos":"adj.","meaning":"極好的；非常的；很棒的","collocations":"terrific performance, terrific idea","example":"She did a terrific job under very difficult circumstances.","translation":"她在極為艱難的情況下出色地完成了任務。"},{"id":"C1-1224-memorial","level":"C1","word":"memorial","pos":"n./adj.","meaning":"紀念碑；紀念日；悼念的","collocations":"war memorial, memorial service","example":"A memorial was erected in honour of those who died.","translation":"一座紀念碑為悼念遇難者而豎立。"},{"id":"C1-1225-administrative","level":"C1","word":"administrative","pos":"adj.","meaning":"行政的；管理上的","collocations":"administrative costs, administrative role","example":"She handles the administrative side of the business.","translation":"她負責處理業務的行政事務。"},{"id":"C1-1226-hopeful","level":"C1","word":"hopeful","pos":"adj./n.","meaning":"懷有希望的；有希望的；候選人","collocations":"remain hopeful, hopeful signs","example":"There are hopeful signs that the economy is recovering.","translation":"有跡象顯示，經濟正在復甦，令人感到樂觀。"},{"id":"C1-1227-specialized","level":"C1","word":"specialized","pos":"adj.","meaning":"專業的；專門的","collocations":"highly specialized, specialized training","example":"The job requires specialized knowledge and skills.","translation":"這份工作需要專業的知識與技能。"},{"id":"C1-1228-surrender","level":"C1","word":"surrender","pos":"v./n.","meaning":"投降；放棄；交出","collocations":"surrender to, unconditional surrender","example":"The rebel forces surrendered after three weeks.","translation":"反叛武裝在三週後宣告投降。"},{"id":"C1-1229-prominent","level":"C1","word":"prominent","pos":"adj.","meaning":"傑出的；顯著的；突出的","collocations":"prominent figure, prominent role","example":"She is a prominent figure in the world of finance.","translation":"她是金融界的知名人士。"},{"id":"C1-1230-echo","level":"C1","word":"echo","pos":"v./n.","meaning":"回聲；反響；使回響","collocations":"echo a view, echo chamber","example":"His words echoed the concerns of many citizens.","translation":"他的話語道出了許多公民共同的心聲。"},{"id":"C1-1231-amendment","level":"C1","word":"amendment","pos":"n.","meaning":"修正案；修改；修訂","collocations":"constitutional amendment, amendment to","example":"Congress passed an amendment to the existing law.","translation":"國會通過了一項對現行法律的修正案。"},{"id":"C1-1232-audit","level":"C1","word":"audit","pos":"v./n.","meaning":"審計；稽核；查帳","collocations":"financial audit, conduct an audit","example":"The company hired an external firm to conduct the audit.","translation":"公司聘請了一家外部公司進行審計。"},{"id":"C1-1233-tribute","level":"C1","word":"tribute","pos":"n.","meaning":"致敬；頌詞；貢品","collocations":"pay tribute, glowing tribute","example":"He paid a heartfelt tribute to his late colleague.","translation":"他向已故的同事致上了深情摯意的悼念。"},{"id":"C1-1234-parish","level":"C1","word":"parish","pos":"n.","meaning":"教區；行政區","collocations":"local parish, parish council","example":"The priest has served this parish for 20 years.","translation":"這位神父在這個教區服務了二十年。"},{"id":"C1-1235-conscience","level":"C1","word":"conscience","pos":"n.","meaning":"良心；道德感；良知","collocations":"clear conscience, moral conscience","example":"She acted according to her conscience.","translation":"她依照自己的良心行事。"},{"id":"C1-1236-morality","level":"C1","word":"morality","pos":"n.","meaning":"道德；道義；道德觀","collocations":"public morality, question of morality","example":"The debate raises deep questions about political morality.","translation":"這場辯論引發了關於政治道德的深層問題。"},{"id":"C1-1237-preservation","level":"C1","word":"preservation","pos":"n.","meaning":"保護；保存；維持","collocations":"preservation of culture, food preservation","example":"The preservation of ancient manuscripts is costly.","translation":"保存古代手稿的工作所費不貲。"},{"id":"C1-1238-desktop","level":"C1","word":"desktop","pos":"n.","meaning":"桌面；桌上型電腦","collocations":"desktop computer, desktop app","example":"She switched from a laptop to a desktop computer.","translation":"她從筆記型電腦換成了桌上型電腦。"},{"id":"C1-1239-stun","level":"C1","word":"stun","pos":"v.","meaning":"使震驚；使目瞪口呆；暈眩","collocations":"be stunned, stun the world","example":"The announcement stunned the financial world.","translation":"這項公告震驚了整個金融界。"},{"id":"C1-1240-niche","level":"C1","word":"niche","pos":"n./adj.","meaning":"利基；壁龕；合適的位置","collocations":"niche market, find your niche","example":"She found her niche in sustainable fashion.","translation":"她在永續時尚領域找到了自己的定位。"},{"id":"C1-1241-slam","level":"C1","word":"slam","pos":"v./n.","meaning":"猛打；嚴厲批評；砰地關上","collocations":"slam the door, slam a decision","example":"Critics slammed the film as deeply offensive.","translation":"評論家猛烈抨擊這部電影極具冒犯性。"},{"id":"C1-1242-seize","level":"C1","word":"seize","pos":"v.","meaning":"抓住；佔領；把握","collocations":"seize an opportunity, seize control","example":"Rebels seized control of the capital overnight.","translation":"叛軍一夜之間奪取了首都的控制權。"},{"id":"C1-1243-integral","level":"C1","word":"integral","pos":"adj.","meaning":"不可或缺的；整體的；積分的","collocations":"integral part, integral to","example":"She became an integral part of the research team.","translation":"她成為了研究團隊不可或缺的一員。"},{"id":"C1-1244-backup","level":"C1","word":"backup","pos":"n.","meaning":"備份；後備支援","collocations":"create a backup, backup plan","example":"Always create a backup of important files.","translation":"請務必備份重要文件。"},{"id":"C1-1245-credibility","level":"C1","word":"credibility","pos":"n.","meaning":"可信度；信譽","collocations":"lose credibility, credibility gap","example":"The scandal seriously damaged her credibility.","translation":"這起醜聞嚴重損害了她的公信力。"},{"id":"C1-1246-evacuate","level":"C1","word":"evacuate","pos":"v.","meaning":"疏散；撤離；清空","collocations":"evacuate the building, order to evacuate","example":"Residents were evacuated as the hurricane approached.","translation":"颶風逼近時，居民紛紛疏散撤離。"},{"id":"C1-1247-confrontation","level":"C1","word":"confrontation","pos":"n.","meaning":"對抗；對峙；衝突","collocations":"direct confrontation, avoid confrontation","example":"He tried to avoid any direct confrontation.","translation":"他竭力避免任何直接的對峙。"},{"id":"C1-1248-glance","level":"C1","word":"glance","pos":"v./n.","meaning":"瞥視；看一眼","collocations":"at a glance, glance at","example":"She glanced at the clock on the wall.","translation":"她瞥了一眼牆上的時鐘。"},{"id":"C1-1249-interior","level":"C1","word":"interior","pos":"n./adj.","meaning":"內部；內地；內部的","collocations":"interior design, interior minister","example":"The interior of the building has been completely renovated.","translation":"建築物的內部已經全面翻新。"},{"id":"C1-1250-pioneer","level":"C1","word":"pioneer","pos":"n./v.","meaning":"先驅；開拓者；開創","collocations":"pioneer research, technology pioneer","example":"She was a pioneer in the field of renewable energy.","translation":"她是可再生能源領域的先驅。"},{"id":"C1-1251-disclosure","level":"C1","word":"disclosure","pos":"n.","meaning":"披露；揭露；公開","collocations":"full disclosure, financial disclosure","example":"Investors demanded full financial disclosure from the company.","translation":"投資者要求公司提供完整的財務揭露。"},{"id":"C1-1252-explicit","level":"C1","word":"explicit","pos":"adj.","meaning":"明確的；清晰的；露骨的","collocations":"explicit content, explicit instructions","example":"The contract contained explicit terms and conditions.","translation":"合約包含了明確的條款和條件。"},{"id":"C1-1253-spine","level":"C1","word":"spine","pos":"n.","meaning":"脊椎；書脊；勇氣","collocations":"backbone/spine, spinal injury","example":"The injury affected two vertebrae in her spine.","translation":"這次受傷影響了她脊椎的兩節椎骨。"},{"id":"C1-1254-chaos","level":"C1","word":"chaos","pos":"n.","meaning":"混亂；無序；動盪","collocations":"complete chaos, descend into chaos","example":"The sudden power cut threw the building into chaos.","translation":"突如其來的停電讓整棟建築陷入一片混亂。"},{"id":"C1-1255-autonomy","level":"C1","word":"autonomy","pos":"n.","meaning":"自治；自主；自主性","collocations":"regional autonomy, professional autonomy","example":"The province was granted a high degree of autonomy.","translation":"這個省份獲得了高度的自治權。"},{"id":"C1-1256-inclined","level":"C1","word":"inclined","pos":"adj.","meaning":"傾向的；有意的；斜的","collocations":"be inclined to, not inclined","example":"He was not inclined to change his mind on the issue.","translation":"他不傾向於改變自己在這個問題上的立場。"},{"id":"C1-1257-align","level":"C1","word":"align","pos":"v.","meaning":"使一致；校準；使排列","collocations":"align with, align interests","example":"The strategy must align with the company's core values.","translation":"策略必須與公司的核心價值觀保持一致。"},{"id":"C1-1258-predominantly","level":"C1","word":"predominantly","pos":"adv.","meaning":"主要地；大部分地","collocations":"predominantly male, predominantly rural","example":"The workforce was predominantly female.","translation":"勞動力以女性為主。"},{"id":"C1-1259-descend","level":"C1","word":"descend","pos":"v.","meaning":"下降；淪落；傳承","collocations":"descend into, descended from","example":"The city descended into chaos after the announcement.","translation":"公告發出後，城市陷入了混亂。"},{"id":"C1-1260-breach","level":"C1","word":"breach","pos":"v./n.","meaning":"違反；突破；缺口","collocations":"breach of contract, security breach","example":"A data breach exposed thousands of customer records.","translation":"一起資料外洩事件暴露了數千筆客戶記錄。"},{"id":"C1-1261-buffer","level":"C1","word":"buffer","pos":"n./v.","meaning":"緩衝；緩衝器；緩和","collocations":"buffer zone, serve as a buffer","example":"A buffer zone was established between the two forces.","translation":"兩軍之間設立了一個緩衝區。"},{"id":"C1-1262-marginal","level":"C1","word":"marginal","pos":"adj.","meaning":"邊緣的；微小的；微不足道的","collocations":"marginal improvement, marginal cost","example":"There was only a marginal increase in profits.","translation":"利潤只有微幅的增長。"},{"id":"C1-1263-peasant","level":"C1","word":"peasant","pos":"n.","meaning":"農民；窮鄉僻壤的人","collocations":"poor peasant, peasant farmer","example":"Peasant farmers rely on seasonal rainfall for their crops.","translation":"農村農民依賴季節性降雨灌溉農作物。"},{"id":"C1-1264-reluctant","level":"C1","word":"reluctant","pos":"adj.","meaning":"不情願的；勉強的","collocations":"be reluctant to, reluctant agreement","example":"She was reluctant to speak publicly about the incident.","translation":"她不願公開談論這起事件。"},{"id":"C1-1265-virtue","level":"C1","word":"virtue","pos":"n.","meaning":"美德；優點；功效","collocations":"virtue of patience, by virtue of","example":"By virtue of her experience, she was the obvious choice.","translation":"憑藉她的豐富經驗，她是不二人選。"},{"id":"C1-1266-supervise","level":"C1","word":"supervise","pos":"v.","meaning":"監督；管理；指導","collocations":"supervise staff, supervise a project","example":"She was appointed to supervise the construction work.","translation":"她被任命負責監督建設工程。"},{"id":"C1-1267-burst","level":"C1","word":"burst","pos":"v./n.","meaning":"爆裂；爆發；衝出","collocations":"burst into tears, burst of energy","example":"She burst into tears when she heard the news.","translation":"聽到這個消息後，她突然淚崩。"},{"id":"C1-1268-spy","level":"C1","word":"spy","pos":"n./v.","meaning":"間諜；偵察；監視","collocations":"spy on, government spy","example":"The novel is about a spy during the Cold War.","translation":"這部小說是關於冷戰時期的一名間諜。"},{"id":"C1-1269-mandate","level":"C1","word":"mandate","pos":"n./v.","meaning":"授權；命令；任務","collocations":"electoral mandate, government mandate","example":"The new government has a mandate to reform the system.","translation":"新政府有授權對這個制度進行改革。"},{"id":"C1-1270-mask","level":"C1","word":"mask","pos":"v./n.","meaning":"掩蓋；面具；口罩","collocations":"wear a mask, mask one's feelings","example":"She masked her anxiety with a confident smile.","translation":"她用自信的笑容掩蓋了內心的焦慮。"},{"id":"C1-1271-clinical","level":"C1","word":"clinical","pos":"adj.","meaning":"臨床的；冷靜客觀的","collocations":"clinical trial, clinical approach","example":"The drug is currently undergoing clinical trials.","translation":"這種藥物目前正在進行臨床試驗。"},{"id":"C1-1272-selective","level":"C1","word":"selective","pos":"adj.","meaning":"有選擇性的；挑剔的","collocations":"selective memory, selective approach","example":"He had a very selective approach to the evidence.","translation":"他對待證據的態度相當有選擇性。"},{"id":"C1-1273-await","level":"C1","word":"await","pos":"v.","meaning":"等候；等待；即將發生","collocations":"await a decision, await trial","example":"The prisoner awaited sentencing with resignation.","translation":"囚犯以認命的心態等待著宣判。"},{"id":"C1-1274-petition","level":"C1","word":"petition","pos":"n./v.","meaning":"請願；陳情；請求","collocations":"sign a petition, file a petition","example":"Over 50,000 people signed the online petition.","translation":"超過五萬人在網路上簽署了這份請願書。"},{"id":"C1-1275-standing","level":"C1","word":"standing","pos":"n./adj.","meaning":"地位；聲譽；持續的","collocations":"long-standing, standing ovation","example":"The judge questioned her legal standing in the case.","translation":"法官對她在案件中的法律地位提出了質疑。"},{"id":"C1-1276-realm","level":"C1","word":"realm","pos":"n.","meaning":"領域；王國；範疇","collocations":"in the realm of, political realm","example":"The discovery pushed the boundaries of the realm of science.","translation":"這項發現突破了科學領域的疆界。"},{"id":"C1-1277-rifle","level":"C1","word":"rifle","pos":"n./v.","meaning":"步槍；仔細搜索；加工線膛","collocations":"assault rifle, rifle through papers","example":"The soldier carried an assault rifle at all times.","translation":"士兵在任何時候都攜帶著一把突擊步槍。"},{"id":"C1-1278-transcript","level":"C1","word":"transcript","pos":"n.","meaning":"文字記錄；成績單；抄本","collocations":"court transcript, academic transcript","example":"The journalist obtained a transcript of the closed meeting.","translation":"記者取得了這場閉門會議的逐字記錄。"},{"id":"B2-1279-ownership","level":"B2","word":"ownership","pos":"n.","meaning":"所有權；物主身份；所有制","collocations":"take ownership of a task, shared ownership, ownership rights","example":"The manager encouraged each team member to take ownership of a specific part of the project.","translation":"經理鼓勵每位團隊成員負責專案中的特定部分。"},{"id":"B2-1280-sufficiently","level":"B2","word":"sufficiently","pos":"adv.","meaning":"足夠；充分","collocations":"sufficiently prepared, sufficiently clear, sufficiently detailed","example":"The instructions were sufficiently clear for new employees to follow without further explanation.","translation":"這些指示夠清楚，新進員工不需要額外說明也能遵循。"},{"id":"B2-1281-precisely","level":"B2","word":"precisely","pos":"adv.","meaning":"精確地；明確地；刻板地；拘泥地","collocations":"precisely because, measure precisely, precisely the same","example":"Please tell me precisely what happened after the lights went out.","translation":"請精確告訴我燈熄滅後發生了什麼事。"},{"id":"B2-1282-phase","level":"B2","word":"phase","pos":"n.","meaning":"時期；局面；方面；位相","collocations":"initial phase, final phase, phase of development","example":"The project has entered its final phase, so every delay now affects the launch date.","translation":"這項專案已進入最後階段，因此現在每一次延誤都會影響發布日期。"},{"id":"B2-1283-evolution","level":"B2","word":"evolution","pos":"n.","meaning":"進化；發展；進展；(氣體)放出","collocations":"gradual evolution, cultural evolution, evolution of technology","example":"The evolution of mobile technology has changed how people work and communicate.","translation":"行動科技的演進改變了人們工作與溝通的方式。"},{"id":"B2-1284-economics","level":"B2","word":"economics","pos":"n.","meaning":"經濟學","collocations":"behavioural economics, basic economics, economics of production","example":"She studied economics to understand how policy decisions influence ordinary households.","translation":"她研讀經濟學，以瞭解政策決策如何影響一般家庭。"},{"id":"B2-1285-ultimately","level":"B2","word":"ultimately","pos":"adv.","meaning":"最後；最終；終究；總之","collocations":"ultimately responsible, ultimately decide, ultimately lead to","example":"You can ask for advice, but you must ultimately make the decision yourself.","translation":"你可以尋求建議，但最終必須自己做決定。"},{"id":"B2-1286-amusing","level":"B2","word":"amusing","pos":"adj.","meaning":"有趣的；引人發笑的","collocations":"amusing story, amusing moment, find it amusing","example":"The story was amusing, but it also taught the class an important lesson.","translation":"這個故事很有趣，但也教了全班一個重要的道理。"},{"id":"B2-1287-motivation","level":"B2","word":"motivation","pos":"n.","meaning":"動機；刺激；推動；促動","collocations":"strong motivation, lack of motivation, motivation to succeed","example":"Clear feedback can increase students' motivation to improve their writing.","translation":"明確的回饋能提升學生改進寫作的動機。"},{"id":"B2-1288-widely","level":"B2","word":"widely","pos":"adv.","meaning":"廣泛地","collocations":"widely used, widely accepted, widely discussed","example":"The new teaching method is now widely used in public schools.","translation":"這種新的教學方法現在已在公立學校廣泛使用。"},{"id":"B2-1289-candle","level":"B2","word":"candle","pos":"n.","meaning":"蠟燭；對著光檢查","collocations":"a candle, use the candle, place the candle","example":"She put the candle on the table before everyone arrived.","translation":"她在大家抵達前，把「蠟燭」放在桌上。"},{"id":"B2-1290-perspective","level":"B2","word":"perspective","pos":"n.","meaning":"遠景；透視感；(觀察問題的)視角；透視法","collocations":"from a different perspective, broad perspective, personal perspective","example":"The visit helped the students see the issue from a wider social perspective.","translation":"這次參訪幫助學生從更廣的社會觀點看待這個議題。"},{"id":"B2-1291-outer","level":"B2","word":"outer","pos":"adj.","meaning":"外部的；外面的","collocations":"outer layer, outer space, outer edge","example":"The outer layer of the jacket kept him dry in the rain.","translation":"外套的外層讓他在雨中保持乾爽。"},{"id":"B2-1292-fantasy","level":"B2","word":"fantasy","pos":"n.","meaning":"幻想；想象的產物","collocations":"live in a fantasy, fantasy world, childhood fantasy","example":"As a child, he loved stories set in a fantasy world full of magic.","translation":"小時候，他喜歡發生在充滿魔法的奇幻世界中的故事。"},{"id":"B2-1293-outstanding","level":"B2","word":"outstanding","pos":"adj.","meaning":"傑出的；突出的；未償付的；未決定的","collocations":"outstanding performance, outstanding result, outstanding student","example":"Her outstanding performance in the final game surprised everyone.","translation":"她在決賽中的傑出表現讓所有人驚訝。"},{"id":"B2-1294-tap","level":"B2","word":"tap","pos":"n.","meaning":"輕打；水龍頭；輕敲；敲打出","collocations":"turn on the tap, tap water, bathroom tap","example":"Please turn off the tap while you brush your teeth.","translation":"刷牙時請把水龍頭關掉。"},{"id":"B2-1295-adequate","level":"B2","word":"adequate","pos":"adj.","meaning":"適當的；足夠的；勝任的；充分的","collocations":"adequate time, adequate support, adequate explanation","example":"The students were given adequate time to finish the test carefully.","translation":"學生獲得足夠時間，可以仔細完成測驗。"},{"id":"B2-1296-loan","level":"B2","word":"loan","pos":"n.","meaning":"貸款；借出；借；供應貨款","collocations":"take out a loan, bank loan, repay a loan","example":"They took out a loan to buy a small apartment near the station.","translation":"他們貸款買下車站附近的一間小公寓。"},{"id":"B2-1297-darkness","level":"B2","word":"darkness","pos":"n.","meaning":"黑暗；暗；深色；隱密","collocations":"complete darkness, fear of darkness, disappear into darkness","example":"The children held hands as they walked home in complete darkness.","translation":"孩子們在一片漆黑中手牽手走回家。"},{"id":"B2-1298-derive","level":"B2","word":"derive","pos":"v.","meaning":"得自；起源","collocations":"derive from, derive benefit from, derive meaning from","example":"The researchers derived their conclusion from several years of observation.","translation":"研究人員從數年的觀察中得出結論。"},{"id":"B2-1299-mixed","level":"B2","word":"mixed","pos":"adj.","meaning":"混合的；形形色色的；弄糊塗的","collocations":"mixed feelings, mixed results, mixed reaction","example":"I had mixed feelings about leaving my old school.","translation":"對於離開舊學校，我有複雜的感受。"},{"id":"B2-1300-temporary","level":"B2","word":"temporary","pos":"adj.","meaning":"暫時的；臨時的；臨時工；臨時僱員","collocations":"temporary job, temporary solution, temporary problem","example":"The family moved into a temporary apartment while their house was repaired.","translation":"房子修繕期間，這家人搬進一間臨時公寓。"},{"id":"B2-1301-balloon","level":"B2","word":"balloon","pos":"n.","meaning":"氣球；使成氣球狀；膨脹如氣球；激增","collocations":"a balloon, use the balloon, place the balloon","example":"Please move the balloon away from the edge of the desk.","translation":"請把「氣球」從桌子邊緣移開。"},{"id":"B2-1302-exploration","level":"B2","word":"exploration","pos":"n.","meaning":"探險；踏勘；探測；探察","collocations":"changes in exploration, a lack of exploration, focus on exploration","example":"We saw how exploration can change people's plans.","translation":"我們看到「探險」如何改變人們的計畫。"},{"id":"B2-1303-dynamic","level":"B2","word":"dynamic","pos":"adj.","meaning":"動態的；有活力的；有力的；動力的","collocations":"dynamic team, dynamic city, dynamic relationship","example":"The class became more dynamic when students started asking their own questions.","translation":"當學生開始提出自己的問題時，課堂變得更有活力。"},{"id":"B2-1304-beg","level":"B2","word":"beg","pos":"v.","meaning":"乞求；乞討；請求","collocations":"beg for help, beg someone to stay, beg for forgiveness","example":"The child begged his parents for one more story before bed.","translation":"睡前，那個孩子求父母再講一個故事。"},{"id":"B2-1305-truly","level":"B2","word":"truly","pos":"adv.","meaning":"真實地；不假","collocations":"truly important, truly understand, truly believe","example":"The experience helped her truly understand the pressure faced by young workers.","translation":"這次經驗幫助她真正理解年輕工作者面臨的壓力。"},{"id":"B2-1306-broadly","level":"B2","word":"broadly","pos":"adv.","meaning":"寬廣地；明白地；無禮貌地","collocations":"broadly similar, broadly speaking, broadly support","example":"The two houses are broadly similar, although one has a larger garden.","translation":"這兩棟房子大致相似，雖然其中一棟有較大的花園。"},{"id":"B2-1307-guideline","level":"B2","word":"guideline","pos":"n.","meaning":"指導路線；方針；指標；準則","collocations":"clear guideline, follow guidelines, safety guideline","example":"The school gave parents clear guidelines about what students should bring.","translation":"學校給家長明確的指引，說明學生應該攜帶哪些物品。"},{"id":"B2-1308-orchestra","level":"B2","word":"orchestra","pos":"n.","meaning":"管絃樂隊；樂隊演奏處","collocations":"an orchestra, use the orchestra, place the orchestra","example":"He found the orchestra in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「管絃樂隊」。"},{"id":"B2-1309-origin","level":"B2","word":"origin","pos":"n.","meaning":"起源；起因；出身；開端","collocations":"a sense of origin, learn about origin, talk about origin","example":"Friends may disagree about origin, even when they respect each other.","translation":"朋友即使互相尊重，也可能對「起源」有不同看法。"},{"id":"B2-1310-make-up","level":"B2","word":"make-up","pos":"n.","meaning":"化妝；組成；性格特質","collocations":"wear make-up, put on make-up, make-up artist","example":"She put on a little make-up before the school play.","translation":"她在校內戲劇表演前化了一點妝。"},{"id":"B2-1311-erupt","level":"B2","word":"erupt","pos":"v.","meaning":"爆發；噴出","collocations":"erupt suddenly, erupt over time, begin to erupt","example":"Problems can erupt when people ignore early warning signs.","translation":"當人們忽視早期警訊時，問題可能會「爆發」。"},{"id":"B2-1312-threat","level":"B2","word":"threat","pos":"n.","meaning":"恐嚇；惡兆；威脅","collocations":"serious threat, pose a threat, threat to safety","example":"Air pollution is a serious threat to the health of young children.","translation":"空氣汙染對幼童健康是嚴重威脅。"},{"id":"B2-1313-observation","level":"B2","word":"observation","pos":"n.","meaning":"觀察；注意；觀測；觀察力","collocations":"careful observation, make an observation, direct observation","example":"Careful observation helped the doctor notice a small change in the patient.","translation":"仔細觀察幫助醫師注意到病人的小變化。"},{"id":"B2-1314-found","level":"B2","word":"found","pos":"v.","meaning":"建立；創立；鑄造；find的過去式和過去分詞","collocations":"found a small company, need to found, found carefully","example":"He helped the group found a small company without making the problem worse.","translation":"他幫助小組「建立」一家小公司，而沒有讓問題變得更糟。"},{"id":"B2-1315-rhythm","level":"B2","word":"rhythm","pos":"n.","meaning":"旋律；節奏；韻律；勻稱","collocations":"natural rhythm, sense of rhythm, rhythm of life","example":"The song has a simple rhythm that is easy for children to follow.","translation":"這首歌有簡單的節奏，孩子很容易跟上。"},{"id":"B2-1316-hip","level":"B2","word":"hip","pos":"n.","meaning":"臀部；薔薇果；憂鬱；熟悉內情的","collocations":"hip pain, hip injury, hands on hips","example":"She put her hands on her hips and waited for an answer.","translation":"她雙手叉腰，等著對方回答。"},{"id":"B2-1317-otherwise","level":"B2","word":"otherwise","pos":"adv.","meaning":"否則；不同地；別的方式","collocations":"otherwise impossible, otherwise stated, otherwise be unable to","example":"Please submit the form today; otherwise, your application may be delayed.","translation":"請今天提交表格；否則你的申請可能會延誤。"},{"id":"B2-1318-satisfied","level":"B2","word":"satisfied","pos":"adj.","meaning":"感到滿意的","collocations":"satisfied with, feel satisfied, satisfied customer","example":"She felt satisfied after finishing a difficult piece of work.","translation":"完成一項困難的工作後，她感到滿意。"},{"id":"B2-1319-speculate","level":"B2","word":"speculate","pos":"v.","meaning":"深思；推測；投機","collocations":"speculate about the cause of the accident, need to speculate, speculate carefully","example":"Our teacher asked us to speculate about the cause of the accident using clear examples.","translation":"老師要求我們用清楚的例子來「深思」事故的原因。"},{"id":"B2-1320-certainty","level":"B2","word":"certainty","pos":"n.","meaning":"確定；確實的事情；肯定；必然的事","collocations":"the importance of certainty, understand certainty, problems with certainty","example":"She wrote a note to remind herself why certainty mattered.","translation":"她寫了一張便條提醒自己為什麼「確定」很重要。"},{"id":"B2-1321-flavour","level":"B2","word":"flavour","pos":"n.","meaning":"味；調味香料；滋味；香味","collocations":"changes in flavour, a lack of flavour, focus on flavour","example":"The book included a chapter about flavour.","translation":"這本書有一章談到「味」。"},{"id":"B2-1322-investment","level":"B2","word":"investment","pos":"n.","meaning":"投資；包埋料；圍模料；包埋法","collocations":"long-term investment, foreign investment, investment in education","example":"Investment in public transport can reduce pollution and improve daily life.","translation":"投資大眾運輸能減少汙染並改善日常生活。"},{"id":"B2-1323-significantly","level":"B2","word":"significantly","pos":"adv.","meaning":"值得注目地；意味深長地","collocations":"change significantly, significantly different, significantly important","example":"The price changed significantly during the holiday season.","translation":"假期期間，價格「值得注目地」變動。"},{"id":"B2-1324-strict","level":"B2","word":"strict","pos":"adj.","meaning":"嚴厲的；絕對的；詳盡的；嚴格的","collocations":"strict rule, strict teacher, strict control","example":"The coach is strict, but players respect him because he is fair.","translation":"教練很嚴格，但球員尊敬他，因為他很公平。"},{"id":"B2-1325-edition","level":"B2","word":"edition","pos":"n.","meaning":"版本；版；翻版","collocations":"latest edition, online edition, special edition","example":"I bought the latest edition of the travel guide.","translation":"我買了最新版的旅遊指南。"},{"id":"B2-1326-rubber","level":"B2","word":"rubber","pos":"n.","meaning":"橡皮；橡膠；做摩擦動作的人；按摩師","collocations":"a rubber, use the rubber, place the rubber","example":"The child pointed at the rubber and asked what it was used for.","translation":"孩子指著「橡皮」，問它是用來做什麼的。"},{"id":"B2-1327-afterwards","level":"B2","word":"afterwards","pos":"adv.","meaning":"然後；後來","collocations":"shortly afterwards, afterwards return, afterwards explain","example":"We had lunch together and went back to class shortly afterwards.","translation":"我們一起吃午餐，不久後就回去上課。"},{"id":"B2-1328-dive","level":"B2","word":"dive","pos":"v.","meaning":"潛水；跳水；俯衝；猛衝","collocations":"dive into, dive deep, go diving","example":"He learned to dive during a holiday by the sea.","translation":"他在海邊度假時學會了潛水。"},{"id":"B2-1329-undertake","level":"B2","word":"undertake","pos":"v.","meaning":"試圖；從事；保證；承擔","collocations":"undertake a detailed review, need to undertake, undertake carefully","example":"Please do not undertake a detailed review until you understand the details.","translation":"在瞭解細節之前，請不要「試圖」詳細審查。"},{"id":"B2-1330-command","level":"B2","word":"command","pos":"n.","meaning":"命令；指揮；控制；部隊","collocations":"give a command, voice command, under command","example":"The dog sat down as soon as it heard the command.","translation":"那隻狗一聽到命令就坐下。"},{"id":"B2-1331-fame","level":"B2","word":"fame","pos":"n.","meaning":"名望；名聲；傳說","collocations":"the importance of fame, understand fame, problems with fame","example":"A short story helped the class discuss fame.","translation":"一個短篇故事幫助全班討論「名望」。"},{"id":"B2-1332-cave","level":"B2","word":"cave","pos":"n.","meaning":"洞；穴；凹陷；塌落","collocations":"a cave, use the cave, place the cave","example":"She put the cave on the table before everyone arrived.","translation":"她在大家抵達前，把「洞」放在桌上。"},{"id":"B2-1333-manufacture","level":"B2","word":"manufacture","pos":"v.","meaning":"產品；製造；假造","collocations":"manufacture medical equipment, need to manufacture, manufacture carefully","example":"Please do not manufacture medical equipment until you understand the details.","translation":"在瞭解細節之前，請不要「產品」醫療設備。"},{"id":"B2-1334-propose","level":"B2","word":"propose","pos":"v.","meaning":"計劃；打算；建議；提議","collocations":"propose a practical solution, need to propose, propose carefully","example":"They had to propose a practical solution before the end of the week.","translation":"他們必須在週末前「計劃」可行的解決方案。"},{"id":"B2-1335-conduct","level":"B2","word":"conduct","pos":"v.","meaning":"進行；執行；指揮","collocations":"conduct a survey, conduct research, conduct an interview","example":"The team conducted a survey to understand why residents opposed the plan.","translation":"團隊進行了一項調查，以瞭解居民為何反對這項計畫。"},{"id":"B2-1336-labour","level":"B2","word":"labour","pos":"n.","meaning":"勞動；努力；工作；勞工","collocations":"labour market, manual labour, labour costs","example":"The farm needs extra labour during the summer.","translation":"這座農場夏天需要額外勞力。"},{"id":"B2-1337-packet","level":"B2","word":"packet","pos":"n.","meaning":"小包；一批信件；大量；信息包","collocations":"a packet, use the packet, place the packet","example":"The child pointed at the packet and asked what it was used for.","translation":"孩子指著「小包」，問它是用來做什麼的。"},{"id":"B2-1338-tough","level":"B2","word":"tough","pos":"adj.","meaning":"艱難的；堅強的","collocations":"tough decision, tough time, tough question","example":"It was a tough decision, but she knew it was the right one.","translation":"那是個艱難的決定，但她知道那是正確的選擇。"},{"id":"B2-1339-rival","level":"B2","word":"rival","pos":"n.","meaning":"對手；競爭者；競爭的","collocations":"main rival, business rival, rival team","example":"Our main rival lowered its prices, so we had to improve our service.","translation":"我們的主要競爭對手降低價格，因此我們必須改善服務。"},{"id":"B2-1340-zone","level":"B2","word":"zone","pos":"n.","meaning":"地帶；帶；地區；環繞","collocations":"danger zone, time zone, safety zone","example":"Cars are not allowed inside the safety zone near the school.","translation":"車輛不得進入學校附近的安全區域。"},{"id":"B2-1341-detailed","level":"B2","word":"detailed","pos":"adj.","meaning":"詳細的；複雜的；詳盡的","collocations":"detailed explanation, detailed plan, detailed information","example":"The teacher gave a detailed explanation after several students looked confused.","translation":"幾位學生看起來困惑後，老師給了詳細的說明。"},{"id":"B2-1342-neat","level":"B2","word":"neat","pos":"adj.","meaning":"整潔的；巧妙的；勻稱的；簡潔的","collocations":"neat room, neat handwriting, neat solution","example":"Please keep your desk neat so you can find your books easily.","translation":"請保持書桌整潔，這樣你才能輕鬆找到書本。"},{"id":"B2-1343-multiple","level":"B2","word":"multiple","pos":"n.","meaning":"倍數；並聯；多樣的；許多的","collocations":"a sense of multiple, learn about multiple, talk about multiple","example":"My friend gave a clear example of multiple.","translation":"我的朋友舉了一個清楚的「倍數」例子。"},{"id":"B2-1344-initial","level":"B2","word":"initial","pos":"adj.","meaning":"最初的；開始的","collocations":"initial plan, initial reaction, initial stage","example":"My initial plan was to study at home, but I went to the library instead.","translation":"我原本的計畫是在家讀書，但後來去了圖書館。"},{"id":"B2-1345-consideration","level":"B2","word":"consideration","pos":"n.","meaning":"考慮；原因；思考；報酬","collocations":"changes in consideration, a lack of consideration, focus on consideration","example":"One clear example made consideration easier to understand.","translation":"一個清楚的例子讓「考慮」更容易理解。"},{"id":"B2-1346-besides","level":"B2","word":"besides","pos":"adv.","meaning":"除...之外；而且；此外","collocations":"besides that, besides being useful, besides the cost","example":"I do not want to go out tonight; besides, I still have homework to finish.","translation":"我今晚不想出門；此外，我還有作業要完成。"},{"id":"B2-1347-testing","level":"B2","word":"testing","pos":"n.","meaning":"測試；吃力的；試驗的","collocations":"the importance of testing, understand testing, problems with testing","example":"My friend gave a clear example of testing.","translation":"我的朋友舉了一個清楚的「測試」例子。"},{"id":"B2-1348-metaphor","level":"B2","word":"metaphor","pos":"n.","meaning":"隱喻","collocations":"a sense of metaphor, learn about metaphor, talk about metaphor","example":"She learned about metaphor after making a mistake.","translation":"她犯錯之後，學到了關於「隱喻」的事。"},{"id":"B2-1349-workplace","level":"B2","word":"workplace","pos":"n.","meaning":"工作場所；工廠；車間","collocations":"safe workplace, workplace culture, workplace stress","example":"A clean workplace helps people work more comfortably.","translation":"乾淨的工作場所能讓人工作得更舒服。"},{"id":"B2-1350-mission","level":"B2","word":"mission","pos":"n.","meaning":"任務；代表團；使命；傳教團","collocations":"changes in mission, a lack of mission, focus on mission","example":"I noticed mission in a news story last night.","translation":"昨晚我在一則新聞中注意到「任務」。"},{"id":"B2-1351-temporarily","level":"B2","word":"temporarily","pos":"adv.","meaning":"暫時；一時；臨時","collocations":"temporarily closed, temporarily unavailable, temporarily suspended","example":"The library was temporarily closed while workers repaired the roof.","translation":"工人修理屋頂期間，圖書館暫時關閉。"},{"id":"B2-1352-somewhat","level":"B2","word":"somewhat","pos":"adv.","meaning":"某物；幾分；多少","collocations":"change somewhat, somewhat different, somewhat important","example":"The room was somewhat quieter after they closed the windows.","translation":"他們關上窗戶後，房間「某物」安靜許多。"},{"id":"B2-1353-jail","level":"B2","word":"jail","pos":"n.","meaning":"監牢；監獄；拘留所；監禁","collocations":"a jail, use the jail, place the jail","example":"He found the jail in a drawer while cleaning his room.","translation":"他打掃房間時，在抽屜裡找到「監牢」。"},{"id":"B2-1354-disk","level":"B2","word":"disk","pos":"n.","meaning":"圓盤；磁盤","collocations":"a disk, use the disk, place the disk","example":"The child pointed at the disk and asked what it was used for.","translation":"孩子指著「圓盤」，問它是用來做什麼的。"},{"id":"B2-1355-convert","level":"B2","word":"convert","pos":"v.","meaning":"轉換；改變","collocations":"convert into, convert files, convert money","example":"This app can convert photos into PDF files in a few seconds.","translation":"這個應用程式能在幾秒內把照片轉成 PDF 檔。"},{"id":"B2-1356-flash","level":"B2","word":"flash","pos":"n.","meaning":"閃光；閃現；一瞬間；反射","collocations":"the importance of flash, understand flash, problems with flash","example":"It took me a while to understand flash.","translation":"我花了一段時間才理解「閃光」。"},{"id":"B2-1357-expense","level":"B2","word":"expense","pos":"n.","meaning":"費用；代價；開支；損失","collocations":"living expense, at great expense, cover the expense","example":"Rent is our biggest monthly expense.","translation":"房租是我們每月最大的開支。"},{"id":"B2-1358-distribution","level":"B2","word":"distribution","pos":"n.","meaning":"分配；分佈","collocations":"the importance of distribution, understand distribution, problems with distribution","example":"She searched online for more information about distribution.","translation":"她上網搜尋更多關於「分配」的資訊。"},{"id":"B2-1359-controversial","level":"B2","word":"controversial","pos":"adj.","meaning":"爭論的；論爭的；被議論的","collocations":"controversial decision, controversial topic, highly controversial","example":"The new rule was controversial because many students thought it was unfair.","translation":"這項新規定引發爭議，因為許多學生認為它不公平。"},{"id":"B2-1360-dramatically","level":"B2","word":"dramatically","pos":"adv.","meaning":"戲劇地；引人注目地；突然地","collocations":"change dramatically, dramatically different, dramatically important","example":"The price changed dramatically during the holiday season.","translation":"假期期間，價格「戲劇地」變動。"},{"id":"B2-1361-phenomenon","level":"B2","word":"phenomenon","pos":"n.","meaning":"現象；跡象；表現；奇蹟","collocations":"social phenomenon, natural phenomenon, explain a phenomenon","example":"Online learning has become a global phenomenon since schools adopted digital tools.","translation":"自從學校採用數位工具後，線上學習已成為全球現象。"},{"id":"B2-1362-senior","level":"B2","word":"senior","pos":"adj.","meaning":"資深的；年長的；高年級的","collocations":"senior manager, senior student, senior citizen","example":"Senior students helped new students find their classrooms.","translation":"高年級學生幫新生找到教室。"},{"id":"B2-1363-cheer","level":"B2","word":"cheer","pos":"n.","meaning":"愉快；振奮；歡呼；喝彩","collocations":"cheer loudly, cheer for a team, give a cheer","example":"The crowd began to cheer when the players walked onto the field.","translation":"球員走上球場時，觀眾開始歡呼。"},{"id":"B2-1364-format","level":"B2","word":"format","pos":"n.","meaning":"開本；版式；形式；格式","collocations":"file format, correct format, change the format","example":"Please save the document in the correct format before sending it.","translation":"寄出前，請把文件存成正確格式。"},{"id":"B2-1365-passionate","level":"B2","word":"passionate","pos":"adj.","meaning":"熱情的；熱烈的；易怒的；熱戀的","collocations":"passionate about, passionate speech, passionate supporter","example":"She is passionate about music and practises the piano every day.","translation":"她熱愛音樂，每天練習鋼琴。"},{"id":"B2-1366-sum","level":"B2","word":"sum","pos":"n.","meaning":"總數；總和；金額；概要","collocations":"changes in sum, a lack of sum, focus on sum","example":"She wrote a note to remind herself why sum mattered.","translation":"她寫了一張便條提醒自己為什麼「總數」很重要。"},{"id":"B2-1367-principal","level":"B2","word":"principal","pos":"n.","meaning":"校長；主要的；本金","collocations":"school principal, principal reason, principal amount","example":"The principal spoke to the students about respect and safety.","translation":"校長向學生談論尊重與安全。"},{"id":"B2-1368-password","level":"B2","word":"password","pos":"n.","meaning":"密碼；口令；通行手段","collocations":"the importance of password, understand password, problems with password","example":"We heard about password during a conversation at lunch.","translation":"我們午餐聊天時聽到了「密碼」。"},{"id":"B2-1369-regulation","level":"B2","word":"regulation","pos":"n.","meaning":"規則；管理；調整；規章","collocations":"strict regulation, government regulation, safety regulation","example":"Stronger regulation is needed to protect consumers from misleading advertisements.","translation":"需要更嚴格的規範來保護消費者免受誤導性廣告影響。"},{"id":"B2-1370-commitment","level":"B2","word":"commitment","pos":"n.","meaning":"委託；交押；承擔義務；贊助","collocations":"strong commitment, long-term commitment, commitment to quality","example":"The agreement shows the company's commitment to reducing waste.","translation":"這項協議顯示公司致力於減少浪費。"},{"id":"B2-1371-panel","level":"B2","word":"panel","pos":"n.","meaning":"嵌板；儀表板；專題討論小組；全體陪審員","collocations":"a panel, use the panel, place the panel","example":"Please move the panel away from the edge of the desk.","translation":"請把「嵌板」從桌子邊緣移開。"},{"id":"B2-1372-offender","level":"B2","word":"offender","pos":"n.","meaning":"罪犯；無禮的人；得罪人的人","collocations":"first-time offender, young offender, repeat offender","example":"The judge gave the young offender a chance to attend counselling.","translation":"法官給這名年輕犯人一次接受輔導的機會。"},{"id":"B2-1373-extend","level":"B2","word":"extend","pos":"v.","meaning":"擴充；延伸；伸展；擴大","collocations":"extend the deadline, need to extend, extend carefully","example":"They had to extend the deadline before the end of the week.","translation":"他們必須在週末前「擴充」期限。"},{"id":"B2-1374-stance","level":"B2","word":"stance","pos":"n.","meaning":"準備擊球姿勢；站立的姿勢；位置；姿態","collocations":"changes in stance, a lack of stance, focus on stance","example":"I noticed stance in a news story last night.","translation":"昨晚我在一則新聞中注意到「準備擊球姿勢」。"},{"id":"B2-1375-modify","level":"B2","word":"modify","pos":"v.","meaning":"修正；變更；修飾；緩和","collocations":"modify the design, need to modify, modify carefully","example":"They had to modify the design before the end of the week.","translation":"他們必須在週末前「修正」設計。"},{"id":"B2-1376-monument","level":"B2","word":"monument","pos":"n.","meaning":"紀念碑；紀念物；石碑","collocations":"the importance of monument, understand monument, problems with monument","example":"We heard about monument during a conversation at lunch.","translation":"我們午餐聊天時聽到了「紀念碑」。"},{"id":"B2-1377-deliberate","level":"B2","word":"deliberate","pos":"adj.","meaning":"深思熟慮的；故意的；從容的；仔細考慮","collocations":"feel deliberate, seem deliberate, a deliberate day","example":"She made a deliberate choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「深思熟慮的」的選擇。"},{"id":"B2-1378-weakness","level":"B2","word":"weakness","pos":"n.","meaning":"虛弱；薄弱；弱點；欲振乏力","collocations":"the importance of weakness, understand weakness, problems with weakness","example":"Parents often talk about weakness when planning for the future.","translation":"父母規劃未來時，常會談到「虛弱」。"},{"id":"B2-1379-refugee","level":"B2","word":"refugee","pos":"n.","meaning":"難民；流亡者；避難者","collocations":"refugee camp, refugee crisis, accept refugees","example":"The organization provides legal advice to refugees who are rebuilding their lives.","translation":"該組織為正在重建生活的難民提供法律建議。"},{"id":"B2-1380-robbery","level":"B2","word":"robbery","pos":"n.","meaning":"搶掠；搶奪；強盜；搶劫","collocations":"armed robbery, bank robbery, robbery suspect","example":"The shop closed early after a robbery in the same street.","translation":"同一條街發生搶案後，這家店提早關門。"},{"id":"B2-1381-specialist","level":"B2","word":"specialist","pos":"n.","meaning":"專門醫師；專家；專業的；專家的","collocations":"a specialist, work as a specialist, ask a specialist","example":"We asked a specialist for advice before making the decision.","translation":"做決定前，我們向一位「專門醫師」請教。"},{"id":"B2-1382-elbow","level":"B2","word":"elbow","pos":"n.","meaning":"手肘；彎頭；扶手；用手肘推開","collocations":"an elbow, use the elbow, place the elbow","example":"The child pointed at the elbow and asked what it was used for.","translation":"孩子指著「手肘」，問它是用來做什麼的。"},{"id":"B2-1383-notebook","level":"B2","word":"notebook","pos":"n.","meaning":"筆記本；手冊；期票簿","collocations":"a notebook, use the notebook, place the notebook","example":"She put the notebook on the table before everyone arrived.","translation":"她在大家抵達前，把「筆記本」放在桌上。"},{"id":"B2-1384-institution","level":"B2","word":"institution","pos":"n.","meaning":"機構；慣例；制度；機關","collocations":"changes in institution, a lack of institution, focus on institution","example":"He used a drawing to show the meaning of institution.","translation":"他用一張圖來說明「機構」的意思。"},{"id":"B2-1385-shortly","level":"B2","word":"shortly","pos":"adv.","meaning":"不久；簡短；唐突地","collocations":"shortly after, shortly before, arrive shortly","example":"The results were announced shortly after the voting had ended.","translation":"投票結束後不久，結果便公佈了。"},{"id":"B2-1386-upper","level":"B2","word":"upper","pos":"adj.","meaning":"上面的；較高的；上級的；上院的","collocations":"look upper, feel upper, become upper","example":"Be careful on the upper path after it rains.","translation":"下雨後走在「上面的」的小路上要小心。"},{"id":"B2-1387-settler","level":"B2","word":"settler","pos":"n.","meaning":"移民者；解決者；結算員；沉澱池","collocations":"early settler, European settler, settler community","example":"The museum shows how early settlers built homes near the river.","translation":"博物館展示早期移民如何在河邊建造住屋。"},{"id":"B2-1388-partly","level":"B2","word":"partly","pos":"adv.","meaning":"部分地；在一定程度上","collocations":"change partly, partly different, partly important","example":"His answer was partly different from what I expected.","translation":"他的回答和我預期的「部分地」不同。"},{"id":"B2-1389-bacteria","level":"B2","word":"bacteria","pos":"n.","meaning":"細菌；桿菌","collocations":"harmful bacteria, bacteria grow, kill bacteria","example":"Proper hand washing can prevent harmful bacteria from spreading in schools.","translation":"正確洗手能防止有害細菌在學校中傳播。"},{"id":"B2-1390-integrate","level":"B2","word":"integrate","pos":"v.","meaning":"綜合；使完整；使成整體；成一體","collocations":"integrate into society, integrate data, integrate technology","example":"The new system will integrate customer data from several departments.","translation":"新系統將整合來自數個部門的客戶資料。"},{"id":"B2-1391-unacceptable","level":"B2","word":"unacceptable","pos":"adj.","meaning":"無法接受的；不受歡迎的；不能接受的；難以承認的","collocations":"unacceptable advice, unacceptable reason, unacceptable choice","example":"That was a unacceptable choice for a family on a tight budget.","translation":"對預算有限的家庭來說，那是個「無法接受的」的選擇。"},{"id":"B2-1392-rail","level":"B2","word":"rail","pos":"n.","meaning":"橫杆；圍欄；欄杆；鐵軌","collocations":"a rail, use the rail, place the rail","example":"The old rail reminded her of her grandfather's house.","translation":"那個舊「橫杆」讓她想起祖父的家。"},{"id":"B2-1393-steam","level":"B2","word":"steam","pos":"n.","meaning":"蒸汽；精力；蒸汽的；蒸發","collocations":"a steam, use the steam, place the steam","example":"Please move the steam away from the edge of the desk.","translation":"請把「蒸汽」從桌子邊緣移開。"},{"id":"B2-1394-operator","level":"B2","word":"operator","pos":"n.","meaning":"操作員；行家；經紀人；算子","collocations":"an operator, work as an operator, ask an operator","example":"My neighbour works as an operator in the city.","translation":"我的鄰居在城裡擔任「操作員」。"},{"id":"B2-1395-restrict","level":"B2","word":"restrict","pos":"v.","meaning":"限制；限定；約束","collocations":"restrict public access, need to restrict, restrict carefully","example":"They had to restrict public access before the end of the week.","translation":"他們必須在週末前「限制」公眾進入。"},{"id":"B2-1396-pose","level":"B2","word":"pose","pos":"n.","meaning":"姿勢；姿態；裝模作樣；偽裝","collocations":"the importance of pose, understand pose, problems with pose","example":"A simple classroom activity showed us pose.","translation":"一個簡單的課堂活動讓我們看見「姿勢」。"},{"id":"B2-1397-apology","level":"B2","word":"apology","pos":"n.","meaning":"道歉；辯護；謝罪；辯解者","collocations":"the importance of apology, understand apology, problems with apology","example":"The conversation at home turned to apology after dinner.","translation":"晚餐後，家裡的談話轉到了「道歉」。"},{"id":"B2-1398-drag","level":"B2","word":"drag","pos":"n.","meaning":"拖；拖累；拖拉；沉重緩慢地走","collocations":"a sense of drag, learn about drag, talk about drag","example":"My friend gave a clear example of drag.","translation":"我的朋友舉了一個清楚的「拖」例子。"},{"id":"B2-1399-establish","level":"B2","word":"establish","pos":"v.","meaning":"建立；確立；制定；移植生長","collocations":"establish a relationship, establish rules, establish a company","example":"The school established clear rules to prevent unfair treatment.","translation":"學校建立了明確規則，以防止不公平對待。"},{"id":"B2-1400-former","level":"B2","word":"former","pos":"adj.","meaning":"從前的；前者的；起形成作用的人(或物)；模型","collocations":"feel former, seem former, a former day","example":"She made a former choice after listening to her parents.","translation":"聽完父母的意見後，她做了一個「從前的」的選擇。"},{"id":"B2-1401-willing","level":"B2","word":"willing","pos":"adj.","meaning":"樂意的；願意的","collocations":"willing to help, willing to try, willing participant","example":"She is always willing to help classmates who miss a lesson.","translation":"她總是願意幫助缺課的同學。"},{"id":"B2-1402-settle","level":"B2","word":"settle","pos":"v.","meaning":"解決；定居；安頓","collocations":"settle a dispute, settle in a city, settle the bill","example":"Both sides agreed to settle the dispute through further negotiation.","translation":"雙方同意透過進一步協商解決爭端。"},{"id":"B2-1403-praise","level":"B2","word":"praise","pos":"n.","meaning":"讚美；稱讚；崇拜；讚揚","collocations":"receive praise, praise for, words of praise","example":"The student received praise for helping a new classmate.","translation":"那位學生因幫助新同學而受到稱讚。"},{"id":"B2-1404-expectation","level":"B2","word":"expectation","pos":"n.","meaning":"期待；指望；展望；期望值","collocations":"high expectation, meet expectations, public expectation","example":"The service failed to meet customers' expectations during the holiday season.","translation":"這項服務在假期期間未能符合顧客期待。"},{"id":"B2-1405-pitch","level":"B2","word":"pitch","pos":"n.","meaning":"程度；坡度；頂點；前傾","collocations":"football pitch, sales pitch, pitch a tent","example":"The children played football on the pitch behind the school.","translation":"孩子們在學校後面的球場踢足球。"},{"id":"B2-1406-illustration","level":"B2","word":"illustration","pos":"n.","meaning":"例證；插圖","collocations":"changes in illustration, a lack of illustration, focus on illustration","example":"The lesson connected illustration to things we see every day.","translation":"這堂課把「例證」和我們每天看見的事物連結起來。"},{"id":"B2-1407-lower","level":"B2","word":"lower","pos":"adj.","meaning":"低的；下級的；下層的；降低","collocations":"look lower, feel lower, become lower","example":"The lower part of the bag tore while he was carrying books.","translation":"他背書時，袋子「低的」的部分破了。"},{"id":"B2-1408-literally","level":"B2","word":"literally","pos":"adv.","meaning":"逐字地；按照字面上地；不誇張地","collocations":"use literally for emphasis, place literally in a sentence, literally in formal writing","example":"She explained the answer literally so her brother could follow each step.","translation":"她以「逐字地」的方式解釋答案，讓弟弟能跟上每一步。"},{"id":"B2-1409-fortunate","level":"B2","word":"fortunate","pos":"adj.","meaning":"幸運的；幸福的","collocations":"fortunate enough, feel fortunate, fortunate situation","example":"We were fortunate to find a doctor who spoke our language.","translation":"我們很幸運找到一位會說我們語言的醫師。"},{"id":"B2-1410-furthermore","level":"B2","word":"furthermore","pos":"adv.","meaning":"此外；而且","collocations":"furthermore, it shows; furthermore important; furthermore necessary","example":"The plan reduces costs; furthermore, it improves the quality of service.","translation":"這項計畫降低成本；此外，它也提升服務品質。"},{"id":"B2-1411-thoroughly","level":"B2","word":"thoroughly","pos":"adv.","meaning":"徹底地；絕對地；透徹地；詳盡地","collocations":"use thoroughly for emphasis, place thoroughly in a sentence, thoroughly in formal writing","example":"She explained the answer thoroughly so her brother could follow each step.","translation":"她以「徹底地」的方式解釋答案，讓弟弟能跟上每一步。"},{"id":"B2-1412-sweep","level":"B2","word":"sweep","pos":"n.","meaning":"掃除；打掃；肅清；視野","collocations":"sweep the floor, sweep away, clean sweep","example":"Please sweep the floor after the guests leave.","translation":"客人離開後，請把地板掃一掃。"},{"id":"B2-1413-stimulate","level":"B2","word":"stimulate","pos":"v.","meaning":"刺激；激勵；鼓舞；起刺激作用","collocations":"stimulate local growth, need to stimulate, stimulate carefully","example":"They had to stimulate local growth before the end of the week.","translation":"他們必須在週末前「刺激」地方成長。"},{"id":"B2-1414-entire","level":"B2","word":"entire","pos":"adj.","meaning":"全部的；整個的","collocations":"entire family, entire day, entire building","example":"The entire family helped clean the house before the guests arrived.","translation":"客人抵達前，全家人一起打掃房子。"},{"id":"B2-1415-flame","level":"B2","word":"flame","pos":"n.","meaning":"火焰；強烈情感","collocations":"a flame, use the flame, place the flame","example":"The child pointed at the flame and asked what it was used for.","translation":"孩子指著「火焰」，問它是用來做什麼的。"},{"id":"B2-1416-gesture","level":"B2","word":"gesture","pos":"n.","meaning":"手勢；姿態；作手勢；作姿態","collocations":"changes in gesture, a lack of gesture, focus on gesture","example":"The book included a chapter about gesture.","translation":"這本書有一章談到「手勢」。"},{"id":"B2-1417-trait","level":"B2","word":"trait","pos":"n.","meaning":"特徵；特性；一筆；少許","collocations":"changes in trait, a lack of trait, focus on trait","example":"It took me a while to understand trait.","translation":"我花了一段時間才理解「特徵」。"},{"id":"B2-1418-bitter","level":"B2","word":"bitter","pos":"adj.","meaning":"苦的；痛苦的","collocations":"bitter taste, bitter cold, bitter argument","example":"The coffee tasted bitter because I forgot to add milk.","translation":"這杯咖啡嚐起來很苦，因為我忘了加牛奶。"},{"id":"B2-1419-naked","level":"B2","word":"naked","pos":"adj.","meaning":"裸體的；無裝飾的；無保護的；赤貧的","collocations":"naked eye, naked truth, naked ambition","example":"The damage was so clear that it could be seen with the naked eye.","translation":"損害非常明顯，肉眼就能看見。"},{"id":"B2-1420-input","level":"B2","word":"input","pos":"n.","meaning":"輸入；輸入電路","collocations":"user input, input from, provide input","example":"The teacher asked for student input before choosing the topic.","translation":"老師在選
